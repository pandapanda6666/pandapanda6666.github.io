name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Auto Generate list.json and Hard Replace Directory Fetching
        run: |
          # 💡 1. 深度巡邏 200 個資料夾，全自動在每一個資料夾底下生成專屬的 list.json 清單
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            function traverseAndGenerate(dirPath) {
              const files = fs.readdirSync(dirPath).filter(f => !f.startsWith('.'));
              fs.writeFileSync(path.join(dirPath, 'list.json'), JSON.stringify(files, null, 2));
              
              files.forEach(file => {
                const fullPath = path.join(dirPath, file);
                if (fs.statSync(fullPath).isDirectory()) {
                  traverseAndGenerate(fullPath);
                }
              });
            }
            
            const rootFiles = fs.readdirSync('.').filter(f => !f.startsWith('.') && f !== 'firebase.json');
            rootFiles.forEach(file => {
              if (fs.statSync(file).isDirectory()) {
                traverseAndGenerate(file);
              }
            });
            console.log('🎉 所有子目錄的專屬 list.json 批量生成完畢！');
          "

          # 💡 2. 終極殺手鐧：全自動掃描全站所有的網頁檔案，將所有讀取目錄的代碼特徵，在發布前強制替換為讀取 list.json
          # 這樣不管您原本是用 fetch、XMLHttpRequest 還是 axios，全數都會被硬更新，免去手動修改 200 次！
          find . -name "*.html" -o -name "*.js" | while read file; do
            if [ "$file" != "./.github/workflows/firebase-hosting-merge.yml" ]; then
              # 替換常見的讀取當前目錄特徵 (支援單雙引號與結尾斜線)
              sed -i "s|'./'|'./list.json'|g" "$file"
              sed -i 's|"./"|"./list.json"|g' "$file"
              sed -i "s|'./\?'|'./list.json'|g" "$file"
              sed -i "s|'\.'|'./list.json'|g" "$file"
              sed -i 's|"\."|"./list.json"|g' "$file"
            fi
          done
          echo "🚀 全站 200+ 個網頁原始碼文字硬替換完畢，徹底解鎖目錄讀取！"

      - name: Generate Perfect Clean firebase.json in Memory
        run: |
          # 💡 保持最乾淨的配置，Firebase 只做純粹的高速託管
          cat << 'EOF' > firebase.json
          {
            "hosting": [
              {
                "site": "pandapandaai",
                "public": ".",
                "ignore": ["firebase.json", "**/.*", "**/node_modules/**"]
              }
            ]
          }
          EOF

      - name: Deploy to Firebase Hosting via Official Action
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PANDAPANDAAI }}
          channelId: live
          projectId: pandapandaai
