name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Perfect Clean firebase.json in Memory
        run: |
          # 💡 建立最乾淨的配置，並自動將剛才建立的 sw.js 晶片註冊到全站的 Service-Worker-Allowed 權限中
          cat << 'EOF' > firebase.json
          {
            "hosting": [
              {
                "site": "pandapandaai",
                "public": ".",
                "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
                "cleanUrls": false,
                "trailingSlash": true,
                "headers": [
                  {
                    "source": "/sw.js",
                    "headers": [{ "key": "Service-Worker-Allowed", "value": "/" }]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Deploy to Firebase Hosting via Official Action
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PANDAPANDAAI }}
          channelId: live
          projectId: pandapandaai
