name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'  # 💡 強制啟用最新 Node24 核心
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PANDAPANDAAI }}
          channelId: live
          projectId: pandapandaai
