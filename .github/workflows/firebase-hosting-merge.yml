name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deep Recursion Unlock web.app Hostname in All Pages
        run: |
          # 💡 終極深度解鎖：強制深度搜尋全站所有子目錄下的 index.html 檔案，全自動將 web.app 網域加入白名單！
          find . -type f -name "index.html" | while read file; do
            if [ "$file" != "./.github/workflows/firebase-hosting-merge.yml" ]; then
              # 精準捕捉並替換您的第 117 行防呆機制，讓 Firebase 的 web.app 也能通過 getRepoInfo 的驗證
              sed -i "s|!hostname.includes('github.io')|(!hostname.includes('github.io') \&\& !hostname.includes('web.app'))|g" "$file"
            fi
          done
          echo "🚀 全站 200+ 個子目錄的 Firebase 網域相容性已「深度递归解鎖」完畢！"

      - name: Generate Perfect Clean firebase.json in Memory
        run: |
          # 💡 保持最純淨的配置，Firebase 只做純粹的高速靜態託管，絕不攔截您的 index.html 網頁
          cat << 'EOF' > firebase.json
          {
            "hosting": [
              {
                "site": "pandapandaai",
                "public": ".",
                "ignore": ["firebase.json", "**/.*", "**/node_modules/**"]
              }
            ]
          }
          EOF

      - name: Deploy to Firebase Hosting via Official Action
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PANDAPANDAAI }}
          channelId: live
          projectId: pandapandaai
