name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via Firebase CLI Tools
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS_JSON='${{ secrets.FIREBASE_SERVICE_ACCOUNT_PANDAPANDAAI }}'
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > gcp_key.json
          npx firebase-tools deploy --only hosting --project pandapandaai --config '{"hosting":{"public":"."}}'
