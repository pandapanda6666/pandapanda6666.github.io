name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Perfect Clean firebase.json in Memory
        run: |
          cat << 'EOF' > firebase.json
          {
            "hosting": [
              {
                "public": ".",
                "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
                "rewrites": [
                  { "source": "/hide/**", "site": "pandapandaai-hide" },
                  { "source": "/Capybara/**", "site": "pandapandaai-capybara" },
                  { "source": "/cursor/**", "site": "pandapandaai-cursor" },
                  { "source": "/pandapanda66/**", "site": "pandapandaai-pandapanda6666" },
                  { "source": "/12/**", "site": "pandapandaai-12" },
                  { "source": "/3D-Clawmachine/**", "site": "pandapandaai-3d-clawmachine" },
                  { "source": "/AI-car-time/**", "site": "pandapandaai-ai-car-time" },
                  { "source": "/PandaPanda-game-1-1/**", "site": "pandapandaai-pandapanda-game-1-1" },
                  { "source": "/typssoft-1/**", "site": "pandapandaai-typssoft-1" },
                  { "source": "/SMT/**", "site": "pandapandaai-smt" },
                  { "source": "/Ardublockly/**", "site": "pandapandaai-ardublockly" },
                  { "source": "/TYPS/**", "site": "pandapandaai-typs" },
                  { "source": "/60913-2/**", "site": "pandapandaai-60913-2" },
                  { "source": "/60913/**", "site": "pandapandaai-60913" },
                  { "source": "/60913-1/**", "site": "pandapandaai-60913-1" },
                  { "source": "/pi/**", "site": "pandapandaai-pi" },
                  { "source": "/pandapanda6666-pandapanda6666/**", "site": "pandapandaai-pandapanda6666-pandapanda6666" },
                  { "source": "/1/**", "site": "pandapandaai-1" }
                ]
              }
            ]
          }
          EOF

      - name: Deploy via Firebase CLI Native
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PANDAPANDAAI }}
        run: |
          npx --yes firebase-tools deploy --only hosting --project pandapandaai
