<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統連線與資料同步</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // 版權所有 © 2026 PandaPanda的AI日常 (https://pandapanda6666.github.io) All Rights Reserved.
        
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
            originalWarn.apply(console, args);
        };
        window.onerror = function(msg, url, line) { 
            if (typeof socket !== 'undefined' && socket.connected) socket.emit('logError', { errorMsg: msg, url: url, line: line }); 
        };
        window.addEventListener('unhandledrejection', function(event) {
            if (typeof socket !== 'undefined' && socket.connected) socket.emit('logError', { errorMsg: 'Promise異常: ' + (event.reason ? event.reason.message || event.reason : '未知錯誤'), url: window.location.href, line: 0 });
        });

        const appId = window.location.hostname + window.location.pathname;
        let socket;
        let serverUrl = '';
        let collectedData = {};

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.style.display = 'none', 300);
            }, 3000);
        }

        async function collectUserData() {
            const data = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screen: window.screen.width + 'x' + window.screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                collectTime: new Date().toISOString()
            };
            return data;
        }

        async function initApp() {
            collectedData = await collectUserData();
            const urlParams = new URLSearchParams(window.location.search);
            serverUrl = urlParams.get('server');

            if (!serverUrl) {
                try {
                    const res = await fetch('https://pandapanda6666.github.io/login-hub/server_url.txt');
                    if (res.ok) serverUrl = (await res.text()).trim();
                } catch (e) { console.error("無法取得伺服器位址"); return; }
            }

            socket = io(serverUrl, { transports: ['websocket'] });
            socket.on('connect', () => {
                socket.emit('initClientInfo', { device: navigator.userAgent });
                checkAuthAndProceed(urlParams);
            });

            socket.on('profileData', (data) => {
                window.history.replaceState({}, document.title, window.location.pathname);
                
                // 無論身分，先上傳收集到的資料
                const finalUploadData = { ...collectedData, userProfile: data };
                socket.emit('saveAppData', { appId: appId, data: finalUploadData });

                socket.emit('getSystemContext', (sysRes) => {
                    if (sysRes && sysRes.isAdmin) {
                        showAdminPanel();
                    } else {
                        showProfileUI(data);
                    }
                });
            });
        }

        function checkAuthAndProceed(urlParams) {
            if (urlParams.get('auth') === 'true') {
                const user = urlParams.get('user');
                if (user) socket.emit('requestProfile', { username: user });
            } else {
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('login-btn').style.display = 'block';
            }
        }

        function handleLoginClick() {
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?from=' + encodeURIComponent(window.location.href) + '&require=1';
        }

        function showProfileUI(data) {
            document.getElementById('loading-spinner').style.display = 'none';
            document.getElementById('login-btn').style.display = 'none';
            const profileArea = document.getElementById('profile-area');
            profileArea.style.display = 'flex';
            document.getElementById('profile-nickname').innerText = data.nickname || '玩家';
        }

        function showAdminPanel() {
            document.getElementById('loading-spinner').style.display = 'none';
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'flex';
            document.getElementById('main-container').classList.remove('items-center', 'justify-center');
            document.getElementById('main-container').classList.add('w-full', 'h-full', 'p-8');
            loadAdminData();
        }

        async function loadAdminData() {
            const textArea = document.getElementById('admin-data-view');
            try {
                const response = await fetch(serverUrl + '/apps');
                const data = await response.json();
                const appData = data.apps?.[appId]?.data;
                textArea.value = appData ? JSON.stringify(appData, null, 4) : '目前尚無回傳資料。';
            } catch (e) { textArea.value = '讀取失敗'; }
        }

        function clearAppData() {
            socket.emit('saveAppData', { appId: appId, data: {} });
            showToast('資料已清除');
            loadAdminData();
        }

        window.onload = initApp;
    </script>
</head>
<body class="bg-gray-100 h-screen w-screen flex flex-col items-center justify-center font-sans">
    <div id="toast" style="display: none;" class="absolute top-10 bg-gray-800 text-white px-6 py-3 rounded shadow-lg z-50"></div>
    <main id="main-container" class="flex items-center justify-center w-full max-w-5xl h-full">
        <div id="loading-spinner" class="animate-spin border-4 border-t-blue-600 rounded-full w-10 h-10"></div>
        <button id="login-btn" style="display: none;" onclick="handleLoginClick()" class="bg-blue-600 text-white font-bold py-3 px-10 rounded">登入</button>
        <div id="profile-area" style="display: none;" class="flex-col items-center p-8 bg-white rounded-2xl shadow-sm">
            <span id="profile-nickname" class="font-bold text-2xl"></span>
        </div>
        <div id="admin-panel" style="display: none;" class="flex-col w-full h-full bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-xl font-bold mb-4">管理面板</h2>
            <textarea id="admin-data-view" class="flex-grow w-full border p-4 mb-4" readonly></textarea>
            <div class="flex space-x-4">
                <button onclick="loadAdminData()" class="bg-blue-600 text-white py-2 px-6 rounded">刷新</button>
                <button onclick="clearAppData()" class="bg-red-600 text-white py-2 px-6 rounded">清除所有頁面資料</button>
            </div>
        </div>
    </main>
    <footer class="absolute bottom-2 text-center w-full text-gray-400 text-xs">
        版權所有 © 2026 <a href="https://pandapanda6666.github.io" target="_blank" class="hover:text-gray-600">PandaPanda的AI日常</a> All Rights Reserved.
    </footer>
</body>
</html>
