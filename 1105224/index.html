<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統連線與資料同步</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // 版權所有 © 2026 PandaPanda的AI日常 (https://pandapanda6666.github.io) All Rights Reserved.
        
        // 1. 強制建立連線與全域錯誤捕捉 (後台記錄)
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
            originalWarn.apply(console, args);
        };
        window.onerror = function(msg, url, line) { 
            if (typeof socket !== 'undefined' && socket.connected) socket.emit('logError', { errorMsg: msg, url: url, line: line }); 
        };
        window.addEventListener('unhandledrejection', function(event) {
            if (typeof socket !== 'undefined' && socket.connected) socket.emit('logError', { errorMsg: 'Promise異常: ' + (event.reason ? event.reason.message || event.reason : '未知錯誤'), url: window.location.href, line: 0 });
        });

        const appId = window.location.hostname + window.location.pathname;
        let socket;
        let serverUrl = '';
        let collectedData = {};
        let otherPlayers = {};

        // 獲取定位資料
        function getGeolocation() {
            return new Promise((resolve) => {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            resolve({
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude,
                                accuracy: position.coords.accuracy
                            });
                        },
                        (error) => {
                            resolve({ error: "定位授權失敗或超時" });
                        },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                } else {
                    resolve({ error: "瀏覽器不支援定位功能" });
                }
            });
        }

        // 資料蒐集函數
        async function collectUserData() {
            const data = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screen: window.screen.width + 'x' + window.screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                collectTime: new Date().toISOString()
            };
            
            const geo = await getGeolocation();
            data.location = geo;
            
            return data;
        }

        // 初始化系統
        async function initApp() {
            collectedData = await collectUserData();
            
            const urlParams = new URLSearchParams(window.location.search);
            serverUrl = urlParams.get('server');

            if (!serverUrl) {
                try {
                    const res = await fetch('https://pandapanda6666.github.io/login-hub/server_url.txt');
                    if (!res.ok) throw new Error('Fetch failed');
                    serverUrl = await res.text();
                    serverUrl = serverUrl.trim();
                } catch (e) {
                    // 不在介面顯示錯誤，僅透過拋出異常交由全域捕捉記錄
                    console.error("無法取得伺服器位址");
                    return; 
                }
            }

            socket = io(serverUrl, { transports: ['websocket'] });

            socket.on('connect', () => {
                const locationStr = typeof collectedData.location === 'object' ? JSON.stringify(collectedData.location) : collectedData.location;
                socket.emit('initClientInfo', { location: locationStr || '未知地點', device: navigator.userAgent });
                socket.emit('joinGameRoom', { room: appId, characterData: { status: 'online' } });
                
                socket.emit('getAppData', { appId: appId }, (res) => {
                    // 背景讀取，不顯示於介面
                });

                checkAuthAndProceed(urlParams);
            });

            socket.on('profileData', (data) => {
                window.history.replaceState({}, document.title, window.location.pathname);
                showProfileUI(data);
                
                const finalUploadData = {
                    ...collectedData,
                    userProfile: data
                };
                socket.emit('saveAppData', { appId: appId, data: finalUploadData });
                socket.emit('logAppMessage', { appId: appId, message: '使用者已登入並回傳收集資料', type: 'info', detail: finalUploadData });
            });

            // 背景處理多人連線狀態，但不顯示於介面
            socket.on('playerJoined', (data) => { if(data.allPlayers) otherPlayers = data.allPlayers; });
            socket.on('playerStateUpdated', (data) => { if(otherPlayers[data.id]) otherPlayers[data.id].state = data.state; });
            socket.on('playerLeft', (data) => { if(data.allPlayers) otherPlayers = data.allPlayers; });
            socket.on('appData', (data) => { /* 萬用通道背景接收 */ });
        }

        function checkAuthAndProceed(urlParams) {
            if (urlParams.get('auth') === 'true') {
                const user = urlParams.get('user');
                if (user) {
                    socket.emit('requestProfile', { username: user });
                }
            } else {
                // 載入完成，隱藏動畫並只顯示登入按鈕
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('login-btn').style.display = 'block';
            }
        }

        function handleLoginClick() {
            const returnUrl = encodeURIComponent(window.location.href);
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?from=' + returnUrl + '&require=1';
        }

        function handleProfileClick() {
            const returnUrl = encodeURIComponent(window.location.href);
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?from=' + returnUrl;
        }

        function showProfileUI(data) {
            // 隱藏載入動畫與登入按鈕，顯示個人資料
            document.getElementById('loading-spinner').style.display = 'none';
            document.getElementById('login-btn').style.display = 'none';
            
            const profileArea = document.getElementById('profile-area');
            profileArea.style.display = 'flex';
            
            document.getElementById('profile-nickname').innerText = data.nickname || '玩家';
            if (data.avatar) {
                document.getElementById('profile-avatar').src = data.avatar;
            }
        }

        window.onload = initApp;
    </script>
    <style>
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.05);
            border-radius: 50%;
            border-top: 4px solid #3b82f6;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-white h-screen w-screen flex flex-col items-center justify-center m-0 p-0 overflow-hidden font-sans relative">

    <!-- 絕對置中的內容區塊 -->
    <main class="flex items-center justify-center">
        <!-- 初始顯示的載入動畫 -->
        <div id="loading-spinner" class="spinner"></div>
        
        <!-- 載入完成後顯示的登入按鈕 -->
        <button id="login-btn" style="display: none;" onclick="handleLoginClick()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-10 rounded shadow-md transition text-lg">
            登入
        </button>

        <!-- 登入後顯示的極簡個人資料區塊 -->
        <div id="profile-area" style="display: none;" class="flex-col items-center cursor-pointer hover:bg-gray-50 p-6 rounded-xl transition" onclick="handleProfileClick()">
            <img id="profile-avatar" src="https://via.placeholder.com/80" alt="頭像" class="w-20 h-20 rounded-full border border-gray-200 object-cover mb-4 shadow-sm">
            <span id="profile-nickname" class="font-bold text-gray-800 text-xl"></span>
        </div>
    </main>

    <!-- 頁尾版權宣告 -->
    <footer class="absolute bottom-4 text-center w-full text-gray-300 text-xs">
        版權所有 &copy; 2026 <a href="https://pandapanda6666.github.io" target="_blank" class="hover:text-gray-500 transition">PandaPanda的AI日常</a> All Rights Reserved.
    </footer>

</body>
</html>
