<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PandaPanda的AI日常 - 統一登入中心</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; transition: 0.2s; }
        input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 bg-[url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop')] bg-cover bg-center">

    <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-sm"></div>

    <div id="app" class="relative glass w-full max-w-md rounded-2xl shadow-2xl overflow-hidden p-8 border border-white/20 z-10 my-8">
        <div class="text-center mb-8">
            <h1 id="formTitle" class="text-3xl font-bold text-slate-800 tracking-wide">PandaPanda的AI日常</h1>
            <p id="formSubtitle" class="text-indigo-600 font-medium mt-2">通用帳號登入系統</p>
            <div id="serverStatus" class="inline-block mt-4 px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700 shadow-sm border border-yellow-200">
                正在獲取伺服器資訊...
            </div>
        </div>

        <div id="loginView">
            <div id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">登入帳號</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition shadow-inner" placeholder="請輸入您的帳號">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">登入密碼</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition shadow-inner" placeholder="請輸入您的密碼">
                </div>
                <button onclick="handleLogin()" id="loginBtn" disabled class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all transform active:scale-95 disabled:bg-slate-300 disabled:cursor-not-allowed disabled:transform-none mt-2">
                    登入系統
                </button>
                <div class="flex items-center my-4">
                    <div class="flex-grow border-t border-slate-200"></div>
                    <span class="mx-3 text-slate-400 text-sm font-medium">或</span>
                    <div class="flex-grow border-t border-slate-200"></div>
                </div>
                <button onclick="handleGoogleLogin()" id="googleBtn" disabled class="w-full bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-3.5 rounded-xl flex items-center justify-center transition shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5 mr-3">
                    使用 Google 帳號登入
                </button>
            </div>
            <div class="mt-6 text-center">
                <button onclick="toggleView('register')" class="text-indigo-600 hover:text-indigo-800 text-sm font-bold transition">還沒有帳號？立即註冊</button>
            </div>
        </div>

        <div id="registerView" class="hidden">
            <div id="registerForm" class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">設定帳號 <span class="text-red-500">*</span></label>
                        <input type="text" id="reg_username" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition shadow-inner" placeholder="請輸入帳號">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">設定密碼 <span class="text-red-500">*</span></label>
                        <input type="password" id="reg_password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition shadow-inner" placeholder="請輸入密碼">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">姓氏 <span class="text-red-500">*</span></label>
                        <input type="text" id="reg_lastName" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition shadow-inner" placeholder="例: 王">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">名字 <span class="text-red-500">*</span></label>
                        <input type="text" id="reg_firstName" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition shadow-inner" placeholder="例: 小明">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">性別 <span class="text-red-500">*</span></label>
                        <select id="reg_gender" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition shadow-inner bg-white">
                            <option value="">請選擇</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">生日 <span class="text-red-500">*</span></label>
                        <input type="date" id="reg_birthday" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition shadow-inner">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">聯絡電話</label>
                    <input type="tel" id="reg_phone" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition shadow-inner" placeholder="請輸入聯絡電話 (選填)">
                </div>
                
                <button onclick="handleRegister()" id="registerBtn" disabled class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all transform active:scale-95 disabled:bg-slate-300 disabled:cursor-not-allowed disabled:transform-none mt-4">
                    送出註冊資料
                </button>
                <div class="mt-4 text-center">
                    <button onclick="toggleView('login')" class="text-slate-500 hover:text-slate-700 text-sm font-bold transition">已有帳號？返回登入</button>
                </div>
            </div>
        </div>

        <div id="messageBox" class="mt-6 text-center text-sm hidden p-3 rounded-lg border"></div>
        
        <div class="mt-8 pt-6 border-t border-slate-200 text-center">
            <p class="text-xs text-slate-500 font-medium">版權所有 © 2026 <a href="https://pandapanda6666.github.io" class="hover:text-indigo-600 transition font-bold">PandaPanda的AI日常</a> All Rights Reserved.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBx_C4b1krEoKQVc1VDuCsPE0t2XrHHzbQ",
            authDomain: "brawl-survival-27c30.firebaseapp.com",
            projectId: "brawl-survival-27c30",
            storageBucket: "brawl-survival-27c30.firebasestorage.app",
            messagingSenderId: "968683230232",
            appId: "1:968683230232:web:5fec3f105cfe9907e81f6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let socket;
        let serverUrl = "";
        const redirectUrl = new URLSearchParams(window.location.search).get('from') || "";

        async function fetchServerUrl() {
            try {
                const response = await fetch(`server_url.txt?t=${Date.now()}`);
                if (!response.ok) throw new Error("無法獲取伺服器網址");
                serverUrl = (await response.text()).trim();
                initSocket();
            } catch (err) {
                showMsg("伺服器資訊獲取失敗，請確認 server_url.txt 是否與此網頁放在同一個資料夾。", "error");
            }
        }

        function initSocket() {
            socket = io(serverUrl);
            
            socket.on('connect', () => {
                document.getElementById('serverStatus').innerText = "伺服器已連線";
                document.getElementById('serverStatus').className = "inline-block mt-4 px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700 border border-green-200 shadow-sm";
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('googleBtn').disabled = false;
                document.getElementById('registerBtn').disabled = false;
            });

            socket.on('connect_error', () => {
                document.getElementById('serverStatus').innerText = "伺服器斷線中";
                document.getElementById('serverStatus').className = "inline-block mt-4 px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-200 shadow-sm";
                document.getElementById('loginBtn').disabled = true;
                document.getElementById('googleBtn').disabled = true;
                document.getElementById('registerBtn').disabled = true;
            });

            socket.on('loginResult', (res) => {
                if (res.success) {
                    showMsg("登入成功！正在跳轉...", "success");
                    
                    if (redirectUrl) {
                        const target = new URL(redirectUrl.startsWith('http') ? redirectUrl : `https://${redirectUrl}`);
                        target.searchParams.set('user', res.username);
                        if (res.level !== undefined) target.searchParams.set('level', res.level);
                        if (res.hero !== undefined) target.searchParams.set('hero', res.hero);
                        target.searchParams.set('server', serverUrl);
                        target.searchParams.set('auth', 'true');
                        window.location.href = target.href;
                    } else {
                        showMsg(`登入成功！歡迎 ${res.username}，但未偵測到跳轉目標網頁。`, "success");
                    }
                } else {
                    if (res.msg === 'google_need_register') {
                        showMsg("此 Google 帳號尚未註冊，請先進行註冊。", "error");
                    } else {
                        showMsg("登入失敗: " + res.msg, "error");
                    }
                }
            });

            socket.on('registerResult', (res) => {
                if (res.success) {
                    showMsg(res.msg || "註冊成功！請使用新帳號登入。", "success");
                    setTimeout(() => { toggleView('login'); }, 1500);
                } else {
                    showMsg("註冊失敗: " + res.msg, "error");
                }
            });
        }

        window.toggleView = function(view) {
            const loginView = document.getElementById('loginView');
            const registerView = document.getElementById('registerView');
            const messageBox = document.getElementById('messageBox');
            
            messageBox.classList.add('hidden');

            if (view === 'register') {
                loginView.classList.add('hidden');
                registerView.classList.remove('hidden');
                document.getElementById('formTitle').innerText = "註冊新帳號";
                document.getElementById('formSubtitle').innerText = "填寫下方資料以建立您的帳號";
                document.getElementById('formSubtitle').className = "text-emerald-600 font-medium mt-2";
            } else {
                registerView.classList.add('hidden');
                loginView.classList.remove('hidden');
                document.getElementById('formTitle').innerText = "PandaPanda的AI日常";
                document.getElementById('formSubtitle').innerText = "通用帳號登入系統";
                document.getElementById('formSubtitle').className = "text-indigo-600 font-medium mt-2";
            }
        };

        window.handleLogin = function() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (!u || !p) return showMsg("請輸入帳號與密碼", "error");
            
            showMsg("驗證中...", "info");
            socket.emit('login', { username: u, password: p });
        };

        window.handleRegister = function() {
            const u = document.getElementById('reg_username').value.trim();
            const p = document.getElementById('reg_password').value;
            const ln = document.getElementById('reg_lastName').value.trim();
            const fn = document.getElementById('reg_firstName').value.trim();
            const gender = document.getElementById('reg_gender').value;
            const birthday = document.getElementById('reg_birthday').value;
            const phone = document.getElementById('reg_phone').value.trim();

            if (!u || !p || !ln || !fn || !gender || !birthday) {
                return showMsg("請填寫所有標示星號的必填項目", "error");
            }

            showMsg("正在送出註冊資料...", "info");
            socket.emit('register', {
                username: u,
                password: p,
                realName: ln + fn,
                birthday: birthday,
                gender: gender,
                phone: phone
            });
        };

        window.handleGoogleLogin = async function() {
            try {
                showMsg("正在開啟 Google 驗證...", "info");
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                showMsg("驗證成功，正在登入伺服器...", "info");
                socket.emit('googleLogin', { 
                    email: user.email, 
                    name: user.displayName 
                });
            } catch (error) {
                showMsg("Google 登入失敗: " + error.message, "error");
            }
        };

        function showMsg(text, type) {
            const box = document.getElementById('messageBox');
            box.innerText = text;
            
            if (type === 'error') {
                box.className = `mt-6 text-center text-sm font-bold text-red-700 bg-red-100 p-3 rounded-xl border border-red-200`;
            } else if (type === 'success') {
                box.className = `mt-6 text-center text-sm font-bold text-green-700 bg-green-100 p-3 rounded-xl border border-green-200`;
            } else {
                box.className = `mt-6 text-center text-sm font-bold text-indigo-700 bg-indigo-100 p-3 rounded-xl border border-indigo-200`;
            }
            
            box.classList.remove('hidden');
        }

        fetchServerUrl();
    </script>
</body>
</html>
