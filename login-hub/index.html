    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBx_C4b1krEoKQVc1VDuCsPE0t2XrHHzbQ",
            authDomain: "brawl-survival-27c30.firebaseapp.com",
            projectId: "brawl-survival-27c30",
            storageBucket: "brawl-survival-27c30.firebasestorage.app",
            messagingSenderId: "968683230232",
            appId: "1:968683230232:web:5fec3f105cfe9907e81f6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let socket;
        let serverUrl = "";
        let currentUserData = null;
        
        window.regMode = 'normal'; 
        window.tempRegEmail = null;

        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('from') || "";
        const requireLogin = urlParams.get('require') === '1' || urlParams.get('require') === 'true';

        async function fetchServerUrl() {
            try {
                const response = await fetch(`server_url.txt?t=${Date.now()}`);
                if (!response.ok) throw new Error("無法獲取伺服器網址");
                serverUrl = (await response.text()).trim();
                initSocket();
            } catch (err) {
                showMsg("伺服器資訊獲取失敗，請確認設定。", "error");
            }
        }

        function initSocket() {
            socket = io(serverUrl, { transports: ['websocket'] });
            
            socket.on('connect', () => {
                document.getElementById('serverStatus').innerText = "伺服器已連線";
                document.getElementById('serverStatus').className = "inline-block mt-4 px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700 border border-green-200 shadow-sm";
                enableButtons(true);
                checkAutoLogin();
            });

            socket.on('connect_error', () => {
                document.getElementById('serverStatus').innerText = "伺服器斷線中";
                document.getElementById('serverStatus').className = "inline-block mt-4 px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-700 border border-red-200 shadow-sm";
                enableButtons(false);
            });

            socket.on('loginResult', (res) => {
                if (res.success) {
                    showMsg("登入成功！", "success");
                    currentUserData = res;
                    localStorage.setItem('panda_auto_user', res.username);
                    if (res.password !== 'GOOGLE_AUTH') {
                        localStorage.setItem('panda_auto_pass', document.getElementById('password').value || 'GOOGLE_AUTH');
                    }
                    
                    updateProfileDashboard();
                    
                    if (requireLogin && redirectUrl) {
                        setTimeout(returnToApp, 1000);
                    } else {
                        toggleView('profile');
                    }
                } else {
                    if (res.msg === 'google_need_register') {
                        showMsg("此 Google 帳號尚未註冊，請先進行註冊。", "error");
                        toggleView('register');
                        setRegMode('google');
                        window.tempRegEmail = res.email;
                        document.getElementById('googleNotLinked').classList.add('hidden');
                        document.getElementById('googleLinked').classList.remove('hidden');
                        document.getElementById('linkedGoogleEmail').innerText = res.email;
                    } else {
                        showMsg("登入失敗: " + res.msg, "error");
                        toggleView('login');
                    }
                }
            });

            socket.on('registerResult', (res) => {
                if (res.success) {
                    showMsg(res.msg || "註冊成功！請登入系統。", "success");
                    setTimeout(() => { toggleView('login'); }, 1500);
                } else {
                    showMsg("註冊失敗: " + res.msg, "error");
                }
            });

            socket.on('updateProfileResult', (res) => {
                if (res.success) {
                    showMsg("個人資料已更新！", "success");
                    currentUserData.nickname = res.nickname;
                    currentUserData.avatar = res.avatar;
                    currentUserData.password = res.password;
                    currentUserData.realName = res.realName;
                    currentUserData.gender = res.gender;
                    currentUserData.birthday = res.birthday;
                    currentUserData.email = res.email;
                    currentUserData.phone = res.phone;
                    updateProfileDashboard();
                    toggleView('profile');
                } else {
                    showMsg("更新失敗: " + res.msg, "error");
                }
            });

            socket.on('logoutSuccess', () => {
                currentUserData = null;
                localStorage.removeItem('panda_auto_user');
                localStorage.removeItem('panda_auto_pass');
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                toggleView('login');
                showMsg("已成功登出", "info");
            });
        }

        function checkAutoLogin() {
            const savedU = localStorage.getItem('panda_auto_user');
            const savedP = localStorage.getItem('panda_auto_pass');
            
            if (savedP === 'GOOGLE_AUTH') {
                showMsg("正在驗證 Google 登入狀態...", "info");
                const unsubscribe = onAuthStateChanged(auth, (user) => {
                    if (user) {
                        socket.emit('googleLogin', { email: user.email, name: user.displayName });
                    } else {
                        if (requireLogin) toggleView('login'); else toggleView('guest');
                    }
                    unsubscribe();
                });
            } else if (savedU && savedP) {
                showMsg("正在自動登入...", "info");
                document.getElementById('username').value = savedU;
                document.getElementById('password').value = savedP;
                socket.emit('login', { username: savedU, password: savedP });
            } else {
                if (requireLogin) {
                    toggleView('login');
                } else {
                    toggleView('guest');
                }
            }
        }

        function enableButtons(enable) {
            ['loginBtn', 'googleBtn', 'registerBtn'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.disabled = !enable;
            });
        }

        window.toggleView = function(view) {
            ['guestView', 'loginView', 'registerView', 'profileView', 'editProfileView'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById('messageBox').classList.add('hidden');
            document.getElementById('headerSection').classList.remove('hidden');

            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');

            if (view === 'register') {
                document.getElementById('registerView').classList.remove('hidden');
                title.innerText = "註冊新帳號";
                subtitle.innerText = "填寫下方資料以建立您的帳號";
                subtitle.className = "text-emerald-600 font-medium mt-2";
            } else if (view === 'login') {
                document.getElementById('loginView').classList.remove('hidden');
                title.innerText = "登入系統";
                subtitle.innerText = "輸入帳號密碼以進入";
                subtitle.className = "text-indigo-600 font-medium mt-2";
            } else if (view === 'guest') {
                document.getElementById('guestView').classList.remove('hidden');
                title.innerText = "PandaPanda的AI日常";
                subtitle.innerText = "通用帳號系統";
                subtitle.className = "text-slate-500 font-medium mt-2";
            } else if (view === 'profile') {
                document.getElementById('profileView').classList.remove('hidden');
                document.getElementById('headerSection').classList.add('hidden');
                if (redirectUrl) {
                    document.getElementById('returnAppBtn').classList.remove('hidden');
                }
            } else if (view === 'editProfile') {
                document.getElementById('editProfileView').classList.remove('hidden');
                document.getElementById('headerSection').classList.add('hidden');
                
                document.getElementById('editNickname').value = currentUserData.nickname || currentUserData.username;
                document.getElementById('editRealName').value = currentUserData.realName || '';
                document.getElementById('editGender').value = currentUserData.gender || '';
                document.getElementById('editBirthday').value = currentUserData.birthday || '';
                document.getElementById('editPhone').value = currentUserData.phone || '';
                document.getElementById('editEmail').value = currentUserData.email || '';
                
                const pwdInput = document.getElementById('editPassword');
                if(currentUserData.password === 'GOOGLE_AUTH') {
                    pwdInput.value = '已綁定Google';
                    pwdInput.disabled = true;
                    pwdInput.className = "w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-100 text-slate-500 outline-none";
                } else {
                    pwdInput.value = currentUserData.password || '';
                    pwdInput.disabled = false;
                    pwdInput.className = "w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition shadow-inner";
                }

                document.getElementById('editAvatarPreview').src = currentUserData.avatar || getDefaultAvatar();
                window.currentEditAvatarBase64 = currentUserData.avatar || '';
            }
        };

        window.setRegMode = function(mode) {
            window.regMode = mode;
            const tabN = document.getElementById('regTabNormal');
            const tabG = document.getElementById('regTabGoogle');
            const fieldsA = document.getElementById('regAccountFields');
            const fieldsG = document.getElementById('regGoogleFields');

            if (mode === 'normal') {
                tabN.className = "w-1/2 py-2 rounded-lg font-bold bg-white text-emerald-600 shadow-sm transition";
                tabG.className = "w-1/2 py-2 rounded-lg font-bold text-slate-500 hover:text-slate-700 transition";
                fieldsA.classList.remove('hidden');
                fieldsG.classList.add('hidden');
            } else {
                tabN.className = "w-1/2 py-2 rounded-lg font-bold text-slate-500 hover:text-slate-700 transition";
                tabG.className = "w-1/2 py-2 rounded-lg font-bold bg-white text-indigo-600 shadow-sm transition";
                fieldsA.classList.add('hidden');
                fieldsG.classList.remove('hidden');
            }
        };

        window.handleRegGoogleAuth = async function() {
            try {
                showMsg("正在連結 Google 帳號...", "info");
                const result = await signInWithPopup(auth, provider);
                window.tempRegEmail = result.user.email;
                
                document.getElementById('googleNotLinked').classList.add('hidden');
                document.getElementById('googleLinked').classList.remove('hidden');
                document.getElementById('linkedGoogleEmail').innerText = window.tempRegEmail;
                showMsg("已成功連結 Google 帳號，請繼續填寫下方資料", "success");
            } catch (error) {
                showMsg("連結 Google 失敗: " + error.message, "error");
            }
        };

        window.clearRegGoogle = function() {
            window.tempRegEmail = null;
            document.getElementById('googleLinked').classList.add('hidden');
            document.getElementById('googleNotLinked').classList.remove('hidden');
        };

        function updateProfileDashboard() {
            if (!currentUserData) return;
            document.getElementById('displayNickname').innerText = currentUserData.nickname || currentUserData.username;
            document.getElementById('displayUsername').innerText = "@" + currentUserData.username;
            document.getElementById('displayAvatar').src = currentUserData.avatar || getDefaultAvatar();
        }

        function getDefaultAvatar() {
            return "https://lh3.googleusercontent.com/a/ACg8ocIACThLQv2z6bs3wAc0ecYIEd-4zdOb0IbkOZV-ZVyRKsblTmw=s288-c-no";
        }

        window.previewImage = function(input, previewId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX = 200;
                        let w = img.width, h = img.height;
                        if (w > h && w > MAX) { h *= MAX / w; w = MAX; }
                        else if (h > MAX) { w *= MAX / h; h = MAX; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                        document.getElementById(previewId).src = dataUrl;
                        if (previewId === 'regAvatarPreview') window.currentRegAvatarBase64 = dataUrl;
                        if (previewId === 'editAvatarPreview') window.currentEditAvatarBase64 = dataUrl;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.handleLogin = function() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (!u || !p) return showMsg("請輸入帳號與密碼", "error");
            showMsg("驗證中...", "info");
            socket.emit('login', { username: u, password: p });
        };

        window.handleRegister = function() {
            const nk = document.getElementById('reg_nickname').value.trim();
            const ln = document.getElementById('reg_lastName').value.trim();
            const fn = document.getElementById('reg_firstName').value.trim();
            const gender = document.getElementById('reg_gender').value;
            const birthday = document.getElementById('reg_birthday').value;
            const phone = document.getElementById('reg_phone').value.trim();
            const email = document.getElementById('reg_email') ? document.getElementById('reg_email').value.trim() : '';

            let payload = {
                nickname: nk,
                realName: ln + fn,
                birthday: birthday,
                gender: gender,
                phone: phone,
                email: email,
                avatar: window.currentRegAvatarBase64 || ''
            };

            if (window.regMode === 'google') {
                if (!window.tempRegEmail) return showMsg("請先連結 Google 帳號", "error");
                if (!nk || !ln || !fn || !gender || !birthday) return showMsg("請填寫所有標示星號的必填項目", "error");
                
                payload.isGoogle = true;
                payload.gmail = window.tempRegEmail;
            } else {
                const u = document.getElementById('reg_username').value.trim();
                const p = document.getElementById('reg_password').value;
                if (!u || !p || !nk || !ln || !fn || !gender || !birthday) return showMsg("請填寫所有標示星號的必填項目", "error");
                if (!email && !phone) return showMsg("必須輸入電子郵件或電話號碼其中一項", "error");
                
                payload.isGoogle = false;
                payload.username = u;
                payload.password = p;
            }

            showMsg("正在送出註冊資料...", "info");
            socket.emit('register', payload);
        };

        window.handleGoogleLogin = async function() {
            try {
                showMsg("正在開啟 Google 驗證...", "info");
                const result = await signInWithPopup(auth, provider);
                showMsg("驗證成功，正在登入伺服器...", "info");
                socket.emit('googleLogin', { email: result.user.email, name: result.user.displayName });
            } catch (error) {
                showMsg("Google 登入失敗: " + error.message, "error");
            }
        };

        window.saveProfile = function() {
            let payload = {
                nickname: document.getElementById('editNickname').value.trim(),
                realName: document.getElementById('editRealName').value.trim(),
                gender: document.getElementById('editGender').value,
                birthday: document.getElementById('editBirthday').value,
                phone: document.getElementById('editPhone').value.trim(),
                email: document.getElementById('editEmail').value.trim(),
                avatar: window.currentEditAvatarBase64 || ''
            };
            
            if (currentUserData.password !== 'GOOGLE_AUTH') {
                payload.password = document.getElementById('editPassword').value;
            }

            if (!payload.nickname || !payload.realName || !payload.gender || !payload.birthday) {
                return showMsg("必填欄位不可為空", "error");
            }
            if (!payload.email && !payload.phone && currentUserData.password !== 'GOOGLE_AUTH') {
                return showMsg("信箱與電話請至少填寫一項", "error");
            }

            showMsg("正在儲存...", "info");
            socket.emit('updateProfile', payload);
        };

        window.switchAccount = function() {
            if (socket) socket.emit('logout');
        };

        window.handleLogout = function() {
            switchAccount();
        };

        window.returnToApp = function() {
            if (!currentUserData || !redirectUrl) return;
            const target = new URL(redirectUrl.startsWith('http') ? redirectUrl : `https://${redirectUrl}`);
            target.searchParams.set('user', currentUserData.username);
            target.searchParams.set('server', serverUrl);
            target.searchParams.set('auth', 'true');
            window.location.href = target.href;
        };

        function showMsg(text, type) {
            const box = document.getElementById('messageBox');
            box.innerText = text;
            if (type === 'error') box.className = `mt-6 text-center text-sm font-bold text-red-700 bg-red-100 p-3 rounded-xl border border-red-200`;
            else if (type === 'success') box.className = `mt-6 text-center text-sm font-bold text-green-700 bg-green-100 p-3 rounded-xl border border-green-200`;
            else box.className = `mt-6 text-center text-sm font-bold text-indigo-700 bg-indigo-100 p-3 rounded-xl border border-indigo-200`;
            box.classList.remove('hidden');
        }

        fetchServerUrl();
    </script>
</body>
</html>
