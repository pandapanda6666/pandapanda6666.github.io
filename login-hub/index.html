<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PandaPanda 雲端桌面系統</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { 
            max-width: 100vw; overflow-x: hidden !important; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; overflow: hidden !important; box-sizing: border-box; user-select: none; touch-action: none; overscroll-behavior: none;
            /* Win11 Bloom Style Background */
            background: radial-gradient(circle at 50% 120%, #004488, #001133 70%);
            color: white;
            height: 100vh;
        }
        
        /* Taskbar */
        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 48px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            display: flex; justify-content: center; align-items: center; gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 10000;
        }
        .tb-icon {
            width: 36px; height: 36px; border-radius: 4px; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
            transition: 0.1s;
        }
        .tb-icon:hover { background: rgba(255,255,255,0.1); }
        .tb-icon.active { background: rgba(255,255,255,0.2); border-bottom: 3px solid #3b82f6; }

        /* Desktop Icons */
        #desktop { padding: 20px; display: flex; flex-direction: column; gap: 20px; flex-wrap: wrap; height: calc(100vh - 48px); }
        .dk-icon {
            width: 80px; display: flex; flex-direction: column; align-items: center; gap: 5px;
            padding: 8px; border-radius: 4px; cursor: pointer;
        }
        .dk-icon:hover { background: rgba(255,255,255,0.1); }
        .dk-icon .icon-img { width: 48px; height: 48px; font-size: 32px; display:flex; justify-content:center; align-items:center; }
        .dk-icon .icon-text { font-size: 12px; text-shadow: 1px 1px 2px black; text-align: center; }

        /* Windows Manager */
        .window { box-sizing: border-box; max-width: 100vw; overflow-x: hidden !important;
            position: absolute; top: 20px; left: 50px; width: 850px; height: 750px;
            background: #0f172a; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; overflow: hidden !important; box-sizing: border-box;
            display: none;
        }
        .window.active { z-index: 1000; }
        .window-header {
            height: 32px; background: rgba(0,0,0,0.2); display: flex; justify-content: space-between;
            align-items: center; padding: 0 10px; cursor: grab; font-size: 12px;
        }
        .window-header:active { cursor: grabbing; }
        .window-controls { display: flex; gap: 10px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .win-close { background: #ef4444; }
        .win-max { background: #eab308; }
        .win-min { background: #22c55e; }
        
        .window-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }

        /* Console App Custom Styles (Matching local Tkinter EXACTLY) */
        .tk-title { text-align: center; font-size: 32px; font-weight: bold; color: #818cf8; margin-top: 20px; }
        .tk-subtitle { text-align: center; font-size: 18px; color: #94a3b8; margin-bottom: 20px; }
        
        .tk-btn-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tk-btn { padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; }
        .tk-btn-green { background: #22c55e; color: white; }
        .tk-btn-green:hover { background: #16a34a; }
        .tk-btn-red { background: #ef4444; color: white; }
        .tk-btn-red:hover { background: #dc2626; }
        .tk-btn-gray { background: #475569; color: white; }
        .tk-btn-gray:hover { background: #334155; }
        
        .tk-url-row { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 10px; }
        .tk-url-input { background: #0f172a; border: none; color: #60a5fa; font-family: Consolas; font-size: 18px; font-weight: bold; width: 400px; outline: none; }
        
        .tk-progress-bar { width: 90%; margin: 0 auto 20px auto; height: 15px; background: #1e293b; }
        .tk-progress-fill { height: 100%; background: #4ade80; width: 0%; transition: width 0.3s; }
        
        #terminal { width: 90%; margin: 0 auto 20px auto; flex-grow: 1; background: #020617; color: #34d399; font-family: Consolas, monospace; padding: 10px; overflow-y: auto; font-size: 14px; white-space: pre-wrap; word-break: break-all; overflow-x: hidden; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- Desktop Icons -->
    <div id="desktop">
        <div class="dk-icon" onclick="openWindow('console')">
            <div class="icon-img">🐼</div>
            <div class="icon-text">Panda主控台</div>
        </div>
        <div class="dk-icon" onclick="openWindow('settings')">
            <div class="icon-img">⚙️</div>
            <div class="icon-text">系統設定</div>
        </div>
    </div>

    <!-- Window: Console (Exact Replica of Tkinter) -->
    <div id="win-console" class="window" style="width: 850px; height: 750px; display: none;">
        <div class="window-header" onmousedown="dragWindow(event, \'win-console\')" ontouchstart="dragWindow(event, \'win-console\')">
            <div>PandaPanda的AI日常___面板</div>
            <div class="window-controls">
                <div class="win-min" onclick="minWindow('console')"></div>
                <div class="win-max" onclick="maxWindow('console')"></div>
                <div class="win-close" onclick="closeWindow('console')"></div>
            </div>
        </div>
        <div class="window-content" style="background: #0f172a;">
            
            <div class="tk-title">PandaPanda的AI日常</div>
            <div class="tk-subtitle">全自動架站與管理機器人</div>
            
            <div class="tk-btn-row">
                <button class="tk-btn tk-btn-green" onclick="emitCmd('start_mc')">開始伺服器</button>
                <button class="tk-btn tk-btn-red" onclick="emitCmd('stop_mc')">停止所有服務</button>
                <button class="tk-btn tk-btn-gray" onclick="emitCmd('restart_system')">重新啟動面板</button>
                <button class="tk-btn tk-btn-gray" onclick="openWindow('settings')">系統設定</button>
            </div>
            
            <div class="tk-url-row">
                <span style="font-size: 16px; color: #e2e8f0; font-weight: bold;">您的遠端管理網址：</span>
                <input type="text" id="lbl-url" class="tk-url-input" value="等待中..." readonly>
            </div>
            
            <div class="tk-progress-bar">
                <div id="progress-fill" class="tk-progress-fill"></div>
            </div>
            
            <div id="terminal">========================================
[系統] PandaPanda 遠端管理面板已啟動
========================================</div>
            
            <div style="text-align: center; color: #64748b; margin-bottom: 15px; font-size: 14px; cursor: pointer;" onclick="window.open('https://pandapanda6666.github.io')">
                版權所有 © 2026 PandaPanda的AI日常 All Rights Reserved.
            </div>
        </div>
    </div>

    <!-- Window: Settings (Old Panel) -->
    <div id="win-settings" class="window" style="width: 1000px; height: 700px; display: none; left: 100px; top: 50px;">
        <div class="window-header" onmousedown="dragWindow(event, \'win-settings\')" ontouchstart="dragWindow(event, \'win-settings\')">
            <div>系統設定與小程式管理</div>
            <div class="window-controls">
                <div class="win-min" onclick="minWindow('settings')"></div>
                <div class="win-max" onclick="maxWindow('settings')"></div>
                <div class="win-close" onclick="closeWindow('settings')"></div>
            </div>
        </div>
        <div class="window-content">
            <iframe id="iframe-settings" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div class="tb-icon" onclick="alert('Start Menu (Work in Progress)')" style="font-size: 20px;">🪟</div>
        <div id="tb-console" class="tb-icon hidden" onclick="toggleWindow('console')" style="font-size: 20px;">🐼</div>
        <div id="tb-settings" class="tb-icon hidden" onclick="toggleWindow('settings')" style="font-size: 20px;">⚙️</div>
    </div>

    <!-- Scripts -->
    <script>
        const socket = io();
        
        socket.on('connect', () => {
            appendLog('[系統] 已成功連接遠端伺服器！', '#22c55e');
        });

        socket.on('disconnect', () => {
            appendLog('[系統] 與遠端伺服器斷線。', '#ef4444');
        });

        socket.on('system_log', (data) => {
            appendLog(data.text);
        });

        socket.on('system_status', (data) => {
            if(data.url) document.getElementById('lbl-url').value = data.url;
            if(data.open === false) {
                document.getElementById('lbl-url').value = "伺服器已離線";
                document.getElementById('progress-fill').style.width = "0%";
            } else {
                document.getElementById('progress-fill').style.width = "100%";
            }
        });

        function appendLog(text, color='') {
            const t = document.getElementById('terminal');
            const span = document.createElement('span');
            span.textContent = text + (text.endsWith('\n')?'':'\n');
            if(color) span.style.color = color;
            // parse ansi or simple rules
            if(!color) {
                if(text.includes('[系統]')) span.style.color = '#38bdf8';
                if(text.includes('[錯誤]')) span.style.color = '#ef4444';
            }
            t.appendChild(span);
            t.scrollTop = t.scrollHeight;
        }

        function emitCmd(cmd) {
            socket.emit('adminAction', { action: 'systemControl', command: cmd });
            appendLog(`[傳送] 執行指令: ${cmd}`, '#eab308');
        }

        /* Window Manager Logic */
        let zIndex = 1000;
        
        function openWindow(id) {
            const win = document.getElementById('win-' + id);
            const tb = document.getElementById('tb-' + id);
            if (win.style.display === 'none') {
                win.style.display = 'flex';
                tb.classList.remove('hidden');
                tb.classList.add('active');
                
                if(id === 'settings' && !document.getElementById('iframe-settings').src) {
                    document.getElementById('iframe-settings').src = 'settings.html';
                }
            }
            focusWindow(id);
        }

        function closeWindow(id) {
            document.getElementById('win-' + id).style.display = 'none';
            document.getElementById('tb-' + id).classList.remove('active');
            document.getElementById('tb-' + id).classList.add('hidden');
        }

        function minWindow(id) {
            document.getElementById('win-' + id).style.display = 'none';
            document.getElementById('tb-' + id).classList.remove('active');
        }

        function maxWindow(id) {
            const win = document.getElementById('win-' + id);
            if(win.dataset.maximized === 'true') {
                win.style.width = win.dataset.oldW;
                win.style.height = win.dataset.oldH;
                win.style.top = win.dataset.oldY;
                win.style.left = win.dataset.oldX;
                win.dataset.maximized = 'false';
            } else {
                win.dataset.oldW = win.style.width;
                win.dataset.oldH = win.style.height;
                win.dataset.oldX = win.style.left;
                win.dataset.oldY = win.style.top;
                
                win.style.width = '100%';
                win.style.height = 'calc(100vh - 48px)';
                win.style.top = '0';
                win.style.left = '0';
                win.dataset.maximized = 'true';
            }
        }

        function toggleWindow(id) {
            const win = document.getElementById('win-' + id);
            const tb = document.getElementById('tb-' + id);
            if (win.style.display === 'none') {
                win.style.display = 'flex';
                tb.classList.add('active');
                focusWindow(id);
            } else {
                if(tb.classList.contains('active')) minWindow(id);
                else focusWindow(id);
            }
        }

        function focusWindow(id) {
            const win = document.getElementById('win-' + id);
            win.style.zIndex = ++zIndex;
            document.querySelectorAll('.tb-icon').forEach(el => el.classList.remove('active'));
            document.getElementById('tb-' + id).classList.add('active');
        }

        function dragWindow(e, winId) {
            const win = document.getElementById(winId);
            if(win.dataset.maximized === 'true') return;
            focusWindow(winId.replace('win-', ''));
            
            let startX = e.clientX || (e.touches && e.touches[0].clientX);
            let startY = e.clientY || (e.touches && e.touches[0].clientY);
            let startLeft = parseInt(window.getComputedStyle(win).left, 10) || 0;
            let startTop = parseInt(window.getComputedStyle(win).top, 10) || 0;

            function onMove(moveEvent) {
                let currentX = moveEvent.clientX || (moveEvent.touches ? moveEvent.touches[0].clientX : startX);
                let currentY = moveEvent.clientY || (moveEvent.touches ? moveEvent.touches[0].clientY : startY);
                win.style.left = startLeft + currentX - startX + 'px';
                win.style.top = startTop + currentY - startY + 'px';
            }
            function onUp() {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onUp);
            }
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
            document.addEventListener('touchmove', onMove, {passive: false});
            document.addEventListener('touchend', onUp);
        }
        
        // Auto open console
        openWindow('console');
    </script>
</body>
</html>
