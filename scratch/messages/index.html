<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訊息 - PandaScratch</title>
    <style>
        :root {
            --primary: #81C784;
            --primary-hover: #66BB6A;
            --bg-color: #F3F4F7;
            --nav-bg: #81C784;
            --text-dark: #333333;
            --white: #FFFFFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); }
        .navbar { display: flex; align-items: center; background-color: var(--nav-bg); height: 50px; padding: 0 15px; color: var(--white); font-size: 14px; font-weight: bold; }
        .navbar a { color: var(--white); text-decoration: none; padding: 0 15px; height: 100%; display: flex; align-items: center; transition: background-color 0.2s; }
        .navbar a:hover { background-color: rgba(0, 0, 0, 0.1); }
        .navbar-brand { display: flex; align-items: center; margin-right: 15px; }
        .navbar-brand img { height: 30px; margin-right: 10px; }
        .navbar-search { flex: 1; display: flex; align-items: center; margin: 0 15px; }
        .navbar-search input { width: 100%; max-width: 300px; padding: 8px 15px; border-radius: 20px; border: none; outline: none; background-color: rgba(0, 0, 0, 0.1); color: var(--white); }
        .navbar-icons { display: flex; align-items: center; gap: 15px; }
        .navbar-icon { font-size: 20px; cursor: pointer; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; border-radius: 50%; transition: background-color 0.2s; }
        .user-menu { position: relative; display: flex; align-items: center; cursor: pointer; padding: 0 10px; height: 100%; }
        .user-avatar { width: 30px; height: 30px; border-radius: 5px; background-color: var(--white); margin-right: 10px; }
        .dropdown-menu { display: none; position: absolute; top: 50px; right: 0; background-color: var(--white); border: 1px solid #ddd; border-radius: 0 0 5px 5px; width: 160px; z-index: 100; }
        .user-menu:hover .dropdown-menu { display: block; }
        .dropdown-menu a { color: var(--text-dark); padding: 12px 15px; display: block; }
        
        .content {
            text-align: center;
            padding: 100px 20px;
            font-size: 32px;
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand" onclick="window.location.href='/scratch/'">
            <img src="https://scratch.mit.edu/images/logo_sm.png" alt="PandaScratch">
        </div>
        
        <div class="navbar-nav">
            <a href="/scratch/projects/editor/">創造</a>
            <a href="/scratch/explore/projects/all/">探索</a>
            <a href="/scratch/ideas/">靈感</a>
            <a href="/scratch/about/">關於</a>
            
            <div class="search-container">
                <svg viewBox="0 0 24 24" style="fill: rgba(255,255,255,0.7); width: 16px; height: 16px; margin-right: 5px;">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" placeholder="搜尋">
            </div>
        </div>

        <div class="auth-actions" id="auth-actions">
            <a href="https://pandapanda6666.github.io/login-hub/?require=1&from=https%3A%2F%2Fpandapanda6666.github.io%2Fscratch%2F" style="margin-right: 10px;">登入 / 註冊</a>
        </div>

        <div class="user-menu" id="user-menu">
            <button class="icon-btn" title="訊息" onclick="window.location.href='/scratch/messages/'">
                <svg viewBox="0 0 24 24" style="fill: white; width: 24px; height: 24px;">
                    <path d="M20,4H4C2.9,4,2.01,4.9,2.01,6L2,18c0,1.1,0.9,2,2,2h16c1.1,0,2-0.9,2-2V6C22,4.9,21.1,4,20,4z M20,18H4V8l8,5l8-5V18z M12,11L4,6h16L12,11z"/>
                </svg>
            </button>
            <button class="icon-btn" title="我的東西" onclick="openMyStuff()">
                <img src="/scratch/projects/editor/static/assets/e1672da8924b2b3e8ad32b137f8f1c4e.png" alt="我的東西" style="width: 24px; height: 24px;">
            </button>
            
            <div class="avatar-container">
                <img src="" alt="Avatar" class="avatar" id="nav-avatar">
                <span class="username" id="nav-username">使用者</span>
                
                <div class="dropdown-content">
                    <a href="https://pandapanda6666.github.io/login-hub/?action=profile">個人資訊</a>
                    <a href="/scratch/mystuff/">我的東西</a>
                    <a href="https://pandapanda6666.github.io/login-hub/?action=settings">帳戶設定</a>
                    <a href="javascript:void(0)" onclick="logout()">登出</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="content">
        我們在做囉!
    </div>
    <script>
        // 登入驗證機制
        function openMyStuff() {
            const token = localStorage.getItem('panda_session_token');
            const currentUser = localStorage.getItem('panda_session_user') || 'User';
            if (!token) {
                window.location.href = 'https://pandapanda6666.github.io/login-hub/?require=1&from=' + encodeURIComponent('https://pandapanda6666.github.io/scratch/mystuff/');
            } else {
                window.location.href = '/scratch/mystuff/?auth=true&user=' + encodeURIComponent(currentUser);
            }
        }
        
        function logout() {
            localStorage.removeItem('panda_session_token');
            localStorage.removeItem('panda_session_user');
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?action=logout&from=' + encodeURIComponent(window.location.href);
        }

        async function checkLogin() {
            let token = localStorage.getItem('panda_session_token');
            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('token');
            if (urlToken) {
                token = urlToken;
                localStorage.setItem('panda_session_token', token);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            
            if (token) {
                try {
                    const response = await fetch('https://pandapanda-chat.onrender.com/verify', {
                        headers: {
                            'Authorization': 'Bearer ' + token
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        document.getElementById('auth-actions').style.display = 'none';
                        document.getElementById('user-menu').style.display = 'flex';
                        
                        // 設定頭像和使用者名稱
                        const userNickname = data.nickname || data.username || data.account || '使用者';
                        const userAvatar = data.avatarUrl || 'https://cdn.discordapp.com/embed/avatars/0.png';
                        
                        document.getElementById('nav-username').textContent = userNickname;
                        document.getElementById('nav-avatar').src = userAvatar;
                        
                        // 儲存最新的暱稱
                        localStorage.setItem('panda_session_user', userNickname);
                    } else {
                        throw new Error('Token invalid');
                    }
                } catch (error) {
                    console.error('Login check failed:', error);
                    localStorage.removeItem('panda_session_token');
                    document.getElementById('auth-actions').style.display = 'flex';
                    document.getElementById('user-menu').style.display = 'none';
                }
            } else {
                document.getElementById('auth-actions').style.display = 'flex';
                document.getElementById('user-menu').style.display = 'none';
            }
        }

        // 頁面載入時檢查登入狀態
        window.addEventListener('load', () => {
            checkLogin();
        });
    </script>
</body>
</html>
