<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈感 - PandaScratch</title>
    <style>
        :root {
            --primary: #81C784;
            --primary-hover: #66BB6A;
            --bg-color: #F3F4F7;
            --nav-bg: #81C784;
            --text-dark: #333333;
            --white: #FFFFFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); }
        .navbar { display: flex; align-items: center; background-color: var(--nav-bg); height: 50px; padding: 0 15px; color: var(--white); font-size: 14px; font-weight: bold; }
        .navbar a { color: var(--white); text-decoration: none; padding: 0 15px; height: 100%; display: flex; align-items: center; transition: background-color 0.2s; }
        .navbar a:hover { background-color: rgba(0, 0, 0, 0.1); }
        .navbar-brand { display: flex; align-items: center; margin-right: 15px; }
        .navbar-brand img { height: 30px; margin-right: 10px; }
        .navbar-search { flex: 1; display: flex; align-items: center; margin: 0 15px; }
        .navbar-search input { width: 100%; max-width: 300px; padding: 8px 15px; border-radius: 20px; border: none; outline: none; background-color: rgba(0, 0, 0, 0.1); color: var(--white); }
        .navbar-icons { display: flex; align-items: center; gap: 15px; }
        .navbar-icon { font-size: 20px; cursor: pointer; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; border-radius: 50%; transition: background-color 0.2s; }
        .user-menu { position: relative; display: flex; align-items: center; cursor: pointer; padding: 0 10px; height: 100%; }
        .user-avatar { width: 30px; height: 30px; border-radius: 5px; background-color: var(--white); margin-right: 10px; }
        .dropdown-menu { display: none; position: absolute; top: 50px; right: 0; background-color: var(--white); border: 1px solid #ddd; border-radius: 0 0 5px 5px; width: 160px; z-index: 100; }
        .user-menu:hover .dropdown-menu { display: block; }
        .dropdown-menu a { color: var(--text-dark); padding: 12px 15px; display: block; }
        
        .content {
            text-align: center;
            padding: 100px 20px;
            font-size: 32px;
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/scratch/" class="navbar-brand">
            <img src="/scratch/scratch-logo.svg" alt="PandaScratch" style="height: 33px; margin-right: 15px;">
        </a>
        <a href="/scratch/projects/editor/">創造</a>
        <a href="/scratch/explore/projects/all/">探索</a>
        <a href="/scratch/ideas/">靈感</a>
        <a href="/scratch/about/">關於</a>
        <div class="navbar-search"><input type="text" placeholder="搜尋"></div>
        <div class="navbar-icons">
            <a href="/scratch/messages/" class="navbar-icon" title="訊息">✉️</a>
            <a href="/scratch/mystuff/" class="navbar-icon" title="我的東西">📁</a>
        </div>
        <div id="auth-actions" style="display: none; height: 100%; align-items: center;">
            <a href="#" onclick="login(event)">登入</a>
            <a href="#">加入PandaScratch</a>
        </div>
        <div class="user-menu" id="userMenu" style="display: none;">
            <div class="user-avatar"></div>
            <span id="username-display">載入中...</span> ▾
            <div class="dropdown-menu">
                <a href="/scratch/users/">👤 個人資訊</a>
                <a href="/scratch/mystuff/"><img src="/scratch/projects/editor/static/assets/e1672da8924b2b3e8ad32b137f8f1c4e.png" alt="我的東西" style="width: 24px; height: 24px;"></a>
                <a href="/scratch/settings/">⚙️ 帳戶設定</a>
                <a href="#" onclick="logout(event)">登出</a>
            </div>
        </div>
    </nav>
    <div class="content">
        我們在做囉!
    </div>
    <script>
                async function checkLogin() {
            let token = localStorage.getItem('panda_session_token');
            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('token');
            if (urlToken) {
                token = urlToken;
                localStorage.setItem('panda_session_token', token);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            if (token) {
                try {
                    let serverUrl = "https://pandapanda-chat.onrender.com";
                    let res = await fetch(serverUrl + '/verify', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (res.ok) {
                        let data = await res.json();
                        let displayName = data.nickname || data.user || data.username || data.account;
                        localStorage.setItem('panda_username', displayName);
                        if (data.avatar) localStorage.setItem('panda_avatar', data.avatar);
                    }
                } catch(e) {}
            }
            
            let user = localStorage.getItem('panda_username');
            let avatar = localStorage.getItem('panda_avatar');

            if (!user) {
                document.getElementById('userMenu').style.display = 'none';
                document.getElementById('auth-actions').style.display = 'flex';
            } else {
                document.getElementById('username-display').innerText = user;
                if (avatar) {
                    document.querySelector('.user-avatar').innerHTML = '<img src="' + avatar + '" style="width:100%;height:100%;border-radius:5px;object-fit:cover;">';
                }
                document.getElementById('userMenu').style.display = 'flex';
                document.getElementById('auth-actions').style.display = 'none';
            }
        }
        checkLogin();
    </script>
</body>
</html>
