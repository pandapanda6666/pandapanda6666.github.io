<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PandaScratch</title>
    <style>
        :root {
            --primary: #4C97FF;
            --primary-hover: #3373cc;
            --secondary: #855CD6;
            --bg-color: #F3F4F7;
            --nav-bg: #4C97FF;
            --text-dark: #333333;
            --text-light: #575E75;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
        }

        /* 導覽列 */
        .navbar {
            display: flex;
            align-items: center;
            background-color: var(--nav-bg);
            height: 50px;
            padding: 0 15px;
            color: var(--white);
            font-size: 14px;
            font-weight: bold;
        }

        .navbar a {
            color: var(--white);
            text-decoration: none;
            padding: 0 15px;
            height: 100%;
            display: flex;
            align-items: center;
            transition: background-color 0.2s;
        }

        .navbar a:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            margin-right: 15px;
        }
        
        .navbar-brand img {
            height: 30px;
            margin-right: 10px;
        }

        .navbar-search {
            flex: 1;
            display: flex;
            align-items: center;
            margin: 0 15px;
        }

        .navbar-search input {
            width: 100%;
            max-width: 300px;
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
            background-color: rgba(0, 0, 0, 0.1);
            color: var(--white);
        }

        .navbar-search input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .navbar-search input:focus {
            background-color: var(--white);
            color: var(--text-dark);
        }

        .navbar-icons {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar-icon {
            font-size: 20px;
            cursor: pointer;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .navbar-icon:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        /* 帳戶下拉選單 */
        .user-menu {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 0 10px;
            height: 100%;
        }

        .user-menu:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            background-color: var(--white);
            margin-right: 10px;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background-color: var(--white);
            border: 1px solid #ddd;
            border-radius: 0 0 5px 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 160px;
            z-index: 100;
        }

        .user-menu:hover .dropdown-menu {
            display: block;
        }

        .dropdown-menu a {
            color: var(--text-dark);
            padding: 12px 15px;
            display: block;
            height: auto;
        }

        .dropdown-menu a:hover {
            background-color: #f5f5f5;
        }

        /* 內容區 */
        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn-large {
            display: inline-block;
            background-color: var(--white);
            color: var(--primary);
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-large:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <!-- 導覽列 -->
    <nav class="navbar">
        <a href="/scratch/" class="navbar-brand">
            <img src="/scratch/scratch-logo.svg" alt="PandaScratch" style="height: 33px; margin-right: 15px;">
        </a>
        <a href="/scratch/projects/editor/">創造</a>
        <a href="/scratch/explore/projects/all/">探索</a>
        <a href="/scratch/ideas/">靈感</a>
        <a href="/scratch/about/">關於</a>
        
        <div class="navbar-search">
            <input type="text" placeholder="搜尋">
        </div>

        <div class="navbar-icons">
            <a href="/scratch/messages/" class="navbar-icon" title="訊息">✉️</a>
            <a href="/scratch/mystuff/" class="navbar-icon" title="我的東西">📁</a>
        </div>

        <div id="auth-actions" style="display: none; height: 100%; align-items: center;">
            <a href="#" onclick="login(event)">登入</a>
            <a href="#">加入PandaScratch</a>
        </div>

        <div class="user-menu" id="userMenu" style="display: none;">
            <div class="user-avatar"></div>
            <span id="username-display">載入中...</span> ▾
            <div class="dropdown-menu">
                <a href="#">👤 個人資訊</a>
                <a href="/scratch/mystuff/">📁 我的東西</a>
                <a href="#">⚙️ 帳戶設定</a>
                <a href="#" onclick="logout(event)">登出</a>
            </div>
        </div>
    </nav>

    <!-- 內容 -->
    <div class="hero">
        <h1>歡迎來到PandaScratch</h1>
        <p>在這裡發揮你的想像力，創造與分享專案！</p>
        <a href="/scratch/projects/editor/" class="btn-large">開始創造</a>
    </div>

    <script>
        function checkLogin() {
            const urlParams = new URLSearchParams(window.location.search);
            let user = urlParams.get('user');
            
            if (user) {
                localStorage.setItem('panda_username', user);
                // 為了美觀，將 URL 上的參數拿掉
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                user = localStorage.getItem('panda_username');
            }

            if (!user) {
                // 如果沒有登入，不強制導向，而是顯示登入按鈕
                document.getElementById('userMenu').style.display = 'none';
                document.getElementById('auth-actions').style.display = 'flex';
            } else {
                document.getElementById('username-display').innerText = user;
                document.getElementById('userMenu').style.display = 'flex';
                document.getElementById('auth-actions').style.display = 'none';
            }
        }

        function login(e) {
            if (e) e.preventDefault();
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?action=login&from=' + encodeURIComponent(window.location.href);
        }

        function logout(e) {
            if (e) e.preventDefault();
            localStorage.removeItem('panda_session_token');
            localStorage.removeItem('panda_username');
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?action=logout&from=' + encodeURIComponent(window.location.href);
        }

        checkLogin();
    </script>
</body>
</html>
