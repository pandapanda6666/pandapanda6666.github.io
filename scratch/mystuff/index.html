<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的東西 - PandaScratch</title>
    <!-- 載入 Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --primary: #4C97FF;
            --primary-hover: #3373cc;
            --secondary: #855CD6;
            --bg-color: #F3F4F7;
            --nav-bg: #4C97FF;
            --text-dark: #333333;
            --text-light: #575E75;
            --white: #FFFFFF;
            --sidebar-width: 250px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
        }

        /* 導覽列 */
        .navbar {
            display: flex;
            align-items: center;
            background-color: var(--nav-bg);
            height: 50px;
            padding: 0 15px;
            color: var(--white);
            font-size: 14px;
            font-weight: bold;
        }

        .navbar a {
            color: var(--white);
            text-decoration: none;
            padding: 0 15px;
            height: 100%;
            display: flex;
            align-items: center;
            transition: background-color 0.2s;
        }

        .navbar a:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            margin-right: 15px;
        }
        
        .navbar-brand img {
            height: 30px;
            margin-right: 10px;
        }

        .navbar-search {
            flex: 1;
            display: flex;
            align-items: center;
            margin: 0 15px;
        }

        .navbar-search input {
            width: 100%;
            max-width: 300px;
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
            background-color: rgba(0, 0, 0, 0.1);
            color: var(--white);
        }

        .navbar-search input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .navbar-search input:focus {
            background-color: var(--white);
            color: var(--text-dark);
        }

        .navbar-icons {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar-icon {
            font-size: 20px;
            cursor: pointer;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .navbar-icon:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        /* 帳戶下拉選單 */
        .user-menu {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 0 10px;
            height: 100%;
        }

        .user-menu:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            background-color: var(--white);
            margin-right: 10px;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background-color: var(--white);
            border: 1px solid #ddd;
            border-radius: 0 0 5px 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 160px;
            z-index: 100;
        }

        .user-menu:hover .dropdown-menu {
            display: block;
        }

        .dropdown-menu a {
            color: var(--text-dark);
            padding: 12px 15px;
            display: block;
            height: auto;
        }

        .dropdown-menu a:hover {
            background-color: #f5f5f5;
        }

        /* 版面結構 */
        .page-header {
            background: var(--white);
            padding: 20px 40px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h2 {
            font-size: 24px;
            color: var(--text-dark);
        }

        .page-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: #f0f0f0;
            color: var(--text-dark);
            border: 1px solid #ccc;
        }

        .btn-secondary:hover {
            background-color: #e0e0e0;
        }

        .layout-container {
            display: flex;
            min-height: calc(100vh - 130px);
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }

        /* 側邊欄 */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            border-radius: 8px;
            padding: 10px 0;
            border: 1px solid #e0e0e0;
            align-self: flex-start;
        }

        .sidebar-item {
            padding: 12px 20px;
            display: block;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .sidebar-item:hover {
            background-color: #f5f5f5;
        }

        .sidebar-item.active {
            background-color: var(--primary);
            color: var(--white);
        }

        .sidebar-divider {
            height: 1px;
            background-color: #e0e0e0;
            margin: 10px 0;
        }

        /* 專案列表區 */
        .main-content {
            flex: 1;
            background: var(--white);
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            padding: 20px;
        }

        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .project-item {
            display: flex;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            transition: box-shadow 0.2s;
            align-items: center;
        }

        .project-item:hover {
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .project-thumbnail {
            width: 120px;
            height: 90px;
            background-color: #f0f0f0;
            border-radius: 4px;
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #ccc;
        }

        .project-details {
            flex: 1;
        }

        .project-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .project-meta {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 10px;
        }

        .project-buttons {
            display: flex;
            gap: 10px;
        }

        .project-buttons button {
            padding: 5px 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background: var(--white);
            cursor: pointer;
        }

        .project-buttons button:hover {
            background: #f0f0f0;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-light);
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: var(--text-dark);
        }
    </style>
</head>
<body>

    <!-- 導覽列 -->
    <nav class="navbar">
        <a href="/scratch/" class="navbar-brand">
            <img src="https://scratch.mit.edu/images/logo_sm.png" alt="PandaScratch" style="filter: brightness(0) invert(1);">
            PandaScratch
        </a>
        <a href="/scratch/projects/editor/">創造</a>
        <a href="/scratch/explore/projects/all/">探索</a>
        <a href="/scratch/ideas/">靈感</a>
        <a href="/scratch/about/">關於</a>
        
        <div class="navbar-search">
            <input type="text" placeholder="搜尋">
        </div>

        <div class="navbar-icons">
            <a href="/scratch/messages/" class="navbar-icon" title="訊息">✉️</a>
            <a href="/scratch/mystuff/" class="navbar-icon" title="我的東西">📁</a>
        </div>

        <div class="user-menu" id="userMenu">
            <div class="user-avatar"></div>
            <span id="username-display">載入中...</span> ▾
            <div class="dropdown-menu">
                <a href="#">👤 個人資訊</a>
                <a href="/scratch/mystuff/">📁 我的東西</a>
                <a href="#">⚙️ 帳戶設定</a>
                <a href="#" onclick="logout(event)">登出</a>
            </div>
        </div>
    </nav>

    <!-- 頁面標題與操作按鈕 -->
    <div class="page-header">
        <h2>我的東西</h2>
        <div class="page-actions">
            <a href="/scratch/projects/editor/" class="btn btn-primary">+ 新增專案</a>
            <button class="btn btn-secondary">+ 新增創作坊</button>
        </div>
    </div>

    <!-- 主要版面 -->
    <div class="layout-container">
        <!-- 側邊欄 -->
        <div class="sidebar">
            <a href="#" class="sidebar-item active">全部的專案</a>
            <a href="#" class="sidebar-item">分享的專案</a>
            <a href="#" class="sidebar-item">未分享專案</a>
            <div class="sidebar-divider"></div>
            <a href="#" class="sidebar-item">我的創作坊</a>
            <div class="sidebar-divider"></div>
            <a href="#" class="sidebar-item">回收桶</a>
        </div>

        <!-- 專案列表區 -->
        <div class="main-content">
            <div id="projects-container" class="projects-list">
                <div class="empty-state">正在載入專案...</div>
            </div>
        </div>
    </div>

    <script>
        // 登入驗證
        let currentUser = '';
        function checkLogin() {
            const urlParams = new URLSearchParams(window.location.search);
            let user = urlParams.get('user');
            
            if (user) {
                localStorage.setItem('panda_username', user);
            } else {
                user = localStorage.getItem('panda_username');
            }

            if (!user) {
                window.location.href = 'https://pandapanda6666.github.io/login-hub/?action=mystuff';
            } else {
                document.getElementById('username-display').innerText = user;
                currentUser = user;
            }
        }

        function logout(e) {
            e.preventDefault();
            localStorage.removeItem('panda_session_token');
            localStorage.removeItem('panda_username');
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?action=logout&from=' + encodeURIComponent(window.location.href);
        }

        checkLogin();

        // 載入專案
        let socket;
        async function connectToServer() {
            try {
                const res = await fetch('https://pandapanda6666.github.io/login-hub/server_url.txt');
                const text = await res.text();
                const serverUrl = atob(text.trim().split('').reverse().join(''));
                
                socket = io(serverUrl, { transports: ['websocket'] });
                
                socket.on('connect', () => {
                    socket.emit('getUserProjects', { username: currentUser });
                });

                socket.on('userProjectsData', (data) => {
                    const container = document.getElementById('projects-container');
                    container.innerHTML = '';
                    
                    let projects = [];
                    if (Array.isArray(data)) {
                        projects = data;
                    } else if (data && Array.isArray(data.projects)) {
                        projects = data.projects;
                    }

                    if (projects.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <h3>你還沒有任何專案</h3>
                                <p>點擊右上角的「+ 新增專案」來創造你的第一個專案吧！</p>
                            </div>
                        `;
                        return;
                    }

                    projects.forEach(proj => {
                        const id = proj.id || proj.appId || proj._id || Math.random().toString(36).substr(2, 9);
                        const title = proj.title || proj.name || '未命名專案';
                        const date = proj.updatedAt || proj.date || new Date().toISOString();
                        
                        const item = document.createElement('div');
                        item.className = 'project-item';
                        item.innerHTML = `
                            <div class="project-thumbnail">🖼️</div>
                            <div class="project-details">
                                <div class="project-title">${title}</div>
                                <div class="project-meta">最後修改：${new Date(date).toLocaleDateString()}</div>
                                <div class="project-buttons">
                                    <button onclick="window.location.href='/scratch/projects/editor/?id=${id}'">看裡面</button>
                                </div>
                            </div>
                        `;
                        container.appendChild(item);
                    });
                });

                socket.on('connect_error', () => {
                    document.getElementById('projects-container').innerHTML = `
                        <div class="empty-state" style="color: red;">
                            <h3>無法連接伺服器</h3>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('projects-container').innerHTML = `
                    <div class="empty-state" style="color: red;">
                        <h3>無法獲取伺服器資訊</h3>
                    </div>
                `;
            }
        }

        if (currentUser) {
            connectToServer();
        }
    </script>
</body>
</html>
