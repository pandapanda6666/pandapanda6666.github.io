<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google" value="notranslate">
    <link rel="shortcut icon" href="static/favicon.ico">
    <title>Scratch 3.0 GUI</title>
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // 請�?得�?此網?��?網�?，�??�伺?�器管�??�板??CORS ?��?網�??��??�中，否?��??��????
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
            originalWarn.apply(console, args);
        };
        window.onerror = function(msg, url, line) { 
            if (typeof window.socket !== 'undefined' && window.socket.connected) window.socket.emit('logError', { errorMsg: msg, url: url, line: line }); 
        };
        window.addEventListener('unhandledrejection', function(event) {
            if (typeof window.socket !== 'undefined' && window.socket.connected) window.socket.emit('logError', { errorMsg: 'Promise?�常: ' + (event.reason ? event.reason.message || event.reason : '?�知?�誤'), url: window.location.href, line: 0 });
        });

        window.appId = window.location.hostname + window.location.pathname;

        async function connectToServer() {
            const urlParams = new URLSearchParams(window.location.search);
            let serverUrl = urlParams.get('server');
            if (!serverUrl) {
                try {
                    const res = await fetch('https://pandapanda6666.github.io/login-hub/server_url.txt');
                    const text = await res.text();
                    serverUrl = atob(text.trim().split('').reverse().join(''));
                } catch (e) {
                    console.error('Failed to get server url', e);
                }
            }
            if (!serverUrl) {
                document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:20%">伺�??��??失�?，�?稍�??�試</h1>';
                return;
            }

            window.socket = io(serverUrl, { transports: ['websocket'] });
            
            window.socket.on('connect', () => {
                window.socket.emit('initClientInfo', { location: '?�知?��?', device: navigator.userAgent });
                window.socket.emit('joinGameRoom', { room: window.appId, characterData: {} });
                
                const auth = urlParams.get('auth');
                const user = urlParams.get('user');
                if (user) localStorage.setItem('panda_session_user', user);
                const token = urlParams.get('token') || localStorage.getItem('panda_session_token');

                if (auth === 'true' && user) {
                    window.socket.emit('requestProfile', { username: user });
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else if (token) {
                    window.socket.emit('tokenLogin', { token: token });
                }
            });

            window.socket.on('profileData', (data) => {
                if (data) {
                    if (data.token) localStorage.setItem('panda_session_token', data.token);
                    window.dispatchEvent(new CustomEvent('sso_login_success', { detail: data }));
                } else {
                    window.dispatchEvent(new CustomEvent('sso_login_failed'));
                }
            });

            window.socket.on('loginResult', (data) => {
                if (data.success && data.token) {
                    localStorage.setItem('panda_session_token', data.token);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    window.dispatchEvent(new CustomEvent('sso_login_success', { detail: data }));
                } else {
                    localStorage.removeItem('panda_session_token');
                    window.dispatchEvent(new CustomEvent('sso_login_failed'));
                }
            });
            
            window.socket.on('playerJoined', (data) => {
                window.dispatchEvent(new CustomEvent('playerJoined', { detail: data }));
            });
            window.socket.on('playerStateUpdated', (data) => {
                window.dispatchEvent(new CustomEvent('playerStateUpdated', { detail: data }));
            });
            window.socket.on('playerLeft', (data) => {
                window.dispatchEvent(new CustomEvent('playerLeft', { detail: data }));
            });
        }
        connectToServer();
    </script>
  </head>

    </div>
  <script type="text/javascript" src="lib.min.js"></script><script type="text/javascript" src="chunks/gui.js"></script></body>
</html>
