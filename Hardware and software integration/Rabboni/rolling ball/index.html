<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rabboni 迷宮</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <!-- Import map for CDN -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
          "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
        }
      }
    </script>
</head>
<body>
    <header>
        <h1>3D Rabboni Maze</h1>
        <div id="statusBadge" class="status-badge disconnected">連線中斷</div>
    </header>
    
    <div id="game-container">
        <!-- 3D Canvas 將會在這裡 -->
    </div>

    <div class="controls-panel">
        <button id="cameraBtn" class="btn" style="margin-bottom: 0.5rem;">切換視角 (預設)</button>
        <button id="calibrateBtn" class="btn">校準 (平放後點擊)</button>
        <div style="margin: 0.8rem 0; color: rgba(255,255,255,0.8); font-size: 0.85rem; display: flex; flex-direction: column; gap: 0.5rem; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 8px;">
            <label style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;"><input type="checkbox" id="invertPitch" /> 畫面反轉 (Pitch)</label>
            <label style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;"><input type="checkbox" id="invertRoll" checked /> 畫面反轉 (Roll)</label>
        </div>
        <div class="info-group">
            <div class="info-label">俯仰角 (Pitch)</div>
            <div class="info-value" id="valPitch">0.00°</div>
            <div class="info-label">翻滾角 (Roll)</div>
            <div class="info-value" id="valRoll">0.00°</div>
        </div>
    </div>

    <div id="winOverlay" class="overlay hidden">
        <div class="win-dialog">
            <h2>恭喜過關！🎉</h2>
            <p>你成功將球引導至終點！</p>
            <button id="restartBtn" class="btn">再來一局</button>
        </div>
    </div>

    <script type="module" src="./main.js?v=10"></script>
</body>
</html>
