<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目錄索引</title>
    <style>
        /* 採用程式碼A的綠色系配色變數 */
        :root {
            --primary-color: #2c5e32;
            --secondary-color: #3c6e42;
            --background-color: #f0f8e8;
            --card-bg-color: #ffffff;
            --text-color: #3d3d3d;
            --border-color: #dde8d4;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.7;
        }

        header {
            border-bottom: 2px solid var(--border-color);
            padding: 3rem 1.5rem;
            background-color: #e4f0d8; /* 配合A主題微調的頂部背景 */
            text-align: center;
        }

        #main-title {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-color);
            margin: 0 0 10px 0;
        }

        #main-subtitle {
            color: #555;
            font-size: 1.1rem;
            margin: 0;
        }

        main {
            flex-grow: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 2rem;
            box-sizing: border-box;
        }

        /* 網格與卡片樣式 */
        #folder-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            color: inherit;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .img-container {
            width: 5rem;
            height: 5rem;
            flex-shrink: 0;
            background: #f0f0f0;
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .project-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .img-fallback-text {
            font-size: 0.7rem;
            color: #9ca3af;
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
            padding: 4px;
        }

        .text-content {
            flex: 1;
            min-width: 0;
        }

        .project-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0;
        }

        .project-desc {
            margin-top: 0.25rem;
            font-size: 0.875rem;
            color: #666;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .arrow-icon {
            color: var(--secondary-color);
            flex-shrink: 0;
        }

        #loading-indicator {
            text-align: center;
            padding: 3rem 0;
            color: #666;
        }
        
        .loading-spinner-small {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #ccc;
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            border-top: 2px solid var(--border-color);
            padding: 2rem 1.5rem;
            background-color: #e4f0d8;
            text-align: center;
            color: #777;
            font-size: 0.9em;
            margin-top: auto;
        }

        footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <div class="max-w-6xl mx-auto text-center">
            <h1 id="main-title">載入中...</h1>
            <p id="main-subtitle"></p>
        </div>
    </header>

    <main>
        <div id="folder-list">
            <!-- 資料夾卡片將在此生成 -->
        </div>
        
        <div id="loading-indicator">
            <div class="loading-spinner-small"></div>
            <p id="loading-text">正在自動辨識目錄結構...</p>
        </div>
    </main>

    <footer>
        <p id="copyright-text">
            版權所有 © 2026 
            <a href="https://pandapanda6666.github.io" target="_blank">PandaPanda的AI日常</a> 
            All Rights Reserved.
        </p>
    </footer>

    <script>
        const isZH = navigator.language.startsWith('zh');
        
        // 語系字典
        const i18n = {
            zh: {
                loading: "載入中...",
                reading: "正在自動辨識目錄結構...",
                noContent: "目前沒有可顯示的項目",
                apiLimit: "GitHub API 達到上限，請稍候",
                defaultSubtitle: "自動掃描的專案清單",
                noDescription: "無說明文字",
                noIcon: "載入預覽中",
                scanError: "讀取目錄失敗",
                localError: "請於 GitHub Pages 運行"
            },
            en: {
                loading: "Loading...",
                reading: "Scanning folders automatically...",
                noContent: "No items found",
                apiLimit: "API rate limit reached",
                defaultSubtitle: "Automated Project List",
                noDescription: "No description",
                noIcon: "Loading Preview",
                scanError: "Failed to scan",
                localError: "Run on GitHub Pages"
            }
        };

        const t = isZH ? i18n.zh : i18n.en;

        function getAbsoluteUrl(relativePath) {
            try {
                let base = window.location.href;
                if (!base.endsWith('/') && !base.includes('.html')) base += '/';
                base = base.replace(/\/index\.html$/, '/'); // 採用 A 的相對路徑精準修正邏輯
                return new URL(relativePath, base).href;
            } catch (e) {
                return relativePath;
            }
        }

        function handleImageError(img, projectUrl) {
            const previewUrl = `https://s.wordpress.com/mshots/v1/${encodeURIComponent(projectUrl)}?w=400`;
            if (img.src !== previewUrl) {
                img.src = previewUrl;
            } else {
                img.parentElement.innerHTML = `<div class="img-fallback-text">${t.noIcon}</div>`;
            }
        }

        // 移植自 B 檔案的後端邏輯：動態解析 GitHub Pages 的帳號、儲存庫與路徑
        async function getRepoInfo() {
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;
            
            if (!hostname.includes('github.io')) return null;

            const user = hostname.split('.')[0];
            const cleanPath = pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
            const pathParts = cleanPath.split('/').filter(p => p !== '');

            // 若在根目錄
            if (pathParts.length === 0) {
                return { user, repo: `${user}.github.io`, subPath: '' };
            }

            const testRepo = pathParts[0];
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${testRepo}`);
                if (res.ok) {
                    return { user, repo: testRepo, subPath: pathParts.slice(1).join('/') };
                }
            } catch (e) {}
            
            return { user, repo: `${user}.github.io`, subPath: pathParts.join('/') };
        }

        async function init() {
            document.getElementById('loading-text').textContent = t.reading;
            document.getElementById('main-title').textContent = t.loading;
            
            await updateTitleFromReadme();
            
            if (window.location.protocol === 'file:') {
                document.getElementById('loading-indicator').innerHTML = `<p style="color: #d9534f; font-style: italic;">${t.localError}</p>`;
                return;
            }
            
            await scanAndLoadFolders();
        }

        async function updateTitleFromReadme() {
            const titleElement = document.getElementById('main-title');
            const subtitleElement = document.getElementById('main-subtitle');
            
            try {
                const response = await fetch(getAbsoluteUrl('./README.md'));
                if (response.ok) {
                    const text = await response.text();
                    const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
                    if (lines.length > 0) {
                        const extractedTitle = lines[0].replace(/^#\s*/, '').trim();
                        titleElement.textContent = extractedTitle;
                        document.title = extractedTitle;
                        subtitleElement.textContent = lines.length > 1 ? lines[1] : t.defaultSubtitle;
                        return;
                    }
                }
            } catch (e) {}
            
            fallbackTitle();
        }

        function fallbackTitle() {
            const url = window.location.href;
            let title = url.replace('https://pandapanda6666.github.io/', '').replace(/\//g, '');
            if (!title || title.includes('index.html')) {
                title = isZH ? "專案目錄" : "Project Directory";
            }
            document.getElementById('main-title').textContent = title;
            document.title = title;
            document.getElementById('main-subtitle').textContent = t.defaultSubtitle;
        }

        // 結合 B 的動態資料源與 A 的卡片元素生成邏輯
        async function scanAndLoadFolders() {
            const container = document.getElementById('folder-list');
            const loadingIndicator = document.getElementById('loading-indicator');
            const repoInfo = await getRepoInfo();
            
            if (!repoInfo) {
                loadingIndicator.innerHTML = `<p style="color: #d9534f;">${t.scanError}</p>`;
                return;
            }

            try {
                const apiUrl = `https://api.github.com/repos/${repoInfo.user}/${repoInfo.repo}/contents/${repoInfo.subPath}`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    if (response.status === 403) throw new Error(t.apiLimit);
                    throw new Error(t.scanError);
                }

                const contents = await response.json();
                // 篩選出非隱藏資料夾
                const directories = contents.filter(item => item.type === 'dir' && !item.name.startsWith('.'));

                let hasContent = false;
                container.innerHTML = ''; 

                for (const item of directories) {
                    try {
                        const folder = item.name;
                        const projectUrl = getAbsoluteUrl(`./${folder}/`);
                        const readmeUrl = getAbsoluteUrl(`./${folder}/README.md`);
                        const iconUrl = getAbsoluteUrl(`./${folder}/icon.png`);
                        
                        const readmeRes = await fetch(readmeUrl);
                        if (!readmeRes.ok) continue; 

                        const text = await readmeRes.text();
                        const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
                        if (lines.length === 0) continue;

                        hasContent = true;
                        const name = lines[0].replace(/^#\s*/, '').trim();
                        const desc = lines.length > 1 ? lines[1].trim() : t.noDescription;

                        const cardHTML = `
                            <a href="${projectUrl}" class="project-card">
                                <div class="card-content">
                                    <div class="img-container">
                                        <img src="${iconUrl}" alt="${name}" class="project-img" 
                                             onerror="handleImageError(this, '${projectUrl}')">
                                    </div>
                                    <div class="text-content">
                                        <h3 class="project-title">${name}</h3>
                                        <p class="project-desc">${desc}</p>
                                    </div>
                                    <div class="arrow-icon">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                                        </svg>
                                    </div>
                                </div>
                            </a>
                        `;
                        
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = cardHTML.trim();
                        container.appendChild(tempDiv.firstChild);

                    } catch (e) {
                        console.warn("Skipping folder:", item.name, e);
                    }
                }

                loadingIndicator.style.display = 'none';
                if (!hasContent) container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:#999;">${t.noContent}</div>`;

            } catch (error) {
                loadingIndicator.innerHTML = `<p style="color: #d9534f;">${error.message}</p>`;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
