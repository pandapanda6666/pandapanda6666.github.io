<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PandaPanda 虛擬商城</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 50% -20%, #1e1b4b, #020617 80%);
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        
        .glass-nav {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        
        .glass-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.2);
            background: rgba(30, 41, 59, 0.6);
        }
        
        .btn-buy {
            background: linear-gradient(135deg, #4ade80, #16a34a);
            transition: all 0.2s ease;
        }
        
        .btn-buy:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
        }
        
        .btn-buy:active {
            transform: scale(0.95);
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }
        
        .origin-badge {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
        }

        /* Success Animation */
        @keyframes successGlow {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            50% { box-shadow: 0 0 40px 20px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }
        .success-anim {
            animation: successGlow 1.5s ease-out;
            border-color: #4ade80 !important;
        }
        
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
        }
        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="glass-nav px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🏪</span>
                <div>
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">PandaPanda 虛擬商城</h1>
                    <p class="text-xs text-slate-400">跨網域通用道具與資產</p>
                </div>
            </div>
            
            <div id="userProfile" class="flex items-center gap-6 hidden">
                <div class="flex flex-col items-end">
                    <span id="userName" class="font-bold text-white"></span>
                    <span class="text-xs text-slate-400">Lv.<span id="userLevel"></span></span>
                </div>
                <div class="bg-slate-800/80 border border-slate-700 rounded-full px-4 py-1.5 flex items-center gap-2 shadow-inner">
                    <span class="text-yellow-400 font-bold">P</span>
                    <span id="userPCoin" class="font-mono font-bold text-green-400 text-lg">---</span>
                </div>
                <button onclick="logout()" class="text-sm text-slate-400 hover:text-white transition">登出</button>
            </div>
            
            <div id="loginPrompt" class="flex items-center gap-4">
                <span class="text-sm text-red-400 font-bold animate-pulse">連線中或未登入...</span>
                <button onclick="goToLogin()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-full font-bold shadow-lg transition">前往登入中心</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-10 text-center">
            <h2 class="text-4xl font-extrabold mb-4">探索無限可能</h2>
            <p class="text-slate-400 max-w-2xl mx-auto">在這裡，您可以使用 P 幣購買各種專屬網域的道具、特效與特權。所有購買的資產將會即時同步至您的全域帳號背包中。</p>
        </div>

        <!-- Filters (Placeholder for future) -->
        <div class="flex gap-4 mb-8 border-b border-slate-800 pb-4">
            <button class="text-blue-400 font-bold border-b-2 border-blue-400 pb-2 px-2">全部商品</button>
        </div>

        <!-- Product Grid -->
        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loading Skeletons -->
            <div class="glass-card h-80 flex flex-col skeleton"></div>
            <div class="glass-card h-80 flex flex-col skeleton"></div>
            <div class="glass-card h-80 flex flex-col skeleton"></div>
            <div class="glass-card h-80 flex flex-col skeleton"></div>
        </div>
    </main>

    <!-- Buy Modal -->
    <div id="buyModal" class="fixed inset-0 modal-overlay z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300" id="buyModalContent">
            <h3 class="text-2xl font-bold mb-2" id="modalTitle">確認購買</h3>
            <p class="text-slate-400 text-sm mb-6" id="modalDesc"></p>
            
            <div class="bg-slate-800 rounded-xl p-4 mb-6 flex justify-between items-center border border-slate-700">
                <span class="text-slate-300">總計金額</span>
                <div class="flex items-center gap-1">
                    <span class="text-yellow-400 font-bold">P</span>
                    <span id="modalPrice" class="text-2xl font-mono font-bold text-green-400"></span>
                </div>
            </div>
            
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-slate-800 hover:bg-slate-700 transition">取消</button>
                <button onclick="confirmBuy()" class="flex-1 py-3 rounded-xl font-bold text-white btn-buy" id="btnConfirmBuy">確認扣款</button>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let currentUser = null;
        let products = [];
        let selectedProduct = null;

        // Initialize connection
        async function init() {
            try {
                // Try to get server url from login-hub
                let res = await fetch('https://pandapanda6666.github.io/login-hub/server_url.txt');
                if(!res.ok) res = await fetch('../login-hub/server_url.txt');
                const t = await res.text();
                const serverUrl = atob(t.trim().split('').reverse().join(''));
                
                socket = io(serverUrl, { transports: ['websocket'] });
                
                socket.on('connect', () => {
                    const savedU = localStorage.getItem('panda_auto_user');
                    const savedP = localStorage.getItem('panda_auto_pass');
                    if (savedU && savedP) {
                        socket.emit('login', { username: savedU, password: savedP });
                    }
                    socket.emit('getProducts');
                });

                socket.on('loginResult', (res) => {
                    if(res.success) {
                        document.getElementById('loginPrompt').classList.add('hidden');
                        document.getElementById('userProfile').classList.remove('hidden');
                        document.getElementById('userName').innerText = res.username;
                        // Ask for user data
                        socket.emit('getUserData', { username: res.username });
                    } else {
                        localStorage.removeItem('panda_auto_pass');
                    }
                });

                socket.on('userData', (data) => {
                    currentUser = data;
                    document.getElementById('userLevel').innerText = data.level || 1;
                    
                    // Animate P-Coin change
                    const el = document.getElementById('userPCoin');
                    const oldVal = parseInt(el.innerText) || 0;
                    const newVal = data.p_coin || 0;
                    animateValue(el, oldVal, newVal, 1000);
                });

                socket.on('productsData', (data) => {
                    products = data || [];
                    renderProducts();
                });
                
                socket.on('productsUpdated', (data) => {
                    products = data || [];
                    renderProducts();
                });

            } catch (e) {
                console.error("Failed to init", e);
                document.getElementById('productGrid').innerHTML = '<div class="col-span-full text-center text-red-400 p-8 bg-red-400/10 rounded-xl border border-red-400/20">無法連線至商城伺服器，請確認主機已開啟。</div>';
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            if(products.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-slate-400 p-8 border border-dashed border-slate-700 rounded-xl">目前商城尚未上架任何商品。</div>';
                return;
            }
            
            products.forEach(p => {
                const cardId = 'card_' + p.id;
                const isOwned = currentUser && currentUser.inventory && currentUser.inventory[p.origin] && currentUser.inventory[p.origin].includes(p.name);
                
                let imgHtml = p.image ? `<img src="${p.image}" class="w-full h-40 object-cover object-center" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\'><rect width=\'100\' height=\'100\' fill=\'%231e293b\'/><text x=\'50\' y=\'50\' font-family=\'Arial\' font-size=\'14\' fill=\'%2364748b\' text-anchor=\'middle\' dominant-baseline=\'middle\'>無圖片</text></svg>'">` 
                                      : `<div class="w-full h-40 bg-gradient-to-br from-slate-800 to-slate-900 flex items-center justify-center text-4xl">🎁</div>`;
                
                let originHtml = p.origin ? `<div class="absolute top-3 right-3 origin-badge text-[10px] font-bold px-2 py-1 rounded-full shadow-lg border border-indigo-300/30">${new URL(p.origin).hostname.split('.')[0]} 專屬</div>` : '';
                
                let btnHtml = isOwned ? 
                    `<button disabled class="w-full py-2.5 rounded-lg font-bold text-slate-400 bg-slate-800 border border-slate-700 cursor-not-allowed">已擁有</button>` :
                    `<button onclick="openModal('${p.id}')" class="w-full py-2.5 rounded-lg font-bold text-white btn-buy">購買道具</button>`;

                const html = `
                    <div id="${cardId}" class="glass-card flex flex-col relative group">
                        ${originHtml}
                        ${imgHtml}
                        <div class="p-5 flex flex-col flex-grow">
                            <h3 class="text-xl font-bold mb-1">${p.name}</h3>
                            <p class="text-xs text-slate-400 mb-4 flex-grow">${p.desc || '無描述'}</p>
                            
                            <div class="flex justify-between items-end mb-4">
                                <span class="text-sm text-slate-500">售價</span>
                                <div class="flex items-center gap-1">
                                    <span class="text-yellow-400 text-sm font-bold">P</span>
                                    <span class="text-2xl font-mono font-bold text-green-400">${p.price}</span>
                                </div>
                            </div>
                            
                            ${btnHtml}
                        </div>
                    </div>
                `;
                grid.innerHTML += html;
            });
        }

        // Modal Logic
        function openModal(id) {
            if(!currentUser) {
                goToLogin();
                return;
            }
            selectedProduct = products.find(p => p.id === id);
            if(!selectedProduct) return;
            
            document.getElementById('modalTitle').innerText = '購買 ' + selectedProduct.name;
            document.getElementById('modalDesc').innerText = '購買後將可於 ' + (selectedProduct.origin || '全域') + ' 中使用此道具/特權。';
            document.getElementById('modalPrice').innerText = selectedProduct.price;
            
            const btn = document.getElementById('btnConfirmBuy');
            if(currentUser.p_coin < selectedProduct.price) {
                btn.innerText = 'P 幣餘額不足';
                btn.classList.add('bg-slate-700', 'text-slate-400', 'cursor-not-allowed');
                btn.classList.remove('btn-buy');
                btn.disabled = true;
            } else {
                btn.innerText = '確認扣款';
                btn.classList.remove('bg-slate-700', 'text-slate-400', 'cursor-not-allowed');
                btn.classList.add('btn-buy');
                btn.disabled = false;
            }

            const modal = document.getElementById('buyModal');
            const content = document.getElementById('buyModalContent');
            modal.classList.remove('hidden');
            // small delay for transition
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('buyModal');
            const content = document.getElementById('buyModalContent');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                selectedProduct = null;
            }, 300);
        }

        function confirmBuy() {
            if(!selectedProduct || !currentUser) return;
            
            const btn = document.getElementById('btnConfirmBuy');
            btn.innerText = '處理中...';
            btn.disabled = true;

            // Emit buy request
            socket.emit('buyItem', { 
                itemId: selectedProduct.id, 
                username: currentUser.username 
            }, (res) => {
                closeModal();
                if(res && res.success) {
                    // Force refresh user data
                    socket.emit('getUserData', { username: currentUser.username });
                    // Play success animation on card
                    const card = document.getElementById('card_' + selectedProduct.id);
                    if(card) {
                        card.classList.add('success-anim');
                        setTimeout(() => renderProducts(), 1500); // re-render to show "已擁有"
                    }
                } else {
                    alert('購買失敗: ' + (res ? res.error : '未知錯誤'));
                    btn.disabled = false;
                }
            });
            
            // Timeout fallback
            setTimeout(() => { btn.disabled = false; }, 5000);
        }

        // Utils
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        function goToLogin() {
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?from=' + encodeURIComponent(window.location.href);
        }

        function logout() {
            localStorage.removeItem('panda_auto_pass');
            goToLogin();
        }

        // Start
        init();
    </script>
</body>
</html>
