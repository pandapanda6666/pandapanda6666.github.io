<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胖達商城</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f4f6f8;
            color: #333333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        /* 隱藏原生滾動條，美化滾動體驗 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }
        .banner-gradient {
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="min-h-screen flex flex-col">

    <!-- 商城頂部導航列 -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo & 品牌名 -->
                <div class="flex items-center cursor-pointer" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                    <img src="./logo.png" alt="Panda Logo" class="h-10 w-10 rounded-full border-2 border-green-500 object-cover">
                    <span class="ml-3 font-extrabold text-xl text-green-700 tracking-wide">胖達商城</span>
                </div>
                
                <!-- 真實搜尋框 -->
                <div class="hidden md:flex flex-1 max-w-lg mx-8">
                    <div class="relative w-full">
                        <input type="text" id="search-input" placeholder="搜尋商品名稱或說明..." class="w-full bg-gray-100 border border-gray-200 text-gray-800 text-sm rounded-full focus:ring-green-500 focus:border-green-500 block pl-10 p-2.5 outline-none transition-all">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <svg class="w-4 h-4 text-gray-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                            </svg>
                        </div>
                        <button type="button" onclick="document.getElementById('search-input').focus()" class="absolute inset-y-0 right-0 px-4 text-sm font-medium text-white bg-green-600 rounded-r-full hover:bg-green-700 focus:ring-4 focus:outline-none focus:ring-green-300">
                            搜尋
                        </button>
                    </div>
                </div>

                <!-- 購物車與會員圖示 -->
                <div class="flex items-center space-x-6">
                    <!-- 會員帳號選單 (模擬功能) -->
                    <div class="relative">
                        <button id="user-menu-btn" onclick="toggleUserMenu(event)" class="text-gray-500 hover:text-green-600 transition-colors focus:outline-none flex items-center rounded-full overflow-hidden border-2 border-transparent hover:border-green-600">
                            <img id="user-avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2'></path><circle cx='12' cy='7' r='4'></circle></svg>" class="h-7 w-7 object-cover bg-gray-100" alt="User">
                        </button>
                        <!-- 下拉選單 -->
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50 border border-gray-100">
                            <div class="px-4 py-3 border-b border-gray-100">
                                <p class="text-xs text-gray-500">當前狀態</p>
                                <p id="user-display-name" class="text-sm font-bold text-gray-800 truncate">訪客</p>
                            </div>
                            
                            
                            <a href="#" onclick="window.location.href='https://pandapanda6666.github.io/login-hub/?from=' + encodeURIComponent(window.location.href); return false;" class="block px-4 py-2 text-sm text-gray-700 hover:bg-green-50 hover:text-green-600">帳號設定</a>
                            <div class="border-t border-gray-100"></div>
                            <button id="login-logout-btn" onclick="mockLoginLogout()" class="w-full text-left block px-4 py-2 text-sm font-medium text-green-600 hover:bg-green-50 hover:text-green-700">
                                登入 / 註冊
                            </button>
                        </div>
                    </div>

                    <!-- 購物車按鈕 -->
                    <!-- P-Coin Display -->
                    <div id="pcoin-display" class="hidden flex items-center bg-green-50 border border-green-200 rounded-full px-3 py-1">
                        <span class="text-yellow-500 font-bold mr-1">P</span>
                        <span id="user-pcoin" class="text-green-700 font-bold font-mono">0</span>
                    </div>
                    <button class="text-gray-500 hover:text-green-600 transition-colors relative">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                        <span id="cart-count" class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-white">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要佈局：左側分類 + 右側內容 -->
    <div class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row gap-8">
        
        <!-- 左側邊欄：商品分類 -->
        <aside class="hidden md:block w-64 flex-shrink-0">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sticky top-24">
                <h3 class="font-bold text-lg text-gray-800 mb-4 border-b border-gray-100 pb-2">商品分類</h3>
                <ul class="space-y-2" id="category-menu">
                    <li>
                        <a href="#" data-category="all" class="category-link flex items-center justify-between text-green-600 bg-green-50 rounded-lg px-3 py-2 font-medium transition-colors">
                            <span>全部商品</span>
                            <span class="bg-green-200 text-green-800 text-xs py-0.5 px-2 rounded-full" id="sidebar-count">0</span>
                        </a>
                    </li>
                    <li><a href="#" data-category="newest" class="category-link flex items-center justify-between text-gray-600 hover:bg-gray-50 hover:text-green-600 rounded-lg px-3 py-2 transition-colors"><span>最新上架</span></a></li>
                    <li><a href="#" data-category="name" class="category-link flex items-center justify-between text-gray-600 hover:bg-gray-50 hover:text-green-600 rounded-lg px-3 py-2 transition-colors"><span>名稱排序</span></a></li>
                </ul>
            </div>
        </aside>

        <!-- 右側主內容 -->
        <main class="flex-1 min-w-0">
            
            <!-- 促銷橫幅 -->
            <div class="banner-gradient rounded-2xl p-8 mb-8 text-white shadow-lg relative overflow-hidden">
                <div class="relative z-10">
                    <span class="bg-yellow-400 text-yellow-900 text-xs font-bold px-2 py-1 rounded uppercase tracking-wider mb-3 inline-block">Official Store</span>
                    <h1 id="main-title" class="text-3xl md:text-4xl font-extrabold mb-2 drop-shadow-md">
                        <!-- 載入中文字將由 JS 替換 -->
                    </h1>
                    <p id="main-subtitle" class="text-green-50 text-lg max-w-xl opacity-90"></p>
                </div>
                <!-- 裝飾用背景圈圈 -->
                <div class="absolute -bottom-10 -right-10 w-48 h-48 bg-white opacity-10 rounded-full"></div>
                <div class="absolute -top-10 right-20 w-32 h-32 bg-white opacity-10 rounded-full"></div>
            </div>

            <!-- 商品列表區塊 -->
            <div class="flex items-center justify-between mb-6" id="shop-header" style="display: none;">
                <h2 class="text-xl font-bold text-gray-800 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                    所有商品
                </h2>
                <div class="flex items-center space-x-2 text-sm text-gray-500">
                    <span>排序方式:</span>
                    <select id="sort-select" class="bg-white border border-gray-200 rounded px-2 py-1 outline-none focus:border-green-500 text-gray-700 cursor-pointer">
                        <option value="default">綜合推薦</option>
                        <option value="newest">最新上架</option>
                        <option value="name">名稱排序(A-Z)</option>
                    </select>
                </div>
            </div>

            <!-- 商品清單網格 -->
            <div id="folder-list" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                <!-- 商品卡片將在此生成 -->
            </div>
            
            <!-- 載入中動畫 -->
            <div id="loading-indicator" class="flex flex-col items-center justify-center py-20 bg-white rounded-xl shadow-sm border border-gray-100">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-green-100 border-t-green-500 mb-4"></div>
                <p id="loading-text" class="text-gray-500 font-medium"></p>
            </div>
        </main>
    </div>

    <!-- 商城底部版權 -->
    <footer class="bg-white border-t border-gray-200 pt-10 pb-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <div class="flex justify-center space-x-6 mb-6">
                
                
                
                
            </div>
            <p id="copyright-text" class="text-gray-500 text-sm">
                版權所有 © 2026 
                <a href="https://pandapanda6666.github.io" class="text-green-600 hover:text-green-800 hover:underline font-bold transition-colors">PandaPanda的AI日常</a> 
                All Rights Reserved.
            </p>
        </div>
    </footer>

    <script>
        const isZH = navigator.language.startsWith('zh');
        
        const i18n = {
            zh: {
                loading: "載入中...",
                reading: "正在為您準備商城商品...",
                noContent: "找不到符合的商品",
                apiLimit: "伺服器請求達到上限，請稍候再試",
                defaultSubtitle: "嚴選優質商品，為您帶來最好的購物體驗",
                noDescription: "暫無商品說明",
                scanError: "讀取商城目錄失敗",
                localError: "請於 GitHub Pages 運行",
                addToCart: "加入購物車",
                added: "已加入"
            },
            en: {
                loading: "Loading...",
                reading: "Preparing shop items...",
                noContent: "No items found",
                apiLimit: "Server rate limit reached, please try again later",
                defaultSubtitle: "Curated premium items for the best shopping experience",
                noDescription: "No description available",
                scanError: "Failed to load shop directory",
                localError: "Run on GitHub Pages",
                addToCart: "Add to Cart",
                added: "Added"
            }
        };

        const t = isZH ? i18n.zh : i18n.en;
        const pandaImgUrl = "./logo.png";
        
        // 全局商品資料陣列，用於搜尋與排序
        let allProducts = [];
        // 購物車數量
        let cartItemsCount = 0;
        // 模擬會員登入狀態
        let isLoggedIn = false;

        function getAbsoluteUrl(relativePath) {
            try {
                let base = window.location.href;
                if (!base.endsWith('/') && !base.includes('.html')) base += '/';
                return new URL(relativePath, base).href;
            } catch (e) {
                return relativePath;
            }
        }

        function handleImageError(img) {
            if (img.src !== pandaImgUrl) {
                img.src = pandaImgUrl;
            }
        }

        // 點擊卡片跳轉到商品專案頁面
        function goToProject(url) {
            window.location.href = url;
        }

        // --- 模擬帳號功能 ---
        function toggleUserMenu(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('user-dropdown');
            dropdown.classList.toggle('hidden');
        }

        function updateLoginUI() {
            const savedU = localStorage.getItem('panda_auto_user');
            isLoggedIn = !!savedU;
            
            if (!isLoggedIn) {
                window.location.href = 'https://pandapanda6666.github.io/login-hub/?require=1&from=' + encodeURIComponent(window.location.href);
                return;
            }
            
            const displayName = document.getElementById('user-display-name');
            const loginBtn = document.getElementById('login-logout-btn');
            const userIconBtn = document.getElementById('user-menu-btn');

            if (isLoggedIn) {
                displayName.textContent = "VIP | " + savedU;
                displayName.classList.add('text-green-600');
                loginBtn.textContent = "登出";
                loginBtn.classList.replace('text-green-600', 'text-red-500');
                userIconBtn.classList.add('text-green-600');
            } else {
                displayName.textContent = "訪客";
                displayName.classList.remove('text-green-600');
                loginBtn.textContent = "登入 / 註冊";
                if (loginBtn.classList.contains('text-red-500')) {
                    loginBtn.classList.replace('text-red-500', 'text-green-600');
                }
                userIconBtn.classList.remove('text-green-600');
            }
        }

        function mockLoginLogout() {
            const savedU = localStorage.getItem('panda_auto_user');
            if (savedU) {
                // Logout completely
                localStorage.removeItem('panda_auto_user');
                localStorage.removeItem('panda_auto_pass');
                // Optional: inform server or just reload
                window.location.href = 'https://pandapanda6666.github.io/login-hub/';
            } else {
                // Redirect to unified login hub with from query param
                window.location.href = 'https://pandapanda6666.github.io/login-hub/?from=' + encodeURIComponent(window.location.href);
            }
        }

        // Initialize UI on load
        document.addEventListener('DOMContentLoaded', updateLoginUI);

        // 點擊畫面其他地方隱藏會員選單
        window.addEventListener('click', function(e) {
            const dropdown = document.getElementById('user-dropdown');
            const btn = document.getElementById('user-menu-btn');
            if (dropdown && !dropdown.classList.contains('hidden') && !btn.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
        // --- 模擬帳號功能結束 ---

        // 加入購物車邏輯
        function addToCart(event) {
            // 防止觸發卡片的點擊跳轉事件
            event.stopPropagation();
            
            // 增加購物車數量
            cartItemsCount++;
            document.getElementById('cart-count').textContent = cartItemsCount;
            
            // 按鈕視覺回饋
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg><span>${t.added}</span>`;
            btn.classList.remove('bg-green-50', 'text-green-700');
            btn.classList.add('bg-green-600', 'text-white', 'border-green-600');
            
            // 1秒後恢復原狀
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.add('bg-green-50', 'text-green-700');
                btn.classList.remove('bg-green-600', 'text-white', 'border-green-600');
            }, 1000);
        }

        async function getRepoInfo() {
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;
            
            if (!hostname.includes('github.io')) return null;

            const user = hostname.split('.')[0];
            const cleanPath = pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
            const pathParts = cleanPath.split('/').filter(p => p !== '');

            if (pathParts.length === 0) {
                return { user, repo: `${user}.github.io`, subPath: '' };
            }

            const testRepo = pathParts[0];
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${testRepo}`);
                if (res.ok) {
                    return { user, repo: testRepo, subPath: pathParts.slice(1).join('/') };
                }
            } catch (e) {}
            
            return { user, repo: `${user}.github.io`, subPath: pathParts.join('/') };
        }

        async function init() {
            document.getElementById('loading-text').textContent = t.reading;
            document.getElementById('main-title').textContent = t.loading;
            
            fallbackTitle();
            
            if (window.location.protocol === 'file:') {
                document.getElementById('loading-indicator').innerHTML = `<p class="text-red-500 font-medium">${t.localError}</p>`;
                return;
            }
            
            initSocket();
            setupInteractions();
        }

        async function updateTitleFromReadme() {
            const titleElement = document.getElementById('main-title');
            const subtitleElement = document.getElementById('main-subtitle');
            
            try {
                const response = await fetch(getAbsoluteUrl('./README.md'));
                if (response.ok) {
                    const text = await response.text();
                    const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
                    if (lines.length > 0) {
                        const extractedTitle = lines[0].replace(/^#\s*/, '').trim();
                        titleElement.textContent = extractedTitle;
                        document.title = extractedTitle;
                        subtitleElement.textContent = lines.length > 1 ? lines[1] : t.defaultSubtitle;
                        return;
                    }
                }
            } catch (e) {}
            
            fallbackTitle();
        }

        function fallbackTitle() {
            const defaultTitle = "胖達商城";
            document.getElementById('main-title').textContent = defaultTitle;
            document.title = defaultTitle;
            document.getElementById('main-subtitle').textContent = t.defaultSubtitle;
        }

        
        // --- WebSocket & Socket.io Logic ---
        let socket;
        let currentUser = null;
        let selectedProduct = null;

        async function initSocket() {
            try {
                let res = await fetch('https://pandapanda6666.github.io/login-hub/server_url.txt');
                if(!res.ok) res = await fetch('../login-hub/server_url.txt');
                const t = await res.text();
                const serverUrl = atob(t.trim().split('').reverse().join(''));
                
                socket = io(serverUrl, { transports: ['websocket'] });
                
                socket.on('connect', () => {
                    const savedU = localStorage.getItem('panda_auto_user');
                    const savedP = localStorage.getItem('panda_auto_pass');
                    if (savedU && savedP) {
                        socket.emit('login', { username: savedU, password: savedP });
                    }
                    socket.emit('getProducts');
                });

                socket.on('loginResult', (res) => {
                    if(res.success) {
                        isLoggedIn = true;
                        currentUser = res;
                        
                        document.getElementById('user-pcoin').innerText = res.pCoin || 0;
                        if(res.avatar) {
                            document.getElementById('user-avatar').src = res.avatar;
                        } else {
                            const localAvatar = localStorage.getItem('panda_avatar');
                            if (localAvatar) document.getElementById('user-avatar').src = localAvatar;
                        }
                        
                        if(allProducts.length > 0) renderProducts(allProducts);
                        
                        document.getElementById('user-display-name').textContent = (res.nickname || res.username);
                        document.getElementById('user-display-name').classList.add('text-green-600');
                        document.getElementById('login-logout-btn').textContent = "登出";
                        document.getElementById('login-logout-btn').classList.replace('text-green-600', 'text-red-500');
                        document.getElementById('pcoin-display').classList.remove('hidden');
                        document.getElementById('pcoin-display').classList.add('flex');
                        
                        
                    } else {
                        localStorage.removeItem('panda_auto_pass');
                        isLoggedIn = false;
                    }
                });

                
                


                socket.on('productsData', (data) => {
                    allProducts = data || [];
                    document.getElementById('loading-indicator').style.display = 'none';
                    if (allProducts.length > 0) {
                        document.getElementById('shop-header').style.display = 'flex';
                        document.getElementById('sidebar-count').textContent = allProducts.length;
                        // Instead of just rendering all, apply URL filters
                        const u = new URLSearchParams(window.location.search);
                        applyFiltersAndSort(u.get('search') || '', u.get('sort') || 'default');
                    } else {
                        renderEmpty();
                    }
                });
                
                socket.on('productsUpdated', (data) => {
                    allProducts = data || [];
                    const term = document.getElementById('search-input').value.toLowerCase().trim();
                    const sortType = document.getElementById('sort-select').value;
                    applyFiltersAndSort(term, sortType);
                });

            } catch (e) {
                console.error("Socket error", e);
                document.getElementById('loading-indicator').innerHTML = '<p class="text-red-500">無法連線至伺服器</p>';
            }
        }

        function openBuyModal(id) {
            if(!isLoggedIn || !currentUser) {
                mockLoginLogout(); // Redirects to login
                return;
            }
            selectedProduct = allProducts.find(p => p.id === id || p.id === parseInt(id));
            if(!selectedProduct) return;
            
            document.getElementById('modalTitle').innerText = '購買 ' + selectedProduct.name;
            document.getElementById('modalDesc').innerText = '購買後將可於 ' + (selectedProduct.origin || '全域') + ' 中使用。';
            document.getElementById('modalPrice').innerText = selectedProduct.price;
            
            const btn = document.getElementById('btnConfirmBuy');
            if(currentUser.pCoin < selectedProduct.price) {
                btn.innerText = 'P 幣餘額不足';
                btn.classList.replace('bg-green-600', 'bg-slate-700');
                btn.disabled = true;
            } else {
                btn.innerText = '確認扣款';
                btn.classList.replace('bg-slate-700', 'bg-green-600');
                btn.disabled = false;
            }
            
            const modal = document.getElementById('buyModal');
            modal.classList.remove('hidden');
        }

        function closeBuyModal() {
            document.getElementById('buyModal').classList.add('hidden');
            selectedProduct = null;
        }

        function confirmBuy() {
            if(!selectedProduct || !currentUser) return;
            const btn = document.getElementById('btnConfirmBuy');
            btn.innerText = '處理中...';
            btn.disabled = true;

            socket.emit('buyItem', { 
                itemId: selectedProduct.id, 
                username: currentUser.username 
            }, (res) => {
                closeBuyModal();
                if(res && res.success) {
                    socket.emit('getUserData', { username: currentUser.username });
                    const card = document.getElementById('card_' + selectedProduct.id);
                    if(card) {
                        card.style.boxShadow = '0 0 30px rgba(74, 222, 128, 0.8)';
                        card.style.borderColor = '#4ade80';
                        setTimeout(() => renderProducts(allProducts), 1500);
                    }
                } else {
                    alert('購買失敗: ' + (res ? res.error : '未知錯誤'));
                    btn.disabled = false;
                }
            });
        }


        async function scanAndLoadFolders() {
            const loading = document.getElementById('loading-indicator');
            const repoInfo = await getRepoInfo();
            
            if (!repoInfo) {
                loading.innerHTML = `<p class="text-red-500 font-medium">${t.scanError}</p>`;
                return;
            }

            try {
                const apiUrl = `https://api.github.com/repos/${repoInfo.user}/${repoInfo.repo}/contents/${repoInfo.subPath}`;
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(response.status === 403 ? t.apiLimit : t.scanError);

                const contents = await response.json();
                const directories = contents.filter(item => item.type === 'dir' && !item.name.startsWith('.'));

                allProducts = []; // 初始化商品陣列

                for (let i = 0; i < directories.length; i++) {
                    const item = directories[i];
                    try {
                        const folder = item.name;
                        const projectUrl = getAbsoluteUrl(`./${folder}/`);
                        const readmeUrl = getAbsoluteUrl(`./${folder}/README.md`);
                        const iconUrl = getAbsoluteUrl(`./${folder}/icon.png`);
                        
                        const readmeRes = await fetch(readmeUrl);
                        if (!readmeRes.ok) continue;

                        const text = await readmeRes.text();
                        const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
                        if (lines.length === 0) continue;

                        const name = lines[0].replace(/^#\s*/, '').trim();
                        const desc = lines.length > 1 ? lines[1].trim() : t.noDescription;

                        // 將資料存入陣列供後續操作
                        allProducts.push({
                            id: i,
                            name: name,
                            desc: desc,
                            projectUrl: projectUrl,
                            iconUrl: iconUrl
                        });
                    } catch (e) {}
                }

                loading.style.display = 'none';
                
                if (allProducts.length > 0) {
                    document.getElementById('shop-header').style.display = 'flex';
                    document.getElementById('sidebar-count').textContent = allProducts.length;
                    renderProducts(allProducts);
                } else {
                    renderEmpty();
                }
            } catch (error) {
                loading.innerHTML = `<p class="text-red-500 font-medium">${error.message}</p>`;
            }
        }

        // 渲染商品卡片列表
        function renderProducts(products) {
            const container = document.getElementById('folder-list');
            container.innerHTML = ''; // 清空目前內容

            if (products.length === 0) {
                renderEmpty();
                return;
            }

            products.forEach(p => {
                const isOwned = currentUser && currentUser.inventory && currentUser.inventory[p.origin] && currentUser.inventory[p.origin].includes(p.name);
                const card = document.createElement('div');
                card.id = 'card_' + p.id;
                // 暗黑玻璃擬物化風格 (Dark Glassmorphism)
                card.className = "group h-full bg-slate-900 rounded-xl border border-slate-700 shadow-lg hover:shadow-2xl transition-all duration-300 relative overflow-hidden flex flex-col";
                card.style.background = "rgba(30, 41, 59, 0.7)";
                card.style.backdropFilter = "blur(12px)";
                
                // 點擊圖片或標題跳轉，按鈕則觸發購買
                const goToProjectHtml = p.projectUrl ? `onclick="goToProject('${p.projectUrl}')"` : '';
                
                // 隨機產生一個假的熱銷標籤 (僅做視覺豐富度)
                const isHot = p.id % 3 === 0;
                const tagHtml = isHot ? `<div class="absolute top-2 left-2 bg-red-500 text-white text-[10px] sm:text-xs font-bold px-2 py-1 rounded z-10">熱銷</div>` : '';

                
                let originBadge = p.origin ? `<div class="absolute top-2 right-2 bg-indigo-600 text-white text-[10px] sm:text-xs font-bold px-2 py-1 rounded-full shadow-lg z-10 border border-indigo-400/30">${new URL(p.origin).hostname.split('.')[0]}</div>` : '';
                
                let btnHtml = isOwned ? 
                    `<button disabled class="w-full bg-slate-800 text-slate-500 font-medium py-2 rounded-lg text-sm border border-slate-700 cursor-not-allowed">已擁有</button>` :
                    `<button onclick="openBuyModal('${p.id}')" class="w-full bg-green-600 hover:bg-green-500 text-white font-medium py-2 rounded-lg transition-colors flex items-center justify-center gap-2 text-sm border border-green-500 shadow-lg shadow-green-600/20">
                        <span class="text-yellow-300 font-bold">P</span>
                        <span>${p.price} - 購買</span>
                    </button>`;

                card.innerHTML = `
                    ${tagHtml}
                    ${originBadge}
                    <!-- 商品圖片區域 -->
                    <div class="relative w-full pt-[80%] bg-slate-800 overflow-hidden border-b border-slate-700 cursor-pointer" ${goToProjectHtml}>
                        <img src="${p.image || p.iconUrl || './logo.png'}" alt="${p.name}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="handleImageError(this)">
                    </div>
                    
                    <!-- 商品資訊區域 -->
                    <div class="p-4 flex flex-col flex-grow text-white">
                        <h2 class="text-sm md:text-base font-bold line-clamp-2 mb-1 group-hover:text-green-400 transition-colors cursor-pointer" title="${p.name}" ${goToProjectHtml}>${p.name}</h2>
                        <p class="text-xs text-slate-400 line-clamp-2 mb-3 flex-grow">${p.desc}</p>
                        
                        <!-- 模擬星級評分 -->
                        <div class="flex items-center mb-3">
                            <div class="flex text-yellow-400 text-xs">★★★★★</div>
                            <span class="text-xs text-slate-500 ml-1">(${Math.floor(Math.random() * 100) + 10})</span>
                        </div>
                        
                        <!-- 購買按鈕 -->
                        ${btnHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 渲染空狀態
        function renderEmpty() {
            const container = document.getElementById('folder-list');
            container.innerHTML = `
                <div class="col-span-full flex flex-col items-center justify-center py-20 bg-white rounded-xl border border-gray-100 shadow-sm">
                    <div class="bg-gray-50 p-6 rounded-full mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                        </svg>
                    </div>
                    <p class="text-gray-500 font-medium">${t.noContent}</p>
                </div>
            `;
        }

        // 設定所有互動事件 (搜尋、排序、分類點擊)
        function setupInteractions() {
            // Apply URL params on load
            const urlParams = new URLSearchParams(window.location.search);
            const pSearch = urlParams.get('search');
            const pSort = urlParams.get('sort');
            const pCat = urlParams.get('category');
            
            if(pSearch) document.getElementById('search-input').value = pSearch;
            if(pSort) document.getElementById('sort-select').value = pSort;
            if(pCat) {
                document.querySelectorAll('.category-link').forEach(l => {
                    l.classList.remove('bg-green-50', 'text-green-600');
                    l.classList.add('text-gray-600');
                    if(l.getAttribute('data-category') === pCat) {
                        l.classList.add('bg-green-50', 'text-green-600');
                        l.classList.remove('text-gray-600');
                    }
                });
            }
            
            // Listen for back/forward browser buttons
            window.addEventListener('popstate', () => {
                const u = new URLSearchParams(window.location.search);
                document.getElementById('search-input').value = u.get('search') || '';
                document.getElementById('sort-select').value = u.get('sort') || 'default';
                
                const c = u.get('category') || 'all';
                document.querySelectorAll('.category-link').forEach(l => {
                    l.classList.remove('bg-green-50', 'text-green-600');
                    l.classList.add('text-gray-600');
                    if(l.getAttribute('data-category') === c) {
                        l.classList.add('bg-green-50', 'text-green-600');
                        l.classList.remove('text-gray-600');
                    }
                });
                
                applyFiltersAndSort(u.get('search') || '', u.get('sort') || 'default');
            });

            // Sync URL on interactions
            function updateURL(search, sort, cat) {
                const url = new URL(window.location);
                if(search) url.searchParams.set('search', search); else url.searchParams.delete('search');
                if(sort && sort !== 'default') url.searchParams.set('sort', sort); else url.searchParams.delete('sort');
                if(cat && cat !== 'all') url.searchParams.set('category', cat); else url.searchParams.delete('category');
                window.history.pushState({}, '', url);
            }

            const searchInput = document.getElementById('search-input');
            const sortSelect = document.getElementById('sort-select');
            const categoryLinks = document.querySelectorAll('.category-link');

            // 1. 搜尋功能 (即時過濾)
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase().trim();
                applyFiltersAndSort(term, sortSelect.value);
                const activeCat = document.querySelector('.category-link.text-green-600').getAttribute('data-category');
                updateURL(term, sortSelect.value, activeCat);
            });

            // 2. 排序功能
            sortSelect.addEventListener('change', (e) => {
                const term = searchInput.value.toLowerCase().trim();
                applyFiltersAndSort(term, e.target.value);
                const activeCat = document.querySelector('.category-link.text-green-600').getAttribute('data-category');
                updateURL(term, e.target.value, activeCat);
            });

            // 3. 側邊欄分類點擊 (聯動排序功能)
            categoryLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    // 視覺狀態重置
                    categoryLinks.forEach(l => {
                        l.classList.remove('bg-green-50', 'text-green-600');
                        l.classList.add('text-gray-600');
                    });
                    // 設定當前選中狀態
                    e.currentTarget.classList.add('bg-green-50', 'text-green-600');
                    e.currentTarget.classList.remove('text-gray-600');

                    // 取得分類資料並變更排序下拉選單
                    const category = e.currentTarget.getAttribute('data-category');
                    if(category === 'all') sortSelect.value = 'default';
                    if(category === 'newest') sortSelect.value = 'newest';
                    if(category === 'name') sortSelect.value = 'name';
                    
                    // 手動觸發變更
                    const term = searchInput.value.toLowerCase().trim();
                    applyFiltersAndSort(term, sortSelect.value);
                    updateURL(term, sortSelect.value, category);
                });
            });
        }

        // 統一處理過濾與排序
        function applyFiltersAndSort(searchTerm, sortType) {
            let filtered = [...allProducts];

            // 執行文字搜尋過濾
            if (searchTerm) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) || 
                    p.desc.toLowerCase().includes(searchTerm)
                );
            }

            // 執行排序
            if (sortType === 'newest') {
                filtered.reverse(); // 簡易模擬：越後面的越新
            } else if (sortType === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else {
                // default (依原本 GitHub API 讀取順序)
                filtered.sort((a, b) => a.id - b.id);
            }

            renderProducts(filtered);
        }

        window.onload = init;
    </script>

    <!-- 暗黑玻璃擬物化購買彈窗 -->
    <div id="buyModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden" style="background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300" id="buyModalContent" style="background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px);">
            <h3 class="text-2xl font-bold mb-2 text-white" id="modalTitle">確認購買</h3>
            <p class="text-slate-400 text-sm mb-6" id="modalDesc"></p>
            
            <div class="bg-slate-800/50 rounded-xl p-4 mb-6 flex justify-between items-center border border-slate-700">
                <span class="text-slate-300">總計金額</span>
                <div class="flex items-center gap-1">
                    <span class="text-yellow-400 font-bold">P</span>
                    <span id="modalPrice" class="text-2xl font-mono font-bold text-green-400"></span>
                </div>
            </div>
            
            <div class="flex gap-3">
                <button onclick="closeBuyModal()" class="flex-1 py-3 rounded-xl font-bold text-slate-300 bg-slate-800 hover:bg-slate-700 transition">取消</button>
                <button onclick="confirmBuy()" class="flex-1 py-3 rounded-xl font-bold text-white bg-green-600 hover:bg-green-500 transition" id="btnConfirmBuy">確認扣款</button>
            </div>
        </div>
    </div>
