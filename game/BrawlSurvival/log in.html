<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萬用多人連線遊戲 - 登入範例</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background: #1e293b; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #334155; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #9ca3af; font-size: 16px; }
        button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-login { background: #3b82f6; } .btn-login:hover { background: #2563eb; }
        .btn-google { background: #ffffff; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        footer { position: fixed; bottom: 10px; font-size: 14px; cursor: pointer; color: white; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>系統登入</h2>
        <input type="text" id="acc" placeholder="帳號">
        <input type="password" id="pwd" placeholder="密碼">
        <button class="btn-login" onclick="alert('請配合 server.js 使用完整的 Socket.io 登入邏輯')">一般登入</button>
        <button class="btn-google" onclick="alert('請在程式碼中補入 Firebase 邏輯')">Google 登入</button>
    </div>
    
    <footer onclick="window.location.href='https://pandapanda6666.github.io'">
        版權所有 © 2026 PandaPanda的AI日常 All Rights Reserved.
    </footer>
</body>
</html>
