<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>荒野生存 - 迷你亂鬥 (海陸大戰版)</title>
    
    <!-- 引入 Socket.io 與 Firebase 所需資源 -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=M+PLUS+Rounded+1c:wght@700;900&display=swap');
        body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background-color:#222;font-family:'Lilita One','M PLUS Rounded 1c',sans-serif;touch-action:none;user-select:none}
        #gameCanvas{display:block;cursor:none}
        #ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;z-index:5}
        .hud-top{padding:20px;display:flex;justify-content:center;gap:60px;color:#fff;-webkit-text-stroke:2px #000;text-shadow:0 4px 0 #000;font-size:36px;font-weight:900;font-style:italic;letter-spacing:2px}
        #centerMessage{position:absolute;top:20%;left:50%;transform:translateX(-50%) rotate(-3deg);font-size:56px;color:#fcd34d;-webkit-text-stroke:2.5px #000;text-shadow:0 6px 0 #000;font-weight:900;font-style:italic;text-align:center;letter-spacing:4px;z-index:20}
        .hud-bottom{position:absolute;bottom:25px;right:25px;display:flex;gap:15px;pointer-events:auto;align-items:flex-end}
        #lobby-screen,#start-screen,#store-screen,#game-over-screen,#pause-screen,#gacha-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;pointer-events:auto}
        #lobby-screen{background:#2563eb;z-index:20}#start-screen{background:radial-gradient(circle at center,#2563eb 0%,#1e3a8a 100%);z-index:15}#store-screen{background:radial-gradient(circle at center,#8b5cf6 0%,#4c1d95 100%);z-index:25}#game-over-screen{background:rgba(0,0,0,0.85);z-index:10}#pause-screen{background:rgba(0,0,0,0.75);z-index:30}#gacha-screen{background:rgba(0,0,0,0.95);z-index:40;transition:opacity 0.5s}
        #coin-display{position:absolute;top:20px;right:25px;background:rgba(15,23,42,0.9);color:#fcd34d;padding:10px 20px;border-radius:20px;border:4px solid #ca8a04;font-size:28px;font-weight:900;z-index:50;display:none;text-shadow:2px 2px 0 #000;box-shadow:0 6px 0 #000}
        h1{font-size:72px;margin-bottom:5px;color:#fcd34d;font-weight:900;font-style:italic;-webkit-text-stroke:3px #000;text-shadow:0 6px 0 #000;letter-spacing:4px;transform:rotate(-2deg)}
        .lobby-box{background:#1e3a8a;border-radius:16px;border:4px solid #0f172a;padding:30px;width:500px;max-width:90%;display:flex;flex-direction:column;gap:15px;box-shadow:0 10px 0 #0f172a}
        .store-box{background:#5b21b6;border-radius:16px;border:4px solid #2e1065;padding:40px;width:650px;max-width:95%;display:flex;flex-direction:column;gap:20px;box-shadow:0 10px 0 #2e1065}
        #nicknameInput{width:100%;box-sizing:border-box;padding:15px;font-size:24px;border-radius:8px;border:4px solid #000;background:#60a5fa;color:#fff;font-weight:900;text-align:center;outline:0}#nicknameInput::placeholder{color:#bfdbfe}
        .btn{font-family:inherit;font-weight:700;font-style:italic;color:#fff;border:4px solid #000;border-radius:12px;cursor:pointer;transition:.1s;-webkit-text-stroke:.5px #000;text-shadow:0 4px 0 #000;letter-spacing:2px;text-align:center;line-height:1.3}
        .btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,0.5)!important}
        .primary-btn{background-color:#fcd34d;box-shadow:0 8px 0 #b45309,inset 0 -5px 0 rgba(0,0,0,0.2);font-size:clamp(18px,4vw,28px);padding:12px 20px}
        .success-btn{background-color:#4ade80;box-shadow:0 8px 0 #166534,inset 0 -5px 0 rgba(0,0,0,0.2);font-size:clamp(18px,4vw,28px);padding:12px 20px}
        .danger-btn{background-color:#ef4444;box-shadow:0 8px 0 #991b1b,inset 0 -5px 0 rgba(0,0,0,0.2);font-size:clamp(18px,4vw,28px);padding:12px 20px}
        .gray-btn{background-color:#9ca3af;box-shadow:0 8px 0 #374151,inset 0 -5px 0 rgba(0,0,0,0.2);font-size:clamp(18px,4vw,28px);padding:12px 20px}
        .setup-container{display:flex;gap:25px;margin:15px 0;background:rgba(15,23,42,0.7);padding:20px;border-radius:16px;border:4px solid #000;box-shadow:0 10px 0 #000;max-width:95%;width:1050px;flex-wrap:wrap;justify-content:center;backdrop-filter:blur(5px)}
        .setup-col{display:flex;flex-direction:column;gap:12px;align-items:center;width:100%}
        #hero-select{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;width:100%;max-height:400px;overflow-y:auto;padding-right:10px}
        #hero-select::-webkit-scrollbar{width:12px}#hero-select::-webkit-scrollbar-thumb{background:#fcd34d;border-radius:6px;border:3px solid #000}
        select{padding:12px 15px;font-size:18px;border-radius:10px;background:#3b82f6;color:#fff;border:4px solid #000;box-shadow:0 5px 0 #000;font-weight:700;font-style:italic;font-family:inherit;cursor:pointer;outline:0}
        .hero-card{position:relative;border:4px solid #000;padding:12px 6px;border-radius:12px;cursor:pointer;background:#64748b;color:#fff;text-align:center;transition:.15s;font-size:20px;font-weight:700;box-shadow:0 5px 0 #000;text-shadow:1px 2px 0 #000;overflow:hidden;display:flex;flex-direction:column;justify-content:center;min-height:80px}
        .hero-card small{color:#fcd34d;font-size:14px;font-weight:700;display:block;margin-top:6px;text-shadow:1px 1px 0 #000}
        .hero-card.selected{border-color:#fcd34d;background:#3b82f6;transform:scale(1.08);box-shadow:0 6px 0 #000;z-index:2}
        .hero-card.locked{filter:grayscale(100%) brightness(0.6);border-color:#333;cursor:not-allowed}
        .hero-card.locked.selected{filter:grayscale(100%) brightness(0.8);border-color:#ef4444;background:#475569}
        .lv-badge{position:absolute;top:-2px;right:-2px;background:#0f172a;padding:2px 5px;border-radius:0 0 0 8px;font-size:12px;border-left:2px solid #000;border-bottom:2px solid #000;z-index:2;font-family:'Lilita One';text-shadow:none}
        .cat-title{width:100%;grid-column:1 / -1;color:#fcd34d;font-size:22px;font-weight:900;background:#334155;padding:8px;border-bottom:4px solid #0f172a;margin-top:10px}
        .hidden{display:none!important}
        .circle-btn{padding:5px;font-weight:900;font-style:italic;font-size:20px;color:#fff;border:4px solid #000;-webkit-text-stroke:1px #000;text-shadow:0 3px 0 #000;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.1;transition:filter .3s}
        #tauntBtn{background:#3b82f6;width:65px;height:65px;box-shadow:0 6px 0 #1e3a8a,inset 0 -5px 0 rgba(0,0,0,0.3);font-size:16px;margin-bottom:5px}#tauntBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #1e3a8a,inset 0 -5px 0 rgba(0,0,0,0.3)!important}
        #gadgetBtn{background:#22c55e;width:75px;height:75px;box-shadow:0 6px 0 #064e3b,inset 0 -5px 0 rgba(0,0,0,0.3);margin-bottom:10px}#gadgetBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #064e3b,inset 0 -5px 0 rgba(0,0,0,0.3)!important}
        #superBtn{background:#facc15;width:95px;height:95px;box-shadow:0 6px 0 #a16207,inset 0 -5px 0 rgba(0,0,0,0.3)}#superBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #a16207,inset 0 -5px 0 rgba(0,0,0,0.3)!important}
        #kill-feed{position:absolute;top:15px;right:15px;display:flex;flex-direction:column;gap:8px;pointer-events:none;align-items:flex-end;z-index:20}
        .kill-log{background:rgba(0,0,0,0.8);padding:8px 16px;border-radius:8px;color:#fff;font-size:18px;font-weight:700;font-style:italic;display:flex;align-items:center;gap:8px;transition:opacity .5s;border:3px solid #000;text-shadow:1px 1px 0 #000;box-shadow:0 4px 0 rgba(0,0,0,0.5)}
        .gacha-hero-display{font-size:80px;font-weight:900;color:#4ade80;-webkit-text-stroke:3px #000;text-shadow:0 8px 0 #000;margin:40px 0;animation:popIn .8s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
        @keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}

        /* 伺服器模組專用 CSS */
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; font-size: 32px; font-weight: bold; }
        .spinner { border: 8px solid rgba(255,255,255,0.3); border-top: 8px solid #fcd34d; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        #global-chat-container { position: fixed; bottom: 40px; left: 20px; width: 350px; height: 300px; background: rgba(15, 23, 42, 0.85); border: 4px solid #3b82f6; border-radius: 12px; display: flex; flex-direction: column; z-index: 50; transition: transform 0.3s; box-shadow: 0 5px 0 #1d4ed8; backdrop-filter: blur(5px); }
        #global-chat-container.minimized { transform: translateY(240px); }
        #chat-header { background: #3b82f6; color: white; padding: 10px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 2px solid #000; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; font-family: sans-serif; font-size: 16px; }
        .chat-msg { background: rgba(255,255,255,0.1); padding: 6px 10px; border-radius: 8px; color: white; word-break: break-all; }
        .chat-msg .c-user { color: #fcd34d; font-weight: bold; margin-right: 5px; }
        .chat-msg .c-admin { color: #ef4444; font-weight: bold; margin-right: 5px; }
        #chat-input-area { display: flex; padding: 10px; border-top: 2px solid #334155; }
        #chat-input-area input { flex: 1; padding: 8px; font-size: 16px; border: 2px solid #000; border-radius: 6px; background: #fff; color: #000; }
        #chat-input-area button { padding: 8px 15px; margin-left: 5px; font-size: 16px; border: 2px solid #000; border-radius: 6px; background: #4ade80; color: white; font-weight: bold; cursor: pointer; }
        #external-login-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 8000; }
        #profile-area { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 50px; border: 3px solid #3b82f6; cursor: pointer; transition: transform 0.2s; margin-bottom: 15px; }
        #profile-area:hover { transform: scale(1.05); border-color: #fcd34d; }
        #avatar-img { width: 50px; height: 50px; border-radius: 50%; background-color: #64748b; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        #profile-name { color: white; font-size: 20px; font-weight: bold; }
        #web-admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .web-admin-box { background: #334155; border: 4px solid #f59e0b; border-radius: 12px; padding: 20px; width: 800px; max-width: 95%; max-height: 80vh; display:flex; flex-direction:column; box-shadow: 0 10px 0 #b45309; }
        #sys-msg-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .sys-msg-box { background: #1e293b; border: 4px solid #fcd34d; border-radius: 12px; padding: 30px; max-width: 500px; width: 90%; text-align: center; box-shadow: 0 10px 0 #b45309; }
    </style>
</head>
<body>
    <!-- 載入中畫面 -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">正在連接伺服器...</div>
    </div>

    <!-- 動態載入登入介面的容器 -->
    <div id="external-login-container" class="hidden"></div>

    <!-- 網管面板 -->
    <div id="web-admin-modal" class="hidden">
        <div class="web-admin-box">
            <h2 style="color: #fcd34d; font-size: 32px; margin-top:0; text-align:center;">網管與房間管理工具</h2>
            <div style="display: flex; gap:10px; margin-bottom: 10px;">
                <button onclick="window.fetchAdminData()" style="font-size:18px; padding:8px; background:#3b82f6; border-radius: 5px; color: white;">🔄 重新整理</button>
                <button onclick="document.getElementById('web-admin-modal').classList.add('hidden')" style="font-size:18px; padding:8px; background:#ef4444; border-radius: 5px; color: white;">✕ 關閉</button>
            </div>
            <div style="flex:1; overflow-y:auto; background:#1e293b; border: 2px solid #000; padding:10px;">
                <h3 style="color:white; margin-top:0;">線上玩家</h3>
                <table style="width:100%; color:white; font-size:16px; text-align:left; border-collapse: collapse; margin-bottom: 20px;">
                    <thead><tr style="border-bottom: 2px solid #555;"><th>帳號</th><th>狀態</th><th>封鎖</th><th>禁言</th><th>操作</th></tr></thead>
                    <tbody id="web-admin-table-body"></tbody>
                </table>
                <h3 style="color:white;">當前房間</h3>
                <table style="width:100%; color:white; font-size:16px; text-align:left; border-collapse: collapse;">
                    <thead><tr style="border-bottom: 2px solid #555;"><th>代碼</th><th>模式</th><th>人數</th><th>房主</th><th>狀態</th></tr></thead>
                    <tbody id="web-admin-room-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 系統公告 -->
    <div id="sys-msg-modal" class="hidden">
        <div class="sys-msg-box">
            <h2 style="color: #ef4444; font-size: 32px; margin-top: 0; -webkit-text-stroke: 1px black;">系統公告</h2>
            <p id="sys-msg-content" style="color: white; font-size: 20px; line-height: 1.5; white-space: pre-wrap;"></p>
            <button onclick="document.getElementById('sys-msg-modal').classList.add('hidden')" style="background: #3b82f6; font-size: 20px; padding: 10px 30px; margin-top: 20px; border-radius: 8px; color: white;">我知道了</button>
        </div>
    </div>

    <!-- 全域聊天室 -->
    <div id="global-chat-container" class="hidden minimized">
        <div id="chat-header" onclick="document.getElementById('global-chat-container').classList.toggle('minimized')">
            <span id="chat-title">💬 全域聊天室</span>
            <span>↕️</span>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="輸入訊息..." maxlength="50">
            <button id="btnSendChat">發送</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="coin-display">💰 <span id="coinAmount">0</span></div>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div id="blueScoreDisplay" style="color: #60a5fa;">藍隊: 0</div>
            <div id="redScoreDisplay" style="color: #ef4444;">紅隊: 0</div>
        </div>
        <div id="centerMessage"></div>
        <div id="kill-feed"></div>
        <div class="hud-bottom">
            <button id="tauntBtn" class="btn circle-btn">嘲諷<br>(T)</button>
            <button id="gadgetBtn" class="btn circle-btn">配件<br>(E)</button>
            <button id="superBtn" class="btn circle-btn">大招<br>(空白)</button>
        </div>
    </div>

    <!-- 大廳 -->
    <div id="lobby-screen">
        <h1 style="font-size: 80px;">荒野生存</h1>
        
        <!-- 動態登入觸發區塊 -->
        <div id="profile-area" onclick="window.openLoginModal()">
            <div id="avatar-img">👤</div>
            <span id="profile-name">訪客 (點擊登入)</span>
            <button id="btnLogout" class="hidden" onclick="event.stopPropagation(); window.performLogout();" style="margin-left: 10px; padding: 5px 10px; background: #ef4444; border-radius: 5px; color: white; font-weight: bold; border: 2px solid black; cursor: pointer;">登出</button>
            <button id="btnWebAdmin" class="hidden" onclick="event.stopPropagation(); document.getElementById('web-admin-modal').classList.remove('hidden'); window.fetchAdminData();" style="margin-left: 5px; padding: 5px 10px; background: #f59e0b; border-radius: 5px; color: white; font-weight: bold; border: 2px solid black; cursor: pointer;">網管</button>
        </div>

        <div class="lobby-box">
            <input type="text" id="nicknameInput" placeholder="請輸入你的暱稱" value="玩家1" />
            <button id="spModeBtn" class="btn success-btn" style="width:100%">🎮 選擇英雄與模式</button>
        </div>
    </div>

    <!-- 選擇畫面 -->
    <div id="start-screen" class="hidden">
        <h1 id="startScreenTitle">英雄營地</h1>
        <p id="startScreenSubtitle" style="color:#fbbf24; font-weight:900; font-size: 24px; margin-bottom: 5px; -webkit-text-stroke: 1.5px black; text-shadow: 0px 4px 0 #000;">挑選並升級你的戰士！</p>
        <div class="setup-container">
            <div class="setup-col" style="flex: 2;">
                <div id="hero-select"></div>
            </div>
            <div class="setup-col" style="flex: 1;">
                <h3 style="margin: 0; color: #fff; font-size: 32px; margin-bottom: 10px;">戰鬥設定</h3>
                <div id="sp-options" style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                    <div style="display: flex; gap: 15px; width: 100%;">
                        <select id="modeSelect" style="flex: 1.5;">
                            <option value="wipeout">☠️ 殲滅戰</option>
                            <option value="gemGrab">💎 寶石爭奪戰</option>
                            <option value="brawlBall">⚽ 亂鬥足球</option>
                            <option value="showdown">🤠 荒野決鬥</option>
                            <option value="heist">💰 金庫攻防戰</option>
                            <option value="hotZone">⭕ 據點搶奪</option>
                            <option value="knockout">🥊 淘汰賽</option>
                            <option value="bossFight">👹 首領戰</option>
                        </select>
                        <select id="teamSizeSelect" style="flex: 1;">
                            <option value="1">1v1</option> <option value="2">2v2</option> <option value="3" selected>3v3</option>
                            <option value="5">5v5</option> <option value="10">10v10</option> <option value="20">20v20</option> 
                            <option value="30">30v30</option> <option value="40">40v40</option> 
                        </select>
                    </div>
                    <select id="gadgetSelect" style="width: 100%; background: #059669;">
                        <option value="heal">💚 滿血恢復</option>
                        <option value="shield">🛡️ 無敵護盾 (2秒)</option>
                        <option value="atk">⚔️ 攻擊強化 (+120/3秒)</option>
                        <option value="speed">⚡ 速度爆發 (3秒)</option>
                        <option value="firewall">🔥 火牆 (指定生成/5秒)</option>
                        <option value="ghost">👻 幽靈漫步 (2秒穿牆)</option>
                        <option value="blink">🌀 空間跳躍 (瞬移)</option>
                    </select>
                    <div style="display: flex; gap: 10px; width: 100%; margin-top: 10px;">
                        <button id="openStoreBtn" class="btn" style="flex: 1; background: #8b5cf6; font-size: 18px; padding: 12px; box-shadow: 0 6px 0 #5b21b6, inset 0 -4px 0 rgba(0,0,0,0.2);">🛒 外觀商城</button>
                        <button id="gachaBtn" class="btn" style="flex: 1; background: #ec4899; font-size: 18px; padding: 12px; box-shadow: 0 6px 0 #be185d, inset 0 -4px 0 rgba(0,0,0,0.2);">🎲 抽轉蛋<br>(💰100)</button>
                    </div>
                </div>
                <div id="modeDesc" style="color:#fcd34d; font-size:20px; font-weight:900; text-align:center; margin-top: 15px;">率先擊殺 10 名敵人獲勝！</div>
            </div>
        </div>
        <div style="display: flex; flex-wrap: wrap; gap: 15px; width: 100%; justify-content: center; margin-top: 10px; padding: 0 10px; box-sizing: border-box;">
            <button id="exitToLobbyBtn" class="btn danger-btn">返回</button>
            <button id="upgradeBtn" class="btn success-btn hidden">⬆️ 升級 (💰100)</button>
            <button id="startBtn" class="btn primary-btn">進入單機戰場</button>
        </div>
    </div>

    <!-- 轉蛋畫面 -->
    <div id="gacha-screen" class="hidden">
        <h1 style="font-size: 70px; color: #fcd34d;">🎲 轉蛋結果</h1>
        <div id="gachaResultText" class="gacha-hero-display"></div>
        <button id="closeGachaBtn" class="btn success-btn" style="margin-top: 20px;">確認</button>
    </div>

    <!-- 商城畫面 -->
    <div id="store-screen" class="hidden">
        <h1 id="storeTitle" style="font-size: 60px;">🛒 商城與背包</h1>
        <p style="color:#fbbf24; font-weight:900; font-size: 24px; margin-bottom: 20px; -webkit-text-stroke: 1.5px black; text-shadow: 0px 4px 0 #000;">解鎖或裝備你喜歡的造型與嘲諷！</p>
        <div class="store-box">
            <h3 style="margin: 0; color: #fff; font-size: 28px; text-shadow: 2px 2px 0 #000;">👕 選擇英雄外觀</h3>
            <select id="skinSelect" style="width: 100%; background: #4f46e5; padding: 15px; font-size: 20px;"></select>

// 加密函數
async function hashPassword(message) {
    const msgUint8 = new TextEncoder().encode(message); 
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8); 
    const hashArray = Array.from(new Uint8Array(hashBuffer)); 
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

window.fetchUrlAndConnect = function() {
    const handleConnection = (url) => {
        if(!window.socket) {
            window.socket = io(url); window.bindSocketEvents(); let isFirstConnect = true;
            window.socket.on('connect', () => { 
                document.getElementById('loading-screen').style.display = 'none'; document.getElementById('global-chat-container').classList.remove('hidden');
                if (isFirstConnect) { window.socket.emit('requestFirebaseConfig'); isFirstConnect = false; } 
            });
            window.socket.on('connect_error', () => { window.location.href = 'Connection error.html'; });
            window.socket.on('disconnect', () => { window.location.href = 'Connection error.html'; });
        }
    };
    fetch('server_url.txt?t=' + new Date().getTime()).then(res => { if (!res.ok) throw new Error("File Not Found"); return res.text(); }).then(url => { handleConnection(url.trim()); }).catch(err => { console.warn("嘗試使用本地端口連線"); handleConnection('http://localhost:5000'); });
};

window.bindSocketEvents = function() {
    if (!window.socket) return;

                alert("首次使用 Google 登入，請補全資料！");

function distance(p1, p2) { return Math.hypot(p1.x-p2.x, p1.y-p2.y); }
function rectCollide(x1, y1, w1, h1, x2, y2, w2, h2) { return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2; }
function hasLineOfSight(x1, y1, x2, y2) { let dx = x2-x1, dy = y2-y1, dist = Math.hypot(dx, dy), steps = Math.max(5, Math.floor(dist/20)); for(let i=1; i<=steps; i++) { let cx = x1 + (dx/steps)*i, cy = y1 + (dy/steps)*i; for(let w of walls) if(cx >= w.x && cx <= w.x+w.w && cy >= w.y && cy <= w.y+w.h) return false; } return true; }

class Particle { constructor(x, y, color) { this.x=x; this.y=y; this.color=color; let a=Math.random()*Math.PI*2, s=Math.random()*3+1; this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s; this.life=1.0; this.decay=Math.random()*0.05+0.02; this.size=Math.random()*4+2; } update() { this.x+=this.vx; this.y+=this.vy; this.life-=this.decay; } draw(ctx) { ctx.globalAlpha=Math.max(0,this.life); ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1.0; } }
function createParticles(x, y, color, count) { for(let i=0; i<count; i++) particles.push(new Particle(x, y, color)); }

class Bullet {
    constructor(x, y, dirX, dirY, speed, damage, shooter, isPiercing = false, type = 'normal', maxDist = Infinity, sharedHitSet = null) {
        this.x=x; this.y=y; this.vx=dirX*speed; this.vy=dirY*speed; this.damage=damage; this.shooter=shooter; this.team=shooter.team; this.type=type; this.speed=speed; this.maxDist=maxDist; this.travelled=0;

        if(type.includes('poco') || type.includes('sandy') || type.includes('emz') || type.includes('draco') || type.includes('gale') || type.includes('nita_normal')) this.radius = 15;

        if(type === 'sprout_normal') this.radius = 10;

        this.color = this.team===(player?player.team:'blue') ? (type.includes('super')?'#eab308':'#fbbf24') : '#f87171';
        if(currentMode==='showdown') this.color = shooter===player ? '#fbbf24' : '#f87171';
        if(type.startsWith('belle') || type.startsWith('jessie')) this.color = '#67e8f9'; if(type.startsWith('spike') || type.includes('willow') || type === 'sprout_normal') this.color = '#4ade80'; 
        if(type.includes('mortis') || type.includes('gray')) this.color = '#a855f7'; if(type.includes('poco') || type.includes('byron')) this.color = '#4ade80'; 
        if(type.includes('gene') || type.includes('kit_super')) this.color = '#c084fc'; if(type.includes('amber') || type.includes('bo')) this.color = '#f97316';
        if(type.includes('emz')) this.color = '#d946ef'; if(type.includes('sandy')) this.color = '#fcd34d';
        if(type.includes('bea_super')) this.color = '#eab308'; if(type.includes('clancy')) this.color = '#f43f5e';
        if(type.includes('gubbert')) this.color = '#22d3ee'; if(type.startsWith('juju')) this.color = '#fb7185';
        if(type.startsWith('shade')) this.color = '#a855f7'; if(type.startsWith('pierce')) this.color = '#0ea5e9';
        if(type === 'hank_super') this.color = '#38bdf8'; if(type === 'doug_super') this.color = '#ec4899';
        this.hitEnemies = sharedHitSet || new Set();
    }
    triggerDeathEffect() {
        if(this.type === 'brock_normal' || this.type === 'bo_normal') { modeEntities.push(new Explosion(this.x, this.y, 60, this.damage*0.5, this.shooter, false)); } 
        else if (this.type === 'sprout_normal') { modeEntities.push(new Explosion(this.x, this.y, 75, this.damage, this.shooter, false)); }
        else if (this.type === 'spike_normal') { for(let i=0; i<6; i++) { let a = i * Math.PI / 3; bullets.push(new Bullet(this.x, this.y, Math.cos(a), Math.sin(a), 12, this.damage*0.5, this.shooter, false, 'spike_thorn')); } } 
        else if (this.type === 'gene_normal' && !this.hasHitEnemy) { for(let i=-2; i<=2; i+=1) { let angle = Math.atan2(this.vy, this.vx) + i*0.2; bullets.push(new Bullet(this.x, this.y, Math.cos(angle), Math.sin(angle), 15, this.damage*0.16, this.shooter, false, 'gene_split', 200)); } } 
        else if (this.type === 'surge_normal') { let splits = this.shooter.surgeStage === 4 ? 6 : 2; let baseAngle = Math.atan2(this.vy, this.vx); for(let i=0; i<splits; i++) { let a = baseAngle + (i===0 ? Math.PI/2 : -Math.PI/2); if(splits===6) a = baseAngle + (i - 2.5) * (Math.PI/3); bullets.push(new Bullet(this.x, this.y, Math.cos(a), Math.sin(a), 15, this.damage*0.5, this.shooter, false, 'normal', 250)); } } 
        else if (this.type === 'mrp_normal') { modeEntities.push(new Explosion(this.x, this.y, 60, this.damage, this.shooter, false)); bullets.push(new Bullet(this.x, this.y, this.vx/this.speed, this.vy/this.speed, 12, this.damage, this.shooter, false, 'normal', 150)); }
    }
    update() {
        this.x+=this.vx; this.y+=this.vy; this.life--; this.travelled += this.speed; 
        if(this.type === 'charlie_normal' && this.travelled > this.maxDist / 2) { this.vx *= -1; this.vy *= -1; this.type = 'normal'; this.hitEnemies.clear(); }
        if(this.life<=0 || this.x<0||this.x>WORLD_WIDTH||this.y<0||this.y>WORLD_HEIGHT || this.travelled >= this.maxDist) { this.isDead=true; this.triggerDeathEffect(); return; }
        let r = this.radius;
        if (!this.piercesWalls) {
            for(let w of walls) {
                if(rectCollide(this.x-r, this.y-r, r*2, r*2, w.x, w.y, w.w, w.h)) {
                    if (this.type.startsWith('rico') || this.type.startsWith('sprout')) { let px = this.x - this.vx, py = this.y - this.vy; if (px + r <= w.x || px - r >= w.x + w.w) this.vx *= -1; else if (py + r <= w.y || py - r >= w.y + w.h) this.vy *= -1; else { this.vx *= -1; this.vy *= -1; } this.x += this.vx*2; this.y += this.vy*2; this.life += 5; this.bounces++; if (this.bounces > 3) { this.isDead = true; this.triggerDeathEffect(); } createParticles(this.x, this.y, '#fcd34d', 2); return; } else if (!this.type.includes('poco_super') && !this.type.includes('sandy')) { this.x -= this.vx; this.y -= this.vy; this.isDead=true; this.triggerDeathEffect(); createParticles(this.x,this.y,'#9ca3af',4); return; }
                }

            if ((this.type.includes('byron') || this.type === 'gubbert_normal') && h.team === this.team && h.type !== 'box' && h.type !== 'safe') { if (h === this.shooter) continue; if(!this.hitEnemies.has(h) && distance(this, h) < this.radius + (h.radius||25)) { if (this.type === 'gubbert_normal') this.shooter.tetheredTargets.add(h); else h.healTimer = 90; this.hitEnemies.add(h); this.isDead=true; createParticles(this.x, this.y, '#4ade80', 5); return; } continue; }
            if (this.type === 'poco_super' && h.team === this.team && h.type !== 'box' && h.type !== 'safe') { if(!this.hitEnemies.has(h) && distance(this, h) < this.radius + (h.radius||25)) { h.hp = h.maxHp; this.hitEnemies.add(h); addFloatingText(h.x + (Math.random()-0.5)*20, h.y - 20 - Math.random()*15, "FULL HEAL!", '#4ade80', 24); } continue; }
            if(h.isDead || (h.team === this.team && h.type !== 'box')) continue; if(currentMode==='showdown' && h===this.shooter) continue; if(h.ghostTimer > 0) continue; 
            if(!this.hitEnemies.has(h) && distance(this, h) < this.radius + (h.radius||25)) {
                if (this.type === 'kit_super' && h.type !== 'box' && h.type !== 'safe') { if (h.team === this.team) { this.shooter.attachedTo = h; this.shooter.attachTimer = 600; } else { this.shooter.attachedTo = h; this.shooter.attachTimer = 180; h.stunTimer = 180; this.shooter.stunTimer = 180; } this.isDead = true; return; }
                let actualDamage = this.damage;
                if (this.type === 'leon_normal') actualDamage *= Math.max(0.3, 1 - (this.travelled / this.maxDist));
                if(h.takeDamage && this.type !== 'sprout_normal') h.takeDamage(actualDamage, this.shooter);
                this.hitEnemies.add(h); this.hasHitEnemy = true;
                if (this.type === 'mortis_super' && h.type !== 'box' && h.type !== 'safe') { this.shooter.hp = Math.min(this.shooter.maxHp, this.shooter.hp + this.damage*0.8); addFloatingText(this.shooter.x + (Math.random()-0.5)*20, this.shooter.y - 20 - Math.random()*15, `+${Math.round(this.damage*0.8)}`, '#4ade80', 20); }
                if (this.type === 'gene_super' && h.type !== 'box' && h.type !== 'safe') { h.pullTarget = this.shooter; h.pullTimer = 25; }
                if (this.type === 'charlie_super' && h.type !== 'box' && h.type !== 'safe') { h.stunTimer = 180; createParticles(h.x, h.y, '#ec4899', 15); }
                if (this.type === 'cordelius_super' && h.type !== 'box' && h.type !== 'safe') { h.silenceTimer = 300; createParticles(h.x, h.y, '#000', 15); }
                if (this.type === 'willow_super' && h.type !== 'box' && h.type !== 'safe') { h.mindControlTimer = 180; h.originalTeam = h.team; h.team = this.shooter.team; addFloatingText(h.x, h.y-20, "MIND CONTROLLED!", '#c084fc', 24); }
                if (this.type === 'edgar_normal' && h.type !== 'box' && h.type !== 'safe') { this.shooter.hp = Math.min(this.shooter.maxHp, this.shooter.hp + this.damage*0.3); }
                if (this.type === 'melodie_normal' && h.type !== 'box' && h.type !== 'safe') { this.shooter.orbitingNotes = Math.min(3, this.shooter.orbitingNotes + 1); }
                if (this.type === 'byron_normal' && h.type !== 'box' && h.type !== 'safe') { h.poisonTimer = 90; h.poisonShooter = this.shooter; }
                if (this.type === 'gubbert_normal' && h.type !== 'box' && h.type !== 'safe') { this.shooter.tetheredTargets.add(h); }
                if (this.type === 'bea_super' && h.type !== 'box') { h.slowTimer = 90; }
                if (this.type === 'bea_normal' && h.type !== 'box') { this.shooter.beaSupercharged = true; }
                if (this.type === 'gale_super' && h.type !== 'box') { h.kbTimer = 15; let dist=Math.hypot(this.vx,this.vy); h.kbVx = (this.vx/dist)*12; h.kbVy = (this.vy/dist)*12; }

                if(!this.type.includes('super') && h.type!=='box' && h.type!=='safe') { if (!(this.shooter.heroType === 'meg' && this.shooter.megMecha)) { this.shooter.superCharge = Math.min(this.shooter.maxSuperCharge, this.shooter.superCharge+20); if(this.shooter===player) updateSuperUI(player.superCharge); } }
                if ((this.type === 'belle_normal' || this.type === 'jessie_normal') && this.chain < 3 && h.type !== 'box' && h.type !== 'safe') { let next = targets.find(t => !t.isDead && t.team !== this.team && t !== h && t.type !== 'box' && t.type !== 'safe' && distance(h, t) < 300 && !this.hitEnemies.has(t)); if (next) { let dx = next.x - h.x, dy = next.y - h.y, dist = Math.hypot(dx,dy); this.vx = (dx/dist)*this.speed; this.vy = (dy/dist)*this.speed; this.x = h.x; this.y = h.y; this.chain++; this.life = 100; this.travelled = 0; this.maxDist = Infinity; return; } } else if (this.type === 'belle_super') { if (this.shooter.markedTarget && this.shooter.markedTarget !== h) this.shooter.markedTarget.markedBy = null; h.markedBy = this.shooter; this.shooter.markedTarget = h; }
                if(!this.piercesEnemies) { this.isDead=true; this.triggerDeathEffect(); createParticles(this.x,this.y,h.color||'#fff',5); return; }
            }

    draw(ctx) { ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='#000'; ctx.stroke(); }

    updateCoinUI(); gameState = 'playing'; startScreen.classList.add('hidden'); gameOverScreen.classList.add('hidden'); pauseScreen.classList.add('hidden'); storeScreen.classList.add('hidden');

}
