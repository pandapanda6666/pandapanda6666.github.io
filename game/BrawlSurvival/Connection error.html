<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伺服器連線中</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; text-align: center; overflow: hidden; user-select: none;}
        canvas { border: 4px solid #3b82f6; border-radius: 8px; background: #1e293b; margin-top: 20px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        h1 { color: #fcd34d; font-size: 48px; margin-bottom: 0; text-shadow: 0 4px 0 #000; }
        .spinner { border: 6px solid rgba(255,255,255,0.1); border-top: 6px solid #fcd34d; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        footer { position: fixed; bottom: 10px; font-size: 14px; cursor: pointer; color: white; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h1>網頁更新中...</h1>
    <div style="color: #9ca3af; font-size: 18px; margin-top: 15px; font-weight: bold;">跳躍吃紅蘿蔔 (W 或 空白鍵)，蹲下閃避中飛鵜鶘 (S 或 下方向鍵)！</div>
    
    <canvas id="dinoCanvas" width="600" height="200"></canvas>
    
    <footer onclick="window.location.href='https://pandapanda6666.github.io'">
        版權所有 © 2026 PandaPanda的AI日常 All Rights Reserved.
    </footer>

    <script>
        let dinoGameLoop;
        let dinoState = { 
            isPlaying: true, x: 80, y: 140, vy: 0, gravity: 0.6, jumpPower: -12, groundY: 140, 
            score: 0, timer: 0, obstacles: [], isDead: false, speed: 5, isDucking: false, rotation: 0 
        };

        function dinoJump() { 
            if (dinoState.isDead) { 
                dinoState.isDead = false; dinoState.score = 0; dinoState.obstacles = []; 
                dinoState.y = dinoState.groundY; dinoState.vy = 0; dinoState.speed = 5; dinoState.isDucking = false; 
            } else if (dinoState.y >= dinoState.groundY && !dinoState.isDucking) { 
                dinoState.vy = dinoState.jumpPower; 
            } 
        }

        function dinoDuck(isDucking) { 
            if(dinoState.isDead) return; 
            dinoState.isDucking = isDucking; 
        }

        function updateDino() {
            const canvas = document.getElementById('dinoCanvas'); 
            const ctx = canvas.getContext('2d'); 
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = "#4ade80"; ctx.lineWidth = 3; ctx.beginPath(); 
            ctx.moveTo(0, dinoState.groundY + 20); ctx.lineTo(canvas.width, dinoState.groundY + 20); ctx.stroke();
            
            if (!dinoState.isDead) {
                dinoState.vy += dinoState.gravity; 
                dinoState.y += dinoState.vy; 
                if (dinoState.y > dinoState.groundY) { dinoState.y = dinoState.groundY; dinoState.vy = 0; }
                
                if(!dinoState.isDucking && dinoState.y === dinoState.groundY) { dinoState.rotation += 0.2; } 
                else if (dinoState.y < dinoState.groundY) { dinoState.rotation += 0.05; }
                
                dinoState.timer++; dinoState.score += 0.1; dinoState.speed += 0.002;
                
                if (Math.random() < 0.02 && dinoState.timer > 50) {
                    dinoState.timer = 0; let randType = Math.random();
                    if(randType < 0.25) { 
                        dinoState.obstacles.push({ x: 600, y: dinoState.groundY - 10, w: 20, h: 30, type: 'carrot', eaten: false }); 
                    } else if (randType < 0.5) { 
                        dinoState.obstacles.push({ x: 600, y: dinoState.groundY - 60, w: 20, h: 30, type: 'carrot', eaten: false }); 
                    } else if (randType < 0.75) { 
                        dinoState.obstacles.push({ x: 600, y: dinoState.groundY - 35, w: 40, h: 30, type: 'pelican' }); 
                    } else { 
                        dinoState.obstacles.push({ x: 600, y: dinoState.groundY + 5, w: 50, h: 15, type: 'crocodile' }); 
                    }
                }
                
                let pR = dinoState.isDucking ? 10 : 20; 
                let pX = dinoState.x; let pY = dinoState.y; 
                if(dinoState.isDucking && dinoState.y === dinoState.groundY) pY += 10; 
                
                for (let i = dinoState.obstacles.length - 1; i >= 0; i--) {
                    let obs = dinoState.obstacles[i]; obs.x -= dinoState.speed; let isColliding = false;
                    
                    if(obs.type === 'crocodile') { 
                        isColliding = (pX + pR > obs.x) && (pX - pR < obs.x + obs.w) && (pY + pR > obs.y); 
                    } else { 
                        let distX = Math.abs(pX - (obs.x + obs.w/2)); let distY = Math.abs(pY - (obs.y + obs.h/2)); 
                        isColliding = (distX < pR + obs.w/2 - 5) && (distY < pR + obs.h/2 - 5); 
                    }
                    
                    if(obs.type === 'carrot') { 
                        if (isColliding && !obs.eaten) { obs.eaten = true; dinoState.score += 10; } 
                        else if (obs.x + obs.w < dinoState.x - 20 && !obs.eaten) { dinoState.isDead = true; } 
                    } else if (obs.type === 'pelican' || obs.type === 'crocodile') { 
                        if (isColliding) { dinoState.isDead = true; } 
                    }
                    
                    if (obs.x < -60) { dinoState.obstacles.splice(i, 1); }
                }
            }
            
            ctx.save(); ctx.translate(dinoState.x, dinoState.y);
            if (dinoState.isDucking) { ctx.scale(1.3, 0.5); ctx.translate(0, 20); } else { ctx.rotate(dinoState.rotation); }
            ctx.fillStyle = "#8B5A2B"; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.fill(); 
            ctx.lineWidth = 2; ctx.strokeStyle = "#5C3A21"; ctx.stroke();
            ctx.fillStyle = "black";
            if (dinoState.isDead) { 
                ctx.strokeStyle = "black"; ctx.lineWidth = 2; 
                ctx.beginPath(); ctx.moveTo(5, -8); ctx.lineTo(11, -2); ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(11, -8); ctx.lineTo(5, -2); ctx.stroke(); 
            } else { 
                ctx.beginPath(); ctx.arc(8, -5, 2, 0, Math.PI*2); ctx.fill(); 
            }
            ctx.beginPath(); ctx.arc(15, 2, 3, 0, Math.PI*2); ctx.fill(); ctx.restore();
            
            dinoState.obstacles.forEach(obs => {
                if (obs.type === 'carrot' && !obs.eaten) {
                    ctx.fillStyle = "#f97316"; ctx.beginPath(); ctx.moveTo(obs.x + obs.w/2, obs.y + obs.h); ctx.lineTo(obs.x, obs.y + 10); ctx.lineTo(obs.x + obs.w, obs.y + 10); ctx.fill();
                    ctx.fillStyle = "#22c55e"; ctx.beginPath(); ctx.moveTo(obs.x + obs.w/2, obs.y + 10); ctx.lineTo(obs.x - 5, obs.y - 5); ctx.lineTo(obs.x + obs.w + 5, obs.y - 5); ctx.fill();
                } else if (obs.type === 'pelican') {
                    ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.ellipse(obs.x + 20, obs.y + 15, 20, 10, 0, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = "#e5e7eb"; ctx.beginPath();
                    if(dinoState.timer % 20 < 10) { ctx.ellipse(obs.x + 20, obs.y + 5, 10, 15, Math.PI/4, 0, Math.PI*2); } 
                    else { ctx.ellipse(obs.x + 20, obs.y + 25, 10, 15, -Math.PI/4, 0, Math.PI*2); }
                    ctx.fill(); 
                    ctx.fillStyle = "#fcd34d"; ctx.beginPath(); ctx.moveTo(obs.x + 10, obs.y + 15); ctx.lineTo(obs.x - 20, obs.y + 25); ctx.lineTo(obs.x, obs.y + 35); ctx.fill();
                    ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(obs.x + 10, obs.y + 10, 2, 0, Math.PI*2); ctx.fill();
                } else if (obs.type === 'crocodile') {
                    ctx.fillStyle = "#15803d"; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); 
                    ctx.fillStyle = "white"; ctx.beginPath();
                    for(let j=0; j<5; j++){ ctx.moveTo(obs.x + j*10, obs.y); ctx.lineTo(obs.x + j*10 + 5, obs.y + 8); ctx.lineTo(obs.x + j*10 + 10, obs.y); }
                    ctx.fill(); 
                    ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(obs.x + 10, obs.y + 5, 3, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(obs.x + 10, obs.y + 5, 1, 0, Math.PI*2); ctx.fill();
                }
            });
            
            ctx.fillStyle = "#fcd34d"; ctx.font = "bold 24px 'Courier New', Courier, monospace"; ctx.textAlign = "right"; 
            ctx.fillText(Math.floor(dinoState.score).toString().padStart(5, '0'), 580, 40);
            
            if (dinoState.isDead) { 
                ctx.textAlign = "center"; ctx.fillStyle = "#ef4444"; ctx.fillText("G A M E   O V E R", 300, 80); 
                ctx.fillStyle = "#9ca3af"; ctx.font = "16px 'Courier New'"; ctx.fillText("Press Space or W to Restart", 300, 110); 
            }
            
            dinoGameLoop = requestAnimationFrame(updateDino);
        }
        
        window.addEventListener('keydown', e => { 
            if (e.key === ' ' || e.key.toLowerCase() === 'w' || e.key === 'ArrowUp') { e.preventDefault(); dinoJump(); } 
            else if (e.key.toLowerCase() === 's' || e.key === 'ArrowDown') { e.preventDefault(); dinoDuck(true); } 
        });
        window.addEventListener('keyup', e => { 
            if (e.key.toLowerCase() === 's' || e.key === 'ArrowDown') { dinoDuck(false); } 
        });
        
        document.getElementById('dinoCanvas').addEventListener('mousedown', (e) => { e.preventDefault(); dinoJump(); });
        document.getElementById('dinoCanvas').addEventListener('touchstart', (e) => { e.preventDefault(); dinoJump(); }, {passive: false});
        
        updateDino();

        setInterval(() => {
            fetch('server_url.txt?t=' + new Date().getTime())
            .then(res => res.text())
            .then(url => { 
                if(url.trim().includes("http")) { 
                    window.location.href = "index.html"; 
                } 
            })
            .catch(e => console.log("等待連線中..."));
        }, 5000);
    </script>
</body>
</html>
