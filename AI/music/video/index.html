<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedicated YouTube Proxy Player</title>
    <style>
        /* 移除所有邊界，讓播放器 100% 填滿整個 iframe */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* 預設黑底防閃爍 */
            overflow: hidden;
        }
        #player {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 播放器將被注入到這個容器中 -->
    <div id="player"></div>

    <script>
        // 1. 取得主網頁傳過來的 URL 參數 (例如：?v=dQw4w9WgXcQ)
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('v');

        // 2. 驗證是否收到正確長度 (11字元) 的 YouTube ID
        if (videoId && videoId.length === 11) {
            // 載入 YouTube 官方 IFrame API
            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            var firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            var player;
            function onYouTubeIframeAPIReady() {
                player = new YT.Player('player', {
                    videoId: videoId,
                    playerVars: {
                        'autoplay': 1,
                        'controls': 1,
                        'rel': 0
                    },
                    events: {
                        'onReady': onPlayerReady,
                        'onStateChange': onPlayerStateChange
                    }
                });
            }

            function onPlayerReady(event) {
                event.target.playVideo();
                sendDuration();
            }

            let progressTimer;
            function onPlayerStateChange(event) {
                // 狀態 1: 正在播放
                if (event.data == YT.PlayerState.PLAYING) {
                    sendDuration();
                    // 啟動實時進度回報
                    clearInterval(progressTimer);
                    progressTimer = setInterval(() => {
                        if (player && player.getCurrentTime) {
                            window.parent.postMessage({ 
                                type: 'YOUTUBE_PROGRESS', 
                                currentTime: player.getCurrentTime(),
                                duration: player.getDuration()
                            }, '*');
                        }
                    }, 500);
                } 
                // 狀態 0: 影片物理播放完畢 (自動忽略廣告時間！)
                else if (event.data == YT.PlayerState.ENDED) {
                    clearInterval(progressTimer);
                    window.parent.postMessage({ type: 'YOUTUBE_ENDED' }, '*');
                }
                // 狀態 2: 暫停或其他狀態
                else {
                    clearInterval(progressTimer);
                }
            }

            function sendDuration() {
                if (player && player.getDuration) {
                    const duration = player.getDuration();
                    if (duration > 0) {
                        // 🌟 核心突破：將 YouTube 報出的真實秒數，傳送回主網頁！
                        window.parent.postMessage({ type: 'YOUTUBE_DURATION', duration: duration }, '*');
                    }
                }
            }
        } else {
            // 若沒有收到 ID，顯示黑畫面或提示
            document.getElementById('player').innerHTML = '<div style="color:#555; text-align:center; padding-top:20vh; font-family:sans-serif; font-size:12px;">Waiting for video ID...</div>';
        }
    </script>
</body>
</html>
