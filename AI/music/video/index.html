<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>YouTube Proxy Player</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #player { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('v');

        if (videoId && videoId.length === 11) {
            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);

            var player;
            function onYouTubeIframeAPIReady() {
                player = new YT.Player('player', {
                    videoId: videoId,
                    playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 },
                    events: {
                        'onReady': onPlayerReady,
                        'onStateChange': onPlayerStateChange,
                        'onError': onPlayerError // 加入錯誤偵測
                    }
                });
            }

            function onPlayerReady(event) { event.target.playVideo(); sendDuration(); }

            function onPlayerError(event) {
                // 將錯誤代碼傳回主頁面
                window.parent.postMessage({ type: 'YOUTUBE_ERROR', code: event.data }, '*');
            }

            let progressTimer;
            function onPlayerStateChange(event) {
                if (event.data == YT.PlayerState.PLAYING) {
                    sendDuration();
                    clearInterval(progressTimer);
                    progressTimer = setInterval(() => {
                        if (player && player.getCurrentTime) {
                            window.parent.postMessage({ 
                                type: 'YOUTUBE_PROGRESS', 
                                currentTime: player.getCurrentTime(),
                                duration: player.getDuration()
                            }, '*');
                        }
                    }, 500);
                } else if (event.data == YT.PlayerState.ENDED) {
                    clearInterval(progressTimer);
                    window.parent.postMessage({ type: 'YOUTUBE_ENDED' }, '*');
                } else {
                    clearInterval(progressTimer);
                }
            }

            function sendDuration() {
                if (player && player.getDuration) {
                    const duration = player.getDuration();
                    if (duration > 0) window.parent.postMessage({ type: 'YOUTUBE_DURATION', duration: duration }, '*');
                }
            }
        }
    </script>
</body>
</html>
