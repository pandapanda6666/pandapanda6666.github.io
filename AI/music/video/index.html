<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>YouTube Proxy Player</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #player { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var videoId = urlParams.get('v');
        var player;

        function onYouTubeIframeAPIReady() {
            if (!videoId) return;
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: { 
                    'autoplay': 1, 
                    'controls': 1, 
                    'rel': 0, 
                    'playsinline': 1,
                    'disablekb': 0,
                    'mute': 1 // 解決自動播放阻擋：預設靜音
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
            startStuckCheck(); // 啟動防卡死機制
        }

        var stuckCheckTimer;
        function startStuckCheck() {
            if (stuckCheckTimer) clearInterval(stuckCheckTimer);
            
            stuckCheckTimer = setInterval(() => {
                if (!player || typeof player.getPlayerState !== 'function') return;
                var state = player.getPlayerState();
                var time = player.getCurrentTime();
                
                // 只要時間卡在 0 秒 (且未在播放中)，每 1 秒強制點擊一次 (playVideo)
                if (time === 0 && state !== YT.PlayerState.PLAYING) {
                    player.playVideo(); // 強制觸發
                    player.unMute();    // 嘗試解除靜音
                } else if (state === YT.PlayerState.PLAYING && player.isMuted()) {
                    player.unMute();    // 已經在播放，確保解除靜音
                }
            }, 1000);
        }

        var progressTimer;
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                player.unMute(); // 確保播放時有聲音
                window.parent.postMessage({ type: 'YOUTUBE_DURATION', duration: player.getDuration() }, '*');
                
                if (progressTimer) clearInterval(progressTimer);
                progressTimer = setInterval(() => {
                    window.parent.postMessage({ 
                        type: 'YOUTUBE_PROGRESS', 
                        currentTime: player.getCurrentTime(),
                        duration: player.getDuration()
                    }, '*');
                }, 500);
            } else if (event.data == YT.PlayerState.ENDED) {
                if (progressTimer) clearInterval(progressTimer);
                window.parent.postMessage({ type: 'YOUTUBE_ENDED' }, '*');
            } else {
                if (progressTimer) clearInterval(progressTimer);
            }
        }

        function onPlayerError(event) {
            // 發生 100(找不到), 150(不允許嵌入) 等錯誤，立刻回報給主網頁跳過
            window.parent.postMessage({ type: 'YOUTUBE_ERROR', code: event.data }, '*');
        }
    </script>
</body>
</html>
