<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedicated YouTube Proxy Player</title>
    <style>
        /* 移除所有邊界，讓播放器 100% 填滿整個 iframe */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* 預設黑底防閃爍 */
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 播放器將被注入到這個容器中 -->
    <div id="player-container"></div>

    <script>
        // 1. 取得主網頁傳過來的 URL 參數 (例如：?v=dQw4w9WgXcQ)
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('v');

        const container = document.getElementById('player-container');

        // 2. 驗證是否收到正確長度 (11字元) 的 YouTube ID
        if (videoId && videoId.length === 11) {
            // 動態生成 YouTube iframe，並包含您剛剛提到的最低限度安全策略
            container.innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen 
                    referrerpolicy="strict-origin-when-cross-origin">
                </iframe>
            `;
        } else {
            // 若沒有收到 ID，顯示黑畫面或提示
            container.innerHTML = '<div style="color:#555; text-align:center; padding-top:20vh; font-family:sans-serif; font-size:12px;">Waiting for video ID...</div>';
        }
    </script>
</body>
</html>
