<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>YouTube Proxy Player</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #player { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('v');
        var player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'playsinline': 1 },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': (e) => window.parent.postMessage({ type: 'YOUTUBE_ERROR', code: e.data }, '*')
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
            
            // 強制喚醒：若卡在 0 秒超過 3 秒，強制重試
            let zeroCount = 0;
            const stuckInterval = setInterval(() => {
                const state = player.getPlayerState();
                const time = player.getCurrentTime();
                if (state !== YT.PlayerState.PLAYING && time === 0) {
                    zeroCount++;
                    if (zeroCount >= 3) {
                        player.playVideo();
                        zeroCount = 0;
                    }
                } else if (state === YT.PlayerState.PLAYING) {
                    clearInterval(stuckInterval);
                }
            }, 1000);
        }

        let progressTimer;
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                window.parent.postMessage({ type: 'YOUTUBE_DURATION', duration: player.getDuration() }, '*');
                progressTimer = setInterval(() => {
                    window.parent.postMessage({ 
                        type: 'YOUTUBE_PROGRESS', 
                        currentTime: player.getCurrentTime(),
                        duration: player.getDuration()
                    }, '*');
                }, 500);
            } else if (event.data == YT.PlayerState.ENDED) {
                clearInterval(progressTimer);
                window.parent.postMessage({ type: 'YOUTUBE_ENDED' }, '*');
            } else {
                clearInterval(progressTimer);
            }
        }
    </script>
</body>
</html>
