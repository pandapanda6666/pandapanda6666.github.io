[youtube-proxy.html]
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>YouTube Proxy Player</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; position: relative; }
        #player { width: 100vw; height: 100vh; }
        #debug-log {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 5px;
            max-height: 80vh;
            overflow-y: auto;
            pointer-events: auto;
            user-select: text;
            -webkit-user-select: text;
            z-index: 9999;
            width: 320px;
            line-height: 1.5;
        }
        footer { display: none; }
    </style>
</head>
<body>
    <div id="player"></div>
    <div id="debug-log">系統初始化中...<br></div>
    <footer>版權所有 © 2026 <a href="https://pandapanda6666.github.io" target="_blank">PandaPanda的AI日常</a> All Rights Reserved.</footer>
    
    <script>
        function logAction(msg) {
            var logDiv = document.getElementById('debug-log');
            if (!logDiv) return;
            var time = new Date().toLocaleTimeString('zh-TW', { hour12: false });
            logDiv.innerHTML += '[' + time + '] ' + msg + '<br>';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        var urlParams = new URLSearchParams(window.location.search);
        var videoId = urlParams.get('v');
        var player;

        logAction("收到 URL 參數，影片ID: " + (videoId || "無"));

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        logAction("已插入 YouTube iframe API 腳本，等待載入...");

        function onYouTubeIframeAPIReady() {
            logAction("YouTube API 核心就緒");
            if (!videoId) {
                logAction("錯誤：找不到 videoId，傳送 404 錯誤至主網頁");
                window.parent.postMessage({ type: 'YOUTUBE_ERROR', code: 404 }, '*');
                return;
            }
            
            logAction("開始建立 YT.Player 實體，準備載入影片...");
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: { 
                    'autoplay': 1, 
                    'controls': 1, 
                    'rel': 0, 
                    'playsinline': 1,
                    'disablekb': 0,
                    'mute': 1,
                    'origin': 'https://pandapanda6666.github.io'
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            logAction("觸發事件：onReady (播放器實體建立完成)");
            logAction("執行動作：強制呼叫 playVideo()");
            event.target.playVideo();
            startStuckCheck(); 
        }

        var stuckCheckTimer;
        function startStuckCheck() {
            if (stuckCheckTimer) {
                clearInterval(stuckCheckTimer);
                logAction("動作：清除舊的卡頓偵測計時器");
            }
            
            logAction("動作：啟動卡頓防護機制 (每1秒檢查一次)");
            stuckCheckTimer = setInterval(function() {
                if (!player || typeof player.getPlayerState !== 'function') return;
                var state = player.getPlayerState();
                var time = player.getCurrentTime();
                
                var stateName = getStateName(state);
                
                if (state !== YT.PlayerState.PLAYING && time === 0) {
                    logAction("偵測防護：發現進度卡在 0 秒 (目前狀態:" + stateName + ")，再次呼叫 playVideo()");
                    player.playVideo(); 
                } else if (state === YT.PlayerState.PLAYING && time > 0) {
                    if (player.isMuted()) {
                        logAction("偵測防護：確認影片順利啟動 (進度:" + time.toFixed(2) + "秒)，執行解除靜音 unMute()");
                        player.unMute();
                    }
                    logAction("偵測防護：啟動流程已完成，關閉卡頓防護計時器");
                    clearInterval(stuckCheckTimer);
                }
            }, 1000);
        }

        var progressTimer;
        function onPlayerStateChange(event) {
            var stateName = getStateName(event.data);
            logAction("觸發事件：onStateChange -> " + stateName);

            if (event.data == YT.PlayerState.PLAYING) {
                if (player.isMuted()) {
                    logAction("動作：播放中偵測到靜音，執行解除靜音 unMute()");
                    player.unMute(); 
                }
                
                var dur = player.getDuration();
                logAction("動作：發送 YOUTUBE_DURATION 至主網頁，總長度 " + dur + " 秒");
                window.parent.postMessage({ type: 'YOUTUBE_DURATION', duration: dur }, '*');
                
                if (progressTimer) clearInterval(progressTimer);
                progressTimer = setInterval(function() {
                    window.parent.postMessage({ 
                        type: 'YOUTUBE_PROGRESS', 
                        currentTime: player.getCurrentTime(),
                        duration: player.getDuration()
                    }, '*');
                }, 500);
            } else if (event.data == YT.PlayerState.ENDED) {
                logAction("動作：發送 YOUTUBE_ENDED 至主網頁");
                if (progressTimer) clearInterval(progressTimer);
                window.parent.postMessage({ type: 'YOUTUBE_ENDED' }, '*');
            } else {
                if (progressTimer) clearInterval(progressTimer);
            }
        }

        function onPlayerError(event) {
            logAction("觸發事件：onError，錯誤代碼 -> " + event.data);
            window.parent.postMessage({ type: 'YOUTUBE_ERROR', code: event.data }, '*');
        }

        function getStateName(stateCode) {
            switch(stateCode) {
                case -1: return "未開始 (UNSTARTED)";
                case 0: return "結束 (ENDED)";
                case 1: return "播放中 (PLAYING)";
                case 2: return "暫停 (PAUSED)";
                case 3: return "緩衝中 (BUFFERING)";
                case 5: return "影片已插入 (CUED)";
                default: return "未知 (" + stateCode + ")";
            }
        }
    </script>
</body>
</html>
