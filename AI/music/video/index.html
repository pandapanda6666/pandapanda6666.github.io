<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>YouTube Proxy Player</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #player { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('v');

        if (videoId && videoId.length === 11) {
            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);

            var player;
            function onYouTubeIframeAPIReady() {
                player = new YT.Player('player', {
                    videoId: videoId,
                    playerVars: { 
                        'autoplay': 1, 
                        'controls': 1, 
                        'rel': 0,
                        'fs': 0,
                        'playsinline': 1
                    },
                    events: {
                        'onReady': onPlayerReady,
                        'onStateChange': onPlayerStateChange,
                        'onError': onPlayerError // 攔截無法播放的錯誤
                    }
                });
            }

            function onPlayerReady(event) {
                event.target.playVideo();
                sendDuration();
            }

            // --- 核心修正：自動回報錯誤給主視窗 ---
            function onPlayerError(event) {
                // event.data 會包含錯誤代碼 (例如 100 影片找不到, 150 不允許嵌入)
                window.parent.postMessage({ type: 'YOUTUBE_ERROR', code: event.data }, '*');
            }

            let progressTimer;
            function onPlayerStateChange(event) {
                if (event.data == YT.PlayerState.PLAYING) {
                    sendDuration();
                    clearInterval(progressTimer);
                    // 每 0.5 秒回報一次實時進度 (自動過濾廣告時間)
                    progressTimer = setInterval(() => {
                        if (player && player.getCurrentTime) {
                            window.parent.postMessage({ 
                                type: 'YOUTUBE_PROGRESS', 
                                currentTime: player.getCurrentTime(),
                                duration: player.getDuration()
                            }, '*');
                        }
                    }, 500);
                } else if (event.data == YT.PlayerState.ENDED) {
                    // 影片真正播完時，發送結束訊號
                    clearInterval(progressTimer);
                    window.parent.postMessage({ type: 'YOUTUBE_ENDED' }, '*');
                } else {
                    clearInterval(progressTimer);
                }
            }

            function sendDuration() {
                if (player && player.getDuration) {
                    const duration = player.getDuration();
                    if (duration > 0) {
                        window.parent.postMessage({ type: 'YOUTUBE_DURATION', duration: duration }, '*');
                    }
                }
            }
        } else {
            // 如果沒有影片 ID，顯示全黑
            document.body.style.backgroundColor = "black";
        }
    </script>
</body>
</html>
