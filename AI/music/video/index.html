[youtube-proxy.html]
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>YouTube Proxy Player</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #player { width: 100vw; height: 100vh; }
        footer { display: none; }
    </style>
</head>
<body>
    <div id="player"></div>
    <footer>版權所有 © 2026 <a href="https://pandapanda6666.github.io" target="_blank">PandaPanda的AI日常</a> All Rights Reserved.</footer>
    
    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var videoId = urlParams.get('v');
        var player;

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            if (!videoId) {
                window.parent.postMessage({ type: 'YOUTUBE_ERROR', code: 404 }, '*');
                return;
            }
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: { 
                    'autoplay': 1, 
                    'controls': 1, 
                    'rel': 0, 
                    'playsinline': 1,
                    'disablekb': 0,
                    'mute': 1,
                    'origin': 'https://pandapanda6666.github.io'
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
            startStuckCheck(); 
        }

        var stuckCheckTimer;
        function startStuckCheck() {
            if (stuckCheckTimer) clearInterval(stuckCheckTimer);
            
            stuckCheckTimer = setInterval(function() {
                if (!player || typeof player.getPlayerState !== 'function') return;
                var state = player.getPlayerState();
                var time = player.getCurrentTime();
                
                if (time === 0 && state !== YT.PlayerState.PLAYING) {
                    player.playVideo(); 
                    player.unMute();    
                } else if (state === YT.PlayerState.PLAYING && player.isMuted()) {
                    player.unMute();    
                }
            }, 1000);
        }

        var progressTimer;
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                player.unMute(); 
                window.parent.postMessage({ type: 'YOUTUBE_DURATION', duration: player.getDuration() }, '*');
                
                if (progressTimer) clearInterval(progressTimer);
                progressTimer = setInterval(function() {
                    window.parent.postMessage({ 
                        type: 'YOUTUBE_PROGRESS', 
                        currentTime: player.getCurrentTime(),
                        duration: player.getDuration()
                    }, '*');
                }, 500);
            } else if (event.data == YT.PlayerState.ENDED) {
                if (progressTimer) clearInterval(progressTimer);
                window.parent.postMessage({ type: 'YOUTUBE_ENDED' }, '*');
            } else {
                if (progressTimer) clearInterval(progressTimer);
            }
        }

        function onPlayerError(event) {
            window.parent.postMessage({ type: 'YOUTUBE_ERROR', code: event.data }, '*');
        }
    </script>
</body>
</html>
