<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 音樂點唱機入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-6 relative overflow-hidden">
    <!-- 裝飾光暈 -->
    <div class="absolute top-1/4 -left-32 w-96 h-96 bg-pink-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 -right-32 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="text-center space-y-12 relative z-10 max-w-2xl w-full">
        <div class="space-y-4">
            <h1 class="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-cyan-400 drop-shadow-lg">
                AI 隨機音樂點唱機
            </h1>
            <p class="text-slate-400 text-lg">選擇您的運作模式</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <!-- 無 API 模式跳轉 -->
            <button onclick="window.location.href='N.html'" class="group relative bg-slate-900/80 backdrop-blur border border-slate-700 hover:border-pink-500 p-8 rounded-3xl transition-all hover:-translate-y-2 hover:shadow-2xl hover:shadow-pink-500/20 text-left">
                <div class="bg-pink-500/20 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 text-pink-400 text-2xl group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2">我沒有 API</h2>
                <p class="text-sm text-slate-400 leading-relaxed">內建免填 Key 機制，適合在 Gemini Canvas 開發環境內直接測試與使用。</p>
            </button>

            <!-- 有 API 模式跳轉 -->
            <button onclick="window.location.href='Y.html'" class="group relative bg-slate-900/80 backdrop-blur border border-slate-700 hover:border-cyan-500 p-8 rounded-3xl transition-all hover:-translate-y-2 hover:shadow-2xl hover:shadow-cyan-500/20 text-left">
                <div class="bg-cyan-500/20 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 text-cyan-400 text-2xl group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-key"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2">我有 API</h2>
                <p class="text-sm text-slate-400 leading-relaxed">需要填寫個人的 Gemini API Key。適合部署在外部網站作為全自動點唱機。</p>
            </button>
        </div>
    </div>
</body>
</html>
