<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 音樂點唱機入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">
    <div class="text-center space-y-12 max-w-2xl w-full bg-slate-900/80 p-10 rounded-3xl border border-slate-800 shadow-2xl">
        <div class="space-y-4">
            <h1 class="text-4xl md:text-5xl font-black bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent">請選擇您的模式</h1>
            <p class="text-slate-400">請依據您的 API 擁有狀況選擇進入點</p>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-6 justify-center">
            <!-- 導向無 API 版 -->
            <button onclick="window.location.href='N.html'" class="flex-1 bg-pink-600/20 hover:bg-pink-600/40 border border-pink-500/50 text-pink-400 hover:text-white px-8 py-6 rounded-2xl font-bold transition-all shadow-lg shadow-pink-500/10 hover:shadow-pink-500/30 flex flex-col items-center gap-3 group">
                <span class="text-3xl group-hover:scale-110 transition-transform">🎧</span>
                <span>沒有 API (免填版)</span>
            </button>
            
            <!-- 導向有 API 版 -->
            <button onclick="window.location.href='Y.html'" class="flex-1 bg-cyan-600/20 hover:bg-cyan-600/40 border border-cyan-500/50 text-cyan-400 hover:text-white px-8 py-6 rounded-2xl font-bold transition-all shadow-lg shadow-cyan-500/10 hover:shadow-cyan-500/30 flex flex-col items-center gap-3 group">
                <span class="text-3xl group-hover:scale-110 transition-transform">🚀</span>
                <span>我有 API (全自動版)</span>
            </button>
        </div>
    </div>
</body>
</html>
