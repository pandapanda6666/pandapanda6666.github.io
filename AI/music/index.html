<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 隨機音樂點唱機 (入口)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .neon-glow { text-shadow: 0 0 15px rgba(244, 63, 94, 0.6); }
    </style>
</head>
<body class="text-slate-100 p-4">

    <div class="max-w-3xl w-full mx-auto p-6 text-center space-y-10 z-10">
        <div class="space-y-4">
            <h1 class="text-4xl md:text-6xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-cyan-400 neon-glow">
                <i class="fa-solid fa-compact-disc animate-spin-slow"></i> AI 音樂點唱機
            </h1>
            <p class="text-slate-400">請選擇您的執行環境模式</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 無 API 選項 -->
            <button onclick="window.location.href='N.html'" class="group relative bg-slate-900/80 border-2 border-slate-700 hover:border-emerald-500 p-8 rounded-3xl transition-all hover:scale-105 hover:shadow-2xl hover:shadow-emerald-500/20 text-left overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i class="fa-solid fa-leaf text-8xl text-emerald-500"></i>
                </div>
                <div class="relative z-10 space-y-3">
                    <div class="inline-block bg-emerald-500/20 text-emerald-400 text-xs px-3 py-1 rounded-full font-bold">
                        免填 Key 輕量版
                    </div>
                    <h2 class="text-2xl font-bold text-white">我沒有 API Key</h2>
                    <p class="text-sm text-slate-400">進入無 API 版點唱機。系統將自動採用環境預設授權，介面中不會出現任何 API 填寫欄位，隨點即播。</p>
                </div>
            </button>

            <!-- 有 API 選項 -->
            <button onclick="window.location.href='Y.html'" class="group relative bg-slate-900/80 border-2 border-slate-700 hover:border-pink-500 p-8 rounded-3xl transition-all hover:scale-105 hover:shadow-2xl hover:shadow-pink-500/20 text-left overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i class="fa-solid fa-bolt text-8xl text-pink-500"></i>
                </div>
                <div class="relative z-10 space-y-3">
                    <div class="inline-block bg-pink-500/20 text-pink-400 text-xs px-3 py-1 rounded-full font-bold">
                        全自動智慧版
                    </div>
                    <h2 class="text-2xl font-bold text-white">我有 API Key</h2>
                    <p class="text-sm text-slate-400">進入完整版點唱機。系統會強制要求您填入個人的 Gemini API Key 以啟動高精準大腦引擎。</p>
                </div>
            </button>
        </div>
    </div>

</body>
</html>
