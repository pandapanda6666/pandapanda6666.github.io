<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 隨機音樂點唱機 (API 版)</title>
    <!-- 引入 Tailwind CSS 與 Font Awesome 圖示 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            min-height: 100vh;
        }
        .neon-glow-cyan { text-shadow: 0 0 10px rgba(6, 182, 212, 0.6), 0 0 20px rgba(6, 182, 212, 0.4); }
        .neon-border-cyan { box-shadow: 0 0 15px rgba(6, 182, 212, 0.3), inset 0 0 15px rgba(6, 182, 212, 0.2); }
        @keyframes rotate-vinyl { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .vinyl-rotate { animation: rotate-vinyl 12s linear infinite; }
        @keyframes bounce-bar { 0%, 100% { height: 4px; } 50% { height: 40px; } }
        .eq-bar { animation: bounce-bar 1.2s ease-in-out infinite; }
        .eq-bar:nth-child(2) { animation-delay: 0.15s; }
        .eq-bar:nth-child(3) { animation-delay: 0.3s; }
        .eq-bar:nth-child(4) { animation-delay: 0.45s; }
        .eq-bar:nth-child(5) { animation-delay: 0.6s; }
        .eq-bar:nth-child(6) { animation-delay: 0.25s; }
        .toggle-checkbox:checked + .toggle-label { background-color: #06b6d4; }
        .toggle-checkbox:checked + .toggle-label .toggle-dot { transform: translateX(100%); }
    </style>
</head>
<body class="text-slate-100 flex flex-col justify-between p-4 md:p-8 relative">

    <button onclick="window.location.href='index.html'" class="absolute top-4 left-4 z-50 bg-slate-800/80 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-xl text-sm font-bold backdrop-blur transition-all border border-slate-700">
        <i class="fa-solid fa-arrow-left"></i> 回首頁
    </button>

    <main class="max-w-xl w-full mx-auto my-auto bg-slate-900/80 backdrop-blur-md rounded-3xl p-6 md:p-8 border border-slate-800 shadow-2xl relative overflow-hidden mt-12 md:mt-0">
        <div class="absolute -top-12 -left-12 w-48 h-48 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-12 -right-12 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="inline-flex items-center gap-1.5 bg-blue-500/10 text-blue-400 text-xs px-3 py-1 rounded-full border border-blue-500/20 mb-3 font-semibold tracking-wider">
                <i class="fa-solid fa-key text-blue-400"></i> API 驅動全自動版
            </div>
            <h1 class="text-3xl md:text-4xl font-black tracking-wider bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent flex items-center justify-center gap-3">
                <i class="fa-solid fa-satellite-dish text-cyan-400 text-2xl"></i>
                AI 隨機音樂點唱機
            </h1>
            <p class="text-slate-400 text-sm mt-2 font-light">搭載自動排錯機制，遇到無法播放影片立即自動跳過</p>
        </div>

        <div class="space-y-6 relative z-30">
            
            <!-- 必填 API 欄位 (Y 版專屬) -->
            <div class="bg-rose-500/10 rounded-2xl p-4 border border-rose-500/30 space-y-2">
                <label for="api-key-input" class="block text-xs font-bold text-rose-400 tracking-wider">
                    <i class="fa-solid fa-triangle-exclamation"></i> 必須填寫您的 Gemini API Key
                </label>
                <input type="password" id="api-key-input" placeholder="請在此貼上 API Key..." class="w-full bg-slate-950 border border-rose-500/50 rounded-xl py-3 px-4 text-sm text-slate-100 focus:outline-none focus:border-rose-400 focus:ring-1 focus:ring-rose-400 transition-all">
            </div>

            <div>
                <label for="prompt-input" class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2 flex justify-between items-center">
                    <span id="limit-label">輸入靈感提示</span>
                    <span id="char-counter" class="text-cyan-400 font-bold">0/0</span>
                </label>
                <div class="relative">
                    <input type="text" id="prompt-input" placeholder="例如：憂鬱下雨天、熱血狂飆" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-5 text-lg text-slate-100 focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/20 transition-all duration-300" onkeydown="if(event.key === 'Enter') generateMusic()">
                </div>
            </div>

            <div>
                <span class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">優先搜尋類型</span>
                <div class="grid grid-cols-4 gap-2 text-center text-xs">
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="official" checked class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-cyan-500 peer-checked:text-cyan-400 peer-checked:bg-cyan-500/10 transition-all">官方 MV</div></label>
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="lyrics" class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-cyan-500 peer-checked:text-cyan-400 peer-checked:bg-cyan-500/10 transition-all">中文歌詞</div></label>
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="live" class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-cyan-500 peer-checked:text-cyan-400 peer-checked:bg-cyan-500/10 transition-all">現場 Live</div></label>
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="audio" class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-cyan-500 peer-checked:text-cyan-400 peer-checked:bg-cyan-500/10 transition-all">純音訊</div></label>
                </div>
            </div>

            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                <div class="flex flex-wrap gap-2 items-center">
                    <span class="text-xs text-slate-500"><i class="fa-solid fa-tags"></i> 風格:</span>
                    <button onclick="fillPrompt('中文抒情')" class="text-xs bg-slate-800/60 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-full transition-all border border-slate-700/50">🎵 中文抒情</button>
                    <button onclick="fillPrompt('英文搖滾')" class="text-xs bg-slate-800/60 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-full transition-all border border-slate-700/50">🎸 英文搖滾</button>
                    <button onclick="fillPrompt('韓國流行')" class="text-xs bg-slate-800/60 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-full transition-all border border-slate-700/50">💃 韓國流行</button>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-semibold text-slate-400">自動連播</span>
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="auto-next-toggle" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer right-4 focus:outline-none"/>
                        <label for="auto-next-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-700 cursor-pointer"><span class="toggle-dot block h-6 w-6 rounded-full bg-slate-100 transform transition-transform duration-200"></span></label>
                    </div>
                </div>
            </div>

            <button id="generate-btn" onclick="generateMusic()" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold text-lg py-4 rounded-2xl shadow-lg shadow-blue-500/20 hover:shadow-blue-500/40 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 group">
                <i class="fa-solid fa-compact-disc text-xl animate-spin group-hover:scale-110"></i><span>發送 API 請求並放歌！</span>
            </button>
        </div>

        <div id="loading-container" class="hidden mt-8 text-center space-y-4 relative z-10">
            <div class="flex justify-center items-center h-24">
                <div class="relative w-20 h-20 bg-black rounded-full flex items-center justify-center border-4 border-slate-700 vinyl-rotate">
                    <div class="w-8 h-8 bg-cyan-500 rounded-full flex items-center justify-center border-2 border-white"><div class="w-2 h-2 bg-black rounded-full"></div></div>
                </div>
            </div>
            <p id="loading-text" class="text-cyan-400 animate-pulse text-sm">Gemini 正在搜尋完美的 YouTube 連結...</p>
        </div>

        <div id="result-container" class="hidden mt-8 p-6 bg-slate-950/90 rounded-2xl border border-cyan-500/30 neon-border-cyan relative z-10 text-center space-y-6">
            <div class="flex justify-center relative">
                <div class="relative w-32 h-32 bg-black rounded-full flex items-center justify-center border-8 border-slate-800 vinyl-rotate shadow-xl shadow-cyan-500/10">
                    <div class="w-12 h-12 bg-cyan-500 rounded-full flex items-center justify-center border-2 border-white"><div class="w-3 h-3 bg-black rounded-full"></div></div>
                </div>
                <div id="prefetch-indicator" class="absolute -top-2 right-2 bg-emerald-500/20 text-emerald-400 text-[10px] font-bold px-2 py-0.5 rounded-full border border-emerald-500/30 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-ping"></span><span>預載守護中</span>
                </div>
            </div>

            <div class="w-full aspect-video bg-black rounded-xl overflow-hidden border-2 border-slate-700 shadow-lg relative">
                <iframe id="yt-player" class="w-full h-full" src="" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center text-xs text-slate-400 px-1">
                    <span>YouTube 物理播放進度</span>
                    <span id="countdown-text" class="text-cyan-400 font-bold">00:00 / 00:00</span>
                </div>
                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden border border-slate-700">
                    <div id="progress-bar" class="bg-gradient-to-r from-cyan-400 to-blue-500 h-full w-0 transition-all duration-500 ease-linear"></div>
                </div>
            </div>

            <div class="space-y-2 pt-1">
                <div class="flex justify-center">
                    <div id="eq-container" class="flex items-end justify-center gap-1.5 h-8 w-full max-w-[120px]">
                        <div class="eq-bar w-1.5 bg-cyan-400 rounded-full" style="height: 10px;"></div>
                        <div class="eq-bar w-1.5 bg-blue-500 rounded-full" style="height: 25px;"></div>
                        <div class="eq-bar w-1.5 bg-cyan-300 rounded-full" style="height: 35px;"></div>
                        <div class="eq-bar w-1.5 bg-emerald-400 rounded-full" style="height: 20px;"></div>
                        <div class="eq-bar w-1.5 bg-indigo-500 rounded-full" style="height: 30px;"></div>
                        <div class="eq-bar w-1.5 bg-sky-400 rounded-full" style="height: 40px;"></div>
                    </div>
                </div>
                <h2 id="song-title" class="text-2xl font-extrabold text-white tracking-wide pt-2 neon-glow-cyan">--</h2>
                <p id="song-artist" class="text-blue-400 font-medium text-base">--</p>
                <div id="song-tag" class="text-slate-400 text-xs italic"></div>
            </div>

            <div class="space-y-3 pt-2">
                <button id="btn-blacklist" onclick="blockCurrentSong()" class="w-full bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/30 py-3 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-ban"></i> 加入黑名單 (不再播放)
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="reportBadLinkAndSkip()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5">
                        <i class="fa-solid fa-link-slash"></i> 連結錯誤 / 跳過
                    </button>
                    <button onclick="triggerNextSongImmediately()" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 shadow-md shadow-cyan-500/10">
                        <i class="fa-solid fa-forward"></i> 切換下一首
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const MAX_CHAR_LIMIT = 100; 

        const GUARANTEED_FALLBACKS = [
            { title: "Sparkle", artist: "RADWIMPS", youtubeId: "a2GujJZfALL", durationSeconds: 340, tag: "雲端精選熱門音樂守護" },
            { title: "STAY", artist: "The Kid LAROI, Justin Bieber", youtubeId: "kTJczUoc26U", durationSeconds: 140, tag: "雲端精選熱門音樂守護" },
            { title: "Blinding Lights", artist: "The Weeknd", youtubeId: "4NRXx6U8ABQ", durationSeconds: 200, tag: "雲端精選熱門音樂守護" },
            { title: "First Love", artist: "宇多田光", youtubeId: "o1sUaV3HQbU", durationSeconds: 260, tag: "雲端精選熱門音樂守護" }
        ];

        let userBlacklist = JSON.parse(localStorage.getItem('ai_music_blacklist') || '[]');
        let playedSongIds = [];       
        let reportedBadIds = [];      
        let currentYoutubeId = "";    
        let nextSongData = null;      
        let isPrefetching = false;    

        const promptInput = document.getElementById('prompt-input');
        const charCounter = document.getElementById('char-counter');
        const limitLabel = document.getElementById('limit-label');

        function initCharacterLimit() {
            promptInput.maxLength = MAX_CHAR_LIMIT;
            limitLabel.textContent = `輸入靈感提示（限 ${MAX_CHAR_LIMIT} 字）`;
            updateCounter(promptInput.value.length);
        }

        function updateCounter(length) {
            charCounter.textContent = `${length}/${MAX_CHAR_LIMIT}`;
            charCounter.className = length >= MAX_CHAR_LIMIT ? "text-rose-500 font-bold animate-bounce" : "text-cyan-400 font-bold";
        }

        promptInput.addEventListener('input', () => updateCounter(promptInput.value.length));

        function fillPrompt(text) {
            const truncated = text.substring(0, MAX_CHAR_LIMIT);
            promptInput.value = truncated;
            updateCounter(truncated.length);
        }

        function saveBlacklist() {
            localStorage.setItem('ai_music_blacklist', JSON.stringify(userBlacklist));
        }

        function blockCurrentSong() {
            if (!currentYoutubeId) return;
            const title = document.getElementById('song-title').textContent;
            const artist = document.getElementById('song-artist').textContent;
            
            if (!userBlacklist.some(item => item.id === currentYoutubeId)) {
                userBlacklist.push({ id: currentYoutubeId, title: title, artist: artist });
                saveBlacklist();
            }
            
            const btn = document.getElementById('btn-blacklist');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-check"></i> 已永久封鎖！為您切換...`;
            btn.classList.replace('bg-rose-500/10', 'bg-rose-600');
            btn.classList.replace('text-rose-400', 'text-white');

            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.classList.replace('bg-rose-600', 'bg-rose-500/10');
                btn.classList.replace('text-white', 'text-rose-400');
                triggerNextSongImmediately();
            }, 1000);
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // --- 核心更新：傾聽 YouTube Proxy 的訊號，包含自動錯誤偵測 ---
        window.addEventListener('message', (event) => {
            if (event.origin !== 'https://pandapanda6666.github.io') return;

            const data = event.data;
            if (data.type === 'YOUTUBE_DURATION') {
                updatePlaybackUI(0, data.duration);
            } else if (data.type === 'YOUTUBE_PROGRESS') {
                updatePlaybackUI(data.currentTime, data.duration);
            } else if (data.type === 'YOUTUBE_ENDED') {
                onPlaybackEnded();
            } else if (data.type === 'YOUTUBE_ERROR') {
                console.warn("YouTube 官方播放器回報錯誤代碼:", data.code);
                reportBadLinkAndSkip(); // 自動觸發無縫換歌
            }
        });

        function updatePlaybackUI(currentTime, duration) {
            const countdownText = document.getElementById('countdown-text');
            const progressBar = document.getElementById('progress-bar');
            countdownText.textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;
            const percent = duration > 0 ? Math.min((currentTime / duration) * 100, 100) : 0;
            progressBar.style.width = `${percent}%`;
        }

        function onPlaybackEnded() {
            if (document.getElementById('auto-next-toggle').checked) playNextSongCycle();
        }

        function playEmbeddedMusic(videoId) {
            currentYoutubeId = videoId;
            const player = document.getElementById('yt-player');
            player.src = `https://pandapanda6666.github.io/AI/music/video/?v=${videoId}`;
            updatePlaybackUI(0, 0);
        }

        function triggerNextSongImmediately() {
            document.getElementById('yt-player').src = ""; 
            playNextSongCycle();
        }

        function reportBadLinkAndSkip() {
            if (currentYoutubeId && !reportedBadIds.includes(currentYoutubeId)) {
                reportedBadIds.push(currentYoutubeId);
                console.log("已將失效影片加入系統壞檔名單:", currentYoutubeId);
            }
            triggerNextSongImmediately();
        }

        async function playNextSongCycle() {
            if (nextSongData) {
                applySongData(nextSongData);
                nextSongData = null; 
            } else {
                await generateMusic();
            }
        }

        function applySongData(song) {
            document.getElementById('song-title').textContent = song.title;
            document.getElementById('song-artist').textContent = song.artist;
            document.getElementById('song-tag').innerHTML = `<i class="fa-solid fa-quote-left text-cyan-400 mr-1"></i> ${song.tag} <i class="fa-solid fa-quote-right text-cyan-400 ml-1"></i>`;

            if (!playedSongIds.includes(song.youtubeId)) {
                playedSongIds.push(song.youtubeId);
                if (playedSongIds.length > 30) playedSongIds.shift();
            }

            document.getElementById('result-container').classList.remove('hidden');
            playEmbeddedMusic(song.youtubeId);

            if (document.getElementById('auto-next-toggle').checked) prefetchNextSong();
        }

        async function prefetchNextSong() {
            if (isPrefetching) return;
            isPrefetching = true;
            nextSongData = null;

            const prefetchIndicator = document.getElementById('prefetch-indicator');
            prefetchIndicator.className = "absolute -top-2 right-2 bg-amber-500/20 text-amber-400 text-[10px] font-bold px-2 py-0.5 rounded-full border border-emerald-500/30 flex items-center gap-1";
            prefetchIndicator.querySelector('span:first-child').className = "w-1.5 h-1.5 bg-amber-400 rounded-full animate-ping";
            prefetchIndicator.querySelector('span:last-child').textContent = "正在思考下一首...";

            try {
                const prompt = promptInput.value;
                let song = await fetchGeminiRecommendation(prompt, false);
                
                const isBlocked = userBlacklist.some(item => item.id === song.youtubeId);
                const isPlayed = playedSongIds.includes(song.youtubeId);
                
                if (!isBlocked && !isPlayed) {
                    nextSongData = song;
                    prefetchIndicator.className = "absolute -top-2 right-2 bg-emerald-500/20 text-emerald-400 text-[10px] font-bold px-2 py-0.5 rounded-full border border-emerald-500/30 flex items-center gap-1";
                    prefetchIndicator.querySelector('span:first-child').className = "w-1.5 h-1.5 bg-emerald-400 rounded-full";
                    prefetchIndicator.querySelector('span:last-child').textContent = "下一首已想好";
                } else {
                    throw new Error("Prefetch hit blacklist or played song.");
                }
            } catch (err) {
                let fallback = GUARANTEED_FALLBACKS.find(f => !playedSongIds.includes(f.youtubeId) && !userBlacklist.some(b => b.id === f.youtubeId)) || GUARANTEED_FALLBACKS[0];
                nextSongData = fallback;
                prefetchIndicator.className = "absolute -top-2 right-2 bg-emerald-500/20 text-emerald-400 text-[10px] font-bold px-2 py-0.5 rounded-full border border-emerald-500/30 flex items-center gap-1";
                prefetchIndicator.querySelector('span:first-child').className = "w-1.5 h-1.5 bg-emerald-400 rounded-full";
                prefetchIndicator.querySelector('span:last-child').textContent = "下一首已就緒 (備用)";
            } finally {
                isPrefetching = false;
            }
        }

        function cleanJSON(text) {
            if (!text) return "";
            let cleaned = text.trim();
            if (cleaned.startsWith("```")) cleaned = cleaned.replace(/^```[a-zA-Z]*/, "").replace(/```$/, "").trim();
            return cleaned;
        }

        async function fetchGeminiRecommendation(promptText, isRetryMode) {
            // Y 版 (有 API 版)：強制讀取使用者輸入的 Key
            const apiKey = document.getElementById('api-key-input').value.trim();
            if (!apiKey) {
                throw new Error("MISSING_API_KEY");
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const prefVal = document.querySelector('input[name="search-pref"]:checked').value;
            let prefQuery = "官方MV";
            if (prefVal === "lyrics") prefQuery = "中文歌詞版";
            if (prefVal === "live") prefQuery = "Live現場版";
            if (prefVal === "audio") prefQuery = "純音訊 Audio";

            const blockedIdArray = [...userBlacklist.map(i => i.id), ...reportedBadIds, ...playedSongIds];

            const systemPrompt = `你是一個世界頂尖的音樂搜尋定位專家。
請完美達成以下限制：
1. 實時搜尋：使用 Google Search 搜尋找出「${prefQuery}」的真實 YouTube 影片網址。
2. 提取真實影片 ID：找出 11 字元 Video ID。嚴禁捏造！
   【絕對封鎖警告】你絕對不准回傳以下被使用者列入黑名單或已播過的影片 ID：[${blockedIdArray.join(', ')}]。請搜尋別首不同歌！
3. 影片時間精確計算（杜絕幻覺）：
   在搜尋結果找出該影片的播放時間字串（放入 durationRaw，如 "3:51"）。
   然後強制轉換為總秒數（放入 durationSeconds）。3:51 = 3*60+51 = 231 秒。長度需介於 120 至 400 秒之間。
回傳格式必須為嚴格的 JSON。`;

            const finalPrompt = promptText.trim() || "輕鬆好聽的中文歌";

            const payload = {
                contents: [{ parts: [{ text: `提示: "${finalPrompt}"` }] }],
                tools: [{ "google_search": {} }], 
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            title: { type: "STRING" }, artist: { type: "STRING" }, youtubeId: { type: "STRING" },
                            durationRaw: { type: "STRING" }, durationSeconds: { type: "INTEGER" }, tag: { type: "STRING" }
                        },
                        required: ["title", "artist", "youtubeId", "durationRaw", "durationSeconds", "tag"]
                    }
                }
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (!response.ok) throw new Error(`API error ${response.status}`);
            const result = await response.json();
            const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (jsonText) return JSON.parse(cleanJSON(jsonText));
            throw new Error("Invalid structure");
        }

        async function generateMusic(isRetryMode = false) {
            const prompt = promptInput.value;
            const generateBtn = document.getElementById('generate-btn');
            const loadingContainer = document.getElementById('loading-container');
            const resultContainer = document.getElementById('result-container');
            const loadingText = document.getElementById('loading-text');
            const apiKeyInput = document.getElementById('api-key-input');

            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50', 'scale-[0.98]');
            loadingContainer.classList.remove('hidden');

            const textSteps = ["發送指令至 API...", "比對專屬黑名單...", "解析精準秒數...", "透過 Proxy 載入..."];
            let step = 0;
            const textInterval = setInterval(() => {
                if (step < textSteps.length) loadingText.textContent = textSteps[step++];
            }, 800);

            try {
                let song = await fetchGeminiRecommendation(prompt, isRetryMode);
                if (userBlacklist.some(item => item.id === song.youtubeId)) throw new Error("Hit blacklist");

                apiKeyInput.classList.remove('ring-4', 'ring-rose-500', 'animate-pulse');
                applySongData(song);
                loadingContainer.classList.add('hidden');
                resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } catch (err) {
                console.warn("生成異常:", err);
                
                if (err.message === "MISSING_API_KEY") {
                    loadingText.innerHTML = "<span class='text-rose-500 font-bold'>請先在上方填寫您的 Gemini API Key！</span>";
                    apiKeyInput.classList.add('ring-4', 'ring-rose-500', 'animate-pulse');
                    apiKeyInput.focus();
                    setTimeout(() => apiKeyInput.classList.remove('animate-pulse'), 2000);
                } else {
                    let fallback = GUARANTEED_FALLBACKS.find(f => !playedSongIds.includes(f.youtubeId) && !userBlacklist.some(b => b.id === f.youtubeId)) || GUARANTEED_FALLBACKS[0];
                    fallback.tag = "✨ 網路重試連線異常，已切換至備用金曲。";
                    applySongData(fallback);
                    loadingContainer.classList.add('hidden');
                    resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            } finally {
                clearInterval(textInterval);
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-50', 'scale-[0.98]');
            }
        }

        initCharacterLimit();
    </script>
