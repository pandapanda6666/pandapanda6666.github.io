<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 隨機音樂點唱機 (無API免填版)</title>
    <!-- CSP 阻擋修正：使用 crossOrigin 並用 link 載入字體 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700;900&display=swap" rel="stylesheet" crossorigin="anonymous">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%); min-height: 100vh; }
        .neon-glow-pink { text-shadow: 0 0 10px rgba(244, 63, 94, 0.6), 0 0 20px rgba(244, 63, 94, 0.4); }
        .neon-border-pink { box-shadow: 0 0 15px rgba(244, 63, 94, 0.3), inset 0 0 15px rgba(244, 63, 94, 0.2); }
        @keyframes rotate-vinyl { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .vinyl-rotate { animation: rotate-vinyl 12s linear infinite; }
        @keyframes bounce-bar { 0%, 100% { height: 4px; } 50% { height: 40px; } }
        .eq-bar { animation: bounce-bar 1.2s ease-in-out infinite; }
        .eq-bar:nth-child(2) { animation-delay: 0.15s; } .eq-bar:nth-child(3) { animation-delay: 0.3s; } .eq-bar:nth-child(4) { animation-delay: 0.45s; } .eq-bar:nth-child(5) { animation-delay: 0.6s; } .eq-bar:nth-child(6) { animation-delay: 0.25s; } .eq-bar:nth-child(7) { animation-delay: 0.1s; } .eq-bar:nth-child(8) { animation-delay: 0.5s; }
        .toggle-checkbox:checked + .toggle-label { background-color: #06b6d4; }
        .toggle-checkbox:checked + .toggle-label .toggle-dot { transform: translateX(100%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-100 flex flex-col justify-between p-4 md:p-8">

    <main class="max-w-xl w-full mx-auto my-auto bg-slate-900/80 backdrop-blur-md rounded-3xl p-6 md:p-8 border border-slate-800 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-12 -left-12 w-48 h-48 bg-pink-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-12 -right-12 w-48 h-48 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <!-- 無API版的首頁導向 -->
            <button onclick="window.location.href='https://pandapanda6666.github.io/AI/music/'" class="absolute left-0 top-0 text-slate-400 hover:text-white transition-colors text-sm">
                <i class="fa-solid fa-arrow-left"></i> 回首頁
            </button>
            <div class="inline-flex items-center gap-1.5 bg-pink-500/10 text-pink-400 text-xs px-3 py-1 rounded-full border border-pink-500/20 mb-3 font-semibold tracking-wider mt-6 sm:mt-0">
                <i class="fa-solid fa-bolt"></i> 免 API 智慧版 · 資料互通
            </div>
            <h1 class="text-3xl md:text-4xl font-black tracking-wider bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent flex items-center justify-center gap-3">
                <i class="fa-solid fa-wand-magic-sparkles text-pink-500 text-2xl"></i> AI 音樂點唱機
            </h1>
            <p class="text-slate-400 text-sm mt-2 font-light">支援智慧歌單、語意黑名單與無縫連播</p>
        </div>

        <div class="space-y-6 relative z-30">
            <div>
                <label for="prompt-input" class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2 flex justify-between items-center">
                    <span id="limit-label">隨機靈感提示 (當歌單為空時使用)</span>
                    <span id="char-counter" class="text-cyan-400 font-bold">0/100</span>
                </label>
                <div class="relative">
                    <input type="text" id="prompt-input" placeholder="例如：憂鬱下雨天、熱血狂飆、慵懶咖啡" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-5 text-lg text-slate-100 focus:outline-none focus:border-cyan-500 transition-all duration-300" onkeydown="if(event.key === 'Enter') generateMusic()">
                </div>
            </div>

            <div>
                <span class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">搜尋偏好版本</span>
                <div class="grid grid-cols-4 gap-2 text-center text-xs">
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="official" checked class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-pink-500 peer-checked:text-pink-400 peer-checked:bg-pink-500/10 transition-all">官方 MV</div></label>
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="lyrics" class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-pink-500 peer-checked:text-pink-400 peer-checked:bg-pink-500/10 transition-all">中文歌詞</div></label>
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="live" class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-pink-500 peer-checked:text-pink-400 peer-checked:bg-pink-500/10 transition-all">現場 Live</div></label>
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="audio" class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-pink-500 peer-checked:text-pink-400 peer-checked:bg-pink-500/10 transition-all">純音訊</div></label>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <button onclick="openModal('playlist-modal')" class="bg-indigo-900/40 hover:bg-indigo-800/60 text-indigo-300 py-2.5 rounded-xl text-xs font-bold border border-indigo-700/50 transition-colors flex items-center justify-center gap-1.5 relative">
                    <i class="fa-solid fa-list-ul"></i> 待播歌單
                    <span id="queue-badge" class="absolute -top-2 -right-2 bg-indigo-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
                </button>
                <button onclick="openModal('history-modal')" class="bg-slate-800/80 hover:bg-slate-700 text-slate-300 py-2.5 rounded-xl text-xs font-bold border border-slate-700 transition-colors flex items-center justify-center gap-1.5">
                    <i class="fa-solid fa-clock-rotate-left"></i> 歷史紀錄
                </button>
                <button onclick="openModal('blacklist-modal')" class="bg-rose-950/40 hover:bg-rose-900/60 text-rose-400 py-2.5 rounded-xl text-xs font-bold border border-rose-900/50 transition-colors flex items-center justify-center gap-1.5">
                    <i class="fa-solid fa-ban"></i> 黑名單
                </button>
            </div>

            <div class="flex items-center justify-end gap-2 pt-2">
                <span class="text-xs font-semibold text-slate-400">自動連播下一首</span>
                <div class="relative inline-block w-10 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" id="auto-next-toggle" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer right-4 focus:outline-none"/>
                    <label for="auto-next-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-700 cursor-pointer"><span class="toggle-dot block h-6 w-6 rounded-full bg-slate-100 transform transition-transform duration-200"></span></label>
                </div>
            </div>

            <button id="generate-btn" onclick="generateMusic()" class="w-full bg-gradient-to-r from-pink-500 via-purple-600 to-cyan-500 text-white font-bold text-lg py-4 rounded-2xl shadow-lg shadow-purple-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3 group">
                <i class="fa-solid fa-play group-hover:scale-110 transition-transform"></i> <span id="generate-btn-text">開始播放音樂！</span>
            </button>
        </div>

        <div id="loading-container" class="hidden mt-8 text-center space-y-4 relative z-10">
            <div class="flex justify-center items-center h-24">
                <div class="relative w-20 h-20 bg-black rounded-full flex items-center justify-center border-4 border-slate-700 vinyl-rotate">
                    <div class="w-8 h-8 bg-cyan-500 rounded-full flex items-center justify-center border-2 border-white"><div class="w-2 h-2 bg-black rounded-full"></div></div>
                </div>
            </div>
            <p id="loading-text" class="text-cyan-400 animate-pulse text-sm">Gemini 正在為您尋找完美的 YouTube 版本...</p>
        </div>

        <div id="result-container" class="hidden mt-8 p-6 bg-slate-950/90 rounded-2xl border border-pink-500/30 neon-border-pink relative z-10 text-center space-y-6">
            <div class="flex justify-center relative">
                <div class="relative w-32 h-32 bg-black rounded-full flex items-center justify-center border-8 border-slate-800 vinyl-rotate shadow-xl">
                    <div class="w-12 h-12 bg-pink-500 rounded-full flex items-center justify-center border-2 border-white"><div class="w-3 h-3 bg-black rounded-full"></div></div>
                </div>
                
                <div id="prefetch-indicator" class="absolute -top-2 right-2 bg-slate-800/80 text-slate-400 text-[10px] font-bold px-2 py-0.5 rounded-full border border-slate-700 flex items-center gap-1 hidden">
                    <span id="prefetch-dot" class="w-1.5 h-1.5 bg-slate-400 rounded-full"></span>
                    <span id="prefetch-text">等待中</span>
                </div>
            </div>

            <div class="w-full aspect-video bg-black rounded-xl overflow-hidden border-2 border-slate-700 shadow-lg relative">
                <iframe id="yt-player" class="w-full h-full" src="" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div class="space-y-2 pt-1">
                <h2 id="song-title" class="text-2xl font-extrabold text-white tracking-wide pt-2 neon-glow-pink">--</h2>
                <p id="song-artist" class="text-cyan-400 font-medium text-base">--</p>
                <div id="song-tag" class="text-slate-400 text-xs italic"></div>
            </div>

            <div class="space-y-3 pt-2">
                <button onclick="blockCurrentSong()" class="w-full bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/30 py-3 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-thumbs-down"></i> 聽膩了，加入黑名單並跳過
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="reportBadLinkAndSkip()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5">
                        <i class="fa-solid fa-link-slash"></i> 無法播放 / 跳過
                    </button>
                    <button onclick="triggerNextSongImmediately()" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 shadow-md shadow-cyan-500/10">
                        <i class="fa-solid fa-forward"></i> 切換下一首
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="playlist-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-slate-900 rounded-2xl p-6 w-full max-w-md border border-indigo-500/30 shadow-2xl flex flex-col max-h-[85vh]">
            <h3 class="text-xl font-bold text-indigo-400 mb-4 flex items-center gap-2"><i class="fa-solid fa-list-ul"></i> 待播歌單 (點歌機)</h3>
            <div class="bg-slate-950 p-3 rounded-xl mb-4 border border-slate-800">
                <p class="text-xs text-slate-400 mb-2">輸入想聽的歌名或歌手，AI 會依序為您播放！</p>
                <div class="flex gap-2">
                    <input type="text" id="manual-pl-input" placeholder="例如：周杰倫 擱淺..." class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500" onkeydown="if(event.key === 'Enter') addManualPlaylist()">
                    <button onclick="addManualPlaylist()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors">插播</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto pr-1 space-y-2" id="playlist-container"></div>
            <button onclick="closeModals()" class="mt-5 w-full bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-bold transition-all">關閉</button>
        </div>
    </div>

    <div id="blacklist-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-slate-900 rounded-2xl p-6 w-full max-w-md border border-rose-500/30 shadow-2xl flex flex-col max-h-[85vh]">
            <h3 class="text-xl font-bold text-rose-400 mb-4 flex items-center gap-2"><i class="fa-solid fa-ban"></i> 語意化黑名單管理</h3>
            <div class="bg-slate-950 p-3 rounded-xl mb-4 border border-slate-800">
                <p class="text-xs text-slate-400 mb-2">直接輸入討厭的歌名、歌手或風格，AI 會自動避開！</p>
                <div class="flex gap-2">
                    <input type="text" id="manual-bl-input" placeholder="例如：某歌手、金屬樂、抖音神曲..." class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-rose-500" onkeydown="if(event.key === 'Enter') addManualBlacklist()">
                    <button onclick="addManualBlacklist()" class="bg-rose-600 hover:bg-rose-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors">封鎖</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto pr-1 space-y-2" id="blacklist-container"></div>
            <button onclick="closeModals()" class="mt-5 w-full bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-bold transition-all">關閉</button>
        </div>
    </div>

    <div id="history-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-slate-900 rounded-2xl p-6 w-full max-w-md border border-cyan-500/30 shadow-2xl flex flex-col max-h-[85vh]">
            <h3 class="text-xl font-bold text-cyan-400 mb-4 flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left"></i> 歷史播放紀錄</h3>
            <div class="flex-1 overflow-y-auto pr-1 space-y-2" id="history-container"></div>
            <button onclick="closeModals()" class="mt-5 w-full bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-bold transition-all">關閉</button>
        </div>
    </div>

    <script>
        var MAX_CHAR_LIMIT = 100; 

        var userBlacklist = JSON.parse(localStorage.getItem('ai_music_blacklist') || '[]');
        var playedHistory = JSON.parse(localStorage.getItem('ai_music_history') || '[]');
        var userPlaylist = JSON.parse(localStorage.getItem('ai_music_playlist') || '[]');
        var reportedBadIds = [];
        var currentYoutubeId = "";
        var nextSongData = null;
        var isPrefetching = false;

        var promptInput = document.getElementById('prompt-input');
        var charCounter = document.getElementById('char-counter');

        function initCharacterLimit() { promptInput.maxLength = MAX_CHAR_LIMIT; updateCounter(promptInput.value.length); updateQueueBadge(); }
        function updateCounter(length) { charCounter.textContent = `${length}/${MAX_CHAR_LIMIT}`; charCounter.className = length >= MAX_CHAR_LIMIT ? "text-rose-500 font-bold animate-bounce" : "text-cyan-400 font-bold"; }
        promptInput.addEventListener('input', () => updateCounter(promptInput.value.length));

        function saveBlacklist() { localStorage.setItem('ai_music_blacklist', JSON.stringify(userBlacklist)); renderBlacklist(); }
        function saveHistory() { localStorage.setItem('ai_music_history', JSON.stringify(playedHistory)); renderHistory(); }
        function savePlaylist() { localStorage.setItem('ai_music_playlist', JSON.stringify(userPlaylist)); renderPlaylist(); updateQueueBadge(); }

        function updateQueueBadge() {
            var badge = document.getElementById('queue-badge');
            var btnText = document.getElementById('generate-btn-text');
            if (userPlaylist.length > 0) {
                badge.textContent = userPlaylist.length;
                badge.classList.remove('hidden');
                btnText.textContent = `播放歌單：${userPlaylist[0]}`;
            } else {
                badge.classList.add('hidden');
                btnText.textContent = "隨機靈感播放！";
            }
        }

        function openModal(id) {
            if(id === 'blacklist-modal') renderBlacklist();
            if(id === 'history-modal') renderHistory();
            if(id === 'playlist-modal') renderPlaylist();
            document.getElementById(id).classList.remove('hidden');
        }
        function closeModals() {
            document.querySelectorAll('.fixed.inset-0').forEach(m => m.classList.add('hidden'));
        }

        function addManualPlaylist() {
            var input = document.getElementById('manual-pl-input');
            var val = input.value.trim();
            if (val) {
                userPlaylist.push(val);
                savePlaylist();
                input.value = "";
                triggerSmartPrefetchUpdate(); 
            }
        }
        function removePlaylist(index) { userPlaylist.splice(index, 1); savePlaylist(); triggerSmartPrefetchUpdate(); }
        function renderPlaylist() {
            var container = document.getElementById('playlist-container');
            if (userPlaylist.length === 0) { container.innerHTML = `<p class="text-center text-slate-500 text-sm py-4">歌單目前是空的。<br>AI 將依據外部靈感提示隨機播放。</p>`; return; }
            container.innerHTML = userPlaylist.map((item, index) => `
                <div class="flex items-center justify-between bg-slate-800/50 p-3 rounded-xl border border-indigo-700/30">
                    <div class="flex items-center gap-3 truncate">
                        <span class="text-indigo-500 font-black text-xs w-4">${index + 1}.</span>
                        <p class="text-slate-200 text-sm font-bold truncate">${item}</p>
                    </div>
                    <button onclick="removePlaylist(${index})" class="shrink-0 text-slate-400 hover:text-rose-400 p-2 transition-colors"><i class="fa-solid fa-trash"></i></button>
                </div>`).join('');
        }

        function addManualBlacklist() {
            var input = document.getElementById('manual-bl-input');
            var val = input.value.trim();
            if (val && !userBlacklist.includes(val)) {
                userBlacklist.push(val);
                saveBlacklist();
                input.value = "";
            }
        }
        function removeBlacklist(index) { userBlacklist.splice(index, 1); saveBlacklist(); }
        function renderBlacklist() {
            var container = document.getElementById('blacklist-container');
            if (userBlacklist.length === 0) { container.innerHTML = `<p class="text-center text-slate-500 text-sm py-4">黑名單是空的。</p>`; return; }
            container.innerHTML = userBlacklist.map((item, index) => {
                var displayName = typeof item === 'object' ? (item.title || item.id) : item; 
                return `
                <div class="flex items-center justify-between bg-slate-800/50 p-3 rounded-xl border border-rose-700/30">
                    <p class="text-slate-200 text-sm font-bold truncate pr-2"><i class="fa-solid fa-ban text-rose-500 mr-2 text-xs"></i>${displayName}</p>
                    <button onclick="removeBlacklist(${index})" class="shrink-0 text-slate-400 hover:text-emerald-400 p-2 transition-colors"><i class="fa-solid fa-unlock"></i></button>
                </div>`
            }).join('');
        }

        function renderHistory() {
            var container = document.getElementById('history-container');
            if (playedHistory.length === 0) { container.innerHTML = `<p class="text-center text-slate-500 text-sm py-4">尚無播放紀錄。</p>`; return; }
            container.innerHTML = playedHistory.map(h => `
                <div class="bg-slate-800/50 p-3 rounded-xl border border-cyan-700/30 flex flex-col gap-1">
                    <p class="text-slate-200 text-sm font-bold truncate">${h.title}</p>
                    <div class="flex justify-between items-center text-[10px]">
                        <span class="text-cyan-400">${h.artist}</span>
                        <span class="text-slate-500 font-mono">${h.youtubeId}</span>
                    </div>
                </div>`).join('');
        }

        function blockCurrentSong() {
            if (!currentYoutubeId) return;
            var title = document.getElementById('song-title').textContent;
            if (!userBlacklist.some(item => (item.id === currentYoutubeId || item === title))) {
                userBlacklist.push(title); 
                saveBlacklist();
            }
            triggerNextSongImmediately();
        }

        window.addEventListener('message', (event) => {
            if (event.origin !== 'https://pandapanda6666.github.io') return;
            var data = event.data;
            if (data.type === 'YOUTUBE_ENDED') {
                if (document.getElementById('auto-next-toggle').checked) playNextSongCycle();
            } else if (data.type === 'YOUTUBE_ERROR') {
                console.warn("YouTube Player Error Code:", data.code);
                reportBadLinkAndSkip();
            }
        });

        function playEmbeddedMusic(videoId) {
            currentYoutubeId = videoId;
            document.getElementById('yt-player').src = `https://pandapanda6666.github.io/AI/music/video/?v=${videoId}`;
        }

        function triggerNextSongImmediately() {
            document.getElementById('yt-player').src = ""; 
            playNextSongCycle();
        }

        function reportBadLinkAndSkip() {
            if (currentYoutubeId) reportedBadIds.push(currentYoutubeId);
            triggerNextSongImmediately();
        }

        async function playNextSongCycle() {
            if (nextSongData) {
                applySongData(nextSongData);
                nextSongData = null; 
            } else {
                await generateMusic();
            }
        }

        function applySongData(song) {
            document.getElementById('song-title').textContent = song.title;
            document.getElementById('song-artist').textContent = song.artist;
            document.getElementById('song-tag').innerHTML = `<i class="fa-solid fa-quote-left text-pink-500 mr-1"></i> ${song.tag} <i class="fa-solid fa-quote-right text-pink-500 ml-1"></i>`;

            if (playedHistory.length === 0 || playedHistory[0].youtubeId !== song.youtubeId) {
                playedHistory.unshift({ title: song.title, artist: song.artist, youtubeId: song.youtubeId });
                if (playedHistory.length > 50) playedHistory.pop();
                saveHistory();
            }

            document.getElementById('result-container').classList.remove('hidden');
            playEmbeddedMusic(song.youtubeId);

            if (document.getElementById('auto-next-toggle').checked) {
                prefetchNextSong();
            }
        }

        function triggerSmartPrefetchUpdate() {
            if (document.getElementById('result-container').classList.contains('hidden')) return; 
            nextSongData = null;
            document.getElementById('prefetch-indicator').classList.add('hidden');
            if (document.getElementById('auto-next-toggle').checked) prefetchNextSong();
        }

        async function prefetchNextSong() {
            if (isPrefetching) return;
            isPrefetching = true;
            nextSongData = null;

            var ind = document.getElementById('prefetch-indicator');
            ind.classList.remove('hidden');
            ind.className = "absolute -top-2 right-2 bg-amber-500/20 text-amber-400 text-[10px] font-bold px-2 py-0.5 rounded-full border border-amber-500/30 flex items-center gap-1 z-20";
            ind.querySelector('span:first-child').className = "w-1.5 h-1.5 bg-amber-400 rounded-full animate-ping";
            ind.querySelector('span:last-child').textContent = userPlaylist.length > 0 ? "提取歌單準備中..." : "背景思考隨機推薦...";

            try {
                var isPlaylistMode = userPlaylist.length > 0;
                var targetPrompt = isPlaylistMode ? userPlaylist[0] : promptInput.value;
                
                var song = await fetchGeminiRecommendation(targetPrompt, isPlaylistMode);
                nextSongData = song;
                
                ind.className = "absolute -top-2 right-2 bg-emerald-500/20 text-emerald-400 text-[10px] font-bold px-2 py-0.5 rounded-full border border-emerald-500/30 flex items-center gap-1 z-20 transition-all";
                ind.querySelector('span:first-child').className = "w-1.5 h-1.5 bg-emerald-400 rounded-full shadow-[0_0_5px_#34d399]";
                ind.querySelector('span:last-child').textContent = "下一首已就緒！";
                
                if (isPlaylistMode) {
                    userPlaylist.shift(); 
                    savePlaylist();
                }

            } catch (err) {
                ind.classList.add('hidden');
            } finally {
                isPrefetching = false;
            }
        }

        function cleanJSON(text) {
            if (!text) return "";
            var cleaned = text.trim();
            if (cleaned.startsWith("```")) cleaned = cleaned.replace(/^```[a-zA-Z]*/, "").replace(/```$/, "").trim();
            return cleaned;
        }

        async function fetchGeminiRecommendation(promptText, isSpecificSong) {
            var apiKey = ""; 
            var url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            var prefVal = document.querySelector('input[name="search-pref"]:checked').value;
            var prefQuery = prefVal === "lyrics" ? "中文歌詞版" : prefVal === "live" ? "現場版" : prefVal === "audio" ? "純音訊" : "官方MV";
            
            var playedIds = playedHistory.map(h => h.youtubeId);
            var blockedIdArray = [...reportedBadIds, ...playedIds.slice(0, 30)];
            var blockedKeywords = userBlacklist.map(b => typeof b === 'object' ? (b.title || b.id) : b).join(', ');
            
            var behaviorInstruction = isSpecificSong 
                ? `使用者「點播」了特定歌曲或歌手：「${promptText}」。請你直接去搜尋這首歌的 YouTube 連結！若提示為歌手，請隨機挑他的一首經典歌。`
                : `使用者提供了「情境/靈感/曲風」：「${promptText || '隨機熱門好聽的歌'}」。請根據此情境推薦一首最適合的歌曲。`;

            var systemPrompt = `你是一個世界頂尖的點唱機大腦。
${behaviorInstruction}

請完美達成以下搜尋與回傳限制：
1. 使用 Google Search 尋找「${prefQuery}」的真實 YouTube 影片。
2. 找出 11 字元 Video ID。
【語意黑名單警告】絕對禁止推薦歌名、歌手或關鍵字包含以下內容的歌曲：[${blockedKeywords}]！
【防重複警告】絕對禁止使用以下影片ID：[${blockedIdArray.join(', ')}]！
3. 長度需介於 120 至 500 秒。
4. 回傳格式為嚴格的 JSON：
{ "title":"歌名", "artist":"歌手", "youtubeId":"11碼ID", "tag":"推薦理由(15字內)" }`;

            var response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "請開始搜尋並回傳JSON" }] }],
                    tools: [{ "google_search": {} }], 
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            if (!response.ok) throw new Error("HTTP error");
            var result = await response.json();
            return JSON.parse(cleanJSON(result.candidates?.[0]?.content?.parts?.[0]?.text));
        }

        async function generateMusic() {
            document.getElementById('generate-btn').disabled = true;
            document.getElementById('loading-container').classList.remove('hidden');
            document.getElementById('prefetch-indicator').classList.add('hidden');
            
            var isPlaylistMode = userPlaylist.length > 0;
            var targetPrompt = isPlaylistMode ? userPlaylist[0] : promptInput.value;
            document.getElementById('loading-text').textContent = isPlaylistMode ? `Gemini 正在讀取您的歌單：${targetPrompt}...` : "Gemini 正在為您尋找完美的版本...";

            try {
                var song = await fetchGeminiRecommendation(targetPrompt, isPlaylistMode);
                applySongData(song);
                document.getElementById('result-container').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                
                if (isPlaylistMode) {
                    userPlaylist.shift(); 
                    savePlaylist();
                }
            } catch (err) {
                console.error(err);
                applySongData({ title: "網路異常", artist: "系統", youtubeId: "a2GujJZfALL", tag: "為您播放備用守護金曲" });
            } finally {
                document.getElementById('generate-btn').disabled = false;
                document.getElementById('loading-container').classList.add('hidden');
            }
        }

        initCharacterLimit();
    </script>
