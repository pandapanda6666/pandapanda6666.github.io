<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 隨機音樂點唱機 (需填 API 版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%); min-height: 100vh; }
        .neon-glow-cyan { text-shadow: 0 0 10px rgba(6, 182, 212, 0.6), 0 0 20px rgba(6, 182, 212, 0.4); }
        .neon-border-cyan { box-shadow: 0 0 15px rgba(6, 182, 212, 0.3), inset 0 0 15px rgba(6, 182, 212, 0.2); }
        @keyframes rotate-vinyl { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .vinyl-rotate { animation: rotate-vinyl 12s linear infinite; }
        @keyframes bounce-bar { 0%, 100% { height: 4px; } 50% { height: 40px; } }
        .eq-bar { animation: bounce-bar 1.2s ease-in-out infinite; }
        .eq-bar:nth-child(2) { animation-delay: 0.15s; } .eq-bar:nth-child(3) { animation-delay: 0.3s; } .eq-bar:nth-child(4) { animation-delay: 0.45s; } .eq-bar:nth-child(5) { animation-delay: 0.6s; } .eq-bar:nth-child(6) { animation-delay: 0.25s; } .eq-bar:nth-child(7) { animation-delay: 0.1s; } .eq-bar:nth-child(8) { animation-delay: 0.5s; }
        .toggle-checkbox:checked + .toggle-label { background-color: #06b6d4; }
        .toggle-checkbox:checked + .toggle-label .toggle-dot { transform: translateX(100%); }
        /* 隱藏卷軸 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-100 flex flex-col justify-between p-4 md:p-8">

    <main class="max-w-xl w-full mx-auto my-auto bg-slate-900/80 backdrop-blur-md rounded-3xl p-6 md:p-8 border border-slate-800 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-12 -left-12 w-48 h-48 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-12 -right-12 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <button onclick="window.location.href='index.html'" class="absolute left-0 top-0 text-slate-400 hover:text-white transition-colors text-sm">
                <i class="fa-solid fa-arrow-left"></i> 回首頁
            </button>
            <div class="inline-flex items-center gap-1.5 bg-cyan-500/10 text-cyan-400 text-xs px-3 py-1 rounded-full border border-cyan-500/20 mb-3 font-semibold tracking-wider mt-6 sm:mt-0">
                <i class="fa-solid fa-key"></i> 開發者 API 專屬版
            </div>
            <h1 class="text-3xl md:text-4xl font-black tracking-wider bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent flex items-center justify-center gap-3">
                <i class="fa-solid fa-wand-magic-sparkles text-cyan-400 text-2xl"></i> AI 音樂點唱機
            </h1>
            <p class="text-slate-400 text-sm mt-2 font-light">搭載黑名單與歷史記憶，為您提前思考下一首</p>
        </div>

        <div class="space-y-6 relative z-30">
            <!-- 強制必填 API 欄位 -->
            <div class="bg-rose-950/20 rounded-2xl p-4 border border-rose-500/30">
                <label for="api-key-input" class="block text-xs font-semibold text-rose-400 uppercase tracking-widest mb-2"><i class="fa-solid fa-lock"></i> 必填：請輸入您的 Gemini API Key</label>
                <input type="password" id="api-key-input" placeholder="AI-xxxxxxxxxxxxxxxx..." class="w-full bg-slate-950 border border-rose-500/50 rounded-xl py-3 px-4 text-sm text-slate-100 focus:outline-none focus:border-rose-400 transition-all">
                <p id="api-warning" class="text-[10px] text-rose-500 font-bold mt-2 hidden animate-pulse">請先輸入 API Key 才能執行點歌！</p>
            </div>

            <div>
                <label for="prompt-input" class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2 flex justify-between items-center">
                    <span id="limit-label">輸入靈感提示</span>
                    <span id="char-counter" class="text-cyan-400 font-bold">0/100</span>
                </label>
                <div class="relative">
                    <input type="text" id="prompt-input" placeholder="例如：憂鬱下雨天、熱血狂飆、慵懶咖啡" class="w-full bg-slate-950 border-2 border-slate-800 rounded-2xl py-4 px-5 text-lg text-slate-100 focus:outline-none focus:border-cyan-500 transition-all duration-300" onkeydown="if(event.key === 'Enter') generateMusic()">
                </div>
            </div>

            <div>
                <span class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">優先搜尋類型</span>
                <div class="grid grid-cols-4 gap-2 text-center text-xs">
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="official" checked class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-cyan-500 peer-checked:text-cyan-400 peer-checked:bg-cyan-500/10 transition-all">官方 MV</div></label>
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="lyrics" class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-cyan-500 peer-checked:text-cyan-400 peer-checked:bg-cyan-500/10 transition-all">中文歌詞</div></label>
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="live" class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-cyan-500 peer-checked:text-cyan-400 peer-checked:bg-cyan-500/10 transition-all">現場 Live</div></label>
                    <label class="cursor-pointer"><input type="radio" name="search-pref" value="audio" class="sr-only peer"><div class="p-2.5 rounded-xl border border-slate-800 bg-slate-950/50 text-slate-400 peer-checked:border-cyan-500 peer-checked:text-cyan-400 peer-checked:bg-cyan-500/10 transition-all">純音訊</div></label>
                </div>
            </div>

            <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                <div class="flex flex-wrap gap-2 items-center">
                    <span class="text-xs text-slate-500"><i class="fa-solid fa-tags"></i> 快捷:</span>
                    <button onclick="fillPrompt('工作讀書白噪音')" class="text-xs bg-slate-800/60 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-full border border-slate-700/50">📚 讀書專注</button>
                    <button onclick="fillPrompt('韓國流行')" class="text-xs bg-slate-800/60 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-full border border-slate-700/50">💃 韓國流行</button>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-semibold text-slate-400">自動連播下一首</span>
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" id="auto-next-toggle" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer right-4 focus:outline-none"/>
                        <label for="auto-next-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-700 cursor-pointer"><span class="toggle-dot block h-6 w-6 rounded-full bg-slate-100 transform transition-transform duration-200"></span></label>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-4">
                <button onclick="openHistoryModal()" class="bg-slate-800/80 hover:bg-slate-700 text-slate-300 py-2.5 rounded-xl text-xs font-bold border border-slate-700 transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left"></i> 播放歷史紀錄
                </button>
                <button onclick="openBlacklistModal()" class="bg-rose-950/40 hover:bg-rose-900/60 text-rose-400 py-2.5 rounded-xl text-xs font-bold border border-rose-900/50 transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-ban"></i> 管理黑名單
                </button>
            </div>

            <button id="generate-btn" onclick="generateMusic()" class="w-full bg-gradient-to-r from-cyan-500 via-blue-600 to-indigo-500 text-white font-bold text-lg py-4 rounded-2xl shadow-lg shadow-blue-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3 group">
                <i class="fa-solid fa-compact-disc text-xl animate-spin group-hover:scale-110"></i> <span>驗證並尋找高精準連結！</span>
            </button>
        </div>

        <div id="error-container" class="hidden mt-6 p-4 bg-rose-500/10 border border-rose-500/30 rounded-2xl text-center space-y-2 relative z-10">
            <div class="text-rose-500 text-lg"><i class="fa-solid fa-triangle-exclamation"></i> 推薦失敗</div>
            <p id="error-message" class="text-slate-300 text-sm">請確認您的 API Key 是否正確或額度已滿！</p>
        </div>

        <div id="loading-container" class="hidden mt-8 text-center space-y-4 relative z-10">
            <div class="flex justify-center items-center h-24">
                <div class="relative w-20 h-20 bg-black rounded-full flex items-center justify-center border-4 border-slate-700 vinyl-rotate">
                    <div class="w-8 h-8 bg-cyan-500 rounded-full flex items-center justify-center border-2 border-white"><div class="w-2 h-2 bg-black rounded-full"></div></div>
                </div>
            </div>
            <p id="loading-text" class="text-cyan-400 animate-pulse text-sm">呼叫 Gemini API 運算中...</p>
        </div>

        <div id="result-container" class="hidden mt-8 p-6 bg-slate-950/90 rounded-2xl border border-cyan-500/30 neon-border-cyan relative z-10 text-center space-y-6">
            <div class="flex justify-center relative">
                <div class="relative w-32 h-32 bg-black rounded-full flex items-center justify-center border-8 border-slate-800 vinyl-rotate shadow-xl">
                    <div class="w-12 h-12 bg-cyan-500 rounded-full flex items-center justify-center border-2 border-white"><div class="w-3 h-3 bg-black rounded-full"></div></div>
                </div>
                
                <!-- 背景預載狀態標籤 (Prefetch Indicator) -->
                <div id="prefetch-indicator" class="absolute -top-2 right-2 bg-slate-800/80 text-slate-400 text-[10px] font-bold px-2 py-0.5 rounded-full border border-slate-700 flex items-center gap-1 hidden">
                    <span id="prefetch-dot" class="w-1.5 h-1.5 bg-slate-400 rounded-full"></span>
                    <span id="prefetch-text">等待中</span>
                </div>
            </div>

            <!-- YouTube Proxy 嵌入 -->
            <div class="w-full aspect-video bg-black rounded-xl overflow-hidden border-2 border-slate-700 shadow-lg relative">
                <iframe id="yt-player" class="w-full h-full" src="" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center text-xs text-slate-400 px-1">
                    <span>YouTube 物理播放進度</span>
                    <span id="countdown-text" class="text-cyan-400 font-bold">00:00 / 00:00</span>
                </div>
                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden border border-slate-700">
                    <div id="progress-bar" class="bg-gradient-to-r from-cyan-500 to-blue-400 h-full w-0 transition-all duration-500 ease-linear"></div>
                </div>
            </div>

            <div class="space-y-2 pt-1">
                <h2 id="song-title" class="text-2xl font-extrabold text-white tracking-wide pt-2 neon-glow-cyan">--</h2>
                <p id="song-artist" class="text-blue-400 font-medium text-base">--</p>
                <div id="song-tag" class="text-slate-400 text-xs italic"></div>
            </div>

            <div class="space-y-3 pt-2">
                <button onclick="blockCurrentSong()" class="w-full bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/30 py-3 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-ban"></i> 討厭這首！加入黑名單並跳過
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="reportBadLinkAndSkip()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5">
                        <i class="fa-solid fa-link-slash"></i> 連結壞了/跳過
                    </button>
                    <button onclick="triggerNextSongImmediately()" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 shadow-md shadow-cyan-500/10">
                        <i class="fa-solid fa-forward"></i> 切換下一首
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- 黑名單管理 Modal -->
    <div id="blacklist-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-slate-900 rounded-2xl p-6 w-full max-w-md border border-rose-500/30 shadow-2xl flex flex-col max-h-[85vh]">
            <h3 class="text-xl font-bold text-rose-400 mb-4 flex items-center gap-2"><i class="fa-solid fa-ban"></i> 黑名單管理</h3>
            
            <div class="bg-slate-950 p-3 rounded-xl mb-4 border border-slate-800">
                <p class="text-xs text-slate-400 mb-2">手動新增黑名單 (支援輸入 YouTube 網址或 11 碼 ID)</p>
                <div class="flex gap-2">
                    <input type="text" id="manual-bl-input" placeholder="YouTube URL 或 ID..." class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-rose-500">
                    <button onclick="addManualBlacklist()" class="bg-rose-600 hover:bg-rose-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition-colors">封鎖</button>
                </div>
                <p id="manual-bl-msg" class="text-[10px] text-rose-400 mt-1 hidden"></p>
            </div>

            <div class="flex-1 overflow-y-auto pr-1 space-y-2" id="blacklist-container">
                <!-- 內容由 JS 產生 -->
            </div>
            
            <button onclick="closeModals()" class="mt-5 w-full bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-bold transition-all">關閉</button>
        </div>
    </div>

    <!-- 播放紀錄 Modal -->
    <div id="history-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-slate-900 rounded-2xl p-6 w-full max-w-md border border-cyan-500/30 shadow-2xl flex flex-col max-h-[85vh]">
            <h3 class="text-xl font-bold text-cyan-400 mb-4 flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left"></i> 播放紀錄</h3>
            
            <div class="flex-1 overflow-y-auto pr-1 space-y-2" id="history-container">
                <!-- 內容由 JS 產生 -->
            </div>
            
            <button onclick="closeModals()" class="mt-5 w-full bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-bold transition-all">關閉</button>
        </div>
    </div>

    <script>
        const MAX_CHAR_LIMIT = 100; 
        
        // 讀取 LocalStorage 資料庫
        let userBlacklist = JSON.parse(localStorage.getItem('ai_music_blacklist') || '[]');
        let playedHistory = JSON.parse(localStorage.getItem('ai_music_history') || '[]');
        
        let playedSongIds = playedHistory.map(item => item.youtubeId); 
        let reportedBadIds = [];
        
        let currentYoutubeId = "";
        let nextSongData = null;
        let isPrefetching = false;

        const promptInput = document.getElementById('prompt-input');
        const charCounter = document.getElementById('char-counter');

        function initCharacterLimit() {
            promptInput.maxLength = MAX_CHAR_LIMIT;
            updateCounter(promptInput.value.length);
        }
        function updateCounter(length) {
            charCounter.textContent = `${length}/${MAX_CHAR_LIMIT}`;
            charCounter.className = length >= MAX_CHAR_LIMIT ? "text-rose-500 font-bold animate-bounce" : "text-cyan-400 font-bold";
        }
        function fillPrompt(text) { 
            promptInput.value = text.substring(0, MAX_CHAR_LIMIT); 
            updateCounter(promptInput.value.length); 
        }

        function saveBlacklist() { localStorage.setItem('ai_music_blacklist', JSON.stringify(userBlacklist)); }
        function saveHistory() { localStorage.setItem('ai_music_history', JSON.stringify(playedHistory)); }

        function openBlacklistModal() {
            renderBlacklist();
            document.getElementById('blacklist-modal').classList.remove('hidden');
        }
        function openHistoryModal() {
            renderHistory();
            document.getElementById('history-modal').classList.remove('hidden');
        }
        function closeModals() {
            document.getElementById('blacklist-modal').classList.add('hidden');
            document.getElementById('history-modal').classList.add('hidden');
        }

        // 解析 YouTube 網址取得 11 碼 ID
        function extractYtId(input) {
            const match = input.match(/(?:v=|\/|youtu\.be\/)([0-9A-Za-z_-]{11})/);
            return match ? match[1] : input.trim();
        }

        function addManualBlacklist() {
            const inputEl = document.getElementById('manual-bl-input');
            const msgEl = document.getElementById('manual-bl-msg');
            const rawVal = inputEl.value;
            const extractedId = extractYtId(rawVal);

            if (extractedId.length !== 11) {
                msgEl.textContent = "無法辨識有效的 YouTube ID 或網址！";
                msgEl.classList.remove('hidden');
                return;
            }

            if (!userBlacklist.some(b => b.id === extractedId)) {
                userBlacklist.push({ id: extractedId, title: "手動新增封鎖", artist: "未知" });
                saveBlacklist();
                inputEl.value = "";
                msgEl.classList.add('hidden');
                renderBlacklist();
            } else {
                msgEl.textContent = "此 ID 已經在黑名單中了！";
                msgEl.classList.remove('hidden');
            }
        }

        function removeBlacklist(id) {
            userBlacklist = userBlacklist.filter(b => b.id !== id);
            saveBlacklist();
            renderBlacklist();
        }

        function renderBlacklist() {
            const container = document.getElementById('blacklist-container');
            if (userBlacklist.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 text-sm py-4">您的黑名單目前是空的。</p>`;
                return;
            }
            container.innerHTML = userBlacklist.map(b => `
                <div class="flex items-center justify-between bg-slate-800/50 p-3 rounded-xl border border-slate-700/50">
                    <div class="truncate pr-2">
                        <p class="text-slate-200 text-sm font-bold truncate">${b.title}</p>
                        <p class="text-slate-500 text-[10px] uppercase font-mono mt-0.5">${b.id}</p>
                    </div>
                    <button onclick="removeBlacklist('${b.id}')" class="shrink-0 text-slate-400 hover:text-rose-400 p-2 transition-colors" title="解除封鎖">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            if (playedHistory.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 text-sm py-4">尚無播放紀錄。</p>`;
                return;
            }
            container.innerHTML = playedHistory.map(h => `
                <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700/50 flex justify-between items-center">
                    <div class="truncate">
                        <p class="text-slate-200 text-sm font-bold truncate">${h.title}</p>
                        <p class="text-slate-400 text-[11px] mt-0.5">${h.artist}</p>
                    </div>
                    <span class="shrink-0 bg-slate-700 text-slate-300 text-[10px] px-2 py-1 rounded-full font-mono ml-2">${h.youtubeId}</span>
                </div>
            `).join('');
        }

        function blockCurrentSong() {
            if (!currentYoutubeId) return;
            const title = document.getElementById('song-title').textContent;
            const artist = document.getElementById('song-artist').textContent;
            if (!userBlacklist.some(item => item.id === currentYoutubeId)) {
                userBlacklist.push({ id: currentYoutubeId, title: title, artist: artist });
                saveBlacklist();
            }
            triggerNextSongImmediately();
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // 接收 iframe Proxy 訊息
        window.addEventListener('message', (event) => {
            if (event.origin !== 'https://pandapanda6666.github.io') return;
            const data = event.data;
            if (data.type === 'YOUTUBE_DURATION') {
                updatePlaybackUI(0, data.duration);
            } else if (data.type === 'YOUTUBE_PROGRESS') {
                updatePlaybackUI(data.currentTime, data.duration);
            } else if (data.type === 'YOUTUBE_ENDED') {
                onPlaybackEnded();
            } else if (data.type === 'YOUTUBE_ERROR') {
                console.warn("偵測到影片失效，自動切換...");
                reportBadLinkAndSkip();
            }
        });

        function updatePlaybackUI(currentTime, duration) {
            document.getElementById('countdown-text').textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;
            const percent = duration > 0 ? Math.min((currentTime / duration) * 100, 100) : 0;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        function onPlaybackEnded() {
            if (document.getElementById('auto-next-toggle').checked) playNextSongCycle();
        }

        function playEmbeddedMusic(videoId) {
            currentYoutubeId = videoId;
            document.getElementById('yt-player').src = `https://pandapanda6666.github.io/AI/music/video/?v=${videoId}`;
            updatePlaybackUI(0, 0);
        }

        function triggerNextSongImmediately() {
            document.getElementById('yt-player').src = ""; 
            playNextSongCycle();
        }

        function reportBadLinkAndSkip() {
            if (currentYoutubeId) reportedBadIds.push(currentYoutubeId);
            triggerNextSongImmediately();
        }

        async function playNextSongCycle() {
            if (nextSongData) {
                applySongData(nextSongData);
                nextSongData = null; // 清空預載
            } else {
                await generateMusic();
            }
        }

        function applySongData(song) {
            document.getElementById('song-title').textContent = song.title;
            document.getElementById('song-artist').textContent = song.artist;
            document.getElementById('song-tag').innerHTML = `<i class="fa-solid fa-quote-left text-cyan-500 mr-1"></i> ${song.tag} <i class="fa-solid fa-quote-right text-cyan-500 ml-1"></i>`;

            // 更新播放歷史紀錄
            if (!playedSongIds.includes(song.youtubeId)) {
                playedSongIds.push(song.youtubeId);
                playedHistory.unshift({ title: song.title, artist: song.artist, youtubeId: song.youtubeId });
                if (playedHistory.length > 50) playedHistory.pop();
                saveHistory();
            }

            document.getElementById('result-container').classList.remove('hidden');
            playEmbeddedMusic(song.youtubeId);

            // 啟動預載
            if (document.getElementById('auto-next-toggle').checked) {
                prefetchNextSong();
            }
        }

        // 核心：提前想好下一首歌
        async function prefetchNextSong() {
            if (isPrefetching) return;
            isPrefetching = true;
            nextSongData = null;

            const ind = document.getElementById('prefetch-indicator');
            const dot = document.getElementById('prefetch-dot');
            const txt = document.getElementById('prefetch-text');
            
            ind.classList.remove('hidden');
            ind.className = "absolute -top-2 right-2 bg-amber-500/20 text-amber-400 text-[10px] font-bold px-2 py-0.5 rounded-full border border-amber-500/30 flex items-center gap-1 z-20";
            dot.className = "w-1.5 h-1.5 bg-amber-400 rounded-full animate-ping";
            txt.textContent = "背景思考下一首...";

            try {
                let song = await fetchGeminiRecommendation(promptInput.value);
                const isBlocked = userBlacklist.some(b => b.id === song.youtubeId);
                if (!isBlocked && !playedSongIds.includes(song.youtubeId)) {
                    nextSongData = song;
                    ind.className = "absolute -top-2 right-2 bg-emerald-500/20 text-emerald-400 text-[10px] font-bold px-2 py-0.5 rounded-full border border-emerald-500/30 flex items-center gap-1 z-20 transition-all";
                    dot.className = "w-1.5 h-1.5 bg-emerald-400 rounded-full shadow-[0_0_5px_#34d399]";
                    txt.textContent = "下一首已就緒！";
                } else {
                    throw new Error("Prefetch hit blacklist.");
                }
            } catch (err) {
                ind.classList.add('hidden'); // 若 API 版預載失敗，直接隱藏讓它下一次走正常流程
            } finally {
                isPrefetching = false;
            }
        }

        function cleanJSON(text) {
            if (!text) return "";
            let cleaned = text.trim();
            if (cleaned.startsWith("```")) cleaned = cleaned.replace(/^```[a-zA-Z]*/, "").replace(/```$/, "").trim();
            return cleaned;
        }

        async function fetchGeminiRecommendation(promptText) {
            const apiKey = document.getElementById('api-key-input').value.trim();
            if (!apiKey) throw new Error("Missing API Key");

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prefVal = document.querySelector('input[name="search-pref"]:checked').value;
            let prefQuery = prefVal === "lyrics" ? "中文歌詞版" : prefVal === "live" ? "現場版" : prefVal === "audio" ? "純音訊" : "官方MV";
            
            const blockedIdArray = [...userBlacklist.map(i => i.id), ...reportedBadIds, ...playedSongIds];
            
            const systemPrompt = `推薦一首YouTube歌曲。搜尋「${prefQuery}」。
找出 11 字元 Video ID。絕對禁止使用以下ID: [${blockedIdArray.join(', ')}].
在durationRaw放入看見的時間(如"3:51")，並在durationSeconds強制換算成秒數(3*60+51=231)。長度限120~400秒。
回傳格式JSON: { "title":"", "artist":"", "youtubeId":"", "durationRaw":"", "durationSeconds":231, "tag":"" }`;

            const finalPrompt = promptText.trim() || "隨機好聽的歌";
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: finalPrompt }] }],
                    tools: [{ "google_search": {} }], 
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            if (!response.ok) throw new Error("HTTP error");
            const result = await response.json();
            return JSON.parse(cleanJSON(result.candidates?.[0]?.content?.parts?.[0]?.text));
        }

        async function generateMusic() {
            // API 版專屬阻擋邏輯
            const apiKey = document.getElementById('api-key-input').value.trim();
            if (!apiKey) {
                const warning = document.getElementById('api-warning');
                warning.classList.remove('hidden');
                setTimeout(() => warning.classList.add('hidden'), 3000);
                return;
            }

            document.getElementById('generate-btn').disabled = true;
            document.getElementById('loading-container').classList.remove('hidden');
            document.getElementById('error-container').classList.add('hidden');
            document.getElementById('prefetch-indicator').classList.add('hidden');

            try {
                let song = await fetchGeminiRecommendation(promptInput.value);
                if (userBlacklist.some(item => item.id === song.youtubeId)) throw new Error("Blacklisted");
                applySongData(song);
                document.getElementById('result-container').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } catch (err) {
                document.getElementById('error-container').classList.remove('hidden');
            } finally {
                document.getElementById('generate-btn').disabled = false;
                document.getElementById('loading-container').classList.add('hidden');
            }
        }

        initCharacterLimit();
    </script>
</body>
</html>
