<!-- 請記得將此網頁的網址，加入伺服器管理面板的 CORS 授權網域白名單中，否則會無法連線 -->
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Messages</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #f0f2f5;
      --panel: #ffffff;
      --line: #e4e6eb;
      --text: #050505;
      --muted: #65676b;
      --blue: #0084ff;
      --blue-dark: #006bd6;
      --green: #31a24c;
      --danger: #ef4444;
      --bubble: #e4e6eb;
      --shadow: 0 8px 28px rgba(0, 0, 0, .08);
      font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 280px;
      background: var(--panel);
    }

    .sidebar,
    .details {
      min-width: 0;
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
    }

    .details {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    .side-header,
    .chat-header,
    .details-header {
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .96);
    }

    .side-header {
      justify-content: space-between;
    }

    .brand {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #f0f2f5;
      color: #1c1e21;
      display: inline-grid;
      place-items: center;
      font-weight: 700;
    }

    .icon-btn:hover,
    .login-btn:hover,
    .send-btn:hover { filter: brightness(.97); }

    .search {
      padding: 12px 16px;
    }

    .search input {
      width: 100%;
      height: 40px;
      border: 0;
      border-radius: 20px;
      background: #f0f2f5;
      padding: 0 16px;
      outline: none;
      color: var(--text);
    }

    .thread-list {
      overflow: auto;
      padding: 0 8px 12px;
    }

    .thread {
      width: 100%;
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      border-radius: 10px;
      background: transparent;
      text-align: left;
      color: var(--text);
    }

    .thread.active,
    .thread:hover { background: #f0f2f5; }

    .avatar,
    .small-avatar {
      border-radius: 50%;
      background: linear-gradient(135deg, #0084ff, #31a24c);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .avatar { width: 56px; height: 56px; font-size: 22px; }
    .small-avatar { width: 40px; height: 40px; font-size: 16px; }
    .avatar img,
    .small-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thread-name,
    .chat-name {
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .thread-preview,
    .status-line {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 3px;
    }

    .thread-time {
      color: var(--muted);
      font-size: 12px;
      align-self: start;
      padding-top: 4px;
    }

    .chat {
      min-width: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    .chat-header {
      justify-content: space-between;
    }

    .chat-person {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-actions {
      display: flex;
      gap: 8px;
    }

    .login-btn {
      min-height: 38px;
      border-radius: 20px;
      padding: 0 14px;
      background: #e7f3ff;
      color: var(--blue-dark);
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .connection {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #bcc0c4;
    }

    .dot.online { background: var(--green); }
    .dot.error { background: var(--danger); }

    .messages {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 18px 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .day {
      align-self: center;
      color: var(--muted);
      font-size: 12px;
      margin: 10px 0;
    }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin: 2px 0;
    }

    .message-row.mine {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(560px, 72%);
      padding: 9px 12px;
      border-radius: 18px;
      background: var(--bubble);
      color: var(--text);
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .mine .bubble {
      background: var(--blue);
      color: #fff;
    }

    .sender {
      color: var(--muted);
      font-size: 12px;
      margin: 8px 0 2px 48px;
    }

    .mine + .message-row:not(.mine),
    .message-row:not(.mine) + .mine {
      margin-top: 8px;
    }

    .composer {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: end;
      gap: 8px;
      padding: 12px 14px 14px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .composer textarea {
      min-height: 40px;
      max-height: 120px;
      resize: none;
      border: 0;
      outline: none;
      border-radius: 20px;
      background: #f0f2f5;
      padding: 10px 14px;
      line-height: 1.35;
      overflow: auto;
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
    }

    .details-body {
      overflow: auto;
      padding: 20px 18px;
      text-align: center;
    }

    .details .avatar {
      width: 86px;
      height: 86px;
      margin: 4px auto 12px;
      font-size: 32px;
    }

    .section-title {
      margin: 28px 0 10px;
      color: var(--muted);
      font-size: 13px;
      text-align: left;
      font-weight: 700;
    }

    .people {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
    }

    .person {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 10px;
      background: #f7f8fa;
    }

    .system-bar {
      min-height: 34px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      background: #fff4d6;
      color: #7c4a03;
      border-bottom: 1px solid #ffe4a3;
      font-size: 13px;
      text-align: center;
    }

    .system-bar.show { display: flex; }

    .copyright {
      margin-top: 28px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .copyright a {
      color: var(--blue-dark);
      text-decoration: none;
      font-weight: 700;
    }

    .hidden-code {
      display: none;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 300px minmax(0, 1fr);
      }
      .details { display: none; }
    }

    @media (max-width: 720px) {
      body { overflow: auto; }
      .app {
        height: 100dvh;
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
      .chat {
        height: 100dvh;
      }
      .chat-header {
        min-height: 58px;
        padding: 8px 10px;
      }
      .chat-actions {
        gap: 4px;
      }
      .connection span:last-child {
        display: none;
      }
      .login-btn {
        max-width: 128px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .messages {
        padding: 14px 10px 10px;
      }
      .bubble {
        max-width: 82%;
      }
    }
  </style>
</head>
<body>
  <div id="systemBar" class="system-bar"></div>
  <main class="app" aria-label="Messages">
    <aside class="sidebar">
      <header class="side-header">
        <div class="brand">Messages</div>
        <button class="icon-btn" id="newChatBtn" title="新增對話">+</button>
      </header>
      <div class="search">
        <input id="searchInput" type="search" placeholder="搜尋 Messenger">
      </div>
      <nav class="thread-list" id="threadList" aria-label="對話列表"></nav>
    </aside>

    <section class="chat">
      <header class="chat-header">
        <div class="chat-person">
          <div class="small-avatar" id="roomAvatar">M</div>
          <div class="chat-copy">
            <div class="chat-name" id="roomTitle">Messages</div>
            <div class="status-line" id="roomStatus">訪客與登入使用者皆可即時聊天</div>
          </div>
        </div>
        <div class="chat-actions">
          <div class="connection" title="連線狀態"><span class="dot" id="connDot"></span><span id="connText">連線中</span></div>
          <button class="login-btn" id="loginBtn">登入 / 註冊</button>
        </div>
      </header>

      <div class="messages" id="messages" aria-live="polite"></div>

      <form class="composer" id="composer">
        <button class="icon-btn" type="button" id="clearBtn" title="清除本機畫面">⌫</button>
        <textarea id="messageInput" rows="1" placeholder="Aa" autocomplete="off"></textarea>
        <button class="send-btn" type="submit" title="送出">›</button>
      </form>
    </section>

    <aside class="details">
      <header class="details-header">
        <strong>聊天室資訊</strong>
      </header>
      <div class="details-body">
        <div class="avatar" id="detailsAvatar">M</div>
        <h2 id="detailsTitle">Messages</h2>
        <p class="status-line" id="detailsSubtitle">雲端同步聊天室</p>
        <div class="section-title">目前在線</div>
        <div class="people" id="peopleList"></div>
        <div class="section-title">雲端資料</div>
        <div class="people">
          <div class="person"><div class="small-avatar">S</div><div><strong id="saveState">等待同步</strong><div class="status-line">訊息會儲存在伺服器</div></div></div>
        </div>
        <p class="copyright">版權所有 © 2026 <a href="https://pandapanda6666.github.io" target="_blank" rel="noopener">PandaPanda的AI日常</a> All Rights Reserved.</p>
      </div>
    </aside>
  </main>

  <script>
    const originalWarn = console.warn;
    console.warn = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
        originalWarn.apply(console, args);
    };
    window.onerror = function(msg, url, line) {
        if (typeof socket !== 'undefined' && socket.connected) socket.emit('logError', { errorMsg: msg, url: url, line: line });
    };
    window.addEventListener('unhandledrejection', function(event) {
        if (typeof socket !== 'undefined' && socket.connected) socket.emit('logError', { errorMsg: 'Promise異常: ' + (event.reason ? event.reason.message || event.reason : '未知錯誤'), url: window.location.href, line: 0 });
    });

    const APP_ID = 'pandapanda_messages_chat';
    const ROOM_ID = 'pandapanda_messages_chat_room';
    let socket;
    let currentUser = {
      username: 'guest-' + Math.random().toString(36).slice(2, 8),
      nickname: '訪客',
      avatar: ''
    };
    let messages = [];
    let allPlayers = {};
    let activeThreadId = 'main';

    const demoThreads = [
      { id: 'main', name: 'Messages', preview: '即時多人連線聊天室', time: '現在', initial: 'M' },
      { id: 'cloud', name: '雲端存檔', preview: '訊息會同步到伺服器', time: '同步', initial: 'S' },
      { id: 'sso', name: 'PandaPanda SSO', preview: '可登入也可訪客使用', time: 'SSO', initial: 'P' }
    ];

    const els = {
      systemBar: document.getElementById('systemBar'),
      threadList: document.getElementById('threadList'),
      searchInput: document.getElementById('searchInput'),
      roomAvatar: document.getElementById('roomAvatar'),
      roomTitle: document.getElementById('roomTitle'),
      roomStatus: document.getElementById('roomStatus'),
      messages: document.getElementById('messages'),
      composer: document.getElementById('composer'),
      messageInput: document.getElementById('messageInput'),
      clearBtn: document.getElementById('clearBtn'),
      newChatBtn: document.getElementById('newChatBtn'),
      loginBtn: document.getElementById('loginBtn'),
      connDot: document.getElementById('connDot'),
      connText: document.getElementById('connText'),
      peopleList: document.getElementById('peopleList'),
      saveState: document.getElementById('saveState'),
      detailsAvatar: document.getElementById('detailsAvatar'),
      detailsTitle: document.getElementById('detailsTitle'),
      detailsSubtitle: document.getElementById('detailsSubtitle')
    };

    boot();

    async function boot() {
      renderThreads(demoThreads);
      bindUI();
      applyLoginFromUrl();
      updateLoginButton();
      seedEmptyState();
      await connectServer();
    }

    function bindUI() {
      els.composer.addEventListener('submit', sendMessage);
      els.messageInput.addEventListener('input', autoResizeInput);
      els.messageInput.addEventListener('keydown', event => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          els.composer.requestSubmit();
        }
      });
      els.clearBtn.addEventListener('click', () => {
        renderMessages([]);
        showNotice('已清除目前畫面，雲端資料未刪除');
      });
      els.newChatBtn.addEventListener('click', () => {
        els.messageInput.focus();
        logApp('使用者建立新對話');
      });
      els.searchInput.addEventListener('input', () => {
        const term = els.searchInput.value.trim().toLowerCase();
        renderThreads(demoThreads.filter(t => !term || t.name.toLowerCase().includes(term) || t.preview.toLowerCase().includes(term)));
      });
      els.loginBtn.addEventListener('click', () => {
        const suffix = currentUser.isLoggedIn ? '' : '&require=1';
        window.location.href = 'https://pandapanda6666.github.io/login-hub/?from=' + encodeURIComponent(window.location.href) + suffix;
      });
    }

    function applyLoginFromUrl() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('auth') === 'true') {
        const user = params.get('user') || currentUser.username;
        currentUser.username = user;
        currentUser.nickname = user;
        currentUser.isLoggedIn = true;
        history.replaceState({}, document.title, window.location.pathname + window.location.hash);
      }
    }

    function updateLoginButton() {
      els.loginBtn.textContent = currentUser.isLoggedIn ? currentUser.nickname : '登入 / 註冊';
      els.loginBtn.title = currentUser.isLoggedIn ? '查看個人資料' : '登入或註冊';
    }

    async function resolveServerUrl() {
      const params = new URLSearchParams(window.location.search);
      const fromUrl = params.get('server');
      if (fromUrl) return fromUrl;
      const response = await fetch('https://pandapanda6666.github.io/login-hub/server_url.txt', { cache: 'no-store' });
      if (!response.ok) throw new Error('server_url.txt 讀取失敗');
      const serverUrl = (await response.text()).trim();
      if (!serverUrl || /localhost|127\.0\.0\.1|:3000\b/i.test(serverUrl)) throw new Error('伺服器網址不合法');
      return serverUrl;
    }

    async function connectServer() {
      try {
        const serverUrl = await resolveServerUrl();
        socket = io(serverUrl, { transports: ['websocket'] });
        registerSocketEvents();
      } catch (err) {
        setConnection('error', '連線失敗');
        document.body.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; min-height:100vh; padding:24px; background-color:#1e293b; color:#f8fafc; font-family:sans-serif; font-size:24px; font-weight:bold; text-align:center;">伺服器連線失敗，請稍後再試</div>';
      }
    }

    function registerSocketEvents() {
      socket.on('connect', () => {
        setConnection('online', '已連線');
        socket.emit('initClientInfo', { location: '未知地點', device: navigator.userAgent });
        if (currentUser.isLoggedIn) socket.emit('requestProfile', { username: currentUser.username });
        socket.emit('joinGameRoom', {
          room: ROOM_ID,
          characterData: {
            appType: 'chat',
            nickname: currentUser.nickname,
            avatar: currentUser.avatar,
            lastActive: Date.now()
          }
        });
        socket.emit('getAppData', { appId: APP_ID }, (res) => {
          const data = res && (res.data || res);
          if (data && Array.isArray(data.messages)) {
            messages = data.messages.slice(-200);
            renderMessages(messages);
            updateThreadPreview();
            els.saveState.textContent = '已載入雲端資料';
          } else {
            els.saveState.textContent = '雲端目前沒有資料';
          }
        });
        logApp(currentUser.nickname + ' 進入聊天室');
      });

      socket.on('disconnect', () => {
        setConnection('', '已離線');
      });

      socket.on('connect_error', () => {
        setConnection('error', '連線錯誤');
      });

      socket.on('illegalWebpage', () => {
        document.body.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:100vh; background-color:#1e293b; color:#ef4444; font-family:sans-serif; font-size:24px; font-weight:bold;">此為違法網頁 已封鎖</div>';
      });

      socket.on('profileData', (data) => {
        if (!data) return;
        currentUser.avatar = data.avatar || currentUser.avatar;
        currentUser.nickname = data.nickname || currentUser.nickname;
        currentUser.isLoggedIn = true;
        updateLoginButton();
        refreshSelfInRoom();
      });

      socket.on('playerJoined', (data) => {
        allPlayers = data && data.allPlayers ? data.allPlayers : allPlayers;
        renderPeople(allPlayers);
      });

      socket.on('playerLeft', (data) => {
        if (data && data.id && allPlayers[data.id]) delete allPlayers[data.id];
        renderPeople(allPlayers);
      });

      socket.on('playerStateUpdated', (data) => {
        if (data && data.id) {
          allPlayers[data.id] = Object.assign({}, allPlayers[data.id] || {}, data);
          renderPeople(allPlayers);
        }
      });

      socket.on('appData', (data) => {
        if (!data || data.room !== ROOM_ID) return;
        if (data.action === 'chatMessage' && data.message && !messages.some(msg => msg.id === data.message.id)) {
          messages.push(data.message);
          messages = messages.slice(-200);
          renderMessages(messages);
          updateThreadPreview();
          saveCloud();
        }
        if (data.action === 'forceReplaceMessages' && Array.isArray(data.messages)) {
          messages = data.messages.slice(-200);
          renderMessages(messages);
          updateThreadPreview();
        }
      });
    }

    function sendMessage(event) {
      event.preventDefault();
      const text = els.messageInput.value.trim();
      if (!text) return;
      const message = {
        id: Date.now() + '-' + Math.random().toString(36).slice(2),
        username: currentUser.username,
        nickname: currentUser.nickname,
        avatar: currentUser.avatar,
        text,
        createdAt: new Date().toISOString()
      };
      messages.push(message);
      messages = messages.slice(-200);
      renderMessages(messages);
      updateThreadPreview();
      els.messageInput.value = '';
      autoResizeInput();
      if (socket && socket.connected) {
        socket.emit('appData', { room: ROOM_ID, action: 'chatMessage', message });
        socket.emit('syncPlayerState', { typing: false, lastMessageAt: message.createdAt, nickname: currentUser.nickname, avatar: currentUser.avatar });
        saveCloud();
        logApp(currentUser.nickname + ' 發送了一則訊息');
      } else {
        showNotice('目前離線，訊息暫時只顯示在本機畫面');
      }
    }

    function saveCloud() {
      if (!socket || !socket.connected) return;
      socket.emit('saveAppData', {
        appId: APP_ID,
        data: {
          messages: messages.slice(-200),
          updatedAt: new Date().toISOString()
        }
      });
      els.saveState.textContent = '已同步雲端';
    }

    function logApp(message, type = 'info') {
      if (socket && socket.connected) socket.emit('logAppMessage', { appId: APP_ID, message, type });
    }

    function refreshSelfInRoom() {
      if (!socket || !socket.connected) return;
      socket.emit('syncPlayerState', {
        nickname: currentUser.nickname,
        avatar: currentUser.avatar,
        lastActive: Date.now()
      });
    }

    function renderThreads(threads) {
      els.threadList.innerHTML = threads.map(thread => `
        <button class="thread ${thread.id === activeThreadId ? 'active' : ''}" data-id="${thread.id}">
          <div class="avatar">${thread.initial}</div>
          <div>
            <div class="thread-name">${escapeHtml(thread.name)}</div>
            <div class="thread-preview" data-preview="${thread.id}">${escapeHtml(thread.preview)}</div>
          </div>
          <div class="thread-time">${escapeHtml(thread.time)}</div>
        </button>
      `).join('');
      els.threadList.querySelectorAll('.thread').forEach(btn => {
        btn.addEventListener('click', () => {
          activeThreadId = btn.dataset.id;
          renderThreads(threads);
          els.messageInput.focus();
        });
      });
    }

    function seedEmptyState() {
      if (messages.length) return;
      messages = [{
        id: 'welcome',
        username: 'system',
        nickname: 'Messages',
        avatar: '',
        text: '歡迎來到即時聊天室。登入後會套用 PandaPanda SSO 個人資料，訪客也可以直接連線聊天。',
        createdAt: new Date().toISOString()
      }];
      renderMessages(messages);
    }

    function renderMessages(list) {
      els.messages.innerHTML = '<div class="day">今天</div>' + list.map((msg, index) => {
        const mine = msg.username === currentUser.username;
        const prev = list[index - 1];
        const showSender = !mine && (!prev || prev.username !== msg.username);
        const avatar = avatarMarkup(msg.avatar, msg.nickname || 'U', 'small-avatar');
        return `
          ${showSender ? `<div class="sender">${escapeHtml(msg.nickname || '訪客')}</div>` : ''}
          <div class="message-row ${mine ? 'mine' : ''}">
            ${mine ? '' : avatar}
            <div class="bubble" title="${formatTime(msg.createdAt)}">${escapeHtml(msg.text)}</div>
          </div>
        `;
      }).join('');
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function renderPeople(players) {
      const entries = Object.entries(players || {});
      if (!entries.length) {
        els.peopleList.innerHTML = '<div class="status-line">等待其他使用者加入</div>';
        return;
      }
      els.peopleList.innerHTML = entries.map(([id, player]) => {
        const data = player.characterData || player;
        const name = data.nickname || player.nickname || '線上使用者';
        const avatar = data.avatar || player.avatar || '';
        return `<div class="person">${avatarMarkup(avatar, name, 'small-avatar')}<div><strong>${escapeHtml(name)}</strong><div class="status-line">在線</div></div></div>`;
      }).join('');
    }

    function updateThreadPreview() {
      const last = messages[messages.length - 1];
      const preview = document.querySelector('[data-preview="main"]');
      if (preview && last) preview.textContent = (last.nickname || '使用者') + ': ' + last.text;
    }

    function setConnection(status, text) {
      els.connDot.className = 'dot ' + status;
      els.connText.textContent = text;
    }

    function showNotice(text) {
      els.systemBar.textContent = text;
      els.systemBar.classList.add('show');
      window.clearTimeout(showNotice.timer);
      showNotice.timer = window.setTimeout(() => els.systemBar.classList.remove('show'), 2600);
    }

    function autoResizeInput() {
      els.messageInput.style.height = '40px';
      els.messageInput.style.height = Math.min(120, els.messageInput.scrollHeight) + 'px';
    }

    function avatarMarkup(src, name, className) {
      const initial = (name || 'U').trim().slice(0, 1).toUpperCase();
      if (src) return `<div class="${className}"><img src="${escapeAttr(src)}" alt=""></div>`;
      return `<div class="${className}">${escapeHtml(initial)}</div>`;
    }

    function formatTime(value) {
      try {
        return new Intl.DateTimeFormat('zh-Hant', { hour: '2-digit', minute: '2-digit' }).format(new Date(value));
      } catch (err) {
        return '';
      }
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }
  </script>

  <script type="text/plain" id="python-dashboard-code">
# PandaPanda Messages Chat 管理面板
def init_dashboard(parent_frame, app_id, api_url):
    import tkinter as tk
    from tkinter import ttk, messagebox
    import requests

    root = ttk.Frame(parent_frame, padding=12)
    root.pack(fill="both", expand=True)

    title = ttk.Label(root, text="Messages 聊天室管理", font=("Microsoft JhengHei UI", 14, "bold"))
    title.pack(anchor="w")

    status_var = tk.StringVar(value="尚未讀取資料")
    count_var = tk.StringVar(value="訊息數：0")
    ttk.Label(root, textvariable=status_var).pack(anchor="w", pady=(8, 0))
    ttk.Label(root, textvariable=count_var).pack(anchor="w")

    box = tk.Text(root, height=12, wrap="word")
    box.pack(fill="both", expand=True, pady=10)

    def load_data():
        try:
            res = requests.get(f"{api_url}/apps", timeout=8)
            res.raise_for_status()
            data = res.json().get("apps", {}).get(app_id, {}).get("data", {})
            messages = data.get("messages", [])
            box.delete("1.0", "end")
            for item in messages[-50:]:
                box.insert("end", f"{item.get('nickname', '使用者')}: {item.get('text', '')}\n")
            count_var.set(f"訊息數：{len(messages)}")
            status_var.set("已讀取雲端資料")
        except Exception as exc:
            messagebox.showerror("讀取失敗", str(exc))
            status_var.set("讀取失敗")

    def clear_messages():
        if not messagebox.askyesno("確認", "要清空這個聊天室的雲端訊息嗎？"):
            return
        try:
            payload = {"appId": app_id, "data": {"messages": [], "updatedAt": ""}}
            res = requests.post(f"{api_url}/apps/update", json=payload, timeout=8)
            res.raise_for_status()
            box.delete("1.0", "end")
            count_var.set("訊息數：0")
            status_var.set("已清空並同步")
        except Exception as exc:
            messagebox.showerror("更新失敗", str(exc))
            status_var.set("更新失敗")

    buttons = ttk.Frame(root)
    buttons.pack(fill="x")
    ttk.Button(buttons, text="重新讀取", command=load_data).pack(side="left")
    ttk.Button(buttons, text="清空雲端訊息", command=clear_messages).pack(side="left", padx=8)

    load_data()
  </script>
