<!-- 
  【開發者提醒】
  請記得將此網頁的網址，加入伺服器管理面板的 CORS 授權網域白名單中，否則會無法連線。
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時聊天室</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- 引入 Font Awesome 供圖示使用 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 隱藏捲軸但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 跑馬燈動畫 */
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            animation: marquee 15s linear infinite;
        }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col overflow-hidden font-sans">

    <!-- 全域錯誤與連線覆蓋層 -->
    <div id="error-overlay" class="fixed inset-0 z-50 bg-black bg-opacity-90 flex items-center justify-center hidden">
        <div class="bg-red-900 border border-red-500 rounded-lg p-6 max-w-sm text-center shadow-2xl">
            <i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4"></i>
            <h2 class="text-xl font-bold mb-2">發生錯誤</h2>
            <p id="error-text" class="text-gray-200">伺服器連線失敗，請稍後再試</p>
        </div>
    </div>

    <!-- 系統公告跑馬燈 -->
    <div id="system-announcement" class="bg-blue-600 text-sm py-1 px-4 relative overflow-hidden hidden flex-shrink-0">
        <div class="whitespace-nowrap inline-block animate-marquee" id="announcement-text">
            歡迎來到即時聊天室！
        </div>
    </div>

    <!-- 頂部導覽列 -->
    <header class="bg-gray-800 border-b border-gray-700 h-16 flex items-center justify-between px-6 flex-shrink-0">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center text-xl font-bold shadow-lg">
                <i class="fas fa-comments"></i>
            </div>
            <h1 class="text-xl font-bold tracking-wider">即時聊天大廳</h1>
            <span id="connection-status" class="ml-2 px-2 py-0.5 text-xs rounded-full bg-yellow-500 text-yellow-900 font-semibold">
                連線中...
            </span>
        </div>
        
        <!-- 登入與個人資料區 -->
        <div id="auth-container">
            <button id="login-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition duration-200 shadow shadow-indigo-500/30 flex items-center space-x-2 hidden">
                <i class="fas fa-sign-in-alt"></i>
                <span>登入 / 註冊</span>
            </button>
            <button id="profile-btn" class="bg-gray-700 hover:bg-gray-600 border border-gray-600 px-4 py-1.5 rounded-lg font-medium transition duration-200 flex items-center space-x-3 hidden">
                <img id="profile-avatar" src="https://placehold.co/100x100/3730a3/ffffff?text=User" alt="Avatar" class="w-7 h-7 rounded-full">
                <span id="profile-name">載入中</span>
            </button>
        </div>
    </header>

    <!-- 主要內容區 (左側名單 + 右側聊天) -->
    <main class="flex-1 flex overflow-hidden relative">
        
        <!-- 手機版側邊欄切換按鈕 -->
        <button id="toggle-sidebar-btn" class="md:hidden absolute top-4 right-4 z-20 bg-gray-700 p-2 rounded-full text-white shadow-lg">
            <i class="fas fa-users"></i>
        </button>

        <!-- 左側：線上名單 -->
        <aside id="sidebar" class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col transition-transform duration-300 absolute md:relative z-10 h-full transform -translate-x-full md:translate-x-0">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800">
                <h2 class="font-semibold text-gray-300 flex items-center space-x-2">
                    <i class="fas fa-user-friends text-indigo-400"></i>
                    <span>線上成員</span>
                    <span id="online-count" class="bg-gray-700 text-xs px-2 py-0.5 rounded-full">0</span>
                </h2>
                <button id="close-sidebar-btn" class="md:hidden text-gray-400 hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <ul id="user-list" class="flex-1 overflow-y-auto no-scrollbar p-2 space-y-1">
                <!-- 線上名單由 JS 動態生成 -->
            </ul>
        </aside>

        <!-- 右側：聊天主畫面 -->
        <section class="flex-1 flex flex-col bg-gray-900 relative">
            
            <!-- 置頂公告區 (雲端存檔資料展示用) -->
            <div id="pinned-msg-container" class="bg-indigo-900/50 border-b border-indigo-700/50 p-3 flex items-start space-x-3 hidden">
                <i class="fas fa-thumbtack text-indigo-400 mt-1 flex-shrink-0"></i>
                <div class="flex-1">
                    <h3 class="text-xs font-bold text-indigo-300 uppercase tracking-wide">置頂訊息 (雲端同步)</h3>
                    <p id="pinned-msg-text" class="text-sm text-gray-200 mt-0.5">...</p>
                </div>
            </div>

            <!-- 聊天紀錄區 -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
                <div class="text-center text-gray-500 text-xs py-4">-- 歡迎來到聊天室，請保持禮貌 --</div>
                <!-- 訊息將動態插入此處 -->
            </div>

            <!-- 輸入區 -->
            <div class="p-4 bg-gray-800 border-t border-gray-700 flex-shrink-0">
                <form id="chat-form" class="flex items-center space-x-2">
                    <input type="text" id="chat-input" class="flex-1 bg-gray-700 border border-gray-600 text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 outline-none" placeholder="輸入訊息..." autocomplete="off">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg text-sm px-5 py-2.5 text-center flex items-center space-x-2 transition shadow shadow-indigo-500/30">
                        <span>發送</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <!-- 底部版權宣告 -->
    <footer class="bg-gray-950 py-2 text-center text-xs text-gray-500 flex-shrink-0 border-t border-gray-800">
        版權所有 &copy; 2026 <a href="https://pandapanda6666.github.io" target="_blank" class="text-indigo-400 hover:text-indigo-300 transition hover:underline">PandaPanda的AI日常</a> All Rights Reserved.
    </footer>

    <script>
        // 核心設定
        const APP_ID = 'messages_Id';
        const LOGIN_HUB_URL = 'https://pandapanda6666.github.io/login-hub/';
        const SERVER_TXT_URL = 'https://pandapanda6666.github.io/login-hub/server_url.txt';
        
        let socket;
        let currentUser = { username: 'Guest_' + Math.floor(Math.random()*1000), nickname: '訪客', avatar: 'https://placehold.co/100x100/4b5563/ffffff?text=?' };
        let isAuth = false;
        let onlinePlayers = {};

        // DOM 元素快取
        const dom = {
            errorOverlay: document.getElementById('error-overlay'),
            errorText: document.getElementById('error-text'),
            connStatus: document.getElementById('connection-status'),
            loginBtn: document.getElementById('login-btn'),
            profileBtn: document.getElementById('profile-btn'),
            profileName: document.getElementById('profile-name'),
            profileAvatar: document.getElementById('profile-avatar'),
            chatMessages: document.getElementById('chat-messages'),
            chatForm: document.getElementById('chat-form'),
            chatInput: document.getElementById('chat-input'),
            userList: document.getElementById('user-list'),
            onlineCount: document.getElementById('online-count'),
            sysAnnouncement: document.getElementById('system-announcement'),
            announcementText: document.getElementById('announcement-text'),
            pinnedContainer: document.getElementById('pinned-msg-container'),
            pinnedText: document.getElementById('pinned-msg-text'),
            sidebar: document.getElementById('sidebar'),
            toggleSidebarBtn: document.getElementById('toggle-sidebar-btn'),
            closeSidebarBtn: document.getElementById('close-sidebar-btn')
        };

        // 規則 1：全域錯誤捕捉，回傳伺服器
        window.onerror = function(msg, url, line) { 
            if (typeof socket !== 'undefined' && socket.connected) {
                socket.emit('logError', { errorMsg: msg, url: url, line: line }); 
            }
        };

        // 顯示嚴重錯誤
        function showFatalError(msg) {
            dom.errorOverlay.classList.remove('hidden');
            dom.errorText.innerText = msg;
            dom.connStatus.innerText = "連線中斷";
            dom.connStatus.className = "ml-2 px-2 py-0.5 text-xs rounded-full bg-red-500 text-red-100 font-semibold";
        }

        // 初始化網路連線
        async function initNetwork() {
            try {
                // 優先讀取 URL 參數
                const urlParams = new URLSearchParams(window.location.search);
                let targetServerUrl = urlParams.get('server');

                // 規則 1：如果無參數，則用 fetch 讀取絕對路徑，嚴格禁止 localhost fallback
                if (!targetServerUrl) {
                    const res = await fetch(SERVER_TXT_URL);
                    if (!res.ok) throw new Error('無法取得伺服器網址文件');
                    targetServerUrl = (await res.text()).trim();
                }

                if (!targetServerUrl || targetServerUrl.includes('localhost') || targetServerUrl.includes('127.0.0.1')) {
                    throw new Error('伺服器網址無效或禁止連線至本機');
                }

                // 建立 Socket.IO 連線
                socket = io(targetServerUrl, { transports: ['websocket'] });

                socket.on('connect', () => {
                    dom.connStatus.innerText = "已連線";
                    dom.connStatus.className = "ml-2 px-2 py-0.5 text-xs rounded-full bg-green-500 text-green-900 font-semibold";
                    
                    // 規則 1：發送裝置資訊
                    socket.emit('initClientInfo', { 
                        location: '未知地點', 
                        device: navigator.userAgent 
                    });

                    // 處理登入或訪客邏輯
                    checkAuthAndJoinRoom();
                });

                socket.on('connect_error', (err) => {
                    showFatalError("伺服器連線失敗，請稍後再試");
                });
                
                socket.on('disconnect', () => {
                    showFatalError("伺服器已斷線");
                });

                setupSocketListeners();

            } catch (err) {
                console.error("初始化失敗:", err);
                showFatalError("伺服器連線失敗，請稍後再試");
            }
        }

        function checkAuthAndJoinRoom() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 規則 2：登入狀態檢查
            if (urlParams.get('auth') === 'true') {
                isAuth = true;
                const userParam = urlParams.get('user');
                
                // 請求玩家資料
                socket.emit('requestProfile', { username: userParam });
                
                // 清除網址列參數
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                // 訪客模式：直接加入房間
                setupUIForAuth(false);
                joinRoom();
            }
        }

        // 規則 2：介面修改
        function setupUIForAuth(authenticated, profileData = null) {
            const returnUrl = encodeURIComponent(window.location.href);
            
            if (authenticated && profileData) {
                dom.loginBtn.classList.add('hidden');
                dom.profileBtn.classList.remove('hidden');
                
                dom.profileName.innerText = profileData.nickname || profileData.username;
                if(profileData.avatar) dom.profileAvatar.src = profileData.avatar;
                
                // 點擊前往登入中心 (無 require 參數)
                dom.profileBtn.onclick = () => {
                    window.location.href = `${LOGIN_HUB_URL}?from=${returnUrl}`;
                };
            } else {
                dom.profileBtn.classList.add('hidden');
                dom.loginBtn.classList.remove('hidden');
                
                // 點擊前往登入中心註冊/登入 (含 require=1)
                dom.loginBtn.onclick = () => {
                    window.location.href = `${LOGIN_HUB_URL}?from=${returnUrl}&require=1`;
                };
            }
        }

        function setupSocketListeners() {
            // 接收 Profile
            socket.on('profileData', (data) => {
                currentUser = data;
                setupUIForAuth(true, data);
                joinRoom(); // 取得資料後再加入房間
            });

            // 規則 3：加入房間與同步狀態
            socket.on('playerJoined', (data) => {
                onlinePlayers = data.allPlayers || {};
                renderUserList();
            });

            socket.on('playerLeft', (data) => {
                if(onlinePlayers[data.userId]) {
                    delete onlinePlayers[data.userId];
                    renderUserList();
                }
            });

            // 規則 4：聊天與系統公告
            socket.on('roomChatMessage', (data) => {
                appendChatMessage(data);
            });

            socket.on('systemMessage', (msg) => {
                showSystemAnnouncement(msg);
            });

            // 規則 3：萬用資料通道 (處理自訂邏輯，例如面板強制更新進度)
            socket.on('appData', (data) => {
                if(data.action === 'forceUpdateUI') {
                    // 接收到管理面板的強制更新
                    loadCloudData();
                }
            });
        }

        function joinRoom() {
            // 規則 3：加入房間
            socket.emit('joinGameRoom', { 
                room: APP_ID, 
                characterData: {
                    nickname: currentUser.nickname,
                    avatar: currentUser.avatar,
                    isAuth: isAuth
                } 
            });
            
            // 規則 4：紀錄日誌
            socket.emit('logAppMessage', { 
                appId: APP_ID, 
                message: `${currentUser.nickname} 進入了聊天室`, 
                type: 'info' 
            });

            // 規則 4：雲端讀取 (載入置頂訊息)
            loadCloudData();
        }

        function loadCloudData() {
            socket.emit('getAppData', { appId: APP_ID }, (res) => {
                if (res && res.pinnedMessage) {
                    dom.pinnedContainer.classList.remove('hidden');
                    dom.pinnedText.innerText = res.pinnedMessage;
                } else {
                    dom.pinnedContainer.classList.add('hidden');
                }
            });
        }

        function renderUserList() {
            dom.userList.innerHTML = '';
            const playerIds = Object.keys(onlinePlayers);
            dom.onlineCount.innerText = playerIds.length;

            playerIds.forEach(id => {
                const p = onlinePlayers[id];
                const charData = p.characterData || {};
                
                const li = document.createElement('li');
                li.className = "flex items-center space-x-2 p-2 hover:bg-gray-700 rounded-lg transition";
                
                // 判斷是否為訪客，給予不同邊框色
                const avatarBorder = charData.isAuth ? 'border-indigo-400' : 'border-gray-500';
                const displayName = charData.nickname || '未知名稱';
                const avatarSrc = charData.avatar || 'https://placehold.co/100x100/4b5563/ffffff?text=?';

                li.innerHTML = `
                    <div class="relative flex-shrink-0">
                        <img src="${avatarSrc}" class="w-8 h-8 rounded-full border-2 ${avatarBorder}">
                        <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border border-gray-800 rounded-full"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-gray-200 truncate">${displayName}</p>
                        ${charData.isAuth ? '<p class="text-[10px] text-indigo-400">已驗證玩家</p>' : '<p class="text-[10px] text-gray-500">訪客</p>'}
                    </div>
                `;
                dom.userList.appendChild(li);
            });
        }

        function appendChatMessage(data) {
            const isMe = data.sender === (currentUser.nickname || currentUser.username);
            const msgDiv = document.createElement('div');
            
            // 時間格式化
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            if (isMe) {
                // 自己發的訊息 (靠右)
                msgDiv.className = "flex justify-end";
                msgDiv.innerHTML = `
                    <div class="flex items-end space-x-2 max-w-[80%]">
                        <div class="text-xs text-gray-500 pb-1">${timeStr}</div>
                        <div class="bg-indigo-600 text-white p-3 rounded-2xl rounded-br-sm shadow-md break-words">
                            <p class="text-sm">${escapeHTML(data.message)}</p>
                        </div>
                    </div>
                `;
            } else {
                // 別人發的訊息 (靠左)
                msgDiv.className = "flex justify-start space-x-2";
                msgDiv.innerHTML = `
                    <img src="${data.avatar || 'https://placehold.co/100x100/4b5563/ffffff?text=U'}" class="w-8 h-8 rounded-full flex-shrink-0 mt-1">
                    <div class="flex flex-col space-y-1 max-w-[80%]">
                        <div class="flex items-baseline space-x-2">
                            <span class="text-xs font-semibold text-gray-400">${escapeHTML(data.sender)}</span>
                            <span class="text-[10px] text-gray-500">${timeStr}</span>
                        </div>
                        <div class="bg-gray-700 text-white p-3 rounded-2xl rounded-bl-sm shadow-md break-words">
                            <p class="text-sm">${escapeHTML(data.message)}</p>
                        </div>
                    </div>
                `;
            }

            dom.chatMessages.appendChild(msgDiv);
            dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight; // 自動捲動到底部
        }

        function showSystemAnnouncement(msg) {
            dom.sysAnnouncement.classList.remove('hidden');
            dom.announcementText.innerText = msg;
            // 重新觸發動畫
            dom.announcementText.style.animation = 'none';
            dom.announcementText.offsetHeight; /* trigger reflow */
            dom.announcementText.style.animation = null; 
        }

        // 安全字串處理
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        // 綁定發送事件
        dom.chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = dom.chatInput.value.trim();
            if (!text || !socket || !socket.connected) return;

            // 規則 4：發送聊天訊息 (這裡的封包結構可依照您的伺服器，通常只需要傳字串或物件)
            // 假設伺服器接受字串並自動補上發送者，或者允許傳物件
            socket.emit('sendRoomChat', {
                message: text,
                sender: currentUser.nickname || '訪客',
                avatar: currentUser.avatar
            });

            // 規則 4：紀錄發言日誌
            socket.emit('logAppMessage', { 
                appId: APP_ID, 
                message: `${currentUser.nickname} 說: ${text.substring(0, 10)}${text.length > 10 ? '...' : ''}`, 
                type: 'info' 
            });

            dom.chatInput.value = '';
        });

        // 手機版側邊欄開關
        dom.toggleSidebarBtn.addEventListener('click', () => {
            dom.sidebar.classList.remove('-translate-x-full');
        });
        dom.closeSidebarBtn.addEventListener('click', () => {
            dom.sidebar.classList.add('-translate-x-full');
        });

        // 啟動應用
        window.onload = initNetwork;

    </script>
</body>
</html>
