<!-- 請記得將此網頁的網址，加入伺服器管理面板的 CORS 授權網域白名單中，否則會無法連線 -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>純粹交流聊天室</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        
        /* 隱藏捲軸但保留滾動功能 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 跑馬燈動畫 */
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee { display: inline-block; animation: marquee 15s linear infinite; white-space: nowrap; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden">

    <header class="bg-white shadow-sm border-b border-gray-200 flex-none z-30 relative">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <!-- Logo & Title -->
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-comments text-xl"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800 hidden sm:block">即時聊天大廳</h1>
            </div>

            <!-- System Message Marquee -->
            <div class="flex-1 mx-4 sm:mx-8 overflow-hidden bg-indigo-50 rounded-full h-10 flex items-center px-4 border border-indigo-100 hidden md:flex">
                <i class="fa-solid fa-bullhorn text-indigo-500 mr-3"></i>
                <div class="overflow-hidden flex-1 relative">
                    <span id="system-marquee" class="animate-marquee text-indigo-700 font-medium text-sm">
                        歡迎來到純粹交流聊天室！隨時分享您的想法～
                    </span>
                </div>
            </div>

            <!-- Auth/Profile Button (Dynamic) -->
            <div id="auth-container" class="flex-shrink-0">
                <!-- 預設顯示載入中 -->
                <div class="animate-pulse bg-gray-200 h-10 w-24 rounded-full"></div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex max-w-6xl mx-auto w-full overflow-hidden bg-white shadow-lg sm:my-4 sm:rounded-2xl border border-gray-100">
        
        <!-- 左側：聊天面板 -->
        <div class="flex-1 flex flex-col h-full relative">
            
            <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 md:hidden">
                <span id="mobile-system-marquee" class="text-xs text-indigo-600 font-medium truncate flex-1 mr-2">歡迎來到大廳！</span>
                <span id="online-count-mobile" class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-medium whitespace-nowrap">連線中...</span>
            </div>

            <!-- 聊天訊息列表 -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 bg-slate-50">
                <div class="text-center text-xs text-gray-400 my-2">-- 已加入 default_room 頻道 --</div>
            </div>

            <!-- 訊息輸入區 -->
            <div class="p-4 border-t border-gray-100 bg-white">
                <form id="chat-form" class="flex gap-2" onsubmit="handleSendChat(event)">
                    <!-- 萬用通道測試按鈕：發送愛心 -->
                    <button type="button" onclick="sendHeartAction()" class="bg-pink-100 hover:bg-pink-200 text-pink-500 w-12 h-12 rounded-xl flex items-center justify-center transition-colors shadow-sm" title="發送愛心">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                    
                    <input type="text" id="chat-input" placeholder="說點什麼..." autocomplete="off" 
                        class="flex-1 bg-gray-100 border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-xl px-4 py-3 text-sm transition-all duration-200 outline-none">
                    
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white w-12 h-12 rounded-xl flex items-center justify-center transition-colors shadow-sm">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- 右側：在線玩家列表 (桌面版顯示) -->
        <div class="w-64 bg-white border-l border-gray-100 flex-col hidden md:flex">
            <div class="p-4 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                <h2 class="font-bold text-gray-700 text-sm"><i class="fa-solid fa-users mr-2 text-indigo-500"></i>線上成員</h2>
                <span id="online-count" class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-medium">連線中</span>
            </div>
            <div id="online-users-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- 在線玩家項目將會動態插入 -->
            </div>
        </div>

    </main>

    <script>
        // 【規範 1】全域錯誤捕捉：只要發生異常就回傳伺服器
        window.onerror = function(msg, url, line) { 
            if (typeof socket !== 'undefined' && socket.connected) {
                socket.emit('logError', { errorMsg: msg, url: url, line: line }); 
            }
        };

        // 狀態管理
        let socket;
        let myId = null;
        let myProfile = {
            username: 'guest_' + Math.floor(Math.random() * 10000),
            nickname: '訪客',
            avatar: 'https://placehold.co/100x100/cbd5e1/ffffff?text=Guest',
            isLoggedIn: false
        };
        const players = {}; // 存放所有玩家資料
        
        const loginHubUrl = 'https://pandapanda6666.github.io/login-hub/';

        function initAuth() {
            // 【規範 2】登入狀態檢查與介面修改
            const urlParams = new URLSearchParams(window.location.search);
            const isAuth = urlParams.get('auth') === 'true';
            const user = urlParams.get('user');
            const authContainer = document.getElementById('auth-container');
            const currentUrlEncoded = encodeURIComponent(window.location.href.split('?')[0]); // 移除參數當作回調

            if (isAuth && user) {
                // 已登入狀態
                myProfile.isLoggedIn = true;
                myProfile.username = user;
                
                // 網址列清除參數
                window.history.replaceState({}, document.title, window.location.pathname);
                
                // 介面改為個人資料按鈕
                authContainer.innerHTML = `
                    <button onclick="window.location.href='${loginHubUrl}?from=${currentUrlEncoded}'" 
                            class="flex items-center gap-2 hover:bg-gray-100 p-1.5 pr-4 rounded-full transition-colors border border-transparent hover:border-gray-200">
                        <img id="my-top-avatar" src="${myProfile.avatar}" class="w-8 h-8 rounded-full border border-gray-200 object-cover">
                        <span id="my-top-nickname" class="text-sm font-medium text-gray-700 hidden sm:block">載入中...</span>
                    </button>
                `;
            } else {
                // 訪客模式
                authContainer.innerHTML = `
                    <button onclick="window.location.href='${loginHubUrl}?from=${currentUrlEncoded}&require=1'" 
                            class="bg-gray-900 hover:bg-gray-800 text-white px-5 py-2 rounded-full text-sm font-medium transition-colors shadow-sm flex items-center gap-2">
                        <i class="fa-solid fa-user text-xs"></i> 登入 / 註冊
                    </button>
                `;
            }
        }

        function showServerError() {
            updateOnlineCountUI('連線失敗', false);
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-gray-500 gap-4 mt-10">
                    <i class="fa-solid fa-triangle-exclamation text-4xl text-red-400"></i>
                    <p class="text-lg font-medium text-red-500">伺服器連線失敗，請稍後再試</p>
                    <p class="text-sm">無法取得連線網址或伺服器未回應。</p>
                </div>
            `;
            // Disable input
            document.getElementById('chat-input').disabled = true;
            document.querySelector('button[type="submit"]').disabled = true;
            document.querySelector('button[title="發送愛心"]').disabled = true;
        }

        async function initApp() {
            initAuth(); 

            // 【規範 1】獲取伺服器網址邏輯 (嚴格模式)
            const urlParams = new URLSearchParams(window.location.search);
            let serverUrl = urlParams.get('server');
            
            if (!serverUrl) {
                try {
                    // 強制讀取登入中心的絕對路徑檔案
                    const res = await fetch('https://pandapanda6666.github.io/login-hub/server_url.txt');
                    if (res.ok) {
                        serverUrl = (await res.text()).trim();
                    } else {
                         throw new Error("Network response was not ok");
                    }
                } catch (e) {
                    console.error('無法取得伺服器網址', e);
                    // 【規範 1】嚴格禁止自動 Fallback 去連線 localhost，直接顯示錯誤
                    showServerError();
                    return; 
                }
            }
            
            if (!serverUrl || serverUrl === "") {
                showServerError();
                return;
            }

            // 【規範 1】建立連線
            try {
                socket = io(serverUrl, { transports: ['websocket'] });
            } catch (e) {
                console.error("Socket.io 初始化失敗", e);
                showServerError();
                return;
            }

            setupSocketListeners();
        }

        function setupSocketListeners() {
            socket.on('connect', () => {
                myId = socket.id;
                updateOnlineCountUI('已連線', true);
                
                // 【規範 1】發送裝置資訊
                socket.emit('initClientInfo', { 
                    location: '未知地點', 
                    device: navigator.userAgent 
                });

                // 【規範 2】如果是登入狀態，請求個人資料
                if (myProfile.isLoggedIn) {
                    socket.emit('requestProfile', { username: myProfile.username });
                }

                // 【規範 3】加入房間 (純聊天室不傳送額外座標)
                socket.emit('joinGameRoom', { 
                    room: 'default_room', 
                    characterData: {} // 若無特別狀態可留空
                });
            });

            socket.on('disconnect', () => {
                updateOnlineCountUI('斷線重連中', false);
            });

            // 接收個人資料並更新畫面
            socket.on('profileData', (data) => {
                if(data.nickname) myProfile.nickname = data.nickname;
                if(data.avatar) myProfile.avatar = data.avatar;
                
                const topAvatar = document.getElementById('my-top-avatar');
                const topName = document.getElementById('my-top-nickname');
                if(topAvatar) topAvatar.src = myProfile.avatar;
                if(topName) topName.textContent = myProfile.nickname;
            });

            // 【規範 3】生成其他玩家
            socket.on('playerJoined', (data) => {
                if (!data || !data.allPlayers) return;
                
                // 更新名單列表
                const allPlayers = data.allPlayers;
                updateOnlineCountUI(`${Object.keys(allPlayers).length} 人`, true);
                
                const listContainer = document.getElementById('online-users-list');
                listContainer.innerHTML = ''; // 清空重建

                for (const pid in allPlayers) {
                    players[pid] = allPlayers[pid];
                    renderOnlineUser(pid, allPlayers[pid]);
                }
            });

            // 【規範 3】玩家離開
            socket.on('playerLeft', (data) => {
                const pid = data.id || data.socketId || data;
                if (players[pid]) {
                    delete players[pid];
                    const userElement = document.getElementById(`user-item-${pid}`);
                    if(userElement) userElement.remove();
                    updateOnlineCountUI(`${Object.keys(players).length} 人`, true);
                }
            });

            // 【規範 4】接收聊天訊息
            socket.on('roomChatMessage', (data) => {
                const senderId = data.id || data.senderId;
                const msg = data.message || data.msg || data;
                const nickname = data.nickname || (players[senderId] ? players[senderId].nickname : '未知');
                const avatar = data.avatar || (players[senderId] ? players[senderId].avatar : 'https://placehold.co/100x100/cbd5e1/ffffff?text=?');
                
                appendChatMessage(nickname, avatar, msg, senderId === myId);
            });

            // 【規範 4】系統公告
            socket.on('systemMessage', (msg) => {
                const marqueeStr = typeof msg === 'string' ? msg : (msg.message || msg.text || '系統公告');
                document.getElementById('system-marquee').textContent = marqueeStr;
                document.getElementById('mobile-system-marquee').textContent = marqueeStr;
                
                appendSystemMessage(marqueeStr);
            });

            // 【規範 3】萬用通道處理
            socket.on('appData', (data) => {
                if(data.action === 'send_like') {
                    showFlyingHeart(data.senderName || '某人');
                }
                // 可以在這裡擴充其他自訂 action
            });
        }

        function updateOnlineCountUI(text, isOnline) {
            const cls = isOnline ? 'text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-medium' : 'text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full font-medium';
            
            const deskCount = document.getElementById('online-count');
            const mobCount = document.getElementById('online-count-mobile');
            
            if(deskCount) { deskCount.textContent = text; deskCount.className = cls; }
            if(mobCount) { mobCount.textContent = text; mobCount.className = cls; }
        }

        function renderOnlineUser(id, data) {
            const listContainer = document.getElementById('online-users-list');
            const isMe = id === myId;
            
            const div = document.createElement('div');
            div.id = `user-item-${id}`;
            div.className = `flex items-center gap-3 p-2 rounded-lg ${isMe ? 'bg-indigo-50 border border-indigo-100' : 'hover:bg-gray-100'} transition-colors`;
            
            div.innerHTML = `
                <div class="relative">
                    <img src="${data.avatar || 'https://placehold.co/100x100/cbd5e1/ffffff?text=' + id.substring(0,2)}" class="w-8 h-8 rounded-full border border-gray-200 object-cover">
                    <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-white rounded-full"></div>
                </div>
                <span class="text-sm font-medium text-gray-700 truncate ${isMe ? 'text-indigo-700' : ''}">${data.nickname || '訪客'}</span>
                ${isMe ? '<span class="ml-auto text-[10px] text-indigo-400 font-bold bg-indigo-100 px-1.5 py-0.5 rounded">我</span>' : ''}
            `;
            
            if (isMe) {
                listContainer.prepend(div); // 自己放最上面
            } else {
                listContainer.appendChild(div);
            }
        }

        function handleSendChat(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg || !socket || !socket.connected) return;

            // 【規範 4】發送聊天訊息
            socket.emit('sendRoomChat', msg);
            input.value = '';
        }

        const chatMessages = document.getElementById('chat-messages');
        
        function appendChatMessage(senderName, senderAvatar, text, isMe) {
            const div = document.createElement('div');
            div.className = `flex gap-3 ${isMe ? 'flex-row-reverse' : ''}`;
            
            const alignClass = isMe ? 'items-end' : 'items-start';
            const bgClass = isMe ? 'bg-indigo-600 text-white rounded-tl-2xl rounded-tr-2xl rounded-bl-2xl' : 'bg-white border border-gray-100 text-gray-800 rounded-tl-2xl rounded-tr-2xl rounded-br-2xl';
            const nameColor = isMe ? 'text-indigo-600' : 'text-gray-500';

            div.innerHTML = `
                <img src="${senderAvatar}" class="w-8 h-8 rounded-full object-cover flex-shrink-0 mt-1 shadow-sm border border-gray-100">
                <div class="flex flex-col ${alignClass} max-w-[75%]">
                    <span class="text-xs ${nameColor} mb-1 font-medium px-1">${senderName}</span>
                    <div class="${bgClass} px-4 py-2.5 text-sm shadow-sm break-words relative group">
                        ${escapeHTML(text)}
                    </div>
                </div>
            `;
            
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendSystemMessage(text) {
            const div = document.createElement('div');
            div.className = `text-center text-xs text-indigo-500 my-4 font-medium bg-indigo-50 py-1.5 px-4 rounded-full max-w-fit mx-auto border border-indigo-100 shadow-sm`;
            div.innerHTML = `<i class="fa-solid fa-circle-info mr-1"></i> ${escapeHTML(text)}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function escapeHTML(str) {
            const p = document.createElement("p");
            p.appendChild(document.createTextNode(str));
            return p.innerHTML;
        }

        function sendHeartAction() {
            if(!socket || !socket.connected) return;
            // 【規範 3】發送端：萬用通道
            socket.emit('appData', {
                room: 'default_room',
                action: 'send_like',
                senderName: myProfile.nickname
            });
        }

        function showFlyingHeart(senderName) {
            const heart = document.createElement('div');
            heart.innerHTML = '<i class="fa-solid fa-heart text-pink-500 text-2xl drop-shadow-md"></i>';
            heart.className = 'absolute z-50 pointer-events-none transition-all duration-1000 ease-out';
            
            // 隨機從底部冒出
            const startX = Math.random() * window.innerWidth;
            heart.style.left = `${startX}px`;
            heart.style.bottom = '10%';
            heart.style.opacity = '1';
            heart.style.transform = 'translateY(0) scale(0.5)';
            
            document.body.appendChild(heart);

            // 附帶發送者名稱提示 (可選)
            const label = document.createElement('div');
            label.textContent = `${senderName} 送出愛心`;
            label.className = 'text-xs text-pink-500 font-bold mt-1 text-center whitespace-nowrap drop-shadow-sm';
            heart.appendChild(label);

            // 動畫過程
            requestAnimationFrame(() => {
                heart.style.transform = `translateY(-150px) scale(1.5)`;
                heart.style.opacity = '0';
            });

            setTimeout(() => { heart.remove(); }, 1000);
        }

        // 啟動應用
        window.onload = initApp;

    </script>
</body>
</html>
