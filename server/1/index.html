<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iian666的遊戲中心</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="authView" class="auth-shell">
      <section class="auth-card" aria-label="帳號系統">
        <header class="auth-header">
          <h1 id="authTitle">登入系統</h1>
          <p id="authSubtitle">輸入帳號密碼以進入</p>
          <div id="serverStatus" class="status-pill">伺服器已連線</div>
        </header>

        <section id="loginPanel">
          <form id="loginForm" class="form-grid">
            <label for="loginAccount">登入帳號</label>
            <input id="loginAccount" type="text" inputmode="email" autocomplete="username" placeholder="請輸入您的帳號" required />

            <label for="loginPassword">登入密碼</label>
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="請輸入您的密碼" required />

            <p id="loginError" class="message error" role="alert"></p>
            <button class="primary-btn indigo" type="submit">一般登入系統</button>
          </form>

          <div class="divider"><span>或</span></div>
          <button id="googleLogin" class="google-btn" type="button">
            <span class="google-mark">G</span>
            使用 Google 帳號登入
          </button>
          <button id="showRegister" class="link-btn" type="button">還沒有帳號？立即註冊</button>
        </section>

        <section id="registerPanel" class="hidden">
          <div class="segmented">
            <button id="normalTab" class="active" type="button">帳號密碼註冊</button>
            <button id="googleTab" type="button">Google 註冊</button>
          </div>

          <form id="registerForm" class="form-grid register-form">
            <div class="avatar-block">
              <button id="avatarButton" class="avatar-preview" type="button" aria-label="上傳大頭貼">
                <img id="avatarPreview" alt="大頭貼預覽" />
              </button>
              <input id="avatarInput" class="hidden" type="file" accept="image/*" />
              <p>點擊上傳大頭貼</p>
            </div>

            <div id="googleRegisterBox" class="hidden">
              <button id="linkGoogle" class="google-btn" type="button">
                <span class="google-mark">G</span>
                連結 Google 帳號 *
              </button>
              <div id="linkedGoogle" class="linked-google hidden">
                <span>已連結：<b id="linkedGoogleEmail"></b></span>
                <button id="clearGoogleLink" type="button">清除</button>
              </div>
            </div>

            <div id="normalRegisterFields" class="two-col">
              <div>
                <label for="regAccount">設定帳號 <span>*</span></label>
                <input id="regAccount" type="text" placeholder="請輸入帳號" />
              </div>
              <div>
                <label for="regPassword">設定密碼 <span>*</span></label>
                <input id="regPassword" type="password" placeholder="請輸入密碼" />
              </div>
            </div>

            <label for="regEmail">電子郵件 <small>(與電話擇一必填)</small> <span>*</span></label>
            <input id="regEmail" type="text" inputmode="email" placeholder="請輸入電子郵件" />

            <label for="regNickname">公開暱稱 <span>*</span></label>
            <input id="regNickname" type="text" placeholder="在系統中顯示的名稱" required />

            <div class="two-col">
              <div>
                <label for="regLastName">姓氏 <span>*</span></label>
                <input id="regLastName" type="text" placeholder="例: 王" required />
              </div>
              <div>
                <label for="regFirstName">名字 <span>*</span></label>
                <input id="regFirstName" type="text" placeholder="例: 小明" required />
              </div>
            </div>

            <div class="two-col">
              <div>
                <label for="regGender">性別 <span>*</span></label>
                <select id="regGender" required>
                  <option value="">請選擇</option>
                  <option value="男">男</option>
                  <option value="女">女</option>
                  <option value="其他">其他</option>
                </select>
              </div>
              <div>
                <label for="regBirthday">生日 <span>*</span></label>
                <input id="regBirthday" type="date" required />
              </div>
            </div>

            <label for="regPhone">聯絡電話 <small>(與信箱擇一必填)</small> <span>*</span></label>
            <input id="regPhone" type="tel" placeholder="請輸入聯絡電話" />

            <p id="registerError" class="message error" role="alert"></p>
            <button class="primary-btn emerald" type="submit">送出註冊資料</button>
            <button id="backToLogin" class="link-btn muted-link" type="button">已有帳號？返回登入</button>
          </form>
        </section>
      </section>
    </main>

    <main id="appView" class="app-shell hidden">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">iian666 Arcade</p>
          <h2>iian666的遊戲中心</h2>
          <p id="currentUser" class="admin-email">ianother6993@gmail.com</p>
        </div>
        <nav id="gameNav" class="game-nav" aria-label="遊戲列表"></nav>
        <button id="logoutBtn" class="ghost-btn" type="button">登出</button>
      </aside>

      <section class="game-stage">
        <header class="stage-header">
          <div>
            <p class="eyebrow">10 個小遊戲</p>
            <h1 id="gameTitle">圈圈叉叉</h1>
          </div>
          <button id="resetGame" class="secondary-btn" type="button">重新開始</button>
        </header>
        <div id="gamePanel" class="game-panel"></div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
