<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公開協同繪圖板</title>
    <link rel="icon" href="https://raw.githubusercontent.com/pandapanda6666/pandapanda6666.github.io/main/login-hub/icon.ico">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: none; overflow: hidden; }
        canvas { touch-action: none; cursor: crosshair; }
    </style>
</head>
<body class="bg-[#eef2e6] min-h-screen flex flex-col items-center justify-center p-2 sm:p-4">
    <!-- 背景裝飾 -->
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-green-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob z-0"></div>
    <div class="fixed top-[20%] right-[-10%] w-96 h-96 bg-yellow-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000 z-0"></div>
    <div class="fixed bottom-[-10%] left-[20%] w-96 h-96 bg-emerald-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-4000 z-0"></div>

    <div class="relative bg-white/95 backdrop-blur-xl w-full max-w-4xl rounded-2xl shadow-xl overflow-hidden p-4 sm:p-6 border border-green-100 z-10 flex flex-col h-[90vh]">
        <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-4">
            <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 flex items-center">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-green-500 to-emerald-600">🎨 協同繪圖板</span>
            </h1>
            <div id="statusBox" class="p-2 rounded-xl bg-slate-50 border border-slate-200 text-sm flex items-center shadow-sm">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500 mr-2"></div>
                <span id="statusText" class="text-slate-600 font-bold hidden sm:inline">尚未連線...</span>
            </div>
        </div>

        <!-- 工具列 -->
        <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
            <div class="flex items-center gap-2">
                <input type="color" id="colorPicker" value="#000000" class="w-10 h-10 rounded cursor-pointer border-0 p-0">
                <input type="range" id="sizePicker" min="1" max="20" value="3" class="w-24 sm:w-32 cursor-pointer">
                <span id="sizeVal" class="text-sm font-bold text-slate-600 w-6">3</span>
            </div>
            <button id="clearBtn" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-bold transition-colors shadow-sm text-sm">🗑️ 清空畫布</button>
        </div>

        <!-- 畫布區 -->
        <div class="relative flex-grow rounded-xl border-2 border-slate-200 bg-white overflow-hidden shadow-inner w-full">
            <canvas id="drawingCanvas"></canvas>
        </div>
    </div>

    <script>
        // 初始化畫布
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizePicker = document.getElementById('sizePicker');
        const sizeVal = document.getElementById('sizeVal');
        const clearBtn = document.getElementById('clearBtn');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let socket = null;

        // 設定畫布大小與 RWD
        function resizeCanvas() {
            canvas.width = 800;
            canvas.height = 600;
            canvas.style.width = '100%';
            canvas.style.height = '100%';
        }
        resizeCanvas();

        sizePicker.addEventListener('input', (e) => sizeVal.innerText = e.target.value);

        // 畫線函數
        function drawLine(x0, y0, x1, y1, color, size, emit = false) {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.strokeStyle = color;
            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.closePath();

            if (emit && socket && socket.connected) {
                socket.emit('draw', { x0, y0, x1, y1, color, size });
            }
        }

        // 滑鼠與觸控事件
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            // 計算縮放比例
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX = e.clientX;
            let clientY = e.clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            return [
                (clientX - rect.left) * scaleX,
                (clientY - rect.top) * scaleY
            ];
        }

        function onDown(e) {
            isDrawing = true;
            const [x, y] = getCoords(e);
            lastX = x;
            lastY = y;
            // 畫個點
            drawLine(x, y, x, y, colorPicker.value, sizePicker.value, true);
            e.preventDefault();
        }

        function onMove(e) {
            if (!isDrawing) return;
            const [x, y] = getCoords(e);
            drawLine(lastX, lastY, x, y, colorPicker.value, sizePicker.value, true);
            lastX = x;
            lastY = y;
            e.preventDefault();
        }

        function onUp(e) {
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', onDown);
        canvas.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);

        canvas.addEventListener('touchstart', onDown, {passive: false});
        canvas.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('touchend', onUp);

        // 清空畫布
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(socket && socket.connected) socket.emit('clear');
        });

        // 取得動態網址並連線
        async function connectSocket() {
            try {
                const response = await fetch('server_url.txt?t=' + new Date().getTime());
                if (!response.ok) throw new Error('無法取得網址');
                const text = await response.text();
                const decoded = atob(text.trim());
                const serverUrl = decoded.split('').reverse().join('');

                socket = io(serverUrl, { transports: ['websocket', 'polling'] });

                socket.on('connect', () => {
                    statusText.innerText = "已連線";
                    statusDot.classList.replace('bg-red-500', 'bg-green-500');
                });

                socket.on('disconnect', () => {
                    statusText.innerText = "連線已斷開";
                    statusDot.classList.replace('bg-green-500', 'bg-red-500');
                });

                socket.on('initDraw', (history) => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    history.forEach(data => {
                        drawLine(data.x0, data.y0, data.x1, data.y1, data.color, data.size, false);
                    });
                });

                socket.on('draw', (data) => {
                    drawLine(data.x0, data.y0, data.x1, data.y1, data.color, data.size, false);
                });

                socket.on('clear', () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                });

            } catch (err) {
                console.error(err);
                statusText.innerText = "尋找伺服器失敗";
                statusDot.classList.replace('bg-green-500', 'bg-red-500');
                setTimeout(connectSocket, 5000);
            }
        }
        connectSocket();
    </script>
</body>
</html>
