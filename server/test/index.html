<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公開同步展示</title>
    <link class="rounded-full" rel="icon" href="https://lh3.googleusercontent.com/a/ACg8ocIACThLQv2z6bs3wAc0ecYIEd-4zdOb0IbkOZV-ZVyRKsblTmw=s288-c-no">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-[#eef2e6] min-h-screen flex items-center justify-center p-4">

    <div class="relative bg-white/95 backdrop-blur-xl w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden p-8 border border-green-100 z-10 my-8">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-green-800 tracking-wide">公開同步展示</h1>
            <p class="text-slate-500 text-sm mt-2">此頁面可讓任何人檢視或修改同步的輸入框</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">同步文字框</label>
                <textarea id="syncInput" rows="5" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition shadow-inner font-sans text-lg" placeholder="正在等待連線..."></textarea>
            </div>
            
            <div id="statusBox" class="mt-4 p-3 rounded-xl bg-slate-50 border border-slate-200 text-sm flex items-center">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500 mr-2"></div>
                <span id="statusText" class="text-slate-600 font-bold">尚未連線至同步伺服器...</span>
            </div>
        </div>

        <footer class="mt-8 pt-6 border-t border-green-100 text-center text-xs text-slate-500 font-bold">
            版權所有 © 2026 PandaPanda的AI日常 All Rights Reserved.
        </footer>
    </div>

    <script>
        const inputEl = document.getElementById('syncInput');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        // 從 GitHub 取得動態穿透網址
        async function fetchServerUrl() {
            try {
                // 為了避免快取，加上時間戳記
                const response = await fetch('server_url.txt?t=' + new Date().getTime());
                if (!response.ok) throw new Error('無法取得 server_url.txt');
                const text = await response.text();
                
                // 解密邏輯 (Base64 + 反轉)
                const encryptedUrl = text.trim();
                const reversed = encryptedUrl.split('').reverse().join('');
                const serverUrl = atob(reversed);
                
                return serverUrl;
            } catch (error) {
                console.error("獲取伺服器網址失敗:", error);
                statusText.innerText = "無法獲取伺服器連線位址";
                return null;
            }
        }

        async function init() {
            const serverUrl = await fetchServerUrl();
            if (!serverUrl) return;

            statusText.innerText = `正在連線至 ${serverUrl}...`;

            // 連線至取得的 WebSocket 伺服器
            const socket = io(serverUrl, { transports: ['websocket'] });

            socket.on('connect', () => {
                statusText.innerText = "已成功連線至同步伺服器";
                statusDot.classList.replace('bg-red-500', 'bg-green-500');
                inputEl.placeholder = "請在此輸入文字，將會自動雙向同步...";
            });

            socket.on('disconnect', () => {
                statusText.innerText = "連線已斷開";
                statusDot.classList.replace('bg-green-500', 'bg-red-500');
            });

            // 接收同步更新
            socket.on('textUpdate', (newText) => {
                if (inputEl.value !== newText) {
                    inputEl.value = newText;
                }
            });

            // 發送文字變更
            inputEl.addEventListener('input', () => {
                socket.emit('textChange', inputEl.value);
            });
        }

        // 啟動連線程序
        init();
    </script>
</body>
</html>
