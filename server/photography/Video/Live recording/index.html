<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遠端監看與錄製系統</title>
    <!-- 消除 Favicon 404 報錯 -->
    <link class="favicon" rel="icon" href="data:,">
    
    <!-- 全域錯誤攔截器與環境變數設定 -->
    <script>
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
            originalWarn.apply(console, args);
        };
        
        window.onerror = function(msg, url, line) { 
            if (typeof socket !== 'undefined' && socket.connected) {
                socket.emit('logError', { errorMsg: msg, url: url, line: line }); 
            }
        };
        
        window.addEventListener('unhandledrejection', function(event) {
            const errorMsg = event.reason ? event.reason.message || event.reason : '未知錯誤';
            // 過濾瀏覽器插件產生的已知 Promise 錯誤
            if (typeof errorMsg === 'string' && errorMsg.includes('message channel closed before a response was received')) return;
            if (typeof socket !== 'undefined' && socket.connected) {
                socket.emit('logError', { errorMsg: 'Promise異常: ' + errorMsg, url: window.location.href, line: 0 });
            }
        });

        // 屏蔽不必要的控制台輸出，避免大量代碼刷屏
        console.log = function() {};
        console.info = function() {};

        // 專屬應用識別碼 (排除 index.html 造成的平行時空問題)
        const appId = window.location.hostname + window.location.pathname.replace('index.html', '');
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

    <!-- 頂部導覽列與 SSO 個人資料區 -->
    <header class="bg-slate-800 border-b border-slate-700 py-4 px-6 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="h-3 w-3 bg-red-500 rounded-full animate-ping"></div>
                <h1 class="text-xl font-bold tracking-wider text-white">Panda Live 遠端監看系統</h1>
            </div>
            
            <div id="authContainer">
                <button id="loginBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-full shadow-lg transition duration-200 transform hover:scale-105">
                    登入 / 註冊 SSO
                </button>
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-grow max-w-7xl w-full mx-auto p-4 md:p-6">
        
        <!-- 連線狀態提示 (非 Alert 彈窗) -->
        <div id="alertToast" class="hidden mb-6 p-4 rounded-xl border flex items-center gap-3 bg-red-950/80 border-red-800 text-red-200 shadow-xl transition-all duration-300">
            <svg class="h-6 w-6 shrink-0 text-red-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" /></svg>
            <span id="alertToastText" class="text-sm font-medium"></span>
        </div>

        <!-- 模式切換大廳 -->
        <div id="lobbySection" class="bg-slate-800 rounded-2xl p-8 border border-slate-700 max-w-2xl mx-auto text-center shadow-2xl mt-10">
            <h2 class="text-2xl font-extrabold text-white mb-3">選擇您的連線模式</h2>
            <p class="text-slate-400 mb-8 text-sm">此版本支援純伺服器轉發影像與音訊，免除一切防火牆與連線干擾。</p>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button id="modeCamera" class="flex flex-col items-center justify-center p-6 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl shadow-lg transition duration-300 group hover:-translate-y-1">
                    <svg class="h-10 w-10 mb-3 text-emerald-100 group-hover:scale-110 transition" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" /></svg>
                    <span class="text-lg font-bold">被監看模式 (相機端)</span>
                    <span class="text-xs text-emerald-200 mt-1">產生配對碼並開始廣播畫面</span>
                </button>
                
                <button id="modeViewer" class="flex flex-col items-center justify-center p-6 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl shadow-lg transition duration-300 group hover:-translate-y-1">
                    <svg class="h-10 w-10 mb-3 text-indigo-100 group-hover:scale-110 transition" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    <span class="text-lg font-bold">監看模式 (觀看端)</span>
                    <span class="text-xs text-indigo-200 mt-1">觀看多端影像並提供錄影</span>
                </button>
            </div>
        </div>

        <!-- 相機端介面 -->
        <div id="cameraUI" class="hidden bg-slate-800 rounded-2xl p-6 border border-slate-700 max-w-2xl mx-auto shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white flex items-center gap-2">
                    <span class="h-2.5 w-2.5 bg-emerald-500 rounded-full animate-pulse"></span>

            <div class="relative aspect-video w-full bg-slate-950 rounded-xl overflow-hidden shadow-inner border border-slate-800">
                <video id="localVideo" autoplay playsinline muted class="w-full h-full object-cover"></video>
                <div id="broadcastStatusIndicator" class="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-full text-xs text-slate-300 flex items-center gap-2">
                    <span id="indicatorDot" class="h-2 w-2 bg-slate-500 rounded-full"></span>
                    <span id="indicatorText">靜止待機中 (無人連線不佔頻寬)</span>

            </div>

            <!-- 本地高清錄影控制區 -->
            <div class="mt-4 bg-slate-900 rounded-xl p-3 border border-slate-700 flex justify-between items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="h-2 w-2 bg-slate-400 rounded-full transition-all duration-300" id="cameraRecordDot"></span>
                    <span class="text-xs font-semibold text-slate-300" id="cameraRecordStatusText">本地錄影未啟動</span>

                <div class="flex gap-2">

                    <button id="btnCameraStopRecord" class="hidden bg-slate-100 hover:bg-white text-slate-900 text-xs font-bold py-2 px-4 rounded-xl shadow-lg transition flex items-center gap-1.5 animate-bounce">

            <!-- 傳輸頻率與畫質控制區 -->
            <div class="mt-4 flex flex-wrap items-center justify-center gap-4 bg-slate-900 rounded-xl p-3 border border-slate-700">
                <div class="flex items-center gap-2">
                    <label class="text-slate-400 text-sm">傳輸頻率:</label>
                    <select id="fpsSelect" class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition">
                        <option value="500">極低 (2 FPS) - 最省流</option>
                        <option value="200">低 (5 FPS)</option>
                        <option value="100" selected>標準 (10 FPS) - 推薦</option>
                        <option value="66">高 (15 FPS)</option>

                    </select>
                </div>
                <div class="flex items-center gap-2">

            <div id="cameraStatus" class="text-xs text-slate-400 text-center mt-4">正在初始化硬體裝置...</div>
        </div>

        <!-- 觀看端介面 -->
        <div id="viewerUI" class="hidden bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-2xl">
            <div class="flex justify-between items-center mb-6">

                    <span class="h-2.5 w-2.5 bg-indigo-500 rounded-full"></span>

            </div>

            <!-- 頻道添加與控制區 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="md:col-span-2 flex gap-2">
                    <input type="text" id="inputPairCode" placeholder="輸入6位數相機配對碼" class="flex-grow bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 font-mono tracking-widest text-center text-lg">
                    <button id="btnConnect" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-6 py-3 rounded-xl transition shadow-lg shrink-0">加入頻道</button>
                </div>
                
                <!-- 錄影控制區 -->
                <div class="flex gap-2">
                    <button id="btnStartRecord" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2">
                        <span class="h-3 w-3 bg-white rounded-full animate-pulse"></span>
                        錄製全螢幕
                    </button>
                    <button id="btnStopRecord" class="hidden w-full bg-slate-100 hover:bg-white text-slate-900 font-bold py-3 px-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2 animate-bounce">
                        <span class="h-3 w-3 bg-red-600 rounded-full"></span>
                        停止並匯出
                    </button>
                </div>
            </div>

            <div class="bg-slate-900/50 rounded-xl p-4 border border-slate-700 mb-6 flex flex-wrap justify-between items-center gap-3">
                <div class="flex items-center gap-2 text-sm text-slate-300">
                    <span class="font-semibold">目前連線頻道：</span>
                    <span id="activeCodesList" class="font-mono text-indigo-400">尚無連線</span>
                </div>
                <div id="viewerStatus" class="text-xs text-slate-400">請在上方輸入配對碼連線。</div>
            </div>

            <!-- 頻道多分割視窗網格 -->
            <div id="feedContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- 這裡會動態產生各頻道的視窗 -->
            </div>

            <!-- 隱藏的 Canvas 用於合併與無 UI 乾淨錄影 -->
            <canvas id="hiddenCanvas" class="hidden"></canvas>
        </div>

    </main>

    <!-- 底部資訊與版權 -->
    <footer class="bg-slate-950 border-t border-slate-900 py-6 text-center text-xs text-slate-500 flex flex-col gap-2">
        <div>
            <a href="https://pandapanda6666.github.io" class="hover:text-indigo-400 transition font-medium">版權所有 © 2026 PandaPanda的AI日常 All Rights Reserved.</a>
        </div>
    </footer>

    <!-- 右下角回報問題浮動按鈕 -->
    <button onclick="reportIssue()" class="fixed bottom-6 right-6 bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 px-5 rounded-full shadow-2xl z-50 flex items-center gap-2 transition duration-300 transform hover:scale-105 active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
        回報問題
    </button>

    <!-- 核心運作腳本 -->
    <script>
        // --- 核心狀態管理與變數 ---
        let socket;
        let myRole = ''; // 'camera' 或者是 'viewer'
        let myPairCode = Math.floor(100000 + Math.random() * 900000).toString(); // 六位數代碼
        let myUuid = crypto.randomUUID();
        
        // 觀看端專用
        let watchedCodes = new Set(); 
        let remoteFeeds = {}; // 結構: { [senderId]: { pairCode, imgElement, lastFrameTime, mediaSource, sourceBuffer, audioQueue, audioEl } }
        let isRecording = false;
        let mediaRecorder;
        let recordedChunks = [];
        let canvasRenderLoopId = null;

        // 相機端專用 (整合防重疊與觀眾追蹤機制)
        let localStream = null;
        let videoInterval = null;
        let micRecorder = null;
        let activeViewers = []; // 線上正在觀看本機的觀眾 uuid 陣列
        let currentCaptureInterval = 100; // 預設 100ms (10 FPS)
        let currentCaptureQuality = 0.3;  // 預設中畫質 0.3

        // 新增相機本地高清錄影專用變數
        let cameraRecorder = null;
        let cameraRecordedChunks = [];
        let isCameraRecording = false;

        // --- SSO 與登入驗證處理 ---
        function checkSSO() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('auth') === 'true') {
                const user = params.get('user');
                
                // 向 Socket 請求資料
                const emitProfileRequest = () => {
                    if (socket && socket.connected) {
                        socket.emit('requestProfile', { username: user });
                    } else {
                        setTimeout(emitProfileRequest, 500);
                    }
                };
                emitProfileRequest();

                // 接收個人資料
                socket.on('profileData', (data) => {
                    if (data) {
                        const container = document.getElementById('authContainer');
                        container.innerHTML = `
                            <div onclick="goToLoginHub()" class="flex items-center gap-3 bg-slate-800 border border-slate-700 py-1.5 px-4 rounded-full cursor-pointer hover:bg-slate-700 transition shadow-inner">
                                <img src="${data.avatar || 'https://via.placeholder.com/40'}" class="w-9 h-9 rounded-full border-2 border-indigo-500 object-cover" onerror="this.src='https://via.placeholder.com/40'">
                                <div class="flex flex-col text-left">
                                    <span class="text-xs font-bold text-slate-100">${data.nickname || user}</span>
                                    <span class="text-[10px] text-yellow-500 font-semibold">🪙 ${data.pCoin || 0} P幣</span>
                                </div>
                            </div>
                        `;
                    }
                });

                // 清除網址列參數避免重新整理造成重複驗證
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
            } else {
                document.getElementById('loginBtn').onclick = () => {
                    window.location.href = 'https://pandapanda6666.github.io/login-hub/?require=1&from=' + encodeURIComponent(window.location.href);
                };
            }
        }

        function goToLoginHub() {
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?from=' + encodeURIComponent(window.location.href);
        }

        function reportIssue() {
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?action=reportIssue&from=' + encodeURIComponent(window.location.href);
        }

        // --- 錯誤提示 UI ---
        function showErrorToast(message) {
            const toast = document.getElementById('alertToast');
            const text = document.getElementById('alertToastText');
            text.innerText = message;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 4000);
        }

        // --- 核心連線邏輯 ---
        async function initSocketConnection() {
            let serverUrl = new URLSearchParams(window.location.search).get('server');
            
            if (!serverUrl) {
                try {
                    const res = await fetch('https://pandapanda6666.github.io/login-hub/server_url.txt');
                    if (res.ok) {
                        serverUrl = (await res.text()).trim();
                    } else {
                        throw new Error('無法取得 server_url.txt 文件');
                    }
                } catch (e) {
                    showErrorToast('伺服器連線失敗，請稍後再試。');
                    return;
                }
            }

            // 確保不是 localhost
            if (serverUrl.includes('localhost') || serverUrl.includes('127.0.0.1')) {
                showErrorToast('伺服器連線失敗，嚴禁連線至本地端伺服器！');
                return;
            }

            // 建立 Socket 連線
            socket = io(serverUrl);

            socket.on('connect', () => {
                socket.emit('initClientInfo', { location: '未知地點', device: navigator.userAgent });
                socket.emit('joinGameRoom', { room: appId, characterData: {} });
                
                // 雲端歷史觀看紀錄讀取
                socket.emit('getAppData', { appId: appId }, (res) => {
                    if (res && res.data && res.data.lastWatchedCodes) {
                        const saved = res.data.lastWatchedCodes;
                        if (saved.length > 0) {
                            document.getElementById('inputPairCode').value = saved.join(', ');
                        }
                    }
                });
            });

            // 綁定前先清除舊的監聽器，嚴防重複連線重複綁定監聽！
            socket.off('appData');
            socket.on('appData', handleIncomingAppData);

            checkSSO();
            
            // 啟用觀看端：自動偵測音訊累積延遲並強行同步追上 (Drift Correction)
            initLatencyCorrection();

            // 啟用觀看端：離線檢測清掃器
            initOfflineCleaner();
        }

        // --- 模式切換事件 ---
        document.getElementById('modeCamera').onclick = async () => {
            myRole = 'camera';
            document.getElementById('lobbySection').classList.add('hidden');
            document.getElementById('cameraUI').classList.remove('hidden');
            document.getElementById('pairCodeDisplay').innerText = myPairCode;
            await initCameraBroadcaster();
        };

        document.getElementById('modeViewer').onclick = () => {
            myRole = 'viewer';
            document.getElementById('lobbySection').classList.add('hidden');
            document.getElementById('viewerUI').classList.remove('hidden');
        };

        // --- 更新相機端的廣播狀態燈 ---
        function updateCameraStatusIndicator() {
            const dot = document.getElementById('indicatorDot');
            const txt = document.getElementById('indicatorText');
            if (activeViewers.length > 0) {
                dot.className = "h-2 w-2 bg-red-500 rounded-full animate-pulse";
                txt.innerText = `畫面串流廣播中 (${activeViewers.length} 人正在觀看)`;
            } else {
                dot.className = "h-2 w-2 bg-slate-500 rounded-full";
                txt.innerText = "靜止待機中 (無人連線不佔頻寬)";
            }
        }

        // --- 相機端廣播邏輯 (高流暢觀眾追蹤與畫質自動調適防延遲版) ---
        async function initCameraBroadcaster() {
            const statusLabel = document.getElementById('cameraStatus');
            try {
                // 如果已經有舊的串流，先徹底關閉
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }

                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 480, height: 360, frameRate: 30 }, // 升級最高支援 30 FPS
                    audio: true 
                });
                document.getElementById('localVideo').srcObject = localStream;
                statusLabel.innerText = "裝置準備就緒，已啟用「低延遲追頻機制與無人看自動休眠」系統。";

                // 隱藏畫布用於壓縮擷取
                const capCanvas = document.createElement('canvas');
                capCanvas.width = 320; 
                capCanvas.height = 240;
                const ctx = capCanvas.getContext('2d', { willReadFrequently: true });
                const videoEl = document.getElementById('localVideo');

                // 動態啟動或重啟影像擷取迴圈 (防重疊與頻率即時響應機制)
                function startCaptureLoop() {
                    stopCaptureLoop();
                    
                    videoInterval = setInterval(() => {
                        // 核心優化：如果沒有觀眾，直接跳過不發送！
                        if (activeViewers.length === 0) return;

                        if (videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
                            ctx.drawImage(videoEl, 0, 0, capCanvas.width, capCanvas.height);
                            const base64Frame = capCanvas.toDataURL('image/jpeg', currentCaptureQuality); 
                            
                            socket.emit('appData', {
                                room: appId,
                                action: 'videoFrame',
                                pairCode: myPairCode,
                                senderId: myUuid,
                                image: base64Frame
                            });
                        }
                    }, currentCaptureInterval);
                }

                // 監聽選單變更，加入「防延遲畫質降載調節器」
                document.getElementById('fpsSelect').onchange = (e) => {
                    currentCaptureInterval = parseInt(e.target.value);
                    
                    // 【低延遲自動調節機制】：如果選擇了 30 FPS (33ms)，自動下調預設畫質到 0.15 或 0.2，避免網路阻塞產生延遲！
                    if (currentCaptureInterval <= 33) { 
                        document.getElementById('qualitySelect').value = "0.1";
                        currentCaptureQuality = 0.1;
                    } else if (currentCaptureInterval <= 100) {
                        document.getElementById('qualitySelect').value = "0.3";
                        currentCaptureQuality = 0.3;
                    }
                    
                    if (activeViewers.length > 0) {
                        startCaptureLoop();
                    }
                    socket.emit('logAppMessage', { appId: appId, message: `更改頻率為: ${e.target.value}ms，已自動調整畫質防延遲。`, type: 'info' });
                };

                document.getElementById('qualitySelect').onchange = (e) => {
                    currentCaptureQuality = parseFloat(e.target.value);
                    socket.emit('logAppMessage', { appId: appId, message: `更改畫質為: ${e.target.value}`, type: 'info' });
                };

                // 建立麥克風音訊切片發送實例 (先不啟動，等待觀眾觸發)
                const audioTracks = localStream.getAudioTracks();
                if (audioTracks.length > 0) {
                    const micStream = new MediaStream([audioTracks[0]]);
                    micRecorder = new MediaRecorder(micStream, { mimeType: 'audio/webm;codecs=opus' });
                    
                    micRecorder.ondataavailable = async (e) => {
                        if (activeViewers.length === 0) return;

                        if (e.data.size > 0 && socket && socket.connected) {
                            socket.emit('appData', {
                                room: appId,
                                action: 'audioChunk',
                                pairCode: myPairCode,
                                senderId: myUuid,
                                chunk: e.data
                            });
                        }
                    };
                }

                socket.emit('logAppMessage', { appId: appId, message: `相機端開始廣播代碼: ${myPairCode}`, type: 'info' });

            } catch (err) {
                console.error(err);
                statusLabel.innerText = "權限授權失敗或本機無可用視訊音訊裝置！";
                showErrorToast("無法存取相機，請點選 Chrome 網址列左側圖示確認權限設定。");
            }
        }

        // --- 相機端動態傳輸開關控制 (0% 閒置損耗防線) ---
        function stopCaptureLoop() {
            if (videoInterval) {
                clearInterval(videoInterval);
                videoInterval = null;
            }
        }

        function startBroadcasting() {
            // 觀眾加入，重新啟動影像與聲音擷取
            const statusLabel = document.getElementById('cameraStatus');
            statusLabel.innerText = "觀眾已進入！影像與音訊全速廣播傳輸中...";
            
            // 1. 影像重啟
            const fpsVal = parseInt(document.getElementById('fpsSelect').value);
            currentCaptureInterval = fpsVal;
            
            if (videoInterval) clearInterval(videoInterval);
            const videoEl = document.getElementById('localVideo');
            const capCanvas = document.createElement('canvas');
            capCanvas.width = 320;
            capCanvas.height = 240;
            const ctx = capCanvas.getContext('2d', { willReadFrequently: true });

            videoInterval = setInterval(() => {
                if (activeViewers.length === 0) return;
                if (videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
                    ctx.drawImage(videoEl, 0, 0, capCanvas.width, capCanvas.height);
                    const base64Frame = capCanvas.toDataURL('image/jpeg', currentCaptureQuality); 
                    socket.emit('appData', {
                        room: appId,
                        action: 'videoFrame',
                        pairCode: myPairCode,
                        senderId: myUuid,
                        image: base64Frame
                    });
                }
            }, currentCaptureInterval);

            // 2. 音訊重啟
            if (micRecorder && micRecorder.state === 'inactive') {
                try {
                    micRecorder.start(400); 
                } catch(e) {}
            }
        }

        function stopBroadcasting() {
            // 觀眾清零，完全暫停擷取，讓硬體徹底休息
            const statusLabel = document.getElementById('cameraStatus');
            statusLabel.innerText = "無人觀看中。影像與音訊已暫停傳送以節省流量。";
            stopCaptureLoop();
            if (micRecorder && micRecorder.state !== 'inactive') {
                try {
                    micRecorder.stop();
                } catch(e) {}
            }
        }

        // --- 觀看端：頻道添加連線 ---
        document.getElementById('btnConnect').onclick = () => {
            const codeInput = document.getElementById('inputPairCode').value.trim();
            if (!codeInput) return;

            // 支援批次輸入, 用逗號或空格分隔
            const codes = codeInput.split(/[\s,]+/).map(c => c.trim()).filter(c => c.length === 6);
            if (codes.length === 0) {
                document.getElementById('viewerStatus').innerText = "輸入代碼格式有誤，必須為 6 位數字";
                return;
            }

            codes.forEach(code => {
                if (!watchedCodes.has(code)) {
                    watchedCodes.add(code);
                    // 向相機廣播端通知：有人開始監看您了！
                    socket.emit('appData', {
                        room: appId,
                        action: 'request_socket_stream',
                        pin: code,
                        requesterId: myUuid
                    });
                }
            });
            
            // 更新 UI 頻道清單
            document.getElementById('activeCodesList').innerText = Array.from(watchedCodes).join(', ');
            document.getElementById('viewerStatus').innerText = "開始連線並監聽頻道串流...";

            // 備份紀錄到雲端
            socket.emit('saveAppData', { 
                appId: appId, 
                data: { lastWatchedCodes: Array.from(watchedCodes) } 
            });

            socket.emit('logAppMessage', { appId: appId, message: `觀看端加入頻道: ${codes.join(', ')}`, type: 'info' });
        };

        // --- 觀看端接收轉發數據 ---
        function handleIncomingAppData(data) {
            // A. 當我們是相機端時，需要聽有沒有觀眾加入或離開
            if (myRole === 'camera' && data.pin === myPairCode) {
                if (data.action === 'request_socket_stream') {
                    if (!activeViewers.includes(data.requesterId)) {
                        activeViewers.push(data.requesterId);
                        document.getElementById('camera-viewer-count').innerText = `線上觀看人數: ${activeViewers.length} 人`;
                        updateCameraStatusIndicator();
                        
                        // 當第一位觀眾進來時，開啟實時截圖與音訊錄製
                        if (activeViewers.length === 1) {
                            startBroadcasting();
                        }
                    }
                }
                else if (data.action === 'stop_stream') {
                    activeViewers = activeViewers.filter(id => id !== data.requesterId);
                    document.getElementById('camera-viewer-count').innerText = `線上觀看人數: ${activeViewers.length} 人`;
                    updateCameraStatusIndicator();
                    
                    // 當最後一位觀眾離開時，自動完全暫停
                    if (activeViewers.length === 0) {
                        stopBroadcasting();
                    }
                }
                return;
            }

            // B. 當我們是觀看端時，需要聽視訊影音串流
            if (myRole !== 'viewer' || !watchedCodes.has(data.pairCode)) return;

            const senderId = data.senderId;

            // 如果該相機來源尚未建立視窗，自動建立
            if (!remoteFeeds[senderId]) {
                createVideoFeedTile(senderId, data.pairCode);
            }

            const feed = remoteFeeds[senderId];
            feed.lastFrameTime = Date.now();

            if (data.action === 'videoFrame') {
                // 更新畫面的 Image 標籤
                feed.imgElement.src = data.image;
                
                // 強制覆寫狀態文字
                const playBtn = document.getElementById('play-btn-' + senderId);
                const statusEl = document.getElementById('status-' + senderId);
                if (statusEl) {
                    if (!playBtn || playBtn.style.display === 'none') {
                        statusEl.innerText = '接收影音中';
                        statusEl.className = 'text-xs ml-2 text-green-400';
                    } else {
                        statusEl.innerText = '影像抵達，請點擊接收影音';
                        statusEl.className = 'text-xs ml-2 text-yellow-400 animate-pulse';
                    }
                }
            } 
            else if (data.action === 'audioChunk') {
                playIncomingAudio(senderId, data.chunk);
            }
        }

        // 建立頻道分割畫面區塊
        function createVideoFeedTile(senderId, pairCode) {
            const container = document.getElementById('feedContainer');
            
            const tile = document.createElement('div');
            tile.className = "relative bg-slate-950 rounded-xl overflow-hidden aspect-video border border-slate-700 shadow-lg group transition-all duration-300";
            tile.id = `tile_${senderId}`;

            const img = document.createElement('img');
            img.className = "w-full h-full object-cover";
            img.id = `remote-video-${senderId}`;
            img.alt = "正在等待首影格...";

            const overlay = document.createElement('div');
            overlay.className = "absolute bottom-3 left-3 bg-slate-900/80 backdrop-blur px-3 py-1.5 rounded-lg text-xs flex items-center gap-2 text-slate-300 z-10 transition-opacity duration-300 group-hover:opacity-30";
            overlay.innerHTML = `
                <span class="h-2 w-2 bg-indigo-500 rounded-full animate-pulse"></span>
                <span>頻道: ${pairCode}</span>
                <span id="status-${senderId}" class="text-xs ml-2 text-yellow-400">連線中...</span>
            `;

            const audioEl = document.createElement('audio');
            audioEl.autoplay = true;
            audioEl.id = `remote-audio-${senderId}`;
            audioEl.className = "hidden";

            // 破解瀏覽器自動播放音軌的點擊覆蓋按鈕
            const playBtn = document.createElement('button');
            playBtn.id = `play-btn-${senderId}`;
            playBtn.className = "absolute inset-0 m-auto h-12 w-44 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-2xl z-20 transition transform hover:scale-105 active:scale-95 text-xs tracking-wider flex items-center justify-center gap-2";
            playBtn.innerHTML = `
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                點擊接收音訊
            `;
            playBtn.onclick = () => {
                playBtn.style.display = 'none';
                audioEl.play().catch(e => console.warn("解除靜音失敗:", e));
                const statusEl = document.getElementById('status-' + senderId);
                if (statusEl) {
                    statusEl.innerText = '接收影音中';
                    statusEl.className = 'text-xs ml-2 text-green-400';
                }
            };

            // 全螢幕按鈕
            const fullscreenBtn = document.createElement('button');
            fullscreenBtn.className = "absolute top-3 left-3 bg-slate-800/80 hover:bg-slate-700 p-2 rounded-lg text-white opacity-0 group-hover:opacity-100 transition duration-200 shadow-md z-30";
            fullscreenBtn.innerHTML = `
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" /></svg>
            `;
            fullscreenBtn.onclick = () => {
                if (!document.fullscreenElement) {
                    tile.requestFullscreen().catch(err => {
                        showErrorToast(`無法進入全螢幕: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            };

            const closeBtn = document.createElement('button');
            closeBtn.className = "absolute top-3 right-3 bg-red-600/90 hover:bg-red-500 p-2 rounded-lg text-white opacity-0 group-hover:opacity-100 transition duration-200 shadow-md z-30";
            closeBtn.innerHTML = `
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            `;
            closeBtn.onclick = () => {
                removeFeed(senderId, pairCode);
            };

            tile.appendChild(img);
            tile.appendChild(overlay);
            tile.appendChild(audioEl);
            tile.appendChild(playBtn);
            tile.appendChild(fullscreenBtn);
            tile.appendChild(closeBtn);
            container.appendChild(tile);

            // 建立 MediaSource 音訊緩衝拼接架構
            const ms = new MediaSource();
            audioEl.src = URL.createObjectURL(ms);

            remoteFeeds[senderId] = {
                pairCode: pairCode,
                imgElement: img,
                lastFrameTime: Date.now(),
                mediaSource: ms,
                sourceBuffer: null,
                audioQueue: [],
                audioEl: audioEl 
            };

            ms.addEventListener('sourceopen', () => {
                try {
                    const sb = ms.addSourceBuffer('audio/webm; codecs=opus');
                    remoteFeeds[senderId].sourceBuffer = sb;

                    sb.addEventListener('updateend', () => {
                        const feed = remoteFeeds[senderId];
                        if (feed && feed.audioQueue.length > 0 && !sb.updating) {
                            sb.appendBuffer(feed.audioQueue.shift());
                        }
                    });
                } catch(e) {
                    console.warn("建立音訊緩衝失敗，瀏覽器可能不支援 WebM/Opus");
                }
            });
        }

        // 移除連線頻道
        function removeFeed(senderId, pairCode) {
            const tile = document.getElementById(`tile_${senderId}`);
            if (tile) tile.remove();
            
            const feed = remoteFeeds[senderId];
            if (feed) {
                if (feed.audioEl) {
                    feed.audioEl.pause();
                    URL.revokeObjectURL(feed.audioEl.src);
                }
                delete remoteFeeds[senderId];
            }

            // 檢查是否還有該配對碼的其他廣播，沒有的話從 watchedCodes 中移除
            const stillHas = Object.values(remoteFeeds).some(f => f.pairCode === pairCode);
            if (!stillHas) {
                watchedCodes.delete(pairCode);
                document.getElementById('activeCodesList').innerText = Array.from(watchedCodes).join(', ') || '尚無連線';
            }

            // 通知相機端：我們不再觀看您了，如果沒有人看請關閉廣播節省流量！
            socket.emit('appData', {
                room: appId,
                action: 'stop_stream',
                pin: pairCode,
                requesterId: myUuid
            });
        }

        // 音訊串流硬體加速解碼播放 (二進位 ArrayBuffer)
        async function playIncomingAudio(senderId, binaryChunk) {
            const feed = remoteFeeds[senderId];
            if (!feed || !feed.sourceBuffer) return;

            // 判定並轉換二進位數據 (相容 ArrayBuffer 或 Blob)
            let arrayBuffer;
            if (binaryChunk instanceof ArrayBuffer) {
                arrayBuffer = binaryChunk;
            } else if (binaryChunk instanceof Blob) {
                arrayBuffer = await binaryChunk.arrayBuffer();
            } else if (typeof binaryChunk === 'string') {
                // 回退 Base64 轉換 (極少發生)
                const binary = atob(binaryChunk);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                arrayBuffer = bytes.buffer;
            } else {
                arrayBuffer = binaryChunk;
            }

            const sb = feed.sourceBuffer;
            if (!sb.updating && feed.audioQueue.length === 0) {
                try {
                    sb.appendBuffer(arrayBuffer);
                } catch(e) {}
            } else {
                feed.audioQueue.push(arrayBuffer);
                // 防溢出快取控制
                if (feed.audioQueue.length > 5) {
                    feed.audioQueue.shift(); // 丟棄過老音訊，確保低延遲
                }
            }
        }

        // --- 核心優化：觀看端追頻防延遲定時器 (Drift Correction) ---
        function initLatencyCorrection() {
            setInterval(() => {
                if (myRole !== 'viewer') return;
                
                Object.values(remoteFeeds).forEach(feed => {
                    const audioEl = feed.audioEl;
                    // 當音訊有快取，且快取結束時間與當前播放進度相差超過 1 秒 (累積了網路阻塞延遲)
                    if (audioEl && audioEl.buffered.length > 0) {
                        const bufferedEnd = audioEl.buffered.end(audioEl.buffered.length - 1);
                        const latency = bufferedEnd - audioEl.currentTime;
                        
                        if (latency > 1.0) {
                            // 【低延遲追頻控制】：直接將播放時間強行快進到最新位置，徹底消滅秒數累積延遲！
                            audioEl.currentTime = bufferedEnd - 0.1;
                        }
                    }
                });
            }, 800); // 每 800ms 精準掃描一次緩衝池
        }

        // --- 核心優化：離線自動偵測與徹底關閉清掃器 (Drift Correction) ---
        function initOfflineCleaner() {
            setInterval(() => {
                if (myRole !== 'viewer') return;
                const now = Date.now();
                Object.entries(remoteFeeds).forEach(([senderId, feed]) => {
                    // 超過 5 秒未收到任何影像更新，判定對方已離線或斷網
                    if (now - feed.lastFrameTime > 5000) {
                        removeFeed(senderId, feed.pairCode);
                        showErrorToast(`頻道代碼 ${feed.pairCode} 偵測到離線，已自動關閉其連接。`);
                    }
                });
            }, 2000); // 每 2 秒清掃一次死頻道
        }

        // --- 背景 2D Canvas 純淨多頻道拼圖與合成引擎 ---
        function startOffscreenCompositor() {
            if (!isRecording) {
                if (canvasRenderLoopId) {
                    cancelAnimationFrame(canvasRenderLoopId);
                    canvasRenderLoopId = null;
                }
                return;
            }

            const canvas = document.getElementById('hiddenCanvas');
            const ctx = canvas.getContext('2d');
            
            // 錄製視訊解析度固定 1280x720
            canvas.width = 1280;
            canvas.height = 720;

            function render() {
                if (myRole !== 'viewer' || !isRecording) return;

                const activeFeeds = Object.entries(remoteFeeds);
                // 背景塗成純黑
                ctx.fillStyle = "#000000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const count = activeFeeds.length;
                if (count > 0) {
                    let cols = Math.ceil(Math.sqrt(count));
                    let rows = Math.ceil(count / cols);
                    let w = canvas.width / cols;
                    let h = canvas.height / rows;

                    activeFeeds.forEach(([id, feed], index) => {
                        // 💡 終極優化：直接將 HTMLImageElement 渲染上畫布，避開二次解碼 Image 的效能損耗！
                        const img = feed.imgElement;
                        if (img && img.complete && img.naturalWidth > 0) {
                            let col = index % cols;
                            let row = Math.floor(index / cols);
                            let x = col * w;
                            let y = row * h;
                            ctx.drawImage(img, x, y, w, h);
                        }
                    });
                } else {
                    ctx.fillStyle = "white";
                    ctx.font = "30px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText("正在等待遠端影像串流...", canvas.width / 2, canvas.height / 2);
                }

                canvasRenderLoopId = requestAnimationFrame(render);
            }
            render();
        }

        // --- 純淨 Canvas 影像錄製與匯出模組 ---
        document.getElementById('btnStartRecord').onclick = () => {
            isRecording = true;
            startOffscreenCompositor(); // 僅在錄影開啟時，動態啟動 Canvas 拼圖迴圈，平時 0 效能負擔

            const canvas = document.getElementById('hiddenCanvas');
            
            // 擷取無 UI 純淨畫布影像訊號 (每秒 15 幀，順暢不卡頓)
            const stream = canvas.captureStream(15);
            
            // 高位元率高畫質無損設定：鎖定高位元率 (10 Mbps) 避免被瀏覽器默認壓縮劣化畫質
            let options = { videoBitsPerSecond: 10000000 }; 
            
            if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                options.mimeType = 'video/webm;codecs=vp9';
            } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) {
                options.mimeType = 'video/webm;codecs=vp8';
            } else {
                options.mimeType = 'video/webm';
            }

            try {
                mediaRecorder = new MediaRecorder(stream, options);
            } catch(e) {
                showErrorToast('您的瀏覽器不支援 WebM 影像錄製。');
                return;
            }

            recordedChunks = [];
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) {
                    recordedChunks.push(e.data);
                }
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                // 強制觸發瀏覽器下載
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `Panda遠端監視錄製_${new Date().toISOString().slice(0,10)}_${Math.floor(100+Math.random()*900)}.webm`;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
            };

            mediaRecorder.start();

            document.getElementById('btnStartRecord').classList.add('hidden');
            document.getElementById('btnStopRecord').classList.remove('hidden');

            socket.emit('logAppMessage', { appId: appId, message: '開啟多頻道純淨影像畫布錄製', type: 'info' });
        };

        document.getElementById('btnStopRecord').onclick = () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            startOffscreenCompositor(); // 錄製停止，完全關閉背景 Canvas 渲染，減少硬體耗損

            document.getElementById('btnStartRecord').classList.remove('hidden');
            document.getElementById('btnStopRecord').classList.add('hidden');
        };

        // --- 相機端（本地）錄影控制邏輯 ---
        document.getElementById('btnCameraStartRecord').onclick = () => {
            if (!localStream) {
                showErrorToast("相機裝置尚未就緒，無法錄影！");
                return;
            }

            cameraRecordedChunks = [];
            let options = { videoBitsPerSecond: 10000000 }; // 本地高清錄影 10 Mbps 畫質不打折
            
            if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                options.mimeType = 'video/webm;codecs=vp9';
            } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) {
                options.mimeType = 'video/webm;codecs=vp8';
            } else {
                options.mimeType = 'video/webm';
            }

            try {
                cameraRecorder = new MediaRecorder(localStream, options);
            } catch (e) {
                cameraRecorder = new MediaRecorder(localStream);
            }

            cameraRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) {
                    cameraRecordedChunks.push(e.data);
                }
            };

            cameraRecorder.onstop = () => {
                const blob = new Blob(cameraRecordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `Panda相機端本地錄製_${new Date().toISOString().slice(0,10)}_${Math.floor(100+Math.random()*900)}.webm`;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);

                // 重設相機端錄影指示燈狀態
                document.getElementById('cameraRecordDot').className = "h-2 w-2 bg-slate-400 rounded-full";
                document.getElementById('cameraRecordStatusText').innerText = "本地錄影未啟動";
            };

            cameraRecorder.start();
            isCameraRecording = true;

            document.getElementById('btnCameraStartRecord').classList.add('hidden');
            document.getElementById('btnCameraStopRecord').classList.remove('hidden');
            
            document.getElementById('cameraRecordDot').className = "h-2 w-2 bg-red-500 rounded-full animate-ping";
            document.getElementById('cameraRecordStatusText').innerText = "本地錄影中...";
            
            if (socket && socket.connected) {
                socket.emit('logAppMessage', { appId: appId, message: '相機端開啟本地高清錄影', type: 'info' });
            }
        };

        document.getElementById('btnCameraStopRecord').onclick = () => {
            if (cameraRecorder && cameraRecorder.state !== 'inactive') {
                cameraRecorder.stop();
            }
            isCameraRecording = false;

            document.getElementById('btnCameraStartRecord').classList.remove('hidden');
            document.getElementById('btnCameraStopRecord').classList.add('hidden');
        };

        // --- 載入時初始化 ---
        window.onload = initSocketConnection;
    </script>
</body>
</html>
