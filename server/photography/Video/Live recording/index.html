<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遠端監看系統</title>
    
    <link rel="icon" href="data:,">

    <script>
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
            originalWarn.apply(console, args);
        };
        
        window.onerror = function(msg, url, line) { 
            if (typeof socket !== 'undefined' && socket.connected) socket.emit('logError', { errorMsg: msg, url: url, line: line }); 
        };
        
        window.addEventListener('unhandledrejection', function(event) {
            const reasonMsg = event.reason ? (event.reason.message || event.reason) : '未知錯誤';
            
            if (typeof reasonMsg === 'string' && reasonMsg.includes('message channel closed before a response was received')) {
                return;
            }

            if (typeof socket !== 'undefined' && socket.connected) {
                socket.emit('logError', { errorMsg: 'Promise異常: ' + reasonMsg, url: window.location.href, line: 0 });
            }
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .video-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000; border-radius: 0.5rem; overflow: hidden; border: 1px solid #333; }
        video { width: 100%; height: auto; display: block; min-height: 200px; background-color: #111; }
        .camera-pin { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; z-index: 10; font-size: 0.9rem; }
        .grid-videos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
        .viewer-count { position: absolute; top: 10px; left: 10px; background: rgba(0,100,200,0.8); color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; z-index: 10; font-size: 0.9rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <script>
        const appId = window.location.hostname + window.location.pathname;
        let socket;
        let currentUser = null;

        let localStream = null;
        let currentMode = null; 
        let myPin = null;
        const peers = {}; 
        const watchedPins = []; 
        let viewerCount = 0;

        const iceServers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:global.stun.twilio.com:3478' }
            ]
        };

        async function initConnection() {
            let serverUrl = '';
            const urlParams = new URLSearchParams(window.location.search);
            const serverParam = urlParams.get('server');

            if (serverParam) {
                serverUrl = serverParam;
            } else {
                try {
                    const response = await fetch('https://pandapanda6666.github.io/login-hub/server_url.txt');
                    if (!response.ok) throw new Error('Network response was not ok');
                    serverUrl = await response.text();
                    serverUrl = serverUrl.trim();
                } catch (error) {
                    showSystemMessage('伺服器連線失敗，請稍後再試', true);
                    return;
                }
            }

            if (!serverUrl) {
                showSystemMessage('伺服器連線失敗，請稍後再試', true);
                return;
            }

            socket = io(serverUrl, { transports: ['websocket'] });

            socket.on('connect', () => {
                showSystemMessage('信令伺服器連線成功', false);
                socket.emit('initClientInfo', { location: '未知地點', device: navigator.userAgent });
                socket.emit('joinGameRoom', { room: appId, characterData: {} });
                checkAuth();
                setupWebRTCListeners();
            });

            socket.on('disconnect', () => {
                showSystemMessage('已與伺服器斷線，嘗試重連中...', true);
            });
        }

        function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const auth = urlParams.get('auth');
            const user = urlParams.get('user');

            const headerContainer = document.getElementById('header-container');

            if (auth === 'true' && user) {
                socket.emit('requestProfile', { username: user });
                socket.on('profileData', (data) => {
                    currentUser = data;
                    renderUserProfile(data);
                    
                    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                    window.history.replaceState({path: newUrl}, '', newUrl);

                    socket.emit('getAppData', { appId: appId }, (res) => {
                        if (res && res.watchedPins) {
                            res.watchedPins.forEach(pin => {
                                if(!watchedPins.includes(pin)) {
                                    watchedPins.push(pin);
                                    addWatcherVideoPlaceholder(pin);
                                    if(currentMode === 'watcher') {
                                        requestCameraStream(pin);
                                    }
                                }
                            });
                        }
                    });
                });
            } else {
                renderGuestLogin();
            }
        }

        function renderUserProfile(data) {
            const headerContainer = document.getElementById('header-container');
            headerContainer.innerHTML = `
                <div class="flex items-center space-x-3 cursor-pointer bg-white p-2 rounded-lg shadow-sm hover:shadow-md transition" onclick="goToSSO()">
                    <img src="${data.avatar || 'https://via.placeholder.com/40'}" alt="頭像" class="w-10 h-10 rounded-full border border-gray-200">
                    <div>
                        <div class="font-bold text-gray-800 text-sm">${data.nickname || '玩家'} <span class="text-xs text-blue-500">Lv.${data.level || 1}</span></div>
                        <div class="text-xs text-yellow-600 font-semibold">P幣: ${data.pCoin || 0}</div>
                    </div>
                </div>
            `;
        }

        function renderGuestLogin() {
            const headerContainer = document.getElementById('header-container');
            headerContainer.innerHTML = `
                <button onclick="goToSSO(true)" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow">
                    登入 / 註冊
                </button>
            `;
        }

        function goToSSO(requireAuth = false) {
            let ssoUrl = 'https://pandapanda6666.github.io/login-hub/?from=' + encodeURIComponent(window.location.href);
            if (requireAuth) {
                ssoUrl += '&require=1';
            }
            window.location.href = ssoUrl;
        }

        function reportIssue() {
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?action=reportIssue&from=' + encodeURIComponent(window.location.href);
        }

        function showSystemMessage(msg, isError = false) {
            const msgDiv = document.getElementById('system-message');
            msgDiv.textContent = msg;
            msgDiv.className = `p-3 mb-4 rounded ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            msgDiv.style.display = 'block';
            setTimeout(() => { msgDiv.style.display = 'none'; }, 5000);
        }

        function updateWatcherStatus(pin, msg, isError = false) {
            const statusEl = document.getElementById('status-' + pin);
            if(statusEl) {
                statusEl.textContent = msg;
                statusEl.className = `text-xs ml-2 ${isError ? 'text-red-400' : 'text-yellow-400'}`;
                if(msg === '已連線' || msg.includes('成功')) {
                    statusEl.className = 'text-xs ml-2 text-green-400';
                }
            }
        }

        function updateCameraViewerCount() {
            const countEl = document.getElementById('camera-viewer-count');
            if(countEl) {
                let activeCount = 0;
                Object.values(peers).forEach(peerObj => {
                    if(peerObj.pc.iceConnectionState === 'connected' || peerObj.pc.iceConnectionState === 'completed') {
                        activeCount++;
                    }
                });
                countEl.textContent = `觀看人數: ${activeCount}`;
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-selection').style.display = 'none';
            if (mode === 'camera') {
                document.getElementById('camera-mode-ui').style.display = 'block';
                startCameraMode();
            } else {
                document.getElementById('watcher-mode-ui').style.display = 'block';
                if(watchedPins.length > 0) {
                    watchedPins.forEach(pin => requestCameraStream(pin));
                }
            }
        }

        async function startCameraMode() {
            if (!window.isSecureContext) {
                showSystemMessage('警告：您的瀏覽器環境非安全連線 (HTTPS)，可能無法開啟相機權限！', true);
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const videoEl = document.getElementById('local-video');
                videoEl.srcObject = localStream;
                
                myPin = Math.floor(100000 + Math.random() * 900000).toString();
                document.getElementById('camera-pin-display').textContent = '代碼: ' + myPin;

                socket.emit('logAppMessage', { appId: appId, message: '開啟被監看模式，代碼:' + myPin, type: 'info' });
            } catch (err) {
                let errMsg = err.message;
                if (err.name === 'NotAllowedError') errMsg = '您拒絕了相機與麥克風的權限。';
                if (err.name === 'NotFoundError') errMsg = '找不到相機設備，請確認筆電鏡頭是否正常。';
                showSystemMessage('無法取得相機權限: ' + errMsg, true);
            }
        }

        function watchNewCamera() {
            const pinInput = document.getElementById('watch-pin-input').value.trim();
            if (pinInput.length !== 6) {
                alert('請輸入6位數代碼');
                return;
            }
            if (!watchedPins.includes(pinInput)) {
                watchedPins.push(pinInput);
                addWatcherVideoPlaceholder(pinInput);
                saveCloudData();
                socket.emit('logAppMessage', { appId: appId, message: '嘗試監看代碼:' + pinInput, type: 'info' });
            }
            requestCameraStream(pinInput);
            document.getElementById('watch-pin-input').value = '';
        }

        function saveCloudData() {
            if (currentUser) {
                socket.emit('saveAppData', { appId: appId, data: { watchedPins: watchedPins } });
            }
        }

        function addWatcherVideoPlaceholder(pin) {
            const container = document.getElementById('remote-videos-container');
            if (document.getElementById('video-wrapper-' + pin)) return;

            const wrapper = document.createElement('div');
            wrapper.id = 'video-wrapper-' + pin;
            wrapper.className = 'video-container shadow-lg';
            wrapper.innerHTML = `
                <div class="camera-pin">監看代碼: ${pin} <span id="status-${pin}" class="text-yellow-400 text-xs ml-2">等待操作...</span></div>
                <video id="remote-video-${pin}" autoplay playsinline controls></video>
                <div class="absolute bottom-2 right-2 flex space-x-2 z-10">
                    <button onclick="requestCameraStream('${pin}')" class="bg-blue-600 text-white px-2 py-1 rounded text-xs">重連</button>
                    <button onclick="removeWatcher('${pin}')" class="bg-red-600 text-white px-2 py-1 rounded text-xs">移除</button>
                </div>
            `;
            container.appendChild(wrapper);
        }

        function removeWatcher(pin) {
            const index = watchedPins.indexOf(pin);
            if (index > -1) {
                watchedPins.splice(index, 1);
                saveCloudData();
            }
            const wrapper = document.getElementById('video-wrapper-' + pin);
            if (wrapper) wrapper.remove();
            
            Object.keys(peers).forEach(peerId => {
                if (peers[peerId].pin === pin) {
                    peers[peerId].pc.close();
                    delete peers[peerId];
                }
            });
        }

        function requestCameraStream(pin) {
            updateWatcherStatus(pin, '尋找裝置中...');
            socket.emit('appData', {
                room: appId,
                action: 'webrtc_signal',
                signalData: { type: 'request_stream', pin: pin, requesterId: socket.id }
            });
            
            setTimeout(() => {
                const statusEl = document.getElementById('status-' + pin);
                if(statusEl && statusEl.textContent === '尋找裝置中...') {
                    updateWatcherStatus(pin, '對方未上線或代碼錯誤', true);
                }
            }, 10000);
        }

        function setupWebRTCListeners() {
            socket.on('appData', async (data) => {
                if (data.action !== 'webrtc_signal') return;
                const signal = data.signalData;

                if (currentMode === 'camera' && signal.type === 'request_stream' && signal.pin === myPin) {
                    const peerId = signal.requesterId;
                    const pc = new RTCPeerConnection(iceServers);
                    peers[peerId] = { pc: pc };

                    if (localStream) {
                        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                    } else {
                        showSystemMessage('警告：尚未獲取到本地影像，無法發送串流', true);
                    }

                    pc.onicecandidate = event => {
                        if (event.candidate) {
                            socket.emit('appData', {
                                room: appId, action: 'webrtc_signal',
                                signalData: { type: 'candidate', targetId: peerId, senderId: socket.id, candidate: event.candidate, pin: myPin }
                            });
                        }
                    };

                    pc.oniceconnectionstatechange = () => {
                        updateCameraViewerCount();
                    };

                    try {
                        const offer = await pc.createOffer();
                        await pc.setLocalDescription(offer);
                        socket.emit('appData', {
                            room: appId, action: 'webrtc_signal',
                            signalData: { type: 'offer', targetId: peerId, senderId: socket.id, sdp: offer, pin: myPin }
                        });
                    } catch (e) {
                        console.error('創建 Offer 失敗:', e);
                    }
                }

                if (signal.targetId !== socket.id) return; 

                if (currentMode === 'watcher' && signal.type === 'offer') {
                    const peerId = signal.senderId;
                    const pin = signal.pin;
                    
                    updateWatcherStatus(pin, '交換信令中...');
                    
                    const pc = new RTCPeerConnection(iceServers);
                    peers[peerId] = { pc: pc, pin: pin };

                    pc.onicecandidate = event => {
                        if (event.candidate) {
                            socket.emit('appData', {
                                room: appId, action: 'webrtc_signal',
                                signalData: { type: 'candidate', targetId: peerId, senderId: socket.id, candidate: event.candidate }
                            });
                        }
                    };

                    pc.ontrack = event => {
                        const videoEl = document.getElementById('remote-video-' + pin);
                        if (videoEl && videoEl.srcObject !== event.streams[0]) {
                            videoEl.srcObject = event.streams[0];
                            videoEl.onloadedmetadata = () => {
                                videoEl.play().catch(e => console.error('自動播放被瀏覽器阻擋:', e));
                            };
                            updateWatcherStatus(pin, '接收影像中...');
                        }
                    };

                    pc.oniceconnectionstatechange = () => {
                        const state = pc.iceConnectionState;
                        if(state === 'checking') updateWatcherStatus(pin, '網路打洞中(STUN)...');
                        else if(state === 'connected' || state === 'completed') updateWatcherStatus(pin, 'P2P連線成功');
                        else if(state === 'disconnected') updateWatcherStatus(pin, '網路不穩，斷線中', true);
                        else if(state === 'failed') updateWatcherStatus(pin, '防火牆阻擋，連線失敗', true);
                        else if(state === 'closed') updateWatcherStatus(pin, '連線已關閉', true);
                    };

                    try {
                        await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);

                        socket.emit('appData', {
                            room: appId, action: 'webrtc_signal',
                            signalData: { type: 'answer', targetId: peerId, senderId: socket.id, sdp: answer }
                        });
                    } catch (e) {
                        updateWatcherStatus(pin, '信令處理失敗', true);
                        console.error('處理 Offer 失敗:', e);
                    }
                }

                if (currentMode === 'camera' && signal.type === 'answer') {
                    const peerId = signal.senderId;
                    if (peers[peerId]) {
                        try {
                            await peers[peerId].pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                        } catch (e) {
                            console.error('設定 Remote Answer 失敗:', e);
                        }
                    }
                }

                if (signal.type === 'candidate') {
                    const peerId = signal.senderId;
                    if (peers[peerId]) {
                        try {
                            await peers[peerId].pc.addIceCandidate(new RTCIceCandidate(signal.candidate));
                        } catch (e) {
                            console.error('加入 ICE Candidate 失敗', e);
                        }
                    }
                }
            });
        }

        window.onload = initConnection;
    </script>

    <header class="bg-gray-800 p-4 flex justify-between items-center text-white shadow-md">
        <h1 class="text-xl font-bold tracking-wider">即時遠端監看系統</h1>
        <div id="header-container">
            <span class="text-sm text-gray-400">載入中...</span>
        </div>
    </header>

    <main class="flex-grow p-4 md:p-8">
        <div id="system-message" style="display:none;"></div>

        <div id="mode-selection" class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg text-center">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">請選擇您的裝置模式</h2>
            <div class="space-y-4">
                <button onclick="setMode('camera')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow">
                    視為被監看端 (相機模式)
                </button>
                <button onclick="setMode('watcher')" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow">
                    視為觀看端 (監看模式)
                </button>
            </div>
            <p class="mt-4 text-sm text-gray-500">提示：系統已自動連接雲端伺服器，資料即時同步。</p>
        </div>

        <div id="camera-mode-ui" style="display: none;" class="text-center">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">被監看模式 (發送中)</h2>
            <div class="video-container shadow-xl">
                <div id="camera-viewer-count" class="viewer-count">觀看人數: 0</div>
                <div id="camera-pin-display" class="camera-pin">代碼: 產生中...</div>
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            <p class="mt-4 text-gray-600">請在另一台裝置輸入上方代碼以進行監看</p>
            <button onclick="location.reload()" class="mt-4 bg-gray-500 hover:bg-gray-600 text-white py-2 px-4 rounded">返回重新選擇</button>
        </div>

        <div id="watcher-mode-ui" style="display: none;">
            <div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-md mb-8">
                <h2 class="text-xl font-bold mb-4 text-gray-800">新增監看頻道</h2>
                <div class="flex space-x-2">
                    <input type="text" id="watch-pin-input" placeholder="請輸入6位數代碼" class="flex-grow border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500" maxlength="6">
                    <button onclick="watchNewCamera()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-6 rounded transition">連線</button>
                </div>
            </div>

            <div id="remote-videos-container" class="grid-videos max-w-6xl mx-auto">
            </div>
            <div class="text-center mt-8">
                <button onclick="location.reload()" class="bg-gray-500 hover:bg-gray-600 text-white py-2 px-4 rounded">返回重新選擇</button>
            </div>
        </div>
    </main>

    <!-- 浮動回報問題按鈕 -->
    <button onclick="reportIssue()" class="fixed bottom-16 right-6 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-5 rounded-full shadow-lg transition duration-200 z-50 flex items-center border-2 border-white">
        回報問題
    </button>
