<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遠端監看系統</title>
    
    <link rel="icon" href="data:,">

    <script>
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
            originalWarn.apply(console, args);
        };
        
        window.onerror = function(msg, url, line) { 
            if (typeof socket !== 'undefined' && socket.connected) socket.emit('logError', { errorMsg: msg, url: url, line: line }); 
        };
        
        window.addEventListener('unhandledrejection', function(event) {
            const reasonMsg = event.reason ? (event.reason.message || event.reason) : '未知錯誤';
            if (typeof reasonMsg === 'string' && reasonMsg.includes('message channel closed before a response was received')) return;
            if (typeof socket !== 'undefined' && socket.connected) {
                socket.emit('logError', { errorMsg: 'Promise異常: ' + reasonMsg, url: window.location.href, line: 0 });
            }
        });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .video-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000; border-radius: 0.5rem; overflow: hidden; border: 1px solid #333; }
        video, img.remote-img { width: 100%; height: auto; display: block; min-height: 200px; background-color: #111; object-fit: contain; }
        .camera-pin { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; z-index: 10; font-size: 0.9rem; }
        .grid-videos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
        .viewer-count { position: absolute; top: 10px; left: 10px; background: rgba(0,100,200,0.8); color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; z-index: 10; font-size: 0.9rem; }
        #debug-log { background: #111; color: #0f0; font-family: monospace; padding: 10px; height: 150px; overflow-y: auto; font-size: 0.8rem; margin-top: 20px; border-radius: 5px; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <script>
        let path = window.location.pathname;
        if (path.endsWith('index.html')) path = path.slice(0, -10);
        if (path.endsWith('/')) path = path.slice(0, -1);
        const appId = window.location.hostname + path;

        const myClientId = Math.random().toString(36).substring(2, 15);

        let socket;
        let currentUser = null;

        let localStream = null;
        let currentMode = null; 
        let myPin = null;
        const watchedPins = []; 
        let activeViewers = [];
        
        let sendFrameInterval = null;
        let audioRecorder = null;
        let lastFrameTimes = {};

        const audioQueues = {};
        const sourceBuffers = {};
        const mediaSources = {};

        function writeDebugLog(msg) {
            const logEl = document.getElementById('debug-log');
            if(logEl) {
                const time = new Date().toLocaleTimeString();
                logEl.innerHTML += `[${time}] ${msg}<br>`;
                logEl.scrollTop = logEl.scrollHeight;
            }
            console.log(`[Socket Debug] ${msg}`);
        }

        async function initConnection() {
            writeDebugLog(`系統初始化，專屬房間ID: ${appId}`);
            writeDebugLog(`本地客戶端識別碼: ${myClientId}`);

            let serverUrl = '';
            const urlParams = new URLSearchParams(window.location.search);
            const serverParam = urlParams.get('server');

            if (serverParam) {
                serverUrl = serverParam;
            } else {
                try {
                    const response = await fetch('https://pandapanda6666.github.io/login-hub/server_url.txt');
                    if (!response.ok) throw new Error('Network response was not ok');
                    serverUrl = await response.text();
                    serverUrl = serverUrl.trim();
                } catch (error) {
                    showSystemMessage('伺服器網址讀取失敗，請稍後再試', true);
                    return;
                }
            }

            if (!serverUrl) {
                showSystemMessage('伺服器網址為空，無法連線', true);
                return;
            }

            writeDebugLog(`準備連線至信令伺服器: ${serverUrl}`);
            socket = io(serverUrl);

            socket.on('connect', () => {
                showSystemMessage('伺服器連線成功', false);
                writeDebugLog(`Socket.IO 連線成功，Session: ${socket.id}`);
                socket.emit('initClientInfo', { location: '未知地點', device: navigator.userAgent });
                socket.emit('joinGameRoom', { room: appId, characterData: {} });
                writeDebugLog(`已送出加入房間請求: ${appId}`);
                checkAuth();
                setupSocketListeners();
            });

            socket.on('disconnect', () => {
                showSystemMessage('已與伺服器斷線，嘗試重連中...', true);
                writeDebugLog('Socket.IO 斷線');
                if (sendFrameInterval) clearInterval(sendFrameInterval);
                if (audioRecorder && audioRecorder.state !== 'inactive') audioRecorder.stop();
            });
        }

        function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const auth = urlParams.get('auth');
            const user = urlParams.get('user');

            const headerContainer = document.getElementById('header-container');

            if (auth === 'true' && user) {
                socket.emit('requestProfile', { username: user });
                socket.on('profileData', (data) => {
                    currentUser = data;
                    renderUserProfile(data);
                    
                    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                    window.history.replaceState({path: newUrl}, '', newUrl);

                    socket.emit('getAppData', { appId: appId }, (res) => {
                        if (res && res.watchedPins) {
                            res.watchedPins.forEach(pin => {
                                if(!watchedPins.includes(pin)) {
                                    watchedPins.push(pin);
                                    addWatcherVideoPlaceholder(pin);
                                    if(currentMode === 'watcher') {
                                        requestCameraStream(pin);
                                    }
                                }
                            });
                        }
                    });
                });
            } else {
                renderGuestLogin();
            }
        }

        function renderUserProfile(data) {
            const headerContainer = document.getElementById('header-container');
            headerContainer.innerHTML = `
                <div class="flex items-center space-x-3 cursor-pointer bg-white p-2 rounded-lg shadow-sm hover:shadow-md transition" onclick="goToSSO()">
                    <img src="${data.avatar || 'https://via.placeholder.com/40'}" alt="頭像" class="w-10 h-10 rounded-full border border-gray-200">
                    <div>
                        <div class="font-bold text-gray-800 text-sm">${data.nickname || '玩家'} <span class="text-xs text-blue-500">Lv.${data.level || 1}</span></div>
                        <div class="text-xs text-yellow-600 font-semibold">P幣: ${data.pCoin || 0}</div>
                    </div>
                </div>
            `;
        }

        function renderGuestLogin() {
            const headerContainer = document.getElementById('header-container');
            headerContainer.innerHTML = `
                <button onclick="goToSSO(true)" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow">
                    登入 / 註冊
                </button>
            `;
        }

        function goToSSO(requireAuth = false) {
            let ssoUrl = 'https://pandapanda6666.github.io/login-hub/?from=' + encodeURIComponent(window.location.href);
            if (requireAuth) {
                ssoUrl += '&require=1';
            }
            window.location.href = ssoUrl;
        }

        function reportIssue() {
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?action=reportIssue&from=' + encodeURIComponent(window.location.href);
        }

        function showSystemMessage(msg, isError = false) {
            const msgDiv = document.getElementById('system-message');
            msgDiv.textContent = msg;
            msgDiv.className = `p-3 mb-4 rounded ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            msgDiv.style.display = 'block';
            setTimeout(() => { msgDiv.style.display = 'none'; }, 8000);
        }

        function updateWatcherStatus(pin, msg, isError = false) {
            const statusEl = document.getElementById('status-' + pin);
            if(statusEl) {
                statusEl.textContent = msg;
                statusEl.className = `text-xs ml-2 ${isError ? 'text-red-400' : 'text-yellow-400'}`;
                if(msg === '已連線' || msg.includes('接收影像中')) {
                    statusEl.className = 'text-xs ml-2 text-green-400';
                }
            }
        }

        function updateCameraViewerCount() {
            const countEl = document.getElementById('camera-viewer-count');
            if(countEl) {
                countEl.textContent = `觀看人數: ${activeViewers.length}`;
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-selection').style.display = 'none';
            if (mode === 'camera') {
                document.getElementById('camera-mode-ui').style.display = 'block';
                startCameraMode();
            } else {
                document.getElementById('watcher-mode-ui').style.display = 'block';
                if(watchedPins.length > 0) {
                    watchedPins.forEach(pin => requestCameraStream(pin));
                }
            }
        }

        async function startCameraMode() {
            if (!window.isSecureContext) {
                showSystemMessage('警告：您的瀏覽器環境非安全連線 (HTTPS)，可能無法開啟相機與麥克風權限！', true);
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const videoEl = document.getElementById('local-video');
                videoEl.srcObject = localStream;
                
                myPin = Math.floor(100000 + Math.random() * 900000).toString();
                document.getElementById('camera-pin-display').textContent = '代碼: ' + myPin;
                writeDebugLog(`相機與麥克風已啟動，您的對外監看代碼: ${myPin}`);

                socket.emit('logAppMessage', { appId: appId, message: '開啟被監看模式，代碼:' + myPin, type: 'info' });

                startSendingFrames();
                startSendingAudio();

            } catch (err) {
                let errMsg = err.message;
                if (err.name === 'NotAllowedError') errMsg = '您拒絕了權限，請點擊 Chrome 網址列左側的鎖頭圖示來允許存取。';
                if (err.name === 'NotFoundError') errMsg = '找不到相機或麥克風設備，請確認硬體是否正常。';
                showSystemMessage('無法取得影音權限: ' + errMsg, true);
                writeDebugLog(`獲取影音權限失敗: ${err.name}`);
            }
        }

        function startSendingFrames() {
            const videoEl = document.getElementById('local-video');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            sendFrameInterval = setInterval(() => {
                if (activeViewers.length === 0) return; 

                if (videoEl.videoWidth > 0 && videoEl.videoHeight > 0) {
                    canvas.width = 320; 
                    canvas.height = (canvas.width / videoEl.videoWidth) * videoEl.videoHeight;
                    ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
                    
                    const frameData = canvas.toDataURL('image/jpeg', 0.4);

                    socket.emit('appData', {
                        room: appId,
                        action: 'socket_video_frame',
                        pin: myPin,
                        frame: frameData
                    });
                }
            }, 100); 
            writeDebugLog(`已啟動影像截圖轉發機制 (10FPS)`);
        }

        function startSendingAudio() {
            if (!localStream) return;
            try {
                audioRecorder = new MediaRecorder(localStream, { mimeType: 'audio/webm; codecs=opus' });
                audioRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0 && activeViewers.length > 0) {
                        socket.emit('appData', {
                            room: appId,
                            action: 'socket_audio_chunk',
                            pin: myPin,
                            chunk: event.data
                        });
                    }
                };
                audioRecorder.start(500); 
                writeDebugLog(`已啟動麥克風音軌分片轉發機制 (500ms)`);
            } catch(e) {
                writeDebugLog(`麥克風分片轉發啟動失敗: ${e}`);
            }
        }

        function watchNewCamera() {
            const pinInput = document.getElementById('watch-pin-input').value.trim();
            if (pinInput.length !== 6) {
                alert('請輸入6位數代碼');
                return;
            }
            if (!watchedPins.includes(pinInput)) {
                watchedPins.push(pinInput);
                addWatcherVideoPlaceholder(pinInput);
                initAudioReceiver(pinInput);
                saveCloudData();
                socket.emit('logAppMessage', { appId: appId, message: '嘗試監看代碼:' + pinInput, type: 'info' });
            }
            requestCameraStream(pinInput);
            document.getElementById('watch-pin-input').value = '';
        }

        function saveCloudData() {
            if (currentUser) {
                socket.emit('saveAppData', { appId: appId, data: { watchedPins: watchedPins } });
            }
        }

        function addWatcherVideoPlaceholder(pin) {
            const container = document.getElementById('remote-videos-container');
            if (document.getElementById('video-wrapper-' + pin)) return;

            const wrapper = document.createElement('div');
            wrapper.id = 'video-wrapper-' + pin;
            wrapper.className = 'video-container shadow-lg flex justify-center items-center';
            wrapper.innerHTML = `
                <div class="camera-pin">監看代碼: ${pin} <span id="status-${pin}" class="text-yellow-400 text-xs ml-2">等待操作...</span></div>
                <img id="remote-video-${pin}" class="remote-img" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="等待影像...">
                <audio id="remote-audio-${pin}" autoplay></audio>
                <button id="play-btn-${pin}" onclick="playMedia('${pin}')" class="absolute bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded z-20">
                    點擊接收影音
                </button>
                <div class="absolute bottom-2 right-2 flex space-x-2 z-10">
                    <button onclick="requestCameraStream('${pin}')" class="bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded text-xs">重連</button>
                    <button onclick="removeWatcher('${pin}')" class="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded text-xs">移除</button>
                </div>
            `;
            container.appendChild(wrapper);
        }

        function playMedia(pin) {
            const playBtn = document.getElementById('play-btn-' + pin);
            if (playBtn) playBtn.style.display = 'none';
            const audioEl = document.getElementById('remote-audio-' + pin);
            if (audioEl) {
                audioEl.play().catch(e => writeDebugLog(`解除靜音失敗: ${e}`));
            }
            const statusEl = document.getElementById('status-' + pin);
            if (statusEl) statusEl.textContent = '接收影像與聲音中...';
        }

        function initAudioReceiver(pin) {
            const audioEl = document.getElementById('remote-audio-' + pin);
            if (!audioEl) return;

            try {
                const ms = new MediaSource();
                audioEl.src = URL.createObjectURL(ms);
                mediaSources[pin] = ms;
                audioQueues[pin] = [];

                ms.addEventListener('sourceopen', () => {
                    try {
                        const sb = ms.addSourceBuffer('audio/webm; codecs=opus');
                        sourceBuffers[pin] = sb;

                        sb.addEventListener('updateend', () => {
                            if (audioQueues[pin].length > 0 && !sb.updating) {
                                sb.appendBuffer(audioQueues[pin].shift());
                            }
                        });
                    } catch (e) {
                        writeDebugLog(`建立音軌緩衝區失敗: ${e}`);
                    }
                });
            } catch(e) {
                writeDebugLog(`初始化 MediaSource 失敗 (可能是蘋果裝置不支援): ${e}`);
            }
        }

        function removeWatcher(pin) {
            const index = watchedPins.indexOf(pin);
            if (index > -1) {
                watchedPins.splice(index, 1);
                saveCloudData();
            }
            const wrapper = document.getElementById('video-wrapper-' + pin);
            if (wrapper) wrapper.remove();
            
            if (mediaSources[pin] && mediaSources[pin].readyState === 'open') {
                mediaSources[pin].endOfStream();
            }
            delete sourceBuffers[pin];
            delete mediaSources[pin];
            delete audioQueues[pin];

            socket.emit('appData', {
                room: appId,
                action: 'stop_stream',
                pin: pin,
                requesterId: myClientId
            });
            writeDebugLog(`已移除監看頻道: ${pin}`);
        }

        function requestCameraStream(pin) {
            updateWatcherStatus(pin, '透過伺服器呼叫中...');
            
            socket.emit('appData', {
                room: appId,
                action: 'request_socket_stream',
                pin: pin,
                requesterId: myClientId
            });
            
            writeDebugLog(`==> 要求頻道 ${pin} 開始轉發影音`);
            
            setTimeout(() => {
                const statusEl = document.getElementById('status-' + pin);
                if(statusEl && (statusEl.textContent.includes('呼叫中') || statusEl.textContent.includes('等待'))) {
                    updateWatcherStatus(pin, '對方未上線或代碼錯誤', true);
                }
            }, 5000);
        }

        function setupSocketListeners() {
            socket.on('appData', (data) => {
                
                if (currentMode === 'camera' && data.action === 'request_socket_stream' && data.pin === myPin) {
                    const requesterId = data.requesterId;
                    if (!activeViewers.includes(requesterId)) {
                        activeViewers.push(requesterId);
                        updateCameraViewerCount();
                        writeDebugLog(`客戶端 ${requesterId} 開始接收影音`);
                    }
                }

                if (currentMode === 'camera' && data.action === 'stop_stream' && data.pin === myPin) {
                    const requesterId = data.requesterId;
                    activeViewers = activeViewers.filter(id => id !== requesterId);
                    updateCameraViewerCount();
                    writeDebugLog(`客戶端 ${requesterId} 停止接收影音`);
                }

                if (currentMode === 'watcher' && data.action === 'socket_video_frame') {
                    const pin = data.pin;
                    if (watchedPins.includes(pin)) {
                        const imgEl = document.getElementById(`remote-video-${pin}`);
                        if (imgEl) {
                            imgEl.src = data.frame;
                            
                            const now = Date.now();
                            if (!lastFrameTimes[pin] || now - lastFrameTimes[pin] > 2000) {
                                const btn = document.getElementById('play-btn-' + pin);
                                if (!btn || btn.style.display === 'none') {
                                    updateWatcherStatus(pin, '接收影像與聲音中...');
                                }
                            }
                            lastFrameTimes[pin] = now;
                        }
                    }
                }

                if (currentMode === 'watcher' && data.action === 'socket_audio_chunk') {
                    const pin = data.pin;
                    if (watchedPins.includes(pin) && sourceBuffers[pin]) {
                        const sb = sourceBuffers[pin];
                        const chunk = data.chunk; 
                        
                        if (!sb.updating && audioQueues[pin].length === 0) {
                            try {
                                sb.appendBuffer(chunk);
                            } catch(e) {
                                writeDebugLog(`寫入音軌緩衝異常: ${e}`);
                            }
                        } else {
                            audioQueues[pin].push(chunk);
                        }
                    }
                }
            });

            if (currentMode === 'watcher') {
                setInterval(() => {
                    const now = Date.now();
                    watchedPins.forEach(pin => {
                        if (lastFrameTimes[pin] && now - lastFrameTimes[pin] > 3000) {
                            updateWatcherStatus(pin, '連線不穩或對方已離線', true);
                        }
                    });
                }, 3000);
            }
        }

        window.onload = initConnection;
    </script>

    <header class="bg-gray-800 p-4 flex justify-between items-center text-white shadow-md">
        <h1 class="text-xl font-bold tracking-wider">即時遠端監看系統</h1>
        <div id="header-container">
            <span class="text-sm text-gray-400">載入中...</span>
        </div>
    </header>

    <main class="flex-grow p-4 md:p-8">
        <div id="system-message" style="display:none;"></div>

        <div id="mode-selection" class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg text-center">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">請選擇您的裝置模式</h2>
            <div class="space-y-4">
                <button onclick="setMode('camera')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow">
                    視為被監看端 (相機模式)
                </button>
                <button onclick="setMode('watcher')" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow">
                    視為觀看端 (監看模式)
                </button>
            </div>
            <p class="mt-4 text-sm text-gray-500">提示：系統已自動連接雲端伺服器，資料即時同步。</p>
        </div>

        <div id="camera-mode-ui" style="display: none;" class="text-center">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">被監看模式 (伺服器轉發中)</h2>
            <div class="video-container shadow-xl">
                <div id="camera-viewer-count" class="viewer-count">觀看人數: 0</div>
                <div id="camera-pin-display" class="camera-pin">代碼: 產生中...</div>
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            <p class="mt-4 text-gray-600">請在另一台裝置輸入上方代碼以進行監看</p>
            <button onclick="location.reload()" class="mt-4 bg-gray-500 hover:bg-gray-600 text-white py-2 px-4 rounded">返回重新選擇</button>
            <div class="max-w-md mx-auto text-left mt-8">
                <h3 class="text-sm font-bold text-gray-700">進階連線診斷日誌：</h3>
                <div id="debug-log"></div>
            </div>
        </div>

        <div id="watcher-mode-ui" style="display: none;">
            <div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-md mb-8">
                <h2 class="text-xl font-bold mb-4 text-gray-800">新增監看頻道</h2>
                <div class="flex space-x-2">
                    <input type="text" id="watch-pin-input" placeholder="請輸入6位數代碼" class="flex-grow border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500" maxlength="6">
                    <button onclick="watchNewCamera()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-6 rounded transition">連線</button>
                </div>
            </div>

            <div id="remote-videos-container" class="grid-videos max-w-6xl mx-auto">
            </div>
            <div class="text-center mt-8">
                <button onclick="location.reload()" class="bg-gray-500 hover:bg-gray-600 text-white py-2 px-4 rounded">返回重新選擇</button>
            </div>
        </div>
    </main>

    <button onclick="reportIssue()" class="fixed bottom-16 right-6 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-5 rounded-full shadow-lg transition duration-200 z-50 flex items-center border-2 border-white">
        回報問題
    </button>
