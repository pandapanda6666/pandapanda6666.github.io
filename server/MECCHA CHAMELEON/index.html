    <script>
        // --- 1. 強制建立連線與全域錯誤捕捉 ---
        const originalWarn = console.warn;
        console.warn = function(...args) {
            if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
            originalWarn.apply(console, args);
        };
        window.onerror = function(msg, url, line) { 
            if (typeof window.socket !== 'undefined' && window.socket.connected) window.socket.emit('logError', { errorMsg: msg, url: url, line: line }); 
        };
        window.addEventListener('unhandledrejection', function(event) {
            if (typeof window.socket !== 'undefined' && window.socket.connected) window.socket.emit('logError', { errorMsg: 'Promise異常: ' + (event.reason ? event.reason.message || event.reason : '未知錯誤'), url: window.location.href, line: 0 });
        });

        // 獲取網頁的絕對路徑(不含參數)作為此應用的專屬識別碼
        const appId = window.location.hostname + window.location.pathname;
        let pCoinIconHTML = `<img src="https://cdn-icons-png.flaticon.com/512/1000/1000136.png" alt="P幣" style="width: 20px; height: 20px; vertical-align: sub; display: inline-block; margin: 0 2px;">`;
    </script>

        #report-btn {

            border-radius: 30px; font-weight: bold; cursor: pointer; text-decoration: none;
            border: 2px solid #ef4444; transition: all 0.2s; backdrop-filter: blur(5px); pointer-events: auto;

<body>

    <!-- 3D Canvas -->

    <!-- 畫板 UI (遊戲中按 Q 顯示) -->

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">

        <p class="text-slate-300 text-lg mb-6 max-w-md text-center">

    <!-- 回報問題按鈕 -->

    <!-- 版權宣告 -->

    <script>
        // --- Socket.IO 與 SSO 整合系統 ---
        let socket;
        let currentUserProfile = null;
        let cloudData = { gamesPlayed: 0, wins: 0, timesCaught: 0 };
        
        function initBroadcasts() {
            fetch('https://pandapanda6666.github.io/login-hub/server_broadcast.json')
                .then(res => res.json())
                .then(list => { window.broadcasts = list; localStorage.setItem('broadcasts', JSON.stringify(list)); })
                .catch(() => { window.broadcasts = JSON.parse(localStorage.getItem('broadcasts') || '[]'); });

            setInterval(() => {
                const now = Date.now(); const bar = document.getElementById('notificationBar'); const msgText = document.getElementById('notificationMsg');
                let activeMsg = null; const list = window.broadcasts || JSON.parse(localStorage.getItem('broadcasts') || '[]');
                for (let b of list) {
                    const st = new Date(b.startTime).getTime();
                    if (b.mode === 1) {
                        const intervalMs = b.intervalMin * 60000; const end = st + ((b.repeatCount - 1) * intervalMs) + 60000;
                        if (now >= st && now <= end) { const elapsed = now - st; if (elapsed % intervalMs < 60000) activeMsg = b.message; }
                    } else if (b.mode === 2) { 
                        const et = new Date(b.endTime).getTime(); if (now >= st && now <= et) activeMsg = b.message; 
                    }
                }
                if (activeMsg) { msgText.innerText = activeMsg; bar.style.display = 'block'; } else { bar.style.display = 'none'; }
            }, 1000);
        }

        function initSSOAndSocket() {
            const urlParams = new URLSearchParams(window.location.search);
            const isAuth = urlParams.get('auth') === 'true';
            const usernameParam = urlParams.get('user');

            if (isAuth && usernameParam) {
                localStorage.setItem('sso_user', usernameParam);
                localStorage.setItem('sso_auth', 'true');
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({path: cleanUrl}, '', cleanUrl);
            }

            const savedUser = localStorage.getItem('sso_user');
            const isLoggedIn = localStorage.getItem('sso_auth') === 'true';
            const authContainer = document.getElementById('auth-container');

            if (isLoggedIn && savedUser) {
                authContainer.innerHTML = `
                    <div class="auth-card" onclick="goToLoginHub()">
                        <img id="ui-avatar" class="auth-avatar" src="https://via.placeholder.com/40" alt="Avatar">
                        <div class="auth-info">
                            <span id="ui-nickname" class="auth-name">載入中...</span>
                            <span id="ui-pcoins" class="auth-coins">-- ${pCoinIconHTML}</span>
                        </div>
                    </div>
                `;
            } else {
                authContainer.innerHTML = `<button class="btn-login" onclick="goToLoginHub(true)">登入 / 註冊</button>`;
            }

            const urlParamServer = urlParams.get('server');
            if (urlParamServer) {
                connectSocket(urlParamServer, savedUser);
            } else {
                fetch('https://pandapanda6666.github.io/login-hub/server_url.txt')
                .then(res => res.text())
                .then(text => {
                    const serverUrl = atob(text.trim().split('').reverse().join(''));
                    connectSocket(serverUrl, savedUser);
                })
                .catch(err => {
                    console.error("無法獲取伺服器網址", err);
                    document.getElementById('auth-container').innerHTML = `<div style="background:rgba(255,0,0,0.8); color:white; padding:10px; border-radius:10px;">伺服器連線失敗，請稍後再試</div>`;
                });
            }
        }

        function connectSocket(serverUrl, savedUser) {
            window.socket = io(serverUrl, { transports: ['websocket'] });

            window.socket.on('connect', () => {
                window.socket.emit('initClientInfo', { location: '未知地點', device: navigator.userAgent });
                // 使用者名稱預設為訪客
                const joinName = savedUser || '訪客';
                window.socket.emit('joinGameRoom', { 
                    room: appId, 
                    characterData: { name: joinName, role: selectedRole } 
                });

                if (savedUser) window.socket.emit('requestProfile', { username: savedUser });

                window.socket.emit('getAppData', { appId: appId }, (res) => {
                    if(res && res.data) cloudData = Object.assign(cloudData, res.data);
                });

                window.socket.on('broadcastSchedule', (list) => {
                    window.broadcasts = list;
                    localStorage.setItem('broadcasts', JSON.stringify(list));
                });
            });

            window.socket.on('profileData', (data) => {
                if(data && data.nickname) {
                    currentUserProfile = data;
                    document.getElementById('ui-nickname').innerText = data.nickname;
                    document.getElementById('ui-pcoins').innerHTML = `${data.pCoin || 0} ${pCoinIconHTML}`;
                    if(data.avatar) document.getElementById('ui-avatar').src = data.avatar;
                }
            });

            // 多人連線事件
            window.socket.on('playerJoined', (data) => {
                if(data.allPlayers) data.allPlayers.forEach(p => updateOtherPlayerUI(p));
            });
            window.socket.on('playerStateUpdated', (data) => {
                if(data.id !== window.socket.id) updateOtherPlayerUI(data);
            });
            window.socket.on('playerLeft', (data) => {
                removeOtherPlayerUI(data.id);
            });
            
            // 自訂事件：接收到被抓捕的通知
            window.socket.on('appData', (payload) => {
                if(payload.action === 'playerCaught' && payload.targetId === window.socket.id) {
                    if(gameState === 'playing') handleCaughtBySeeker();
                }
            });
        }

        function goToLoginHub(requireAuth = false) {
            let url = 'https://pandapanda6666.github.io/login-hub/?from=' + encodeURIComponent(window.location.href);
            if(requireAuth) url += '&require=1';
            window.location.href = url;
        }

        function reportIssue(e) {
            e.preventDefault();
            window.location.href = 'https://pandapanda6666.github.io/login-hub/?action=reportIssue&from=' + encodeURIComponent(window.location.href);
        }

        function saveGameToCloud() {
            if(window.socket && window.socket.connected) {
                window.socket.emit('saveAppData', { appId: appId, data: cloudData });
            }
        }

        let scene, camera, renderer;
        let environmentObjects = [];
        let playerRig, localPlayerGroup;
        let isThirdPerson = true;
        let selectedRole = 'hider'; // 'hider' 或 'seeker'
        
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let prevTime = performance.now();
        const speed = 40.0;
        const playerHeight = 1.5;
        let euler = new THREE.Euler(0, 0, 0, 'YXZ');
        const PI_2 = Math.PI / 2;

        let gameState = 'start'; 
        let isDrawingMode = false;
        
        // 塗鴉相關
        let skinCanvas, skinCtx, skinTexture;
        let skinBase64Cache = ""; // 快取目前畫布的 base64 避免重複發送
        let isPainting = false;
        let brushColor = '#ffffff';

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 20, 70);

            playerRig = new THREE.Group();
            scene.add(playerRig);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            playerRig.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('gameCanvas').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 0.6, 150);
            pointLight.position.set(0, 30, 0);
            scene.add(pointLight);

            buildLevel();
            setupInputControls();
            initDrawingCanvas();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, false);

            animate();
        }

        function buildLevel() {
            // 地板
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
            environmentObjects.push(floor);

            // 蒙德里安風格的彩色拼牆 (供玩家躲藏參考)
            const wallZ = -40;
            const colors = [0xff3333, 0x3333ff, 0x33ff33, 0xffff33, 0xffffff, 0x222222, 0xff9933];
            for(let i=0; i<16; i++) {
                for(let j=0; j<5; j++) {
                    const w = 4 + Math.random() * 4;
                    const h = 4 + Math.random() * 4;
                    const geo = new THREE.PlaneGeometry(w, h);
                    const mat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)], side: THREE.DoubleSide });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(-35 + (i*5), h/2 + (j*4), wallZ);
                    scene.add(mesh);
                    environmentObjects.push(mesh);
                }
            }
            
            // 四周牆壁
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            const wallGeo = new THREE.BoxGeometry(100, 20, 2);
            const w1 = new THREE.Mesh(wallGeo, wallMat); w1.position.set(0, 10, 50); scene.add(w1); environmentObjects.push(w1);
            const w2 = new THREE.Mesh(wallGeo, wallMat); w2.position.set(50, 10, 0); w2.rotation.y = Math.PI/2; scene.add(w2); environmentObjects.push(w2);
            const w3 = new THREE.Mesh(wallGeo, wallMat); w3.position.set(-50, 10, 0); w3.rotation.y = Math.PI/2; scene.add(w3); environmentObjects.push(w3);

            // 散落的障礙物
            for(let i=0; i<40; i++) {
                const size = 2 + Math.random() * 3;
                const geo = new THREE.BoxGeometry(size, size*1.5, size);
                const mat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set((Math.random() - 0.5) * 80, size*0.75, (Math.random() - 0.5) * 70 + 5);
                mesh.castShadow = true; mesh.receiveShadow = true;
                scene.add(mesh);
                environmentObjects.push(mesh);
            }
        }

        function createHumanoidMesh(isSeeker = false, customTexture = null) {
            const group = new THREE.Group();
            
            let material;
            if(isSeeker) {
                // 尋找者外觀：紅色發光
                material = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x550000 });
            } else {
                // 躲藏者外觀：預設白色或使用 CanvasTexture
                material = new THREE.MeshStandardMaterial({ color: 0xffffff });
                if(customTexture) material.map = customTexture;
            }

            // 頭部
            const headGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const head = new THREE.Mesh(headGeo, material);
            head.position.y = 1.4;
            head.castShadow = true;
            group.add(head);
            
            // 尋找者專屬：探照燈與眼睛
            if(isSeeker) {
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                const eyes = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.85), eyeMat);
                eyes.position.y = 1.4;
                group.add(eyes);
                
                const spotLight = new THREE.SpotLight(0xff5555, 1.5, 30, Math.PI/6, 0.5, 1);
                spotLight.position.set(0, 1.4, 0);
                spotLight.target.position.set(0, 0, -5);
                group.add(spotLight);
                group.add(spotLight.target);
            }

            // 身體
            const bodyGeo = new THREE.BoxGeometry(1, 1.2, 0.5);
            const body = new THREE.Mesh(bodyGeo, material);
            body.position.y = 0.4;
            body.castShadow = true;
            group.add(body);

            // 手腳
            const limbGeo = new THREE.BoxGeometry(0.3, 1, 0.3);
            const lArm = new THREE.Mesh(limbGeo, material); lArm.position.set(-0.7, 0.4, 0); lArm.castShadow = true; group.add(lArm);
            const rArm = new THREE.Mesh(limbGeo, material); rArm.position.set(0.7, 0.4, 0); rArm.castShadow = true; group.add(rArm);
            const lLeg = new THREE.Mesh(limbGeo, material); lLeg.position.set(-0.25, -0.7, 0); lLeg.castShadow = true; group.add(lLeg);
            const rLeg = new THREE.Mesh(limbGeo, material); rLeg.position.set(0.25, -0.7, 0); rLeg.castShadow = true; group.add(rLeg);

            return group;
        }

        function createLocalPlayer() {
            if(localPlayerGroup) {
                playerRig.remove(localPlayerGroup);
            }
            
            if(selectedRole === 'seeker') {
                localPlayerGroup = createHumanoidMesh(true);
            } else {
                localPlayerGroup = createHumanoidMesh(false, skinTexture);
            }
            
            playerRig.add(localPlayerGroup);
            toggleCamera(isThirdPerson); // 確保視角正確
        }

        function toggleCamera(forceThirdPerson = null) {
            if(forceThirdPerson !== null) isThirdPerson = forceThirdPerson;
            else isThirdPerson = !isThirdPerson;
            
            if (isThirdPerson) {
                camera.position.set(0, 2.5, 5); // 第三人稱
                if(localPlayerGroup) localPlayerGroup.visible = true;
            } else {
                camera.position.set(0, 1.4, 0.2); // 第一人稱 (頭部位置)
                if(localPlayerGroup) localPlayerGroup.visible = false;
            }
            camera.rotation.set(0,0,0); 
        }

        function initDrawingCanvas() {
            skinCanvas = document.getElementById('skinCanvas');
            skinCtx = skinCanvas.getContext('2d');
            skinCtx.fillStyle = '#ffffff';
            skinCtx.fillRect(0, 0, 128, 128); // 填滿白色底
            
            skinTexture = new THREE.CanvasTexture(skinCanvas);
            skinTexture.magFilter = THREE.NearestFilter; // 像素風格
            
            // 建立調色盤
            const colors = ['#ffffff', '#ff3333', '#3333ff', '#33ff33', '#ffff33', '#222222', '#ff9933', '#ff33ff'];
            const palette = document.getElementById('color-palette');
            colors.forEach(color => {
                const btn = document.createElement('div');
                btn.className = 'color-btn';
                btn.style.backgroundColor = color;
                if(color === brushColor) btn.classList.add('active');
                btn.onclick = () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    brushColor = color;
                };
                palette.appendChild(btn);
            });

            // 繪圖事件
            skinCanvas.addEventListener('mousedown', (e) => { isPainting = true; draw(e); });
            skinCanvas.addEventListener('mousemove', draw);
            skinCanvas.addEventListener('mouseup', () => { isPainting = false; skinCtx.beginPath(); updateSkinTexture(); });
            skinCanvas.addEventListener('mouseleave', () => { isPainting = false; skinCtx.beginPath(); });

            document.getElementById('btn-clear-draw').onclick = () => {
                skinCtx.fillStyle = brushColor;
                skinCtx.fillRect(0, 0, 128, 128);
                updateSkinTexture();
            };
            document.getElementById('btn-finish-draw').onclick = toggleDrawingMode;
        }

        function draw(e) {
            if(!isPainting) return;
            const rect = skinCanvas.getBoundingClientRect();
            // 計算相對於畫布實際大小的座標 (處理 CSS 縮放)
            const scaleX = skinCanvas.width / rect.width;
            const scaleY = skinCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            skinCtx.lineWidth = 15;
            skinCtx.lineCap = 'round';
            skinCtx.strokeStyle = brushColor;
            
            skinCtx.lineTo(x, y);
            skinCtx.stroke();
            skinCtx.beginPath();
            skinCtx.moveTo(x, y);
            
            // 邊畫邊更新本機材質
            if(skinTexture) skinTexture.needsUpdate = true;
        }

        function updateSkinTexture() {
            if(skinTexture) skinTexture.needsUpdate = true;
            // 快取 Base64 準備傳給伺服器 (壓縮畫質以節省頻寬)
            skinBase64Cache = skinCanvas.toDataURL('image/jpeg', 0.5);
            // 立即發送一次更新
            syncStateWithServer(true); 
        }

        function toggleDrawingMode() {
            if(gameState !== 'playing' || selectedRole === 'seeker') return;
            isDrawingMode = !isDrawingMode;
            const ui = document.getElementById('drawing-ui');
            if(isDrawingMode) {
                document.exitPointerLock();
                ui.classList.remove('hidden');
            } else {
                ui.classList.add('hidden');
                document.body.requestPointerLock();
            }
        }

        function setupInputControls() {
            const onKeyDown = function ( event ) {
                if(gameState !== 'playing') return;
                switch ( event.code ) {
                    case 'ArrowUp': case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight': case 'KeyD': moveRight = true; break;
                    case 'KeyV': if(!isDrawingMode) toggleCamera(); break;
                    case 'KeyQ': toggleDrawingMode(); break;
                }
            };

            const onKeyUp = function ( event ) {
                switch ( event.code ) {
                    case 'ArrowUp': case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight': case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener( 'keydown', onKeyDown );
            document.addEventListener( 'keyup', onKeyUp );

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body && gameState === 'playing' && !isDrawingMode) {
                    const movementX = e.movementX || 0;
                    const movementY = e.movementY || 0;
                    
                    euler.setFromQuaternion( playerRig.quaternion );
                    euler.y -= movementX * 0.002;
                    playerRig.quaternion.setFromEuler( new THREE.Euler(0, euler.y, 0, 'YXZ') );

                    let camEuler = new THREE.Euler(0, 0, 0, 'YXZ');
                    camEuler.setFromQuaternion(camera.quaternion);
                    camEuler.x -= movementY * 0.002;
                    camEuler.x = Math.max( - PI_2 + 0.1, Math.min( PI_2 - 0.1, camEuler.x ) );
                    camera.quaternion.setFromEuler( new THREE.Euler(camEuler.x, 0, 0, 'YXZ') );
                }
            });

            document.body.addEventListener('click', (e) => {
                if(e.target.closest('#auth-container') || e.target.closest('#drawing-ui') || e.target.closest('.overlay')) return;
                
                if(gameState === 'playing' && !isDrawingMode) {
                    document.body.requestPointerLock();
                    
                    // 尋找者左鍵抓捕邏輯
                    if(selectedRole === 'seeker') {
                        attemptCatch();
                    }
                }
            });

            // UI 綁定
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    selectedRole = e.currentTarget.getAttribute('data-role');
                });
            });

            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', resetGame);
        }

        function attemptCatch() {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            
            // 獲取所有其他玩家的 Mesh
            const playerMeshes = Object.values(otherPlayers).map(p => p.mesh);
            const intersects = raycaster.intersectObjects(playerMeshes, true);

            if (intersects.length > 0) {
                // 找出被擊中的頂層 Group
                let hitObject = intersects[0].object;
                while(hitObject.parent && hitObject.parent.type !== 'Scene' && !hitObject.userData.playerId) {
                    hitObject = hitObject.parent;
                }
                
                const targetId = hitObject.userData.playerId;
                const targetInfo = otherPlayers[targetId];
                
                // 如果抓到的是躲藏者，發送廣播
                if(targetInfo && targetInfo.role === 'hider' && window.socket) {
                    // 視覺回饋 (探照燈閃紅)
                    document.getElementById('status-alert').innerText = "抓到一個！";
                    document.getElementById('status-alert').style.opacity = 1;
                    setTimeout(() => document.getElementById('status-alert').style.opacity = 0, 1000);
                    
                    window.socket.emit('appData', {
                        room: appId,
                        action: 'playerCaught',
                        targetId: targetId
                    });
                }
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            document.body.requestPointerLock();
            
            gameState = 'playing';
            isDrawingMode = false;
            
            // 根據身分設定 UI 與出生點
            if(selectedRole === 'seeker') {
                document.getElementById('instruction-seeker').classList.remove('hidden');
                document.getElementById('instruction-hider').classList.add('hidden');
                playerRig.position.set(0, playerHeight, 0); // 鬼生在中間
            } else {
                document.getElementById('instruction-seeker').classList.add('hidden');
                document.getElementById('instruction-hider').classList.remove('hidden');
                // 躲藏者生在邊緣
                playerRig.position.set((Math.random()-0.5)*80, playerHeight, (Math.random()-0.5)*80);
            }
            
            euler.set(0,0,0);
            playerRig.quaternion.setFromEuler(new THREE.Euler(0,0,0));
            velocity.set(0,0,0);
            
            createLocalPlayer();
            updateSkinTexture(); // 初始同步皮膚
            syncStateWithServer(true); // 強制同步初始狀態

            if(window.socket && window.socket.connected) {
                window.socket.emit('logAppMessage', { appId: appId, message: `玩家以 ${selectedRole} 身分開始遊戲`, type: 'info' });
            }
        }

        function resetGame() {
            document.getElementById('game-over-screen').classList.add('hidden');
            startGame();
        }

        function handleCaughtBySeeker() {
            gameState = 'gameover';
            document.exitPointerLock();
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('drawing-ui').classList.add('hidden');
            
            cloudData.timesCaught++;
            saveGameToCloud();
            
            document.getElementById('end-title').innerText = "被抓到了！";
            document.getElementById('end-reason').innerText = "尋找者發現了你的蹤跡！";
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        // 多人連線同步
        let otherPlayers = {}; // { id: { mesh, role, labelDiv } }
        let lastSyncTime = 0;

        function syncStateWithServer(force = false) {
            if (window.socket && window.socket.connected && gameState === 'playing') {
                const now = Date.now();
                if (force || now - lastSyncTime > 100) { // 10fps limit
                    const stateObj = {
                        x: playerRig.position.x,
                        y: playerRig.position.y,
                        z: playerRig.position.z,
                        rotY: playerRig.rotation.y,
                        role: selectedRole
                    };
                    
                    // 只有在強制同步或是剛畫完時，才發送較大的 Base64 圖片
                    if(force && selectedRole === 'hider') {
                        stateObj.skinBase64 = skinBase64Cache;
                    }

                    window.socket.emit('syncPlayerState', {
                        room: appId,
                        state: stateObj
                    });
                    lastSyncTime = now;
                }
            }
        }

        function updateOtherPlayerUI(p) {
            if(!scene) return;
            if(p.id === window.socket?.id) return;

            let op = otherPlayers[p.id];
            
            // 建立或重新建立模型 (如果身分改變)
            let pRole = p.state?.role || (p.characterData ? p.characterData.role : 'hider');
            
            if(!op || op.role !== pRole) {
                if(op && op.mesh) scene.remove(op.mesh);
                
                const mesh = createHumanoidMesh(pRole === 'seeker');
                mesh.userData.playerId = p.id; // 用於 Raycast 辨識
                scene.add(mesh);
                
                op = { mesh: mesh, role: pRole, textureCache: '' };
                otherPlayers[p.id] = op;
            }

            if(p.state) {
                // 平滑插值可以在未來加入，目前直接設定位置
                op.mesh.position.set(p.state.x, p.state.y, p.state.z);
                op.mesh.rotation.y = p.state.rotY;

                // 如果對方是躲藏者且有傳送新的皮膚資料
                if(pRole === 'hider' && p.state.skinBase64 && p.state.skinBase64 !== op.textureCache) {
                    op.textureCache = p.state.skinBase64;
                    const img = new Image();
                    img.onload = () => {
                        const tex = new THREE.Texture(img);
                        tex.magFilter = THREE.NearestFilter;
                        tex.needsUpdate = true;
                        
                        // 將材質套用到該玩家的所有身體部位
                        op.mesh.children.forEach(child => {
                            if(child.isMesh && child.material) {
                                child.material.map = tex;
                                child.material.color.setHex(0xffffff); // 清除顏色干擾
                                child.material.needsUpdate = true;
                            }
                        });
                    };
                    img.src = p.state.skinBase64;
                }
            }
        }

        function removeOtherPlayerUI(id) {
            if(otherPlayers[id]) {
                scene.remove(otherPlayers[id].mesh);
                delete otherPlayers[id];
            }
        }

        function animate() {
            requestAnimationFrame( animate );

            const time = performance.now();
            const delta = ( time - prevTime ) / 1000;

            if ( gameState === 'playing' && !isDrawingMode ) {
                // 簡易物理與移動
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number( moveForward ) - Number( moveBackward );
                direction.x = Number( moveRight ) - Number( moveLeft );
                direction.normalize();

                if ( moveForward || moveBackward ) velocity.z -= direction.z * speed * delta;
                if ( moveLeft || moveRight ) velocity.x -= direction.x * speed * delta;

                playerRig.translateX( velocity.x * delta );
                playerRig.translateZ( velocity.z * delta );

                if ( playerRig.position.y < playerHeight ) {
                    velocity.y = 0;
                    playerRig.position.y = playerHeight;
                }
                
                // 邊界限制
                const bound = 48;
                if(playerRig.position.x > bound) playerRig.position.x = bound;
                if(playerRig.position.x < -bound) playerRig.position.x = -bound;
                if(playerRig.position.z > bound) playerRig.position.z = bound;
                if(playerRig.position.z < -bound) playerRig.position.z = -bound;

                // 簡單動畫：移動時手腳擺動
                if(localPlayerGroup && (Math.abs(velocity.x) > 1 || Math.abs(velocity.z) > 1)) {
                    const walkCycle = Math.sin(time * 0.015);
                    // 假設身體結構順序為: 0:Head, 1:Body, 2:lArm, 3:rArm, 4:lLeg, 5:rLeg (如果是 Seeker 順序會不同，需安全取用)
                    // 為了簡化，直接用索引猜測，實際應在建立時指定 name
                    localPlayerGroup.children.forEach(child => {
                        if(child.position.y === 0.4 && child.position.x < 0) child.rotation.x = walkCycle; // lArm
                        if(child.position.y === 0.4 && child.position.x > 0) child.rotation.x = -walkCycle; // rArm
                        if(child.position.y < 0 && child.position.x < 0) child.rotation.x = -walkCycle; // lLeg
                        if(child.position.y < 0 && child.position.x > 0) child.rotation.x = walkCycle; // rLeg
                    });
                }

                syncStateWithServer();
            }
            
            // 讓其他玩家也有走路動畫
            Object.values(otherPlayers).forEach(op => {
                // 如果對方正在移動 (可透過記錄上次位置比對，此處簡化處理為只要時間在動就讓手腳輕微晃動)
                op.mesh.children.forEach(child => {
                    if(child.position.y === 0.4 && child.position.x < 0) child.rotation.x = Math.sin(time * 0.01);
                    if(child.position.y === 0.4 && child.position.x > 0) child.rotation.x = -Math.sin(time * 0.01);
                });
            });

            renderer.render( scene, camera );
            prevTime = time;
        }

        window.onload = function() {
            initBroadcasts();
            initSSOAndSocket();
            init3D();
        };
    </script>
</body>
</html>
